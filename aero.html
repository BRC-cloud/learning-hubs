{q:"Un tube de Pitot mesure :",o:["La pression totale","La pression statique","La température","Le cap magnétique"],c:0,e:"Le <b>tube de Pitot</b> capte la <b>pression totale</b> (statique + dynamique) en face de l'avion. Combiné à la prise de pression statique, il permet de calculer la vitesse. S'il est bouché (givre, insectes) → indications de vitesse fausses → danger critique."},
{q:"Le fuselage semi-monocoque est fait de :",o:["Cadres + lisses + revêtement","Longerons + nervures + boulons","Composite uniquement","Tubes soudés entre eux"],c:0,e:"<svg viewBox='0 0 260 110' style='width:100%;max-width:260px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:6px'><text x='130' y='14' text-anchor='middle' fill='#e2e8f0' font-size='9' font-weight='bold'>Fuselage semi-monocoque</text><ellipse cx='60' cy='60' rx='30' ry='35' fill='none' stroke='#3b82f6' stroke-width='2'/><ellipse cx='130' cy='60' rx='30' ry='35' fill='none' stroke='#3b82f6' stroke-width='2'/><ellipse cx='200' cy='60' rx='30' ry='35' fill='none' stroke='#3b82f6' stroke-width='2'/><text x='130' y='105' text-anchor='middle' fill='#93c5fd' font-size='8'>Cadres (anneaux)</text><line x1='35' y1='28' x2='225' y2='28' stroke='#059669' stroke-width='1.5'/><line x1='35' y1='40' x2='225' y2='40' stroke='#059669' stroke-width='1.5'/><line x1='35' y1='80' x2='225' y2='80' stroke='#059669' stroke-width='1.5'/><line x1='35' y1='92' x2='225' y2='92' stroke='#059669' stroke-width='1.5'/><text x='240' y='42' fill='#6ee7b7' font-size='7'>Lisses</text><rect x='30' y='25' width='200' height='70' rx='30' fill='none' stroke='#f97316' stroke-width='1.5' stroke-dasharray='4'/><text x='240' y='65' fill='#fdba74' font-size='7'>Peau</text></svg>Structure standard des avions de ligne. Les <b>cadres</b> donnent la forme, les <b>lisses</b> raidissent, le <b>revêtement</b> (peau) reprend les efforts de torsion et de pressurisation."},
{q:"Un turboréacteur fonctionne en :",o:["Aspirant, comprimant, brûlant, éjectant l'air","Faisant tourner une hélice par un moteur à pistons","Utilisant un moteur électrique et des batteries","Brûlant du charbon dans une chaudière"],c:0,e:"Le <b>turboréacteur</b> en 4 mots : <b>aspirer, comprimer, brûler, éjecter</b>. L'air entre par l'avant, le compresseur le comprime, le kérosène brûle dans la chambre de combustion, les gaz chauds sortent par la tuyère et font tourner la turbine (qui entraîne le compresseur). C'est un cycle continu."},
{q:"C'est quoi un compresseur dans un moteur d'avion ?",o:["Il comprime l'air avant la combustion","Il refroidit les gaz après la turbine","Il injecte le carburant","Il produit l'électricité de bord"],c:0,e:"Le <b>compresseur</b> = des disques avec des aubes qui tournent très vite pour <b>comprimer l'air</b>. Plus l'air est comprimé, plus la combustion est efficace. Les pièces du compresseur sont souvent en <b>titane</b> (Ti-6Al-4V) car il est léger et résistant à ~500 °C."},
{q:"C'est quoi une turbine dans un moteur d'avion ?",o:["Des aubes qui tournent grâce aux gaz chauds","Un ventilateur électrique de refroidissement","Un filtre à air","Un réservoir de carburant"],c:0,e:"La <b>turbine</b> = des aubes qui sont mises en rotation par les <b>gaz chauds</b> (>1000 °C) sortant de la chambre de combustion. La turbine est connectée au compresseur → elle le fait tourner. Matériaux : <b>superalliages de nickel</b> + barrière thermique (céramique YSZ)."},
{q:"C'est quoi un longeron ?",o:["La poutre principale qui résiste à la flexion de l'aile","Le revêtement extérieur du fuselage","Un câble de commande de vol","Un cadre transversal du fuselage"],c:0,e:"<svg viewBox='0 0 280 100' style='width:100%;max-width:280px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:6px'><text x='140' y='14' text-anchor='middle' fill='#e2e8f0' font-size='9' font-weight='bold'>Structure interne de l'aile</text><path d='M20,50 Q60,30 140,35 Q200,38 260,48' stroke='#94a3b8' stroke-width='1.5' fill='none'/><path d='M20,50 Q60,55 140,53 Q200,52 260,48' stroke='#94a3b8' stroke-width='1.5' fill='none'/><line x1='60' y1='35' x2='60' y2='53' stroke='#dc2626' stroke-width='3'/><line x1='180' y1='40' x2='180' y2='50' stroke='#dc2626' stroke-width='3'/><text x='120' y='30' text-anchor='middle' fill='#fca5a5' font-size='8' font-weight='bold'>Longerons (spars)</text><line x1='40' y1='42' x2='40' y2='52' stroke='#059669' stroke-width='1.5'/><line x1='90' y1='37' x2='90' y2='52' stroke='#059669' stroke-width='1.5'/><line x1='140' y1='36' x2='140' y2='52' stroke='#059669' stroke-width='1.5'/><line x1='210' y1='41' x2='210' y2='49' stroke='#059669' stroke-width='1.5'/><text x='140' y='68' text-anchor='middle' fill='#6ee7b7' font-size='8'>Nervures (ribs) = forme du profil</text><text x='140' y='82' text-anchor='middle' fill='#93c5fd' font-size='8'>Revêtement (skin) = reprend la torsion</text><text x='20' y='92' fill='#94a3b8' font-size='7'>Emplanture</text><text x='240' y='92' fill='#94a3b8' font-size='7'>Saumon</text></svg>Le <b>longeron</b> (spar) = la <b>poutre principale</b> de l'aile, de l'emplanture au saumon. Il résiste à la <b>flexion</b>. Matériau : <b>7075-T6</b> (alu) ou composite carbone."},
{q:"C'est quoi une nervure d'aile ?",o:["Un élément transversal qui donne la forme du profil","La poutre principale de l'aile","Le moteur accroché sous l'aile","Le câble de commande des volets"],c:0,e:"Les <b>nervures</b> (ribs) = des pièces transversales à l'intérieur de l'aile qui lui donnent sa <b>forme de profil aérodynamique</b>. Elles transmettent aussi les charges du revêtement vers les longerons. On peut les voir comme le squelette de l'aile."},
{q:"La postcombustion (afterburner) c'est :",o:["Injecter du carburant après la turbine pour un boost de poussée","Brûler le carburant une deuxième fois dans le compresseur","Refroidir le moteur après le vol","Éteindre le moteur en vol"],c:0,e:"La <b>postcombustion</b> = on injecte du kérosène <b>après la turbine</b>, directement dans la tuyère. Les gaz déjà chauds rebrûlent → <b>+50 % de poussée</b>. Mais ça consomme <b>2 à 3× plus</b> de carburant.<br><br>Utilisé uniquement sur les <b>chasseurs militaires</b> (M88 du Rafale, F135 du F-35) pour le décollage court, le combat et le passage supersonique. Jamais sur les avions de ligne (trop gourmand).<br><svg viewBox='0 0 300 70' style='width:100%;max-width:300px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:6px'><rect x='20' y='20' width='50' height='30' rx='4' fill='#334155' stroke='#94a3b8' stroke-width='1'/><text x='45' y='38' text-anchor='middle' fill='#94a3b8' font-size='7'>Compr.</text><rect x='75' y='20' width='50' height='30' rx='4' fill='#7c2d12' stroke='#f97316' stroke-width='1.5'/><text x='100' y='38' text-anchor='middle' fill='#fdba74' font-size='7'>Comb.</text><rect x='130' y='20' width='50' height='30' rx='4' fill='#334155' stroke='#94a3b8' stroke-width='1'/><text x='155' y='38' text-anchor='middle' fill='#94a3b8' font-size='7'>Turbine</text><rect x='185' y='15' width='60' height='40' rx='4' fill='#991b1b' stroke='#ef4444' stroke-width='2'/><text x='215' y='33' text-anchor='middle' fill='#fca5a5' font-size='8' font-weight='bold'>POST-</text><text x='215' y='44' text-anchor='middle' fill='#fca5a5' font-size='8' font-weight='bold'>COMB.</text><polygon points='250,25 280,35 250,45' fill='#f97316'/><text x='275' y='55' fill='#fdba74' font-size='7'>+50% poussée</text><text x='150' y='65' text-anchor='middle' fill='#94a3b8' font-size='8'>Carburant injecté ICI → boost temporaire</text></svg>"},
{q:"Un turbopropulseur entraîne :",o:["Une hélice via un réducteur","Uniquement un flux de gaz chauds","Un rotor d'hélicoptère","Des roues au sol"],c:0,e:"Le <b>turbopropulseur</b> (turboprop) = une turbine à gaz qui entraîne une <b>hélice</b> via un réducteur. Plus économe que le turboréacteur à basse vitesse (<500 km/h). Ex : ATR 72 (avions régionaux), A400M (militaire)."},
{q:"Un turbomoteur (turboshaft) entraîne :",o:["Le rotor d'un hélicoptère","Une hélice d'avion","Un flux de gaz pour la poussée","Les roues d'un véhicule"],c:0,e:"Le <b>turbomoteur</b> (turboshaft) = une turbine à gaz dont toute la puissance va à un <b>arbre de sortie</b> (pas de poussée par les gaz). Cet arbre entraîne le <b>rotor principal</b> d'un hélicoptère. Ex : Safran Helicopter Engines (basé à Bordes, 64)."},
{q:"Le type de moteur standard des avions de ligne modernes est :",o:["Le turboréacteur double flux (turbofan)","Le turboréacteur simple flux (turbojet)","Le turbopropulseur (turboprop)","Le moteur à pistons"],c:0,e:"Le <b>turbofan</b> (double flux) est le standard car il est plus <b>silencieux</b> et plus <b>économe</b> que le simple flux. La majorité de la poussée vient du <b>flux froid</b> (air qui contourne le cœur sans être brûlé).<br><svg viewBox='0 0 280 80' style='width:100%;max-width:280px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:6px'><rect x='30' y='25' width='30' height='30' rx='15' fill='#3b82f6'/><text x='45' y='44' text-anchor='middle' fill='white' font-size='8' font-weight='bold'>Fan</text><rect x='65' y='30' width='100' height='20' rx='4' fill='#7c2d12' stroke='#f97316' stroke-width='1'/><text x='115' y='44' text-anchor='middle' fill='#fdba74' font-size='7'>Cœur (flux chaud)</text><rect x='65' y='20' width='120' height='8' rx='3' fill='#1e3a5f' stroke='#3b82f6' stroke-width='1'/><rect x='65' y='52' width='120' height='8' rx='3' fill='#1e3a5f' stroke='#3b82f6' stroke-width='1'/><text x='200' y='28' fill='#93c5fd' font-size='7'>Flux froid (80%)</text><text x='200' y='46' fill='#fca5a5' font-size='7'>Flux chaud (20%)</text><text x='200' y='60' fill='#93c5fd' font-size='7'>Flux froid (80%)</text><text x='140' y='75' text-anchor='middle' fill='#94a3b8' font-size='8'>Bypass ratio LEAP ≈ 11:1</text></svg>"},
{q:"Le kérosène est :",o:["Le carburant des avions","Le lubrifiant des moteurs","Le liquide de refroidissement","Un gaz propulseur"],c:0,e:"Le <b>kérosène</b> (Jet A-1) = le carburant standard des avions. C'est un dérivé du pétrole, comme le diesel mais plus raffiné. Il brûle dans la <b>chambre de combustion</b> du moteur. Un A320 consomme ~2 500 L/h en croisière."},
],
L2:[
{q:"Le principal défaut du variomètre :",o:["Il a un retard de mesure","Il ne fonctionne qu'en virage","Il nécessite un recalage fréquent","Il ne fonctionne pas en altitude"],c:0,e:"Le <b>variomètre</b> (VSI) mesure la vitesse verticale (montée/descente en ft/min). Son principal défaut : il a un <b>retard</b> inhérent. Il ne donne pas une information instantanée, il faut attendre une phase stabilisée pour avoir une lecture fiable."},
{q:"L'intérêt des composites en aéro est surtout :",o:["L'allègement de la structure","La conductibilité électrique","Le coût inférieur au métal","La facilité d'usinage"],c:0,e:"Le composite est <b>plus léger</b> que le métal à résistance égale (haute résistance spécifique). L'A350 = 53 % composite → économies de carburant. Mais le composite n'est PAS conducteur (problème foudre) et coûte plus cher que l'alu."},
{q:"Le terme 'IAS' désigne :",o:["La vitesse indiquée par l'anémomètre","La vitesse sol mesurée par GPS","La vitesse vraie à une altitude","La vitesse sonique locale"],c:0,e:"<b>IAS</b> (Indicated Airspeed) = la vitesse affichée directement par l'anémomètre, non corrigée. La <b>TAS</b> (True Airspeed) corrige pour l'altitude et la température. La vitesse <b>sol</b> (GS) ajoute/soustrait le vent."},
{q:"Le fly-by-wire signifie :",o:["Commandes de vol électriques","Pilotage par câbles mécaniques","Navigation par fil d'Ariane","Transmission radio uniquement"],c:0,e:"<b>Fly-by-wire</b> = commandes de vol <b>électriques</b>. Le manche n'est plus relié mécaniquement aux gouvernes : il envoie un <b>signal électrique</b> à un calculateur qui commande des vérins hydrauliques. Avantage : protection contre le décrochage, optimisation automatique. Standard depuis l'A320 (1988)."},
],
L3:[
{q:"Le revêtement en aluminium (Alclad) sur les tôles d'aile sert à :",o:["Protéger l'alliage structural contre la corrosion","Augmenter la résistance en traction","Réduire le poids total de l'aile","Améliorer la conductivité thermique"],c:0,e:"L'<b>Alclad</b> = une fine couche d'aluminium pur (99,5 %) plaquée sur un alliage 2024 ou 7075. L'alu pur se corrode à la place de l'alliage structural → <b>protection sacrificielle</b>. Sans Alclad, les alliages de la série 2xxx et 7xxx seraient trop sensibles à la corrosion intergranulaire."},
{q:"La différence entre un longeron et une nervure dans une aile :",o:["Le longeron va dans le sens de l'envergure, la nervure dans le sens de la corde","Le longeron est en composite, la nervure en alu","La nervure porte la charge principale","Le longeron est un revêtement de surface"],c:0,e:"<b>Longeron</b> (spar) = poutre principale dans le <b>sens de l'envergure</b> (de l'emplanture au saumon). Il reprend les efforts de <b>flexion</b>. <b>Nervure</b> (rib) = cadre transversal dans le <b>sens de la corde</b>. Elle donne la forme aérodynamique et transmet les efforts au longeron."},
{q:"Le facteur de sécurité en aéro (ultimate) est généralement de :",o:["1,5 (charge limite × 1,5 = charge ultime)","1,0 (pas de marge)","3,0 (triple marge)","10 (très conservateur)"],c:0,e:"En aéro, le <b>facteur de sécurité ultime</b> = <b>1,5</b>. La structure doit supporter la <b>charge limite</b> (max en service) sans déformation permanente, et la <b>charge ultime</b> (1,5 × limite) sans rupture pendant 3 secondes. Ce coefficient est faible par rapport au génie civil (2-3) car en aéro, chaque gramme compte."},
{q:"La philosophie 'damage tolerance' en aéro signifie :",o:["La structure peut voler avec une fissure détectable avant rupture","La structure ne doit jamais avoir de fissure","Les dommages sont interdits en service","On remplace la pièce dès la première inspection"],c:0,e:"<b>Damage tolerance</b> = la structure est conçue pour que les fissures <b>grandissent lentement</b> et soient <b>détectées par inspection</b> avant d'atteindre la taille critique. Opposé au <b>safe-life</b> (on retire la pièce après un nombre de cycles fixe, même sans fissure). L'A380 et le 787 sont certifiés en damage tolerance."},
{q:"La pressurisation du fuselage à chaque vol crée un cycle de :",o:["Fatigue (traction dans la peau du fuselage)","Fluage","Corrosion uniforme","Usure par frottement"],c:0,e:"À chaque vol, la différence de pression (cabin ~0,75 bar vs extérieur ~0,25 bar à FL350) met la peau du fuselage en <b>traction</b> (comme un ballon). Au sol → relâchement. Ce cycle répété = <b>fatigue</b>. Après des milliers de vols, des fissures peuvent apparaître (cf. accident Aloha Airlines 1988). Les inspections vérifient systématiquement les rivets et joints."},
{q:"Le flutter est un phénomène dangereux car :",o:["Les vibrations aéroélastiques s'amplifient jusqu'à la rupture","L'avion ralentit progressivement","Le moteur surchauffe","Le train d'atterrissage se bloque"],c:0,e:"Le <b>flutter</b> = couplage entre les forces aérodynamiques et l'élasticité de la structure. Au-delà d'une certaine vitesse, l'énergie injectée par l'air dépasse l'amortissement structural → les <b>oscillations s'amplifient</b> de façon divergente → rupture en quelques secondes. Chaque avion est certifié avec une marge de flutter au-delà de Vd (vitesse de design en piqué)."},
]},

// ==================== BIA NAVIGATION ====================
bia_nav:{title:'Navigation & Réglementation',mod:'bia',
lessons:[
{t:"Unités aéronautiques",en:"Aviation units",b:"<span class='key'>1 mille nautique (NM)</span> <span class='en'>(Nautical mile)</span> = 1 852 m = 1 minute d'arc de latitude<br><span class='key'>1 nœud (kt)</span> <span class='en'>(Knot)</span> = 1 NM/h = 1,852 km/h<br><span class='key'>1 pied (ft)</span> <span class='en'>(Foot)</span> = 0,3048 m (≈ 30 cm)<br><span class='key'>Niveau de vol (FL)</span> <span class='en'>(Flight Level)</span> : FL100 = 10 000 ft en calage standard (1013 hPa)"},
{t:"Numérotation des pistes",en:"Runway numbering",b:"Le numéro = <span class='key'>orientation magnétique / 10</span>, arrondi au plus proche.<br>Exemple : piste orientée 234°M → <span class='key'>piste 23</span>.<br><br>L'autre bout = +/- 180° → 234 - 180 = 054 → <span class='key'>piste 05</span>.<br><br>Si 2 pistes parallèles : <span class='key'>L</span> (left) et <span class='key'>R</span> (right) vues dans le sens d'atterrissage. De l'autre côté, R devient L et inversement.<br>Exemple : piste <span class='key'>23R</span> → l'autre bout = <span class='key'>05L</span>.<br><br><div class='remember'><b>On décolle et on atterrit FACE AU VENT</b>. Si le vent vient de 270° → on utilise la piste 27.</div>"},
{t:"Codes transpondeur et priorités",en:"Transponder codes and priorities",b:"<span class='key'>7000</span> : VFR standard (sans instruction du contrôle)<br><span class='key'>7700</span> : <span class='key'>urgence</span> <span class='en'>(Emergency)</span><br><span class='key'>7600</span> : <span class='key'>panne radio</span> <span class='en'>(Radio failure)</span><br><span class='key'>7500</span> : <span class='key'>détournement</span> <span class='en'>(Hijack)</span><br><br>Priorités en vol (du plus au moins prioritaire) :<br><span class='key'>Ballon</span> > <span class='key'>Planeur</span> > <span class='key'>Dirigeable</span> > <span class='key'>Avion tractant</span> > <span class='key'>Avion/Hélicoptère</span><br><br>À même catégorie : priorité à droite (comme en voiture)."},
{t:"Feux de position et nuit aéro",en:"Position lights and aeronautical night",b:"<span class='key'>Rouge</span> à gauche <span class='en'>(Red = port/left)</span><br><span class='key'>Vert</span> à droite <span class='en'>(Green = starboard/right)</span><br><span class='key'>Blanc</span> à l'arrière <span class='en'>(White = aft)</span><br><br><span class='key'>Nuit aéronautique</span> : commence <span class='key'>30 min après le coucher du soleil</span>, finit <span class='key'>30 min avant le lever</span>."},
{t:"Espaces aériens et navigation",en:"Airspace and navigation",b:"<span class='key'>Classe A</span> : IFR uniquement (routes aériennes en altitude, au-dessus FL195)<br><span class='key'>Classe D</span> : espace contrôlé (autour des aérodromes importants)<br><span class='key'>Classe G</span> : <span class='key'>non contrôlé</span> (campagne, petits aérodromes)<br><br><span class='key'>Vol à l'estime</span> <span class='en'>(Dead reckoning)</span> : déterminer un cap et une heure estimée d'arrivée par calcul (cap + vitesse + vent).<br><br><span class='key'>DME</span> <span class='en'>(Distance Measuring Equipment)</span> : mesure la <span class='key'>distance oblique</span> (pas la distance au sol !).<br><span class='key'>VAR</span> = déclinaison magnétique (angle entre nord vrai et nord magnétique)."},
],
L1:[
{q:"1 mille nautique (NM) = :",o:["1 852 m","1 609 m","1 000 m","2 000 m"],c:0,e:"NM = 1 852 m = 1 minute d'arc de latitude."},
{q:"1 pied (ft) = :",o:["0,3048 m","1,852 m","0,852 m","0,1 m"],c:0,e:"1 ft = 30,48 cm."},
{q:"Code transpondeur 7700 = :",o:["Urgence","VFR standard","Panne radio","Détournement"],c:0,e:"7700 = emergency. 7000 = VFR. 7600 = panne radio. 7500 = détournement."},
{q:"Feux de position : rouge est :",o:["À gauche","À droite","À l'arrière","Dessous"],c:0,e:"Rouge = gauche. Vert = droite. Blanc = arrière."},
{q:"Un espace de classe G est :",o:["Non contrôlé","Contrôlé","Interdit au VFR","Réservé militaire"],c:0,e:"G = non contrôlé. A = IFR uniquement. D = contrôlé."},
{q:"Priorité entre ballon et avion :",o:["Le ballon est prioritaire","L'avion est prioritaire","Égal","Ça dépend de l'altitude"],c:0,e:"Ballon > planeur > dirigeable > avion tractant > avion."},
{q:"C'est quoi un transpondeur ?",o:["Un émetteur qui identifie l'avion sur le radar","Un instrument de mesure de vitesse","Un système de pilotage automatique","Un type de radio pour parler au contrôleur"],c:0,e:"Le <b>transpondeur</b> = un émetteur dans l'avion qui répond aux signaux du radar au sol. Il envoie un <b>code à 4 chiffres</b> (squawk) qui identifie l'avion sur l'écran du contrôleur. Codes spéciaux : 7700 (urgence), 7600 (panne radio), 7500 (détournement)."},
{q:"1 nœud (kt) c'est :",o:["1 mille nautique par heure","1 km/h","1 mile par heure","10 m/s"],c:0,e:"<b>1 nœud</b> (knot, kt) = <b>1 NM/h</b> = 1,852 km/h. C'est l'unité de vitesse standard en aéronautique et en marine. Le nom vient des nœuds sur les cordes utilisées autrefois pour mesurer la vitesse des bateaux."},
{q:"FL100 signifie :",o:["10 000 pieds en calage standard","100 pieds d'altitude","1 000 mètres d'altitude","10 000 mètres"],c:0,e:"<b>FL</b> (Flight Level) = altitude en centaines de pieds, calée sur <b>1013,25 hPa</b> (pression standard). FL100 = <b>10 000 ft</b>. FL350 = 35 000 ft (~10 600 m, altitude de croisière typique). On utilise le FL au-dessus de l'altitude de transition (~5000 ft en France)."},
{q:"VFR signifie :",o:["Vol à Vue","Vol Fréquence Radio","Vol Formation Rapide","Vitesse Fixe Réglée"],c:0,e:"<b>VFR</b> = Visual Flight Rules = vol à vue. Le pilote navigue en regardant dehors (repères visuels, carte). Il doit respecter des conditions météo minimales (visibilité, distance aux nuages). L'autre mode est <b>IFR</b> (Instrument Flight Rules) = vol aux instruments."},
{q:"IFR signifie :",o:["Vol aux Instruments","Instruments de Fréquence Radio","Indicateur de Force Résiduelle","Information de Flight Radar"],c:0,e:"<b>IFR</b> = Instrument Flight Rules = vol aux instruments. Le pilote navigue uniquement avec ses instruments (horizon artificiel, GPS, VOR, ILS). Obligatoire en espace de classe A, dans les nuages, et pour les vols de ligne."},
],
L2:[
{q:"Piste orientée 234°M, son numéro est :",o:["23","24","05","11"],c:0,e:"234/10 = 23,4 → arrondi = 23."},
{q:"Piste 23R → l'autre bout :",o:["05L","05R","23L","41R"],c:0,e:"23+18=41, -36=05. R vu d'un côté = L vu de l'autre."},
{q:"La nuit aéronautique commence :",o:["30 min après le coucher du soleil","Au coucher du soleil","30 min avant le coucher","1 h après le coucher"],c:0,e:"30 min après coucher → 30 min avant lever."},
{q:"Le DME mesure :",o:["La distance oblique","La distance au sol","L'altitude","La vitesse sol"],c:0,e:"Distance en ligne droite avion-station, pas la projection au sol."},
{q:"Le vol à l'estime consiste à :",o:["Déterminer cap et heure d'arrivée par calcul","Suivre des repères visuels","Utiliser le GPS","Suivre un VOR"],c:0,e:"Dead reckoning = calcul cap + vitesse + vent → ETA."},
{q:"C'est quoi un aérodrome ?",o:["Un terrain aménagé pour le décollage et l'atterrissage","Uniquement les grands aéroports internationaux","Un hangar de maintenance","Un centre de contrôle aérien"],c:0,e:"Un <b>aérodrome</b> = tout terrain (ou plan d'eau) aménagé pour le <b>décollage</b> et l'<b>atterrissage</b> des aéronefs. Ça va du petit terrain en herbe au grand aéroport international (CDG, Orly). Un <b>aéroport</b> est un aérodrome ouvert au trafic commercial."},
{q:"C'est quoi un METAR ?",o:["Un message d'observation météo d'un aérodrome","Un type de moteur d'avion","Un instrument de navigation","Un code de piste d'atterrissage"],c:0,e:"Un <b>METAR</b> = un message codé de <b>observation météo</b> émis toutes les 30 min par un aérodrome. Il contient : vent, visibilité, nuages, température, point de rosée, pression (QNH). Le <b>TAF</b> est la prévision (9-30 h). Les deux sont essentiels pour la préparation du vol."},
{q:"La déclinaison magnétique c'est :",o:["L'angle entre le nord vrai et le nord magnétique","La déviation du compas due au métal de l'avion","L'inclinaison de l'aiguille vers le sol","L'écart entre le cap GPS et le cap compas"],c:0,e:"La <b>déclinaison magnétique</b> (VAR) = l'angle entre le <b>nord géographique</b> (vrai) et le <b>nord magnétique</b>. Elle varie selon le lieu et le temps. En France, elle est d'environ <b>0 à 2° ouest</b>. Il faut la connaître pour convertir un cap vrai en cap magnétique."},
{q:"On décolle et atterrit face au vent car :",o:["Ça réduit la distance nécessaire et la vitesse sol","Ça augmente la vitesse sol","Ça réduit la portance","Le vent n'a aucun effet sur le décollage"],c:0,e:"<b>Face au vent</b> = le vent relatif augmente → la portance est atteinte à une <b>vitesse sol plus faible</b> → la distance de décollage/atterrissage est <b>plus courte</b>. Vent de face de 20 kt = on atteint la vitesse de décollage avec 20 kt de moins par rapport au sol. C'est pour ça que la piste active dépend du vent."},
],
L3:[
{q:"Avion NY→Paris, Vp 900 km/h, jet-stream 300 km/h d'ouest→est. Vitesse sol :",o:["1200 km/h","600 km/h","900 km/h","300 km/h"],c:0,e:"Vent arrière : Vsol = Vp + Vvent = 900+300 = 1200 km/h."},
{q:"Piste à Brest : 07R/25L, vent 270°/10 kt. On décolle :",o:["Piste 25L","Piste 07R","N'importe laquelle","Piste 07L"],c:0,e:"Vent de 270° → on décolle face au vent → piste 25 (cap ~250°)."},
{q:"Nausées après 10 min de vol = :",o:["Conflit vestibulo-visuel","Otite barotraumatique","Hypoxie","Stress"],c:0,e:"Mal de l'air = conflit entre informations visuelles et vestibulaires."},
]},

// ==================== BIA HISTOIRE ====================
bia_histoire:{title:'Histoire de l\'aéronautique',mod:'bia',
lessons:[
{t:"Les pionniers (avant 1900)",en:"Pioneers of flight",b:"<span class='key'>Icare</span> (mythologie) : ailes en plumes et cire → trop près du soleil<br><span class='key'>Léonard de Vinci</span> (~1500) : dessins de machines volantes (vis aérienne, parachute en forme de 'tente')<br><span class='key'>Frères Montgolfier</span> (1783) : premier vol humain en <span class='key'>ballon à air chaud</span> (Pilâtre de Rozier + marquis d'Arlandes)<br><span class='key'>Jacques Charles</span> (1783) : premier vol en <span class='key'>ballon à gaz</span> (hydrogène)<br><span class='key'>André-Jacques Garnerin</span> (1797) : premier saut en <span class='key'>parachute</span><br><span class='key'>Clément Ader</span> (1890) : premier 'décollage' motorisé (Éole) mais vol non contrôlé → controverse<br><span class='key'>Octave Chanute</span> : ingénieur franco-américain, pionnier du planeur"},
{t:"L'âge d'or (1900-1939)",en:"The golden age of aviation",b:"<span class='key'>Frères Wright</span> (1903) : premier vol motorisé <span class='key'>contrôlé et soutenu</span> (Flyer, Kitty Hawk, 12 s, 37 m)<br><span class='key'>Louis Blériot</span> (1909) : première traversée de la <span class='key'>Manche</span><br><span class='key'>Roland Garros</span> (1913) : première traversée de la <span class='key'>Méditerranée</span><br><br><span class='key'>Première Guerre mondiale</span> : premières missions = <span class='key'>observation</span>. Avions : SPAD XIII (meilleur chasseur français). Baron Rouge (Von Richthofen) sur Fokker DR.I (triplan, 3 ailes).<br><span class='key'>Marcel Dassault</span> : hélice '<span class='key'>Éclair</span>' pendant la WWI.<br><br><span class='key'>Aéropostale</span> : <span class='key'>Georges Latécoère</span> fonde la ligne France→Amérique du Sud. Pilotes célèbres : <span class='key'>Saint-Exupéry</span>, <span class='key'>Mermoz</span>, <span class='key'>Guillaumet</span>.<br><br>Années 1930 : les Allemands développent le planeur car interdiction d'aviation militaire motorisée (Traité de Versailles)."},
{t:"WWII à aujourd'hui",en:"WWII to present",b:"<span class='key'>WWII</span> : Spitfire (GB) vs Messerschmitt Bf 109 (All). <span class='key'>Normandie-Niémen</span> = escadrille de Français libres avec les forces soviétiques.<br><span class='key'>1939</span> : premier jet (Heinkel He 178).<br><br><span class='key'>Wernher von Braun</span> : spécialiste allemand V2, recruté par les USA (programme spatial).<br><span class='key'>Chuck Yeager</span> (1947) : premier vol <span class='key'>supersonique</span> (Bell X-1).<br><br>Spatial :<br><span class='key'>Youri Gagarine</span> (1961) : premier homme en orbite (Vostok)<br><span class='key'>Valentina Terechkova</span> (1963) : première femme dans l'espace<br><span class='key'>Neil Armstrong</span> (1969) : premier homme sur la <span class='key'>Lune</span> (Apollo 11)<br><span class='key'>Thomas Pesquet</span> (2016, 2021) : spationaute français, ISS<br><span class='key'>Félix Baumgartner</span> (2012) : premier passage du mur du son en chute libre<br><span class='key'>Rosetta/Philae</span> (2014) : atterrissage sur une comète<br><br>Aviation civile : <span class='key'>Air France</span> (1933), <span class='key'>Concorde</span> (1er vol 1969, service 1976-2003), <span class='key'>A380</span> (2005)"},
],
L1:[
{q:"Premier vol contrôlé et soutenu :",o:["Frères Wright (1903)","Clément Ader (1890)","Blériot (1909)","Montgolfier (1783)"],c:0,e:"1903 frères Wright (12 s, 37 m). Ader = décollage non contrôlé."},
{q:"Première traversée de la Manche :",o:["Louis Blériot","Roland Garros","Lindbergh","Mermoz"],c:0,e:"Blériot = Manche. Garros = Méditerranée. Lindbergh = Atlantique."},
{q:"Premier homme en orbite :",o:["Youri Gagarine (1961)","Neil Armstrong (1969)","Alan Shepard (1961)","Thomas Pesquet (2016)"],c:0,e:"<b>Youri Gagarine</b> (URSS) est devenu le premier homme en orbite le <b>12 avril 1961</b>, à bord du vaisseau <b>Vostok 1</b>. Le vol a duré 108 minutes (un tour complet de la Terre).<br><br><b>Ne pas confondre :</b><br>• <b>Gagarine</b> (1961) = premier en <b>orbite</b> (tour complet)<br>• <b>Shepard</b> (1961) = premier Américain dans l'espace (vol suborbital, pas un tour complet)<br>• <b>Armstrong</b> (1969) = premier homme sur la <b>Lune</b> (Apollo 11)<br>• <b>Pesquet</b> (2016, 2021) = spationaute français, missions sur l'ISS"},
{q:"Air France a été créée en :",o:["1933","1945","1920","1950"],c:0,e:"Air France = 1933."},
{q:"Les frères Montgolfier (1783) ont inventé :",o:["Le ballon à air chaud","Le ballon à gaz","L'avion","Le parachute"],c:0,e:"Montgolfier = air chaud. Jacques Charles = ballon à gaz (hydrogène)."},
{q:"Premier saut en parachute :",o:["André-Jacques Garnerin","Léonard de Vinci","Pilâtre de Rozier","Clément Ader"],c:0,e:"Garnerin, 1797. De Vinci a dessiné un parachute mais ne l'a pas testé."},
],
L2:[
{q:"L'hélice 'Éclair' est créée par :",o:["Marcel Dassault","Roland Garros","Louis Blériot","Saint-Exupéry"],c:0,e:"Dassault s'est fait connaître pendant la WWI avec l'hélice Éclair."},
{q:"Normandie-Niémen est :",o:["Une escadrille de Français libres avec les Soviétiques","Un régiment de la RAF","Des Américains engagés le Jour J","Un avion de chasse"],c:0,e:"Pilotes français libres sur le front de l'Est avec les forces soviétiques."},
{q:"Mur du son en chute libre :",o:["Félix Baumgartner","Chuck Yeager","Thomas Pesquet","Youri Gagarine"],c:0,e:"Baumgartner = chute libre. Yeager = en avion (Bell X-1)."},
{q:"Georges Latécoère a fondé :",o:["La ligne aéropostale France-Amérique du Sud","Air France","Dassault Aviation","SNECMA"],c:0,e:"Aéropostale. Pilotes : Saint-Exupéry, Mermoz, Guillaumet."},
{q:"Les Allemands sont devenus leaders en planeur dans les années 30 car :",o:["L'interdiction d'aviation militaire motorisée","Le manque de carburant","Leur industrie du balsa","Le climat favorable"],c:0,e:"Traité de Versailles 1918 = pas d'aviation militaire → développement planeur."},
{q:"Le parachute de Léonard de Vinci avait la forme :",o:["D'une tente","D'un hémisphère","D'un cône","D'un carré"],c:0,e:"Forme de 'tente' à faces rectangulaires ou triangulaires."},
],
L3:[
{q:"Sonde Rosetta a déposé le robot Philae sur :",o:["Une comète","Mars","La Lune","Un astéroïde"],c:0,e:"Rosetta/Philae = atterrissage sur la comète 67P/Tchourioumov-Guérassimenko."},
{q:"Le meilleur chasseur français de la WWI :",o:["SPAD XIII","Spitfire","Fokker DR.I","Nieuport 28"],c:0,e:"SPAD XIII = meilleur chasseur français WWI. Spitfire = WWII. Fokker = allemand."},
{q:"Première femme dans l'espace :",o:["Valentina Terechkova","Jacqueline Auriol","Claudie Haigneré","Sally Ride"],c:0,e:"Terechkova (URSS, 1963). Haigneré = première Française (1996)."},
{q:"WWII : les avions qui se sont affrontés :",o:["Spitfire vs Messerschmitt Bf 109","SPAD XIII vs Fokker","Hurricane vs Rafale","Concorde vs Tu-144"],c:0,e:"Spitfire vs Me109 = WWII. SPAD vs Fokker = WWI."},
]},

// ==================== INDUSTRIE - SAFRAN ====================
ind_safran:{title:'Safran en détail',mod:'industrie',
lessons:[
{t:"Pourquoi connaître Safran",en:"Why Safran matters",b:"Safran est le <span class='key'>2e groupe aéro/défense mondial</span>. C'est ta cible n°1 : comprendre Safran, c'est comprendre la propulsion aéronautique.<br><br><b>Chiffres clés (à connaître par cœur pour un entretien) :</b><br>- <span class='key'>CA : 27,3 Mds €</span> (2024) — c'est plus que Thales (20 Mds €) et Dassault (6 Mds €) réunis<br>- <span class='key'>100 000 employés</span> dans <span class='key'>30+ pays</span><br>- Siège : <span class='key'>Paris-Saclay (91)</span>. PDG : <span class='key'>Olivier Andriès</span><br>- Coté au <span class='key'>CAC 40</span><br><br><b>L'histoire en 30 secondes :</b><br>Safran est né en <span class='key'>2005</span> de la fusion de <span class='key'>SNECMA</span> (moteurs d'avion, héritage Gnome et Rhône depuis 1905) et <span class='key'>SAGEM</span> (électronique de défense). Le nom vient de l'épice safran, symbole de précision.<br><br><div class='remember'><b>En entretien</b> : ne dis pas juste '27 Mds de CA'. Ajoute un point de comparaison : 'plus que Thales et Dassault réunis, mais bien moins qu'Airbus qui est à 65 Mds — logique, Airbus assemble des avions entiers.'</div>"},
{t:"Les filiales — qui fait quoi",en:"Safran subsidiaries explained",b:"Safran, c'est 7 filiales principales. Chacune est spécialisée dans un domaine :<br><br><span class='key'>Safran Aircraft Engines</span> — <b>la filiale phare</b>. C'est là que sont conçus et fabriqués les moteurs LEAP et M88. Filiale <span class='key'>100 % Safran</span> (PAS une coentreprise). Site principal : <span class='key'>Villaroche (77)</span>. C'est aussi là que se trouvent les ateliers TdS de Corbeil-Essonnes.<br><br><span class='key'>Safran Helicopter Engines</span> — <span class='key'>leader mondial</span> des turbomoteurs pour hélicoptères. Basé à Bordes (64). Équipe les hélicoptères Airbus, Bell, Sikorsky.<br><br><span class='key'>Safran Landing Systems</span> — trains d'atterrissage et <span class='key'>freins carbone</span>. Vélizy (78). Fournit Airbus, Boeing, Dassault.<br><br><span class='key'>Safran Nacelles</span> — les capots qui entourent les moteurs (A320neo, A330neo). Le Havre (76).<br><br><span class='key'>Safran Electronics & Defense</span> — navigation inertielle, optronique, drones. Massy (91).<br><br><span class='key'>Safran Ceramics</span> — fabrique les <span class='key'>CMC (SiC/SiC)</span> pour les aubes du LEAP. Au Haillan (33). Technologie de rupture : 1/3 du poids du nickel, tenue 1300 °C+.<br><br><span class='key'>Safran Seats</span> — sièges d'avion. 1er mondial.<br><br><div class='remember'><b>Pourquoi c'est important</b> : en entretien, montre que tu sais que Safran Aircraft Engines est une filiale, pas le groupe. Et que CFM International (le LEAP) est une coentreprise SÉPARÉE avec GE, pas une filiale.</div>"},
{t:"CFM International et les moteurs",en:"CFM and engine programs",b:"<span class='key'>CFM International</span> = coentreprise <span class='key'>50/50 entre Safran et GE Aerospace</span>, créée en <span class='key'>1974</span>. C'est CFM qui fabrique et vend le LEAP, pas Safran directement.<br><br><b>Les moteurs à connaître :</b><br><br><span class='key'>LEAP</span> — LE moteur du moment. Équipe les 3 moyen-courriers les plus vendus :<br>- <span class='key'>LEAP-1A</span> → Airbus A320neo<br>- <span class='key'>LEAP-1B</span> → Boeing 737 MAX<br>- <span class='key'>LEAP-1C</span> → COMAC C919 (avion chinois)<br>Performance : <span class='key'>-15 % de conso</span> vs CFM56 grâce au taux de dilution ~11, aux aubes fan en composite tissé 3D, et aux CMC (SiC/SiC) en turbine BP.<br><br><span class='key'>CFM56</span> — le prédécesseur du LEAP. <span class='key'>33 000+ produits</span>. Le moteur le plus vendu de l'histoire. Encore en service partout.<br><br><span class='key'>M88</span> — moteur du <span class='key'>Rafale</span> (Dassault). Avec <span class='key'>postcombustion</span> (= on injecte du carburant directement dans les gaz d'échappement après la turbine → énorme boost de poussée temporaire, utilisé au décollage et en combat, mais consomme énormément). 7,5 tonnes de poussée avec PC. <span class='key'>100 % Safran</span> (pas CFM). Programme militaire stratégique.<br><br><span class='key'>TP400</span> — A400M (avion de transport militaire). Consortium Europrop.<br><br><span class='key'>RISE</span> — le futur. Démonstrateur <span class='key'>open-fan</span> (pas de nacelle, hélice visible). Objectif : <span class='key'>-20 % vs LEAP</span>. Pas encore en service, horizon 2035+."},
{t:"Safran et les traitements de surface",en:"Safran and surface treatments",b:"Pourquoi les TdS sont critiques chez Safran ? Parce qu'un moteur d'avion subit des conditions extrêmes : 1000 °C+ dans la turbine, corrosion, fatigue cyclique, érosion.<br><br><b>Ce que fait un spécialiste TdS chez Safran :</b><br><br>- <span class='key'>Anodisation</span> des pièces compresseur en alliages alu (<span class='key'>2024</span> = alu + cuivre, fuselage ; <span class='key'>7075-T6</span> = alu + zinc, le plus résistant, ailes/longerons ; le 'T6' = traitement thermique par revenu artificiel qui le durcit) → résistance corrosion et usure<br>- <span class='key'>Nickelage</span> et <span class='key'>chromage</span> des disques et arbres → dureté de surface, tolérance dimensionnelle<br>- <span class='key'>Barrières thermiques</span> (YSZ) sur les aubes turbine HP → isolation thermique<br>- <span class='key'>Aluminisation</span> des superalliages Ni → protection haute température<br>- <span class='key'>Grenaillage de précontrainte</span> <span class='en'>(Shot peening)</span> → résistance fatigue<br><br>Le site de <span class='key'>Corbeil-Essonnes (91)</span> est un atelier TdS internalisé de Safran Aircraft Engines. C'est du <span class='key'>Tier 1</span> : Safran garde en interne les procédés critiques.<br><br><b>L'enjeu REACH :</b> remplacer le CrVI (OAC→TSA, Alodine→TCP, chromage→HVOF, cadmiage→Zn-Ni) tout en maintenant les qualifications Nadcap. C'est exactement ce qu'on attend d'un ingénieur TdS aujourd'hui.<br><br><div class='remember'><b>En entretien</b> : montre que tu comprends le lien entre le procédé TdS et la pièce moteur. Ne parle pas d'anodisation 'en général', parle d'anodisation de pièces compresseur en 7075-T6 pour la tenue en corrosion.</div>"},
],

{q:"100 000 employés, c'est :",o:["Safran"],w:["Thales","Dassault","Airbus","Rolls-Royce","GE Aerospace","Boeing"],c:0,e:"Safran = 100 000 employés dans 30+ pays. Retiens l'ordre : Boeing (170k) > Airbus (150k) > Safran (100k) > Thales (81k) > GE (52k) > RR (42k) > Dassault (13k)."},

// ==================== INDUSTRIE - AIRBUS ====================
ind_airbus:{title:'Airbus en détail',mod:'industrie',
lessons:[
{t:"Airbus : le géant européen",en:"Airbus overview",b:"Airbus est le <span class='key'>1er avionneur mondial</span> en nombre de livraisons (devant Boeing depuis 2019). C'est un employeur majeur en France, et beaucoup de postes matériaux/TdS existent chez eux ou chez leurs sous-traitants.<br><br><b>Chiffres clés :</b><br>- <span class='key'>CA : ~65 Mds €</span> (2024) — le plus gros CA de l'aéro européenne<br>- <span class='key'>~150 000 employés</span><br>- Siège : <span class='key'>Toulouse / Blagnac</span><br>- Consortium européen : France, Allemagne, Espagne, Royaume-Uni<br><br><b>Point fondamental :</b> Airbus <span class='key'>ne fabrique PAS de moteurs</span>. C'est un <span class='key'>intégrateur</span> : il conçoit et assemble la cellule (fuselage, ailes), puis achète les moteurs à CFM (Safran+GE), Pratt & Whitney ou Rolls-Royce selon le modèle.<br><br>Airbus a aussi des divisions :<br>- <span class='key'>Airbus Helicopters</span> (Marignane) — hélicoptères civils et militaires<br>- <span class='key'>Airbus Defence & Space</span> — satellites, avion de transport A400M<br><br><div class='remember'><b>En entretien</b> : si on te demande la différence entre Safran et Airbus → 'Safran fait le cœur (moteur), Airbus fait le corps (cellule). Airbus est le client de Safran.'</div>"},
{t:"La gamme Airbus — chaque avion et son moteur",en:"Airbus aircraft lineup",b:"Chaque avion Airbus utilise des moteurs différents, fournis par des motoristes différents. C'est essentiel à connaître :<br><br><span class='key'>A220</span> (ex-Bombardier C Series) — petit moyen-courrier (100-150 places). Moteur : <span class='key'>PW1500G (GTF)</span>. Racheté par Airbus en 2018.<br><br><span class='key'>A320neo</span> — <b>LE best-seller mondial</b>. 150-240 places. C'est l'avion le plus commandé au monde. Deux options moteur : <span class='key'>LEAP-1A (CFM)</span> ou <span class='key'>PW1100G (GTF)</span>. Objectif : <span class='key'>75 avions/mois en 2026</span>.<br><br><span class='key'>A330neo</span> — long-courrier bimoteur. 250-440 places. Moteur : <span class='key'>Trent 7000 (Rolls-Royce)</span> uniquement.<br><br><span class='key'>A350</span> — long-courrier nouvelle génération. 300-410 places. <span class='key'>53 % composite</span> (record). Moteur : <span class='key'>Trent XWB (Rolls-Royce)</span> exclusif.<br><br><span class='key'>A380</span> — le géant (500+ places). <b>Arrêté en 2021</b>. Moteur : CF6/GP7200 ou Trent 900.<br><br><span class='key'>A400M</span> — transport militaire. Moteur : <span class='key'>TP400</span> (consortium Europrop incluant Safran)."},
{t:"Airbus et les matériaux",en:"Materials at Airbus",b:"Pourquoi Airbus est intéressant pour un ingénieur matériaux/TdS ? Parce que chaque avion est un assemblage de milliers de pièces qui nécessitent des traitements de surface :<br><br><b>Alliages d'aluminium</b> (fuselage, nervures) :<br>- <span class='key'>2024-T3</span> (fuselage) et <span class='key'>7075-T6</span> (longerons, ailes) → anodisation, conversion chimique, primaire anticorrosion<br>- La majorité de la structure des A320neo est encore en alu<br><br><b>Composites CFRP</b> (A350 surtout) :<br>- <span class='key'>53 % de la masse de l'A350</span> est en carbone/époxy<br>- Les composites ne se corrodent pas mais nécessitent : protection foudre (ECF cuivre), peinture UV, réparation délaminage<br><br><b>Titane</b> (fixations, pièces de jonction) :<br>- Ti-6Al-4V pour les boulons et attaches en zones critiques → passivation<br><br><b>Ce que ça veut dire pour toi</b> : chez Airbus ou ses sous-traitants, un poste TdS implique surtout de l'anodisation alu, de la conversion chimique, et de la gestion REACH (remplacement Alodine par TCP, remplacement cadmiage par Zn-Ni sur les fixations)."},
],
L1:[
{q:"Airbus est :",o:["Un intégrateur qui achète ses moteurs","Un motoriste","Un équipementier radar","Un fabricant de missiles"],c:0,e:"Airbus = cellule. Achète moteurs à CFM, PW ou RR."},
{q:"CA d'Airbus en 2024 :",o:["~65 Mds €"],w:["~27 Mds €","~20 Mds €","~78 Mds $","~38 Mds $","~6 Mds €","~35 Mds €","~90 Mds €"],c:0,e:"Airbus = ~65 milliards €. C'est le plus gros CA de l'aéro européenne. Pour comparer : Airbus (65) > Safran (27) > Thales (20) > Dassault (6). En dollars, Boeing (78 Mds $) est au-dessus, mais il faut comparer en même devise."},
{q:"~65 Mds € de CA, c'est :",o:["Airbus"],w:["Safran","Boeing","Thales","Dassault","GE Aerospace","Rolls-Royce"],c:0,e:"Airbus = ~65 Mds €. Astuce : Airbus est l'intégrateur (il assemble tout l'avion), donc logiquement son CA est le plus élevé côté européen."},
{q:"~150 000 employés, c'est :",o:["Airbus"],w:["Safran","Thales","Boeing","Dassault","GE Aerospace","Rolls-Royce"],c:0,e:"Airbus = ~150 000 employés. Répartis entre France, Allemagne, Espagne, UK. Boeing est au-dessus avec ~170 000 (mais un seul pays)."},
{q:"Toulouse / Blagnac est le siège de :",o:["Airbus","Safran","Dassault","Thales"],c:0,e:"Airbus = Toulouse. Chaîne d'assemblage finale A320, A350."},
{q:"L'A320neo peut être motorisé par :",o:["LEAP-1A ou PW1100G","Trent XWB uniquement","M88","GE90"],c:0,e:"A320neo = 2 options : LEAP (CFM/Safran+GE) ou GTF (Pratt & Whitney)."},
{q:"L'A350 utilise comme moteur :",o:["Trent XWB (Rolls-Royce) exclusivement","LEAP (CFM)","GTF (Pratt & Whitney)","GEnx (GE)"],c:0,e:"Trent XWB = seule option sur A350. 53 % composite."},
{q:"Objectif cadence A320neo en 2026 :",o:["75/mois","50/mois","100/mois","30/mois"],c:0,e:"75 A320neo par mois = défi majeur du ramp-up."},
{q:"L'A380 a été :",o:["Arrêté en 2021","Relancé en 2024","Remplacé par l'A350","Vendu à Boeing"],c:0,e:"Programme A380 arrêté. Trop gros, pas assez rentable."},
{q:"53 % de composite, c'est :",o:["L'A350","Le B787","L'A320neo","Le Rafale"],c:0,e:"A350 = 53 % composite (record Airbus). B787 = 50 %."},
{q:"C'est quoi un intégrateur en aéro ?",o:["Une entreprise qui assemble l'avion final","Un fabricant de moteurs","Un sous-traitant de pièces","Un bureau d'études"],c:0,e:"Un <b>intégrateur</b> (OEM) = l'entreprise qui <b>assemble l'avion complet</b> à partir de composants fournis par des dizaines de fournisseurs. <b>Airbus</b> et <b>Boeing</b> sont les deux grands intégrateurs. Ils ne fabriquent pas tout eux-mêmes : les moteurs viennent de CFM, PW ou RR ; les trains de Safran Landing Systems ; etc."},
{q:"Un A320 transporte environ :",o:["150 à 240 passagers","50 à 80 passagers","400 à 500 passagers","600+ passagers"],c:0,e:"L'<b>A320</b> (famille A318/A319/A320/A321) = <b>150 à 240 passagers</b> selon la version et la configuration. C'est le moyen-courrier, le segment le plus vendu au monde. L'A321neo peut aller jusqu'à 240 en haute densité."},
{q:"Le LEAP motorise quel avion Airbus ?",o:["L'A320neo","L'A350","L'A330neo","L'A380"],c:0,e:"Le <b>LEAP-1A</b> motorise l'<b>A320neo</b> (l'option alternative est le GTF de Pratt & Whitney). Le LEAP-1B motorise le Boeing 737 MAX. Le LEAP-1C motorise le COMAC C919 chinois. L'A350 utilise le Trent XWB de Rolls-Royce."},
{q:"Airbus Helicopters est basé à :",o:["Marignane","Toulouse","Le Havre","Bordes"],c:0,e:"<b>Airbus Helicopters</b> est basé à <b>Marignane</b> (Bouches-du-Rhône), près de Marseille. C'est le 1er fabricant mondial d'hélicoptères civils. Ne pas confondre avec Safran Helicopter Engines (moteurs hélico) qui est à Bordes (64)."},
{q:"L'A400M est :",o:["Un avion de transport militaire","Un avion de ligne","Un hélicoptère","Un drone de combat"],c:0,e:"L'<b>A400M</b> = avion de <b>transport militaire</b> européen (cargo, parachutistes, véhicules). Motorisé par le TP400 (consortium Europrop incluant Safran). Remplace les vieux C-130 et C-160 Transall."},
],
L2:[
{q:"L'A330neo est motorisé par :",o:["Trent 7000 (Rolls-Royce) uniquement","LEAP (CFM)","GTF (PW)","GEnx (GE)"],c:0,e:"A330neo = Trent 7000 exclusif."},
{q:"L'A220 était auparavant :",o:["Le Bombardier C Series","Un projet Dassault","Un avion Boeing","Un ULM"],c:0,e:"Racheté par Airbus en 2018. Motorisé par PW1500G (GTF)."},
{q:"Les alliages alu principaux sur un A320 sont :",o:["2024-T3 et 7075-T6","6061 uniquement","Titane uniquement","Inconel 718"],c:0,e:"<b>2024-T3</b> = alu + cuivre → <b>fuselage</b> (bonne résistance en fatigue). Le <b>T3</b> = traitement thermique avec maturation naturelle.<br><b>7075-T6</b> = alu + zinc → <b>ailes et longerons</b> (le plus résistant des alliages alu, Rm ≈ 570 MPa). Le <b>T6</b> = revenu artificiel au four qui forme des précipités durcissants.<br><br><b>Décryptage du nom :</b> le 1er chiffre = l'élément d'alliage (2xxx = cuivre, 7xxx = zinc). Le T + chiffre = la recette de traitement thermique."},
],L3:[
{q:"L'A350 utilise du CFRP pour ~53 % de sa masse. L'avantage principal vs l'alu :",o:["Gain de masse de 20-25 % à résistance équivalente","Meilleure conductivité électrique","Coût de fabrication inférieur","Plus facile à réparer en maintenance"],c:0,e:"Le CFRP (carbone/époxy) = <b>20-25 % plus léger</b> que l'alu à résistance égale. Sur l'A350, ça se traduit par des centaines de kg en moins → économies de carburant sur la durée de vie de l'avion. Mais le CFRP est plus cher et plus complexe à réparer."},
{q:"Le caisson central de voilure de l'A350 est fabriqué à :",o:["Nantes (Airbus Stelia)","Toulouse","Hambourg","Broughton"],c:0,e:"<b>Nantes</b> produit le <b>caisson central de voilure</b> (center wing box) de l'A350, pièce structurale critique en composite carbone qui relie les deux ailes au fuselage. Toulouse assure l'assemblage final. Hambourg fait des tronçons de fuselage. Broughton (UK) fait les ailes."},
{q:"L'A321XLR a une autonomie de ~8 700 km grâce à :",o:["Un réservoir supplémentaire dans le fuselage arrière","Des moteurs plus puissants que l'A321neo","Des ailes allongées de 5 mètres","Un fuselage en composite carbone"],c:0,e:"L'<b>A321XLR</b> (Xtra Long Range) gagne en autonomie grâce à un <b>RCT</b> (Rear Center Tank) = réservoir supplémentaire intégré sous le plancher arrière du fuselage. Même moteurs LEAP-1A/PW1100G que l'A321neo, même fuselage alu."},
]},

// ==================== INDUSTRIE - THALES & DASSAULT ====================
ind_thales_dassault:{title:'Thales & Dassault',mod:'industrie',
lessons:[
{t:"Thales — les yeux et le cerveau",en:"Thales overview",b:"Thales est le spécialiste français de l'<span class='key'>électronique de défense et de sécurité</span>. Si Safran est le cœur (moteur) et Airbus le corps (cellule), Thales est <span class='key'>les yeux et le cerveau</span>.<br><br><b>Chiffres clés :</b><br>- <span class='key'>CA : ~20 Mds €</span> (2024)<br>- <span class='key'>~81 000 employés</span><br>- Siège : <span class='key'>Paris La Défense</span><br><br><b>Ce que Thales fabrique :</b><br>- <span class='key'>Avionique</span> <span class='en'>(Avionics)</span> : les écrans, calculateurs et systèmes de vol dans le cockpit<br>- <span class='key'>Radar</span> : le <span class='key'>RBE2 AESA</span> du Rafale — radar à antenne active, considéré parmi les meilleurs au monde<br>- <span class='key'>Optronique</span> <span class='en'>(Optronics)</span> : caméras infrarouges, systèmes de visée<br>- <span class='key'>Gestion du trafic aérien</span> : systèmes de contrôle pour les aéroports<br><br>Thales ne fabrique <span class='key'>NI moteur NI cellule</span>. Mais leurs boîtiers électroniques ont besoin de TdS (blindage EMI, protection corrosion des connecteurs).<br><br>Autres activités : <span class='key'>cybersécurité</span>, spatial (<span class='key'>Thales Alenia Space</span>, JV avec Leonardo — satellites, ISS), transport ferroviaire (signalisation)."},
{t:"Dassault Aviation — Rafale et Falcon",en:"Dassault Aviation overview",b:"Dassault est un cas unique : une entreprise familiale qui fabrique à la fois des avions de chasse et des jets d'affaires.<br><br><b>Chiffres clés :</b><br>- <span class='key'>CA : ~6,2 Mds €</span> (2024) — petit en CA mais énorme en valeur stratégique<br>- <span class='key'>~12 800 employés</span><br>- Siège : <span class='key'>Saint-Cloud (92)</span><br>- Fondé par <span class='key'>Marcel Dassault</span>. Famille Dassault = actionnaire majoritaire.<br><br><b>Le Rafale</b> — avion de combat omnirôle. C'est l'illustration parfaite de la collaboration française :<br>- Cellule : <span class='key'>Dassault</span><br>- Moteur : <span class='key'>M88 (Safran)</span><br>- Radar + avionique : <span class='key'>RBE2 AESA (Thales)</span><br>Export : <span class='key'>Inde, Égypte, Qatar, Grèce, Croatie, Indonésie</span>.<br><br><b>Les Falcon</b> — jets d'affaires haut de gamme. Gamme : 6X, 8X, 900, 2000. Marché civil mondial.<br><br><span class='key'>Dassault Systèmes</span> (CATIA, 3DEXPERIENCE) est une filiale <b>séparée</b> — logiciels de conception 3D utilisés par toute l'industrie aéro."},
{t:"L'écosystème défense français",en:"French defense ecosystem",b:"Comprendre comment Safran, Thales et Dassault travaillent ensemble est un vrai plus en entretien :<br><br><b>Le Rafale = 3 entreprises françaises :</b><br>- <span class='key'>Dassault</span> = maître d'œuvre (cellule, assemblage final, vol)<br>- <span class='key'>Safran</span> = moteur M88 + trains (via Landing Systems) + navigation inertielle (via Electronics & Defense)<br>- <span class='key'>Thales</span> = radar RBE2 AESA + avionique + optronique<br><br><b>Autres acteurs français :</b><br>- <span class='key'>MBDA</span> = missiles (JV entre Airbus, BAE Systems, Leonardo). Meteor, MICA, Scalp.<br>- <span class='key'>DGA</span> (Direction Générale de l'Armement) = l'agence qui passe les commandes pour l'armée française<br>- <span class='key'>ONERA</span> = centre de recherche aéronautique (l'équivalent de la NASA pour la recherche, pas les missions)<br><br><div class='remember'><b>En entretien</b> : montrer que tu comprends l'écosystème (pas juste l'entreprise isolée) est un signal fort. 'Je sais que Safran fournit le M88 au Rafale, que Thales fait le radar, et que c'est Dassault qui intègre le tout.'</div>"},
],
L1:[
{q:"Thales fait principalement :",o:["Avionique, radar, électronique de défense","Moteurs d'avion","Cellules d'avion","Trains d'atterrissage"],c:0,e:"Thales = les yeux et le cerveau. Ni moteur ni cellule."},
{q:"CA de Thales en 2024 :",o:["~20 Mds €"],w:["~6 Mds €","~65 Mds €","~27 Mds €","~38 Mds $","~78 Mds $","~12 Mds €"],c:0,e:"Thales = ~20 milliards €. Ordre à retenir : Airbus (65) > Safran (27) > Thales (20) > Dassault (6)."},
{q:"~20 Mds € de CA, c'est :",o:["Thales"],w:["Dassault","Safran","Airbus","GE Aerospace","Boeing","Rolls-Royce"],c:0,e:"Thales = ~20 Mds €. Astuce : 20, c'est pile entre Safran (27) et Dassault (6)."},
{q:"~81 000 employés, c'est :",o:["Thales"],w:["Dassault","Safran","Airbus","GE Aerospace","Rolls-Royce","Boeing"],c:0,e:"Thales = ~81 000. Ordre : Boeing (170k) > Airbus (150k) > Safran (100k) > Thales (81k) > GE (52k) > RR (42k) > Dassault (13k)."},
{q:"Paris La Défense est le siège de :",o:["Thales","Dassault Aviation","Safran","Airbus"],c:0,e:"Thales = La Défense. Dassault = Saint-Cloud. Safran = Saclay."},
{q:"Saint-Cloud (92) est le siège de :",o:["Dassault Aviation","Thales","Safran","Airbus"],c:0,e:"Dassault = Saint-Cloud. Fondé par Marcel Dassault."},
{q:"CA de Dassault Aviation en 2024 :",o:["~6,2 Mds €","~20 Mds €","~27 Mds €","~65 Mds €"],c:0,e:"Dassault = ~6,2 Mds €. Petit CA mais énorme valeur stratégique."},
{q:"~12 800 employés, c'est :",o:["Dassault Aviation","Thales","Safran","Rolls-Royce"],c:0,e:"Dassault = ~12 800. Entreprise familiale."},
{q:"Le radar du Rafale (RBE2 AESA) est fabriqué par :",o:["Thales","Safran","Dassault","Airbus"],c:0,e:"Thales = radar + avionique du Rafale."},
{q:"Le Rafale utilise le moteur :",o:["M88 (Safran)","LEAP (CFM)","Trent (Rolls-Royce)","F135 (PW)"],c:0,e:"M88 = Safran Aircraft Engines. 100 % Safran."},
{q:"Les Falcon sont :",o:["Des jets d'affaires Dassault","Des avions de chasse","Des hélicoptères","Des drones Thales"],c:0,e:"Falcon = jets d'affaires haut de gamme. 6X, 8X, 900, 2000."},
],
L2:[
{q:"Sur le Rafale, qui fait quoi ?",o:["Dassault = cellule, Safran = moteur, Thales = radar","Tout est fait par Dassault","Safran fait tout sauf le radar","Thales assemble le tout"],c:0,e:"3 entreprises françaises : Dassault (cellule), Safran (M88), Thales (RBE2)."},
{q:"La DGA est :",o:["L'agence qui commande les armes pour l'armée française","Un motoriste","Un avionneur","Un centre de recherche"],c:0,e:"Direction Générale de l'Armement. Client des industriels de défense."},
{q:"MBDA fabrique :",o:["Des missiles","Des radars","Des moteurs","Des avions"],c:0,e:"JV Airbus + BAE + Leonardo. Missiles pour Rafale, Typhoon, etc."},
{q:"Dassault Systèmes est :",o:["Une filiale séparée","La même entreprise que Dassault Aviation","Un concurrent de Thales","Une filiale de Safran"],c:0,e:"Dassault Systèmes = logiciels 3D. Entité séparée de Dassault Aviation."},
{q:"Thales Alenia Space est :",o:["Une JV avec Leonardo","Une filiale 100 % Thales","Un concurrent d'Airbus","Une division de Safran"],c:0,e:"JV Thales + Leonardo (Italie). Satellites, modules ISS."},
],
L3:[
{q:"Quels pays ont acheté le Rafale ?",o:["Inde","Égypte","Qatar","Grèce"],c:[0,1,2,3],m:true,e:"Inde, Égypte, Qatar, Grèce + Croatie, Indonésie. Export majeur."},
{q:"Un 'offset' dans un contrat de défense international signifie :",o:["Des retombées industrielles locales imposées à l'exportateur","Un rabais sur le prix unitaire","Un décalage de livraison","Un écart de tolérance dimensionnelle"],c:0,e:"L'<b>offset</b> = obligation pour l'industriel exportateur (ex : Dassault) de créer des <b>retombées économiques locales</b> dans le pays acheteur : transfert de technologie, sous-traitance locale, investissements. C'est souvent 50-100 % de la valeur du contrat. Critère décisif dans les ventes d'armement."},
{q:"Thales est principalement positionné sur :",o:["L'électronique de défense et les systèmes de mission","Les moteurs d'avion","Les cellules d'avion","Le MRO civil"],c:0,e:"<b>Thales</b> = leader en <b>électronique de défense</b> : radars (RBE2 du Rafale), systèmes de combat, optronique, communications sécurisées, avionique (écrans cockpit, commandes de vol A350). Pas de moteurs (Safran), pas de cellules (Airbus/Dassault). JV avec Leonardo pour le spatial (Thales Alenia Space)."},
{q:"La supply chain aéro est organisée en 'tiers'. Un fournisseur Tier 2 :",o:["Fournit des sous-ensembles au Tier 1 (pas directement à l'avionneur)","Livre directement à Airbus ou Boeing","Ne fait que de la matière première","Est un concurrent de l'avionneur"],c:0,e:"<svg viewBox='0 0 280 120' style='width:100%;max-width:280px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:6px'><text x='140' y='14' text-anchor='middle' fill='#e2e8f0' font-size='9' font-weight='bold'>Pyramide supply chain aéro</text><polygon points='140,22 240,100 40,100' fill='none' stroke='#94a3b8' stroke-width='1.5'/><line x1='75' y1='70' x2='205' y2='70' stroke='#94a3b8' stroke-width='1' stroke-dasharray='3'/><line x1='105' y1='45' x2='175' y2='45' stroke='#94a3b8' stroke-width='1' stroke-dasharray='3'/><text x='140' y='38' text-anchor='middle' fill='#93c5fd' font-size='8' font-weight='bold'>Tier 0 (OEM)</text><text x='140' y='48' text-anchor='middle' fill='#64748b' font-size='7'>Airbus, Boeing</text><text x='140' y='61' text-anchor='middle' fill='#6ee7b7' font-size='8' font-weight='bold'>Tier 1</text><text x='140' y='70' text-anchor='middle' fill='#64748b' font-size='7'>Safran, Thales, RR</text><text x='140' y='84' text-anchor='middle' fill='#fdba74' font-size='8' font-weight='bold'>Tier 2</text><text x='140' y='93' text-anchor='middle' fill='#64748b' font-size='7'>Mecachrome, ateliers TdS</text><text x='140' y='112' text-anchor='middle' fill='#94a3b8' font-size='8'>Tier 3 : fonderies, matières premières</text></svg>Plus on descend, plus les entreprises sont <b>petites et spécialisées</b>."},
]},

ind_ecosysteme:{title:'Concurrents & Marché',mod:'industrie',
lessons:[
{t:"Les concurrents internationaux",en:"International competitors",b:"Tu n'as pas besoin de tout savoir sur GE ou Rolls-Royce, mais tu dois les situer par rapport à Safran :<br><br><span class='key'>GE Aerospace</span> (Cincinnati, USA) — <span class='key'>1er motoriste mondial</span>. CA ~38 Mds $. ~52 000 employés. Partenaire 50 % de Safran dans CFM (LEAP). Moteurs propres : GE90 (B777), GEnx (B787), GE9X (B777X). Indépendant depuis 2024 (spin-off GE).<br><br><span class='key'>Rolls-Royce</span> (Derby, UK) — 3e motoriste. CA ~17 Mds £. ~42 000 employés. Famille Trent : Trent XWB (A350, exclusif), Trent 7000 (A330neo). <span class='key'>Absent du moyen-courrier</span> (pas de concurrent LEAP/GTF).<br><br><span class='key'>Pratt & Whitney</span> (Hartford, USA) — filiale RTX. Le <span class='key'>GTF (PW1000G)</span> est le concurrent DIRECT du LEAP sur A320neo. Utilise un <span class='key'>réducteur</span> entre turbine BP et fan. Aussi : F135 pour le F-35 (monopole militaire USA).<br><br><span class='key'>Boeing</span> (Arlington, USA) — concurrent direct d'Airbus. CA ~78 Mds $. B737 MAX (LEAP-1B), B787, B777. <span class='key'>Crise qualité depuis 2018</span> (crashes B737 MAX).<br><br><div class='remember'><b>Le débat de l'industrie</b> : GTF (réducteur, fan lent, -15-20 % conso) vs LEAP (direct drive, plus simple, fiabilité prouvée). En entretien chez Safran, tu dois connaître les deux et expliquer les avantages du LEAP.</div>"},
{t:"La supply chain aéronautique",en:"Aerospace supply chain",b:"L'aéronautique fonctionne en <span class='key'>pyramide</span>. Connaître ta place dans cette pyramide montre que tu comprends l'industrie :<br><br><span class='key'>OEM / Tier 0</span> — Airbus, Boeing. Ils assemblent l'avion final. Ce sont les 'donneurs d'ordre'.<br><br><span class='key'>Tier 1</span> — Safran, Thales, Rolls-Royce. Ils fournissent des <span class='key'>systèmes complets</span> : un moteur entier, un train d'atterrissage complet, l'avionique du cockpit.<br><br><span class='key'>Tier 2</span> — Sous-ensembles : aubes de compresseur, cartes électroniques, vérins hydrauliques. Exemples : Mecachrome, Figeac Aero.<br><br><span class='key'>Tier 3</span> — Pièces élémentaires, matières premières, TdS externalisé. Exemples : ateliers de traitement de surface, fonderies.<br><br><b>Cas particulier :</b> l'atelier TdS de <span class='key'>Corbeil-Essonnes</span> chez Safran Aircraft Engines est un Tier 1 internalisé. Safran garde en interne les procédés critiques (anodisation des pièces moteur, nickelage, etc.) au lieu de les sous-traiter, parce que la qualité est trop critique.<br><br><div class='remember'><b>En entretien</b> : montre que tu comprends pourquoi certains TdS restent en interne (contrôle qualité, Nadcap, criticité sécurité vol) et d'autres sont sous-traités (pièces non critiques, coût).</div>"},
{t:"Le marché aéro 2024-2026",en:"Aerospace market outlook",b:"Le marché aéro vit une situation paradoxale : <span class='key'>trop de commandes, pas assez de production</span>.<br><br><b>Les chiffres qui comptent :</b><br>- <span class='key'>Backlog > 17 000 avions</span> (Airbus + Boeing) = ~10 ans de production au rythme actuel<br>- Objectif Airbus : <span class='key'>75 A320neo/mois en 2026</span> (vs ~60 aujourd'hui)<br>- LEAP : <span class='key'>>3000 moteurs/an</span> à produire<br>- CA mondial du secteur aéro : <span class='key'>~900 Mds $</span> (civil + militaire + spatial)<br><br><b>Le défi = le ramp-up :</b><br>Le problème n'est pas de vendre des avions (le backlog est plein pour 10 ans). Le problème est de <span class='key'>produire assez vite</span>. Le goulot d'étranglement est la <span class='key'>supply chain</span> : forges, fonderies, ateliers de TdS, matières premières (titane, nickel).<br><br><b>Ce que ça veut dire pour toi :</b> un spécialiste TdS qui sait tenir la cadence, respecter les specs Nadcap, et qualifier des procédés de substitution REACH = un profil très recherché. La demande dépasse l'offre.<br><br><div class='remember'><b>En entretien</b> : 'Je sais que le défi aujourd'hui n'est pas commercial mais industriel. Safran doit produire plus de 3000 LEAP par an, et chaque pièce passe par un atelier TdS. C'est là que j'interviens.'</div>"},
],
L1:[
{q:"OEM signifie :",o:["Original Equipment Manufacturer","Operational Engine Management","Overseas Export Market","Office of Engineering Materials"],c:0,e:"<b>OEM</b> = le fabricant/assembleur final du produit. En aéro : <b>Airbus et Boeing</b> sont les OEM (Tier 0). Ils assemblent l'avion complet à partir des pièces et systèmes fournis par les Tier 1 (Safran, Rolls-Royce...), Tier 2 (Mecachrome...) et Tier 3 (fonderies, ateliers TdS...)."},
{q:"Safran dans la supply chain = :",o:["Tier 1 (systèmes complets)","Tier 0 (assemblage final)","Tier 3 (pièces élémentaires)","Tier 2 (sous-ensembles)"],c:0,e:"<b>Tier 1</b> = fournisseur de systèmes complets (moteur entier, train d'atterrissage complet). Airbus et Boeing = Tier 0 (OEM, assemblage final). Mecachrome, Figeac Aero = Tier 2 (sous-ensembles)."},
{q:"Le backlog Airbus+Boeing dépasse :",o:["17 000 avions","5 000 avions","25 000 avions","50 000 avions"],c:0,e:"Plus de <b>17 000 avions</b> en carnet de commandes = environ 10 ans de production au rythme actuel. C'est le signe que le marché est en surchauffe côté demande."},
{q:"Le concurrent direct du LEAP est :",o:["Le GTF (Pratt & Whitney)","Le Trent XWB (Rolls-Royce)","Le GE90 (GE Aerospace)","Le M88 (Safran)"],c:0,e:"Le <b>GTF</b> (Geared Turbofan, PW1000G) de <b>Pratt & Whitney</b> est le concurrent direct du LEAP sur le moyen-courrier (A320neo).<br><br><b>Rappel :</b> Le <b>LEAP</b> est le moteur de <b>CFM International</b> (coentreprise Safran + GE). Il motorise l'A320neo, le B737 MAX et le C919.<br><br>LEAP = entraînement direct (simple, fiable). GTF = réducteur entre turbine et fan (meilleure conso théorique mais plus complexe)."},
{q:"Le principal défi du marché aéro actuel est :",o:["Produire assez vite","Trouver des clients","Baisser les prix","Développer de nouveaux avions"],c:0,e:"Le backlog est plein pour 10 ans. Le problème n'est pas de vendre, c'est de <b>produire assez vite</b>. Le goulot d'étranglement : la supply chain (forges, fonderies, ateliers TdS, matières premières)."},
{q:"GE Aerospace est le partenaire de Safran dans :",o:["CFM International","Airbus Defence","Thales Alenia Space","MBDA"],c:0,e:"<b>CFM International</b> = coentreprise 50/50 Safran + GE Aerospace, créée en 1974. C'est CFM qui fabrique et vend le LEAP."},
{q:"Quel motoriste n'a PAS de moyen-courrier :",o:["Rolls-Royce","GE Aerospace","Safran","Pratt & Whitney"],c:0,e:"<b>Rolls-Royce</b> fabrique uniquement des moteurs pour <b>long-courriers</b> (famille Trent : Trent XWB pour A350, Trent 7000 pour A330neo).<br><br>Rolls-Royce est <b>absent du marché moyen-courrier</b>, dominé par le LEAP (Safran+GE) et le GTF (Pratt & Whitney). Ce marché représente ~80 % des ventes d'avions neufs."},
{q:"~78 Mds $ de CA en 2024, c'est :",o:["Boeing"],w:["Airbus","Safran","Thales","Dassault","GE Aerospace","Rolls-Royce"],c:0,e:"<b>Boeing</b> = ~78 milliards $ de CA (en dollars). C'est le plus gros CA de l'aéro car Boeing assemble des avions entiers.<br><br><b>Ordre :</b> Boeing (78 Mds $) > Airbus (65 Mds €) > GE (38 Mds $) > Safran (27 Mds €) > Thales (20 Mds €) > Rolls-Royce (17 Mds £) > Dassault (6 Mds €)."},
{q:"~170 000 employés, c'est :",o:["Boeing"],w:["Airbus","Safran","Thales","Dassault","GE Aerospace","Rolls-Royce"],c:0,e:"<b>Boeing</b> = ~170 000 employés, le plus gros effectif de l'aéro mondiale (principalement aux USA).<br><br><b>Ordre :</b> Boeing (170k) > Airbus (150k) > Safran (100k) > Thales (81k) > GE (52k) > Rolls-Royce (42k) > Dassault (13k)."},
{q:"Arlington (Virginie) est le siège de :",o:["Boeing","Safran","Airbus","Thales"],c:0,e:"<b>Boeing</b> a déménagé son siège à Arlington (VA) en 2022, près du Pentagone. Avant : Chicago. Historiquement : Seattle.<br><br><b>Les sièges :</b> Boeing = Arlington. Airbus = Toulouse. Safran = Saclay. Thales = La Défense. Dassault = Saint-Cloud. GE = Cincinnati."},
{q:"Le B737 MAX est motorisé par :",o:["LEAP-1B (CFM)","Trent 7000 (Rolls-Royce)","GTF (Pratt & Whitney)","GE90 (GE Aerospace)"],c:0,e:"<b>Rappel :</b> <b>CFM International</b> = coentreprise 50/50 entre <b>Safran</b> (France) et <b>GE Aerospace</b> (USA). Le <b>LEAP</b> est le moteur fabriqué par CFM pour les avions moyen-courriers.<br><br>Il existe 3 versions du LEAP :<br>• <b>LEAP-1A</b> → Airbus A320neo<br>• <b>LEAP-1B</b> → Boeing B737 MAX<br>• <b>LEAP-1C</b> → COMAC C919 (avion chinois)<br><br>Le B737 MAX n'a qu'<b>un seul motoriste</b> (CFM), alors que l'A320neo peut choisir entre LEAP et GTF (Pratt & Whitney)."},
{q:"GE Aerospace est devenu indépendant en :",o:["2024","2005","2019","2015"],c:0,e:"<b>GE Aerospace</b> est devenu une entreprise indépendante en <b>2024</b> après le spin-off de General Electric (qui s'est scindé en 3 : GE Aerospace, GE Vernova, GE HealthCare)."},
{q:"Le GE9X est le moteur du :",o:["Boeing 777X","Boeing 787","Airbus A350","Airbus A380"],c:0,e:"Le <b>GE9X</b> de GE Aerospace est le moteur exclusif du Boeing <b>777X</b>. C'est le plus gros moteur d'avion jamais construit (diamètre fan : 3,4 m)."},
{q:"~52 000 employés, c'est :",o:["GE Aerospace"],w:["Safran","Thales","Boeing","Dassault","Airbus","Rolls-Royce"],c:0,e:"<b>GE Aerospace</b> = ~52 000 employés. Plus petit en effectif que Safran (100k) car GE sous-traite beaucoup de la fabrication."},
{q:"~42 000 employés, c'est :",o:["Rolls-Royce"],w:["Safran","Thales","Boeing","Dassault","GE Aerospace","Airbus"],c:0,e:"<b>Rolls-Royce</b> = ~42 000 employés. Basé à Derby (UK). Spécialisé long-courrier uniquement (famille Trent)."},
{q:"Cincinnati (Ohio) est le siège de :",o:["GE Aerospace","Boeing","Safran","Rolls-Royce"],c:0,e:"<b>GE Aerospace</b> = Cincinnati (Ohio). Boeing = Arlington (VA). Pratt & Whitney = East Hartford (Connecticut)."},
],
L2:[
{q:"Le GTF se distingue du LEAP par :",o:["Un réducteur entre turbine et fan","Un système open-fan visible","Pas de soufflante frontale","Deux chambres de combustion"],c:0,e:"<b>GTF</b> = Geared Turbofan. Un <b>réducteur</b> entre la turbine BP et le fan permet au fan de tourner plus lentement → meilleur rendement propulsif. Le LEAP utilise un entraînement direct (plus simple, fiabilité prouvée)."},
{q:"La crise qualité Boeing a commencé en :",o:["2018 (crash Lion Air)","2010 (retard B787)","2020 (COVID)","2005 (fusion McDonnell)"],c:0,e:"Crash <b>Lion Air</b> (oct. 2018) puis <b>Ethiopian Airlines</b> (mars 2019). Cause : le système <b>MCAS</b> (anti-décrochage automatique) qui poussait le nez vers le bas. 346 morts. B737 MAX cloué au sol 20 mois."},
{q:"Le goulot d'étranglement du ramp-up est :",o:["La supply chain industrielle","Le manque de commandes","Le manque de pilotes formés","Les réglementations trop strictes"],c:0,e:"Trop de commandes, pas assez de capacité de production. Les forges, fonderies et ateliers TdS ne peuvent pas suivre la cadence demandée par Airbus et Boeing."},
{q:"Le GE90 motorise exclusivement :",o:["Le Boeing 777","Le Boeing 787","L'Airbus A380","L'Airbus A350"],c:0,e:"<b>GE90</b> = moteur exclusif du B777 (classique). Le B787 utilise le GEnx ou le Trent 1000."},
{q:"Le F135 de Pratt & Whitney équipe :",o:["Le F-35 Lightning II","Le Rafale","L'Eurofighter Typhoon","Le F-16"],c:0,e:"Le <b>F135</b> est le moteur du <b>F-35</b> (avion de chasse américain). Pratt & Whitney a le monopole de la motorisation du F-35, le programme militaire le plus cher de l'histoire."},
