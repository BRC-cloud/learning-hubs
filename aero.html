{q:"La norme ASTM F519 concerne :",o:["La fragilisation par hydrogène","Le brouillard salin","L'adhérence des dépôts","La dureté Vickers"],c:0,e:"<b>ASTM F519</b> = norme de référence pour les essais de <b>fragilisation par hydrogène</b> (FPH). Elle définit les éprouvettes et les conditions d'essai pour vérifier qu'un procédé de dépôt ne fragilise pas l'acier."},
{q:"C'est quoi le ressuage ?",o:["Un liquide coloré qui révèle les fissures de surface","Un bain pour protéger contre la corrosion","Un four de traitement thermique","Un outil pour mesurer l'épaisseur"],c:0,e:"Le <b>ressuage</b> (penetrant testing) : on applique un <b>liquide coloré ou fluorescent</b> sur la surface. Le liquide pénètre dans les fissures. On essuie, on applique un révélateur blanc → les fissures apparaissent en rouge ou en vert fluo sous UV. Ne détecte que les défauts <b>ouverts en surface</b>."},
{q:"Les ultrasons en CND servent à :",o:["Détecter les défauts internes de la pièce","Mesurer la dureté de surface","Nettoyer la pièce avant traitement","Chauffer la pièce uniformément"],c:0,e:"Les <b>ultrasons</b> : on envoie une onde sonore à travers la pièce. Si elle rencontre un défaut (fissure, porosité, délaminage), l'onde est <b>réfléchie</b> → on voit le défaut sur l'écran. Méthode <b>non destructive</b>, très utilisée pour les composites (délaminage) et les métaux (inclusions, fissures internes)."},
{q:"La micro-Vickers sert à :",o:["Mesurer la dureté d'une couche mince","Mesurer l'épaisseur d'un dépôt","Détecter les fissures en surface","Mesurer la résistance à la traction"],c:0,e:"La <b>micro-Vickers</b> = dureté Vickers avec une très faible charge (< 1 kg). On enfonce une minuscule pyramide diamant dans la surface. Idéale pour mesurer la dureté d'une <b>couche mince</b> de TdS (anodisation, nickelage) ou d'une <b>zone locale</b> (zone affectée thermiquement en soudage)."},
{q:"La rugosité Ra mesure :",o:["La moyenne des écarts de profil en µm","L'épaisseur du revêtement","La dureté de la surface","L'angle de contact d'une goutte"],c:0,e:"<b>Ra</b> = moyenne arithmétique des écarts de hauteur par rapport à la ligne moyenne. Unité : <b>µm</b>. Le paramètre de rugosité le plus utilisé en industrie."},
{q:"Un angle de contact < 90° signifie :",o:["Surface hydrophile","Surface hydrophobe","Surface très rugueuse","Surface très dure"],c:0,e:"<b>Angle de contact < 90°</b> = <b>hydrophile</b> (la goutte s'étale, mouillant). <b>> 90°</b> = <b>hydrophobe</b> (la goutte perle). Après un dégraissage réussi, la surface doit être hydrophile."},
{q:"La XRF (fluorescence X) en TdS sert à :",o:["Mesurer l'épaisseur et la composition d'un dépôt","Détecter les fissures internes","Mesurer la dureté de surface","Tester l'adhérence du revêtement"],c:0,e:"La <b>XRF</b> envoie des rayons X sur la surface et analyse les rayons renvoyés. Elle mesure l'<b>épaisseur</b> d'un dépôt ET sa <b>composition chimique</b>. Non destructif et rapide."},
],
L2:[
{q:"Les métaux sensibles à la FPH sont les aciers :",o:["> 1000 MPa de Rm","> 500 MPa de Rm","Tous sans exception","Uniquement les inox"],c:0,e:"La FPH touche principalement les <b>aciers haute résistance</b> (Rm > 1000 MPa). Plus l'acier est dur, plus il est sensible. Les aciers doux (< 500 MPa) sont peu concernés."},
{q:"L'hydrogène pénètre dans l'acier lors :",o:["De l'électrodéposition et du décapage acide","Du dégraissage alcalin uniquement","Du rinçage à l'eau","Du séchage en étuve"],c:0,e:"L'hydrogène atomique est généré lors de réactions cathodiques : <b>électrodéposition</b> (nickelage, cadmiage) et <b>décapage acide</b>. Il pénètre dans la maille cristalline du fer et fragilise le métal."},
{q:"Le brouillard salin (ISO 9227) utilise :",o:["5 % NaCl à 35 °C","10 % HCl à 50 °C","1 % H₂SO₄ à 25 °C","Eau pure à 100 °C"],c:0,e:"Brouillard salin normalisé ISO 9227 : <b>5 % de NaCl</b> (sel) en solution, à <b>35 °C</b>, pulvérisé en brouillard. On expose la pièce pendant des centaines d'heures et on note l'apparition de la corrosion. C'est l'essai de corrosion accéléré le plus courant."},
{q:"Le test de quadrillage note de :",o:["0 (parfait) à 5 (tout se décolle)","1 (faible) à 10 (excellent)","A (bon) à F (mauvais)","Pas de notation, juste oui/non"],c:0,e:"Le <b>quadrillage ISO 2409</b> : grille tracée au cutter + scotch arraché. Note <b>0</b> = rien ne part (parfait). Note <b>5</b> = plus de 65 % du revêtement se décolle (rejet total). En aéro, on exige souvent <b>0 ou 1</b> maximum."},
{q:"La radiographie industrielle détecte :",o:["Les défauts internes","Uniquement les défauts de surface","L'épaisseur du revêtement","La composition chimique du bain"],c:0,e:"La <b>radiographie</b> (rayons X ou gamma) traverse la pièce et révèle les <b>défauts internes</b> : porosités, inclusions, fissures internes, défauts de soudage. Comme une radio médicale mais pour les pièces mécaniques."},
{q:"Le ressuage ne fonctionne PAS pour :",o:["Les défauts internes","Les fissures de fatigue en surface","Les piqûres de corrosion ouvertes","Les criques de traitement thermique"],c:0,e:"Le <b>ressuage</b> ne détecte que les défauts <b>ouverts en surface</b> (le liquide doit pouvoir pénétrer). Pour les défauts internes → <b>ultrasons</b> ou <b>radiographie</b>. Pour les fissures sous un revêtement → <b>courants de Foucault</b>."},
],L3:[
{q:"Acier 1200 MPa cadmié : le dégazage doit commencer :",o:["Dans les 4 h après dépôt, sinon irréversible","Dans les 24 h, délai standard","Après 48 h de repos à l'ambiante","Immédiatement mais 1 h suffit"],c:0,e:"Pour les aciers >1000 MPa, le dégazage doit commencer <b>dans les 4 h</b> après le dépôt (cadmiage, nickelage, chromage). Passé ce délai, l'hydrogène se piège de façon <b>irréversible</b> dans les défauts cristallins → risque de fissuration retardée impossible à éliminer. Conditions : 190-230 °C pendant 4-24 h."},
{q:"Brouillard salin : rouille blanche après 120 h sur Zn-Ni. Verdict ?",o:["Acceptable (le zinc se sacrifie normalement)","Rejet immédiat (corrosion trop rapide)","Parfait (aucune corrosion du tout)","Il faut recommencer le test"],c:0,e:"La <b>rouille blanche</b> sur du Zn-Ni = oxydation du <b>zinc</b> (couche sacrificielle). C'est <b>attendu et acceptable</b>. Ce qui serait critique, c'est la <b>rouille rouge</b> = corrosion du <b>substrat acier</b>. Le Zn-Ni doit tenir 720 h+ avant rouille rouge. 120 h de rouille blanche = le revêtement fonctionne comme prévu."},
]},

// ==================== TDS - NORMES ====================
tds_normes:{title:'Normes & REACH',mod:'tds',
lessons:[
{t:"REACH et substitution",en:"REACH regulation and substitution",b:"CrVI : OAC→TSA, Alodine→TCP, chromage→HVOF, primaire→sol-gel.<br>Cadmium : cadmiage→Zn-Ni. Solvants chlorés→dégraissants aqueux.<br>Autorisations expirent (sunset dates). Qualifier les alternatives = stratégique."},
{t:"Nadcap et spécifications",en:"Nadcap and specifications",b:"<span class='key'>Nadcap</span> : certifie les procédés spéciaux (TdS, soudage, CND, TT). Audit 12-18 mois.<br>Procédé spécial = résultat non vérifiable par inspection visuelle.<br><span class='key'>AMS 2470</span> = OAC. <span class='key'>AMS 2471</span> = ASA. <span class='key'>AMS 2700</span> = passivation inox.<br><span class='key'>EN 9100</span> = ISO 9001 version aéro."},
{t:"Qualification d'un procédé TdS",en:"Process qualification",b:"En aéro, avant de traiter des pièces en série, il faut <span class='key'>qualifier le procédé</span> = prouver qu'il donne des résultats conformes de façon <b>reproductible</b>.<br><br><b>Les étapes de qualification :</b><br>1. <span class='key'>Rédaction de la fiche procédé</span> : tous les paramètres (température, courant, temps, concentrations, rinçages)<br>2. <span class='key'>Essais de qualification</span> : traiter des éprouvettes témoins et mesurer épaisseur, adhérence, corrosion, dureté<br>3. <span class='key'>FAI</span> (First Article Inspection) : contrôle complet de la première pièce série. Rapport avec toutes les mesures vs spécification<br>4. <span class='key'>Validation client</span> : le donneur d'ordre (Airbus, Safran...) approuve le procédé<br><br><b>Capabilité (Cp, Cpk) :</b><br>On mesure si le procédé est <b>centré</b> et <b>stable</b> par rapport aux tolérances. <span class='key'>Cpk ≥ 1,33</span> = procédé capable (la variation naturelle tient dans les tolérances avec marge). En dessous = trop de risque de non-conformité.<br><br><b>Carte de contrôle :</b><br>On suit un paramètre dans le temps (épaisseur, pH du bain...). Si le point sort des <span class='key'>limites de contrôle</span> → alerte, investigation, action corrective.<br><br><div class='remember'>En industrie aéro, <b>on qualifie le procédé, pas le produit</b>. Si le procédé est maîtrisé (paramètres dans les limites), le produit sera conforme. C'est le principe des procédés spéciaux.</div>"},
{t:"Gestion des bains en production",en:"Bath management in production",b:"Un atelier TdS, c'est une <span class='key'>ligne de bains</span> : chaque cuve a un rôle (dégraissage, décapage, traitement, rinçage). La gestion quotidienne est critique :<br><br><b>Suivi analytique :</b><br>On <span class='key'>analyse régulièrement</span> chaque bain (titrage, pH-mètre, densimètre) pour vérifier que les concentrations sont dans les limites de la fiche procédé. Fréquence typique : quotidienne à hebdomadaire selon le bain.<br><br><b>Corrections :</b><br>- <span class='key'>Rajout de sels</span> : la concentration baisse avec le temps (consommation + entraînement)<br>- <span class='key'>Ajustement pH</span> : ajout d'acide ou de base<br>- <span class='key'>Filtration</span> : retirer les particules en suspension (contamination)<br>- <span class='key'>Purification</span> : traitement au charbon actif pour retirer les impuretés organiques<br><br><b>Durée de vie d'un bain :</b><br>Un bain accumule les <span class='key'>contaminants</span> (métaux dissous, matière organique, chlorures). Quand les corrections ne suffisent plus → on <b>vidange et reconstitue</b> le bain. Coût + arrêt production + traitement des effluents.<br><br><b>Traçabilité :</b><br>Chaque analyse, correction et vidange est <span class='key'>enregistrée</span> dans le dossier bain. Nadcap vérifie cette traçabilité lors des audits.<br><br><div class='remember'>Un bain mal suivi = des non-conformités. En TdS industriel, le <b>suivi analytique</b> et la <b>traçabilité</b> sont aussi importants que le traitement lui-même.</div>"},
],
L1:[
{q:"Nadcap certifie :",o:["Les procédés spéciaux","Les avions avant leur livraison","Les pilotes de ligne","Les matériaux avant utilisation"],c:0,e:"<b>Nadcap</b> certifie les <b>procédés spéciaux</b> : traitement de surface, soudage, CND, traitement thermique. Un procédé est 'spécial' quand le résultat <b>ne peut pas être vérifié par simple inspection visuelle</b> (on ne voit pas si l'anodisation fait 15 µm en regardant la pièce)."},
{q:"CrVI est classé :",o:["CMR","Irritant pour la peau","Sans danger en petite dose","Allergène courant"],c:0,e:"Le <b>chrome hexavalent</b> (CrVI) est classé <b>CMR</b> = Cancérigène, Mutagène, Reprotoxique. C'est la classification la plus sévère de REACH (Annexe XIV). Son utilisation nécessite une autorisation avec date d'expiration (sunset date)."},
{q:"AMS 2700 = :",o:["Passivation des inox","Anodisation chromique (OAC)","Anodisation sulfurique (ASA)","Nickelage électrolytique"],c:0,e:"Les spécifications AMS à retenir :<br>• <b>AMS 2700</b> = passivation des inox<br>• <b>AMS 2470</b> = anodisation chromique (OAC)<br>• <b>AMS 2471</b> = anodisation sulfurique (ASA)"},
{q:"EN 9100 est :",o:["L'ISO 9001 version aéronautique","Une norme de traitement de surface","Un standard de test mécanique","Une spécification moteur"],c:0,e:"<b>EN 9100</b> = la version aéronautique de l'ISO 9001 (management de la qualité). Elle ajoute des exigences spécifiques à l'aéro : traçabilité, gestion de configuration, maîtrise des procédés spéciaux."},
{q:"Un procédé spécial est un procédé dont :",o:["Le résultat ne peut pas être vérifié visuellement","Le coût dépasse 10 000 €","La durée dépasse 24 h","Le résultat est toujours parfait"],c:0,e:"Un <b>procédé spécial</b> = on ne peut pas vérifier le résultat par une simple inspection visuelle ou dimensionnelle. Exemples : TdS (épaisseur interne), soudage (qualité interne du joint), traitement thermique (microstructure). D'où l'importance de <b>maîtriser le procédé</b> plutôt que de contrôler le produit fini."},
{q:"La fréquence d'audit Nadcap est :",o:["Tous les 12 à 18 mois","Tous les 5 ans","Une seule fois à la certification","Tous les mois"],c:0,e:"<b>Nadcap</b> audite les fournisseurs tous les <b>12 à 18 mois</b>. C'est très exigeant : chaque paramètre de chaque bain est vérifié (température, concentration, temps, courant...). Perdre Nadcap = perdre ses clients aéro."},
{q:"C'est quoi le CrVI (chrome hexavalent) ?",o:["Un produit chimique cancérigène utilisé historiquement en TdS","Un alliage de chrome très résistant","Un outil de mesure de dureté","Un type de fibre de carbone"],c:0,e:"Le <b>CrVI</b> (chrome hexavalent) = une forme très toxique du chrome, classée <b>CMR</b> (Cancérigène, Mutagène, Reprotoxique). Il était très utilisé en TdS aéro (anodisation OAC, Alodine, chromage dur, primaires peinture). REACH impose de le <b>remplacer</b> par des alternatives non toxiques (TSA, TCP, HVOF, sol-gel)."},
{q:"C'est quoi une spécification AMS ?",o:["Un document qui définit comment faire un traitement","Un outil de mesure de surface","Un type d'alliage aéronautique","Un logiciel de gestion qualité"],c:0,e:"<b>AMS</b> (Aerospace Material Specification) = document publié par SAE International qui définit <b>les exigences exactes</b> pour un matériau ou un procédé aéro. Ex : <b>AMS 2471</b> dit exactement comment faire une anodisation sulfurique (température, courant, durée, épaisseur min/max, contrôles...). C'est la recette officielle."},
{q:"C'est quoi une non-conformité ?",o:["Une pièce qui ne respecte pas les exigences","Une pièce parfaitement conforme","Un type de traitement de surface","Un outil de contrôle"],c:0,e:"Une <b>non-conformité</b> (NC) = une pièce ou un procédé qui <b>ne respecte pas les exigences</b> définies dans la spécification (épaisseur hors tolérance, adhérence insuffisante, paramètre bain hors limites). En aéro, chaque NC doit être <b>documentée</b>, analysée (cause racine) et traitée (rebut, retouche ou dérogation)."},
{q:"La FAI (First Article Inspection) c'est :",o:["Le contrôle complet de la première pièce de série","L'inspection de l'avion avant son premier vol","La formation des opérateurs qualité","L'audit Nadcap annuel"],c:0,e:"La <b>FAI</b> = contrôle exhaustif de la <b>première pièce</b> produite. On mesure TOUT et on compare aux spécifications. Si la FAI est OK → le procédé est validé pour la série."},
{q:"Un Cpk ≥ 1,33 signifie :",o:["Le procédé est capable et stable","Le bain est contaminé","Le contrôle qualité a échoué","La pièce est non conforme"],c:0,e:"<b>Cpk ≥ 1,33</b> = le procédé est <b>capable</b> : sa variation naturelle tient dans les tolérances avec marge. Si Cpk < 1 → trop de pièces hors tolérance."},
{q:"Une carte de contrôle en TdS sert à :",o:["Suivre un paramètre dans le temps et détecter les dérives","Dessiner le plan de la ligne de bains","Enregistrer les commandes clients","Calculer le coût de production"],c:0,e:"Une <b>carte de contrôle</b> (SPC) = graphique où on trace un paramètre au fil du temps. Des <b>limites de contrôle</b> (±3σ) encadrent les mesures. Si un point sort → alerte, investigation, action corrective."},
{q:"La traçabilité d'un bain TdS implique d'enregistrer :",o:["Chaque analyse, correction et vidange","Uniquement le nombre de pièces traitées","Seulement la température du local","Le nom de l'opérateur uniquement"],c:0,e:"Traçabilité bain = <b>chaque analyse</b> chimique, <b>chaque correction</b>, <b>chaque vidange</b>. Cet historique est vérifié à chaque audit Nadcap."},
],
L2:[
{q:"REACH s'applique à l'aéro pour :",o:["Remplacer les substances CMR toxiques","Certifier les avions","Former les pilotes","Contrôler les émissions CO₂"],c:0,e:"<b>REACH</b> (Registration, Evaluation, Authorisation of CHemicals) oblige l'industrie à remplacer les substances les plus dangereuses. En aéro/TdS : le CrVI (OAC, Alodine, chromage) et le cadmium sont les principales cibles."},
{q:"Une sunset date est :",o:["La date d'expiration d'une autorisation REACH","La date de livraison d'un avion","La fin de vie d'un moteur","Le coucher de soleil aéronautique"],c:0,e:"<b>Sunset date</b> = la date après laquelle une substance ne peut plus être utilisée sans autorisation spécifique. Si l'entreprise n'a pas qualifié une alternative avant cette date, elle doit arrêter le procédé."},
{q:"AMS 2470 correspond à :",o:["L'anodisation chromique (OAC)","La passivation des inox","Le nickelage électrolytique","L'anodisation sulfurique (ASA)"],c:0,e:"<b>AMS 2470</b> = OAC (anodisation chromique). <b>AMS 2471</b> = ASA (anodisation sulfurique). <b>AMS 2700</b> = passivation des inox. Ce sont les 3 spécifications AMS les plus importantes en TdS aéro."},
{q:"La différence entre une spec AMS et une spec MIL :",o:["AMS = civil (SAE), MIL = militaire (US DoD)","AMS = militaire, MIL = civil","Les deux sont identiques","AMS est européen, MIL est américain"],c:0,e:"<b>AMS</b> (Aerospace Material Specification) = normes émises par la <b>SAE</b> pour l'aéronautique civile et militaire. <b>MIL</b> = normes du département de la Défense US. En pratique, beaucoup de specs MIL ont été remplacées par des AMS. Les donneurs d'ordre (Airbus, Safran) référencent les deux dans leurs cahiers des charges."},
{q:"Une SVHC au sens de REACH est :",o:["Une substance extrêmement préoccupante (CMR, PBT...)","Un type de revêtement","Une certification qualité","Un outil de mesure d'épaisseur"],c:0,e:"<b>SVHC</b> = Substance of Very High Concern. Ce sont les substances les plus dangereuses identifiées par l'ECHA : <b>CMR</b> (cancérogène, mutagène, reprotoxique), <b>PBT</b> (persistant, bioaccumulable, toxique), perturbateurs endocriniens. En TdS aéro : le CrVI et le cadmium sont des SVHC → substitution obligatoire à terme."},
{q:"La QPL (Qualified Products List) en aéro sert à :",o:["Lister les produits chimiques approuvés pour un procédé","Lister les pilotes qualifiés","Enregistrer les brevets","Planifier la production"],c:0,e:"La <b>QPL</b> = liste des produits (bains, peintures, produits chimiques) <b>qualifiés</b> par le donneur d'ordre pour un procédé donné. Ex : QPL des primaires époxy qualifiés par Airbus. Un atelier TdS ne peut utiliser QUE les produits sur la QPL → tout changement de fournisseur chimique nécessite une requalification."},
],L3:[
{q:"Un fournisseur perd sa certification Nadcap TdS. Conséquence ?",o:["Il ne peut plus traiter de pièces aéro","Il continue avec un avertissement","Il passe en audit tous les 5 ans","Seuls les nouveaux contrats sont affectés"],c:0,e:"<b>Nadcap</b> est obligatoire pour les fournisseurs de procédés spéciaux en aéro. Sans Nadcap, le fournisseur <b>ne peut plus traiter de pièces</b> pour les donneurs d'ordre aéro (Airbus, Boeing, Safran...). C'est un critère éliminatoire, pas un bonus. Les pièces en cours doivent être redirigées vers un fournisseur certifié."},
{q:"La TSA est 'tartrique-sulfurique'. Le rôle de l'acide tartrique est :",o:["Stabiliser la couche et améliorer la corrosion","Accélérer la croissance de l'oxyde","Colorer la couche en jaune","Remplacer le courant électrique"],c:0,e:"L'<b>acide tartrique</b> dans la TSA agit comme <b>inhibiteur de dissolution</b> : il stabilise la couche anodique et réduit l'attaque acide des pores → meilleure <b>résistance à la corrosion</b> que l'ASA classique (H₂SO₄ seul). C'est ce qui permet à la TSA de se rapprocher des performances de l'OAC sans utiliser de CrVI."},
{q:"Un client exige une OAC (CrVI) mais la sunset date est passée. Que fait l'atelier ?",o:["Demander si le client a une autorisation REACH ou proposer la TSA comme alternative qualifiée","Appliquer l'OAC quand même","Refuser le contrat sans alternative","Utiliser un autre acide sans qualification"],c:0,e:"Après la <b>sunset date</b>, l'utilisation du CrVI nécessite une <b>autorisation REACH</b> spécifique. L'atelier doit vérifier si le client (ou son donneur d'ordre) détient cette autorisation. Sinon, proposer la <b>TSA</b> ou la <b>BSAA</b> comme alternatives qualifiées. Appliquer un procédé CrVI sans autorisation = infraction réglementaire."},
{q:"Lors d'un audit Nadcap, une non-conformité majeure signifie :",o:["Suspension possible de la certification si pas corrigée","Un simple avertissement sans conséquence","Une amélioration suggérée pour le prochain audit","Un bonus sur le score d'audit"],c:0,e:"En audit <b>Nadcap</b>, une <b>non-conformité majeure</b> = écart significatif par rapport aux exigences. L'atelier a un délai limité pour corriger (action corrective + preuves). Si non corrigée → <b>suspension de la certification</b> → interdiction de traiter des pièces aéro. C'est pourquoi les ateliers TdS prennent les audits Nadcap très au sérieux."},
]},

// ==================== MÉTAUX - BASES ====================
met_bases:{title:'Propriétés mécaniques',mod:'metaux',
lessons:[
{t:"C'est quoi un métal ?",en:"What is a metal?",b:"Un <span class='key'>métal</span> est un matériau qui conduit l'électricité et la chaleur, qui est <span class='key'>brillant</span> (éclat métallique), et qui peut se <span class='key'>déformer</span> sans casser (ductile).<br><br>En aéro, on utilise 4 familles de métaux :<br>- <span class='key'>Aluminium</span> : léger (2,7 g/cm³), le plus utilisé en structure avion<br>- <span class='key'>Titane</span> : mi-lourd (4,5 g/cm³), résistant et anticorrosion<br>- <span class='key'>Acier</span> : lourd (7,8 g/cm³) mais très résistant, pour trains d'atterrissage<br>- <span class='key'>Superalliages de nickel</span> : très lourds (8,9 g/cm³), pour les parties chaudes du moteur (>1000 °C)<br><br>Un <span class='key'>alliage</span> = un métal de base + des éléments d'addition pour améliorer les propriétés. Ex : l'acier = fer + carbone, le duralumin (2024) = aluminium + cuivre.<br><br><div class='remember'><b>Lire un nom d'alliage :</b> Ti-6Al-4V = Titane + 6 % Aluminium + 4 % Vanadium. Les chiffres donnent le % de chaque élément d'addition.</div>"},
{t:"Propriétés mécaniques clés",en:"Key mechanical properties",b:"Quand on choisit un métal pour une pièce d'avion, on regarde ses <b>propriétés mécaniques</b> = comment il réagit quand on le tire, le comprime, le cogne. Voici les grandeurs essentielles :<br><br><span class='key'>Rm</span> <span class='en'>(Ultimate Tensile Strength)</span> : la <b>contrainte maximale</b> avant rupture. On la mesure en tirant sur une éprouvette jusqu'à ce qu'elle casse. Unité : <b>MPa</b>.<br><br><span class='key'>Re (ou Rp0.2)</span> <span class='en'>(Yield Strength)</span> : la <b>limite élastique</b> = la contrainte à partir de laquelle le métal se déforme <b>de façon permanente</b>. En dessous de Re, le métal revient à sa forme initiale (élastique). Au-dessus, il garde la déformation (plastique).<br><br><span class='key'>A%</span> <span class='en'>(Elongation)</span> : l'<b>allongement à rupture</b> = de combien le métal s'allonge avant de casser. A% élevé = ductile (se déforme beaucoup). A% faible = fragile (casse net).<br><br>Ces 3 grandeurs viennent de la <b>courbe de traction</b> (on tire sur une éprouvette et on mesure force / allongement) :<br><svg viewBox='0 0 280 150' style='width:100%;max-width:280px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:8px'><line x1='40' y1='130' x2='260' y2='130' stroke='#94a3b8' stroke-width='1.5'/><line x1='40' y1='130' x2='40' y2='15' stroke='#94a3b8' stroke-width='1.5'/><text x='150' y='148' text-anchor='middle' fill='#94a3b8' font-size='8'>Déformation ε →</text><text x='18' y='75' fill='#94a3b8' font-size='8' transform='rotate(-90,18,75)'>Contrainte σ →</text><path d='M40,130 L100,60' stroke='#3b82f6' stroke-width='2.5'/><path d='M100,60 Q130,38 170,32 Q200,30 220,35' stroke='#3b82f6' stroke-width='2.5' fill='none'/><path d='M220,35 L235,50' stroke='#3b82f6' stroke-width='2.5'/><circle cx='235' cy='50' r='4' fill='#ef4444'/><text x='245' y='53' fill='#fca5a5' font-size='7'>Rupture</text><line x1='40' y1='60' x2='100' y2='60' stroke='#059669' stroke-width='1' stroke-dasharray='3'/><text x='35' y='58' fill='#6ee7b7' font-size='8' text-anchor='end'>Re</text><circle cx='100' cy='60' r='3' fill='#059669'/><text x='105' y='55' fill='#6ee7b7' font-size='7'>Limite élastique</text><line x1='40' y1='30' x2='220' y2='30' stroke='#f97316' stroke-width='1' stroke-dasharray='3'/><text x='35' y='33' fill='#fdba74' font-size='8' text-anchor='end'>Rm</text><text x='180' y='25' fill='#fdba74' font-size='7'>Contrainte max</text><text x='70' y='100' fill='#93c5fd' font-size='7'>Zone élastique</text><text x='160' y='80' fill='#c4b5fd' font-size='7'>Zone plastique</text></svg><span class='key'>KIc</span> <span class='en'>(Fracture Toughness)</span> : <b>ténacité</b> = résistance à la propagation d'une fissure. En aéro, on veut des matériaux qui tolèrent de petites fissures sans casser d'un coup (tolérance aux dommages).<br><br><span class='key'>HV, HRC</span> <span class='en'>(Hardness)</span> : <b>dureté</b> = résistance à l'enfoncement d'un poinçon. Plus c'est dur, plus ça résiste à l'usure.<br><br><span class='key'>Fluage</span> <span class='en'>(Creep)</span> : déformation lente sous contrainte constante <b>à haute température</b>. Critique pour les aubes de turbine (1000 °C + force centrifuge = le métal s'allonge lentement au fil du temps)."},
{t:"Durcissement des métaux",en:"Strengthening mechanisms",b:"<b>Pour comprendre le durcissement, il faut d'abord comprendre les dislocations.</b><br><br><span class='key'>C'est quoi une dislocation ?</span><br>Un métal est un cristal = des atomes rangés en lignes régulières. Mais il y a toujours des <b>défauts</b> : des endroits où il manque un demi-plan d'atomes. Ce défaut s'appelle une <span class='key'>dislocation</span>.<br><br>Quand on tire sur le métal, la dislocation <b>se déplace</b> d'atome en atome, comme une vague. C'est ce mouvement qui permet au métal de se <b>déformer plastiquement</b> (changer de forme sans casser). Sans dislocations, le métal serait fragile comme du verre.<br><br><b>Durcir un métal = empêcher les dislocations de bouger.</b> Plus les dislocations sont bloquées, plus il faut forcer pour déformer = plus le métal est dur et résistant.<br><br><b>Analogie :</b> imagine une autoroute (le cristal). Les dislocations sont des voitures. Si l'autoroute est vide, les voitures roulent vite = le métal se déforme facilement. Pour durcir = mettre des obstacles sur la route.<br><br><svg viewBox='0 0 300 170' style='width:100%;max-width:300px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:8px'><text x='150' y='14' text-anchor='middle' fill='#e2e8f0' font-size='9' font-weight='bold'>Les 4 obstacles aux dislocations</text><rect x='5' y='22' width='140' height='62' rx='6' fill='rgba(239,68,68,0.12)' stroke='#ef4444' stroke-width='1'/><text x='75' y='38' text-anchor='middle' fill='#fca5a5' font-size='8' font-weight='bold'>1. Écrouissage</text><text x='75' y='50' text-anchor='middle' fill='#94a3b8' font-size='7'>Déformer à froid</text><text x='75' y='62' text-anchor='middle' fill='#94a3b8' font-size='7'>= multiplier les dislocations</text><text x='75' y='76' text-anchor='middle' fill='#fca5a5' font-size='7'>Embouteillage !</text><rect x='155' y='22' width='140' height='62' rx='6' fill='rgba(59,130,246,0.12)' stroke='#3b82f6' stroke-width='1'/><text x='225' y='38' text-anchor='middle' fill='#93c5fd' font-size='8' font-weight='bold'>2. Solution solide</text><text x='225' y='50' text-anchor='middle' fill='#94a3b8' font-size='7'>Ajouter des atomes étrangers</text><text x='225' y='62' text-anchor='middle' fill='#94a3b8' font-size='7'>= déformer le réseau</text><text x='225' y='76' text-anchor='middle' fill='#93c5fd' font-size='7'>Nids de poule !</text><rect x='5' y='92' width='140' height='62' rx='6' fill='rgba(5,150,105,0.12)' stroke='#059669' stroke-width='1'/><text x='75' y='108' text-anchor='middle' fill='#6ee7b7' font-size='8' font-weight='bold'>3. Précipitation</text><text x='75' y='120' text-anchor='middle' fill='#94a3b8' font-size='7'>Former des particules (TT)</text><text x='75' y='132' text-anchor='middle' fill='#94a3b8' font-size='7'>= obstacles infranchissables</text><text x='75' y='146' text-anchor='middle' fill='#6ee7b7' font-size='7'>Murs sur la route !</text><rect x='155' y='92' width='140' height='62' rx='6' fill='rgba(168,85,247,0.12)' stroke='#a855f7' stroke-width='1'/><text x='225' y='108' text-anchor='middle' fill='#c4b5fd' font-size='8' font-weight='bold'>4. Taille de grain</text><text x='225' y='120' text-anchor='middle' fill='#94a3b8' font-size='7'>Grains plus fins</text><text x='225' y='132' text-anchor='middle' fill='#94a3b8' font-size='7'>= plus de joints de grains</text><text x='225' y='146' text-anchor='middle' fill='#c4b5fd' font-size='7'>Plus de péages !</text></svg><b>Les 4 mécanismes en détail :</b><br><br><span class='key'>1. Écrouissage</span> <span class='en'>(Work hardening)</span><br>On déforme le métal <b>à froid</b> (laminage, forgeage, tréfilage). Ça multiplie énormément les dislocations (de 10⁶ à 10¹² par cm²). Comme elles sont trop nombreuses, elles se bloquent entre elles = embouteillage.<br>Résultat : le métal devient <b>dur</b> mais perd sa <b>ductilité</b> (il ne peut plus se déformer davantage).<br>Pour le rendre ductile à nouveau → <b>recuit</b> (chauffage qui réorganise les grains).<br>Exemple aéro : tôles d'alu laminées à froid pour les fuselages.<br><br><span class='key'>2. Solution solide</span> <span class='en'>(Solid solution strengthening)</span><br>On ajoute des <b>atomes étrangers</b> dans le cristal du métal de base. Ces atomes sont plus gros ou plus petits → ils déforment localement le réseau cristallin → les dislocations ont du mal à passer (comme rouler sur une route avec des nids-de-poule).<br>Exemple : le cuivre dans l'aluminium (série 2xxx), le zinc dans l'aluminium (série 7xxx).<br><br><span class='key'>3. Précipitation</span> <span class='en'>(Precipitation hardening)</span><br>On forme de <b>très fines particules</b> (précipités) à l'intérieur du métal par traitement thermique (mise en solution → trempe → vieillissement). Les dislocations ne peuvent pas traverser ces nano-obstacles → elles sont bloquées.<br>C'est LE mécanisme du <b>T6</b> : l'alu 7075-T6 contient des précipités MgZn₂ de quelques nanomètres qui le rendent 2× plus résistant que l'alu sans traitement.<br>Aussi utilisé pour le 17-4 PH (inox à durcissement par précipitation).<br><br><span class='key'>4. Taille de grain</span> <span class='en'>(Grain refinement, loi de Hall-Petch)</span><br>Un métal = plein de petits cristaux (<b>grains</b>) séparés par des <b>joints de grains</b>. Quand une dislocation arrive à un joint, elle est bloquée (le grain voisin a une orientation différente).<br>→ Grains plus fins = <b>plus de joints</b> = plus d'obstacles = métal plus résistant.<br>Loi de <b>Hall-Petch</b> : Re augmente quand la taille de grain diminue.<br>En pratique : on contrôle la taille de grain par la vitesse de refroidissement et les traitements thermiques.<br><br><div class='remember'><b>Résumé :</b> un métal se déforme parce que les dislocations bougent. Le durcir = les bloquer. 4 façons : embouteillage (écrouissage), nids-de-poule (solution solide), murs (précipités), péages (joints de grains).</div>"},
{t:"Structures cristallines",en:"Crystal structures",b:"Les métaux sont des <span class='key'>cristaux</span> : leurs atomes sont rangés de façon régulière dans l'espace, comme des billes empilées. La façon dont les atomes sont empilés s'appelle la <b>structure cristalline</b>.<br><br><b>3 structures principales :</b><br><br><span class='key'>CFC</span> (cubique faces centrées) <span class='en'>(FCC)</span> : aluminium, cuivre, nickel, or.<br><span class='key'>CC</span> (cubique centré) <span class='en'>(BCC)</span> : fer (à température ambiante), chrome, tungstène.<br><span class='key'>HC</span> (hexagonal compact) <span class='en'>(HCP)</span> : titane (phase α), zinc, magnésium.<br><br><svg viewBox='0 0 300 90' style='width:100%;max-width:300px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:6px'><rect x='5' y='10' width='90' height='65' rx='6' fill='#0e4429' stroke='#059669' stroke-width='1.5'/><text x='50' y='28' text-anchor='middle' fill='#6ee7b7' font-size='10' font-weight='bold'>CFC</text><text x='50' y='42' text-anchor='middle' fill='#6ee7b7' font-size='7'>12 glissements</text><text x='50' y='54' text-anchor='middle' fill='#94a3b8' font-size='7'>Al, Cu, Ni, Au</text><text x='50' y='66' text-anchor='middle' fill='#059669' font-size='8' font-weight='bold'>Très ductile</text><rect x='105' y='10' width='90' height='65' rx='6' fill='#1e3a5f' stroke='#3b82f6' stroke-width='1.5'/><text x='150' y='28' text-anchor='middle' fill='#93c5fd' font-size='10' font-weight='bold'>CC</text><text x='150' y='42' text-anchor='middle' fill='#93c5fd' font-size='7'>48 glissements*</text><text x='150' y='54' text-anchor='middle' fill='#94a3b8' font-size='7'>Fe, Cr, W</text><text x='150' y='66' text-anchor='middle' fill='#3b82f6' font-size='8' font-weight='bold'>Résistant</text><rect x='205' y='10' width='90' height='65' rx='6' fill='#7f1d1d' stroke='#ef4444' stroke-width='1.5'/><text x='250' y='28' text-anchor='middle' fill='#fca5a5' font-size='10' font-weight='bold'>HC</text><text x='250' y='42' text-anchor='middle' fill='#fca5a5' font-size='7'>3 glissements</text><text x='250' y='54' text-anchor='middle' fill='#94a3b8' font-size='7'>Ti(α), Zn, Mg</text><text x='250' y='66' text-anchor='middle' fill='#ef4444' font-size='8' font-weight='bold'>Plus fragile</text></svg><b>C'est quoi un système de glissement ?</b><br>Quand on tire sur un métal, les atomes glissent les uns sur les autres le long de certains <b>plans</b> et dans certaines <b>directions</b>. Chaque combinaison plan + direction = un <span class='key'>système de glissement</span>.<br><br><b>Le lien avec ductile/fragile :</b><br>Imagine un jeu de cartes. Si tu peux glisser les cartes dans 12 directions différentes (CFC), le paquet se déforme facilement = <b>ductile</b>. Si tu ne peux glisser que dans 3 directions (HC), c'est beaucoup plus rigide, et si aucune ne marche pour la force appliquée, ça casse = <b>fragile</b>.<br><br>C'est pour ça que le <b>titane (HC)</b> est plus dur à déformer que l'<b>aluminium (CFC)</b> : le titane a peu de chemins de glissement disponibles.<br><br><div class='remember'><b>Mnémo :</b> CFC = Facile (ductile, 12 glissements). HC = Hard (fragile, 3 glissements). Plus de glissements = plus ductile.</div>"},
{t:"Traitements thermiques",en:"Heat treatments",b:"<b>Principe général :</b> les propriétés mécaniques d'un métal dépendent de sa <b>microstructure</b> (taille des grains, phases présentes, précipités). En chauffant puis en refroidissant de façon contrôlée, on modifie cette microstructure → on change les propriétés <b>sans changer la composition chimique</b>.<br><br>Tout repose sur une idée simple : <b>la vitesse de refroidissement détermine ce qu'on obtient</b>.<br><br><svg viewBox='0 0 300 130' style='width:100%;max-width:300px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:8px'><text x='150' y='14' text-anchor='middle' fill='#e2e8f0' font-size='9' font-weight='bold'>Effet de la vitesse de refroidissement</text><line x1='30' y1='30' x2='30' y2='115' stroke='#94a3b8' stroke-width='1'/><line x1='30' y1='115' x2='280' y2='115' stroke='#94a3b8' stroke-width='1'/><text x='155' y='126' text-anchor='middle' fill='#94a3b8' font-size='7'>Temps →</text><text x='14' y='75' fill='#94a3b8' font-size='7' transform='rotate(-90,14,75)'>T °C →</text><path d='M30,35 Q60,35 80,50 Q120,80 150,95 Q200,108 270,112' stroke='#059669' stroke-width='2' fill='none'/><text x='275' y='110' fill='#6ee7b7' font-size='7'>Lent</text><text x='230' y='100' fill='#6ee7b7' font-size='6'>→ Recuit</text><path d='M30,35 Q50,40 70,60 Q90,85 110,100 L150,112' stroke='#f97316' stroke-width='2' fill='none'/><text x='155' y='110' fill='#fdba74' font-size='7'>Moyen</text><text x='140' y='96' fill='#fdba74' font-size='6'>→ Normalisation</text><path d='M30,35 L50,80 L60,112' stroke='#ef4444' stroke-width='2' fill='none'/><text x='65' y='110' fill='#fca5a5' font-size='7'>Rapide</text><text x='80' y='96' fill='#fca5a5' font-size='6'>→ Trempe</text><line x1='30' y1='35' x2='280' y2='35' stroke='#94a3b8' stroke-width='0.5' stroke-dasharray='3'/><text x='282' y='38' fill='#94a3b8' font-size='6'>T chauffage</text></svg><b>Les traitements thermiques dans le volume :</b><br><br><span class='key'>1. Trempe</span> <span class='en'>(Quenching)</span><br>On chauffe le métal au-dessus d'une température critique (pour les aciers : au-dessus de la zone austénitique, ~800-900 °C), puis on refroidit <b>très vite</b> (eau, huile, air pulsé). Le refroidissement est si rapide que les atomes n'ont pas le temps de se réorganiser normalement.<br>→ Pour les aciers : l'austénite (CFC, stable à chaud) se transforme en <span class='key'>martensite</span> (structure déformée, très dure). C'est une transformation <b>sans diffusion</b> : les atomes de carbone restent piégés dans le réseau.<br>→ Pour les aluminiums : la trempe <b>fige les atomes en solution</b> (mise en solution) pour préparer le vieillissement.<br>Résultat : métal très <b>dur</b> mais <b>fragile</b> (martensite acier) ou sursaturé (alu).<br><br><span class='key'>2. Revenu</span> <span class='en'>(Tempering)</span><br>Après la trempe, le métal est trop fragile pour être utilisé tel quel. Le revenu = réchauffage modéré (<b>150-650 °C</b> selon l'acier), maintien, puis refroidissement.<br>→ La martensite se détend : les contraintes internes se relâchent, de petits <b>carbures</b> précipitent.<br>→ On perd un peu de dureté mais on récupère beaucoup de <b>ductilité</b> et de <b>ténacité</b>.<br><b>Trempe + revenu</b> = le traitement standard des aciers hautes performances aéro (300M, 4340 pour les trains d'atterrissage). On choisit la température de revenu pour ajuster le compromis dureté/ductilité.<br><br><span class='key'>3. Recuit</span> <span class='en'>(Annealing)</span><br>Chauffage lent + maintien + refroidissement <b>lent</b> (dans le four éteint).<br>→ Les grains se réorganisent, les contraintes internes disparaissent, le métal devient <b>mou et ductile</b>.<br>Utilisé pour : faciliter la mise en forme (laminage, pliage, emboutissage), restaurer la ductilité après un écrouissage, homogénéiser la structure.<br><br><span class='key'>4. Mise en solution + vieillissement (T6)</span> <span class='en'>(Solution treatment + aging)</span><br>Spécifique aux alliages d'aluminium (2xxx, 7xxx). En 3 étapes :<br>① <b>Mise en solution</b> : chauffage (~495 °C pour le 2024) → les éléments d'alliage (Cu, Zn, Mg) se dissolvent dans l'alu.<br>② <b>Trempe</b> : refroidissement rapide → les atomes restent piégés en sursaturation (ils voudraient précipiter mais n'ont pas eu le temps).<br>③ <b>Vieillissement</b> (naturel à température ambiante = T4, artificiel en four ~120-175 °C = T6) → de très <b>fins précipités</b> se forment et bloquent les dislocations = <b>durcissement structural</b>.<br>C'est le mécanisme du fameux <b>7075-T6</b> (alu + Zn + Mg + Cu → précipités MgZn₂).<br><br><b>Les traitements thermochimiques (en surface) :</b><br><br><span class='key'>5. Cémentation</span> <span class='en'>(Case hardening / Carburizing)</span><br>On place la pièce dans une atmosphère riche en carbone à haute température (~900-950 °C) pendant plusieurs heures. Le <b>carbone diffuse</b> dans la surface sur quelques dixièmes de mm à quelques mm.<br>→ Surface enrichie en carbone = très dure après trempe. Cœur pauvre en carbone = reste <b>ductile</b>.<br>Idéal pour les <b>engrenages</b> : surface résistante à l'usure, cœur qui absorbe les chocs.<br><br><span class='key'>6. Nitruration</span> <span class='en'>(Nitriding)</span><br>On place la pièce dans une atmosphère azotée (~500 °C) pendant longtemps. L'<b>azote diffuse</b> en surface et forme des <b>nitrures</b> très durs (Fe₄N, CrN).<br>Avantage vs cémentation : température plus basse → <b>pas de trempe après</b> → moins de déformations. Utilisée pour les vilebrequins, arbres, cylindres.<br><br><div class='remember'><b>Résumé :</b> Refroidissement rapide = dur et fragile (trempe). Revenu = on ajuste le compromis. Lent = mou et ductile (recuit). T6 = précipités durcissants dans l'alu. Cémentation/nitruration = surface dure, cœur ductile.</div>"},
{t:"Diagrammes de phases",en:"Phase diagrams",b:"<b>C'est quoi un diagramme de phases ?</b><br>Imagine une <b>carte</b> qui te dit : pour un alliage donné (composition en % sur l'axe horizontal), à une température donnée (axe vertical), <b>quel(s) état(s) du métal sont stables</b>. C'est exactement ça un diagramme de phases.<br><br>C'est l'outil fondamental en métallurgie : il explique pourquoi un traitement thermique marche, pourquoi un alliage fond à telle température, et d'où viennent les noms austénite, ferrite, martensite (voir leçon suivante).<br><br><b>Les lignes et zones clés :</b><br><svg viewBox='0 0 280 170' style='width:100%;max-width:280px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:8px'><text x='140' y='14' text-anchor='middle' fill='#e2e8f0' font-size='9' font-weight='bold'>Diagramme de phases (type eutectique)</text><line x1='35' y1='25' x2='35' y2='150' stroke='#94a3b8' stroke-width='1'/><line x1='35' y1='150' x2='265' y2='150' stroke='#94a3b8' stroke-width='1'/><text x='150' y='165' text-anchor='middle' fill='#94a3b8' font-size='7'>% élément B →</text><text x='12' y='90' fill='#94a3b8' font-size='7' transform='rotate(-90,12,90)'>Température →</text><text x='38' y='158' fill='#94a3b8' font-size='6'>0%</text><text x='255' y='158' fill='#94a3b8' font-size='6'>100%</text><path d='M35,35 Q80,38 120,55 L150,80' stroke='#ef4444' stroke-width='2' fill='none'/><path d='M265,40 Q220,45 180,60 L150,80' stroke='#ef4444' stroke-width='2' fill='none'/><text x='70' y='33' fill='#fca5a5' font-size='7'>Liquidus</text><text x='215' y='38' fill='#fca5a5' font-size='7'>Liquidus</text><path d='M35,65 Q60,68 90,80 L150,80' stroke='#3b82f6' stroke-width='2' fill='none'/><path d='M265,70 Q230,73 200,78 L150,80' stroke='#3b82f6' stroke-width='2' fill='none'/><text x='55' y='75' fill='#93c5fd' font-size='7'>Solidus</text><line x1='60' y1='80' x2='240' y2='80' stroke='#f97316' stroke-width='1.5' stroke-dasharray='3'/><circle cx='150' cy='80' r='4' fill='#f97316'/><text x='150' y='94' text-anchor='middle' fill='#fdba74' font-size='8' font-weight='bold'>Eutectique</text><rect x='80' y='22' width='100' height='30' rx='3' fill='rgba(239,68,68,0.1)'/><text x='130' y='42' text-anchor='middle' fill='#fca5a5' font-size='8'>LIQUIDE</text><rect x='45' y='55' width='60' height='20' rx='3' fill='rgba(168,85,247,0.1)'/><text x='75' y='69' text-anchor='middle' fill='#c4b5fd' font-size='6'>L + solide</text><rect x='195' y='55' width='60' height='20' rx='3' fill='rgba(168,85,247,0.1)'/><text x='225' y='69' text-anchor='middle' fill='#c4b5fd' font-size='6'>L + solide</text><rect x='40' y='100' width='80' height='35' rx='3' fill='rgba(5,150,105,0.1)'/><text x='80' y='117' text-anchor='middle' fill='#6ee7b7' font-size='8'>Phase α</text><text x='80' y='129' text-anchor='middle' fill='#6ee7b7' font-size='6'>(solide)</text><rect x='180' y='100' width='80' height='35' rx='3' fill='rgba(59,130,246,0.1)'/><text x='220' y='117' text-anchor='middle' fill='#93c5fd' font-size='8'>Phase β</text><text x='220' y='129' text-anchor='middle' fill='#93c5fd' font-size='6'>(solide)</text><rect x='120' y='100' width='60' height='35' rx='3' fill='rgba(249,115,22,0.1)'/><text x='150' y='120' text-anchor='middle' fill='#fdba74' font-size='7'>α + β</text></svg><span class='key'>Liquidus</span> : la ligne au-dessus de laquelle <b>tout est liquide</b>. En dessous, le métal commence à cristalliser.<br><span class='key'>Solidus</span> : la ligne en dessous de laquelle <b>tout est solide</b>.<br><b>Entre les deux</b> : zone biphasée = mélange liquide + solide (c'est la zone pâteuse, comme du sorbet à moitié fondu).<br><br><span class='key'>Point eutectique</span> : la composition précise où le mélange fond à la <b>température la plus basse</b>, directement de solide à liquide (pas de zone pâteuse). Ex : eutectique Al-Si = 12,6 % Si, fond à 577 °C. Utilisé en <b>fonderie</b> car il coule très bien dans les moules.<br><br><b>Zones monophasées vs biphasées :</b><br>- Zone <b>monophasée</b> (α seul, β seul) = matériau homogène, une seule structure cristalline.<br>- Zone <b>biphasée</b> (α + β) = deux phases coexistent côte à côte. Ex : Ti-6Al-4V = mélange α (HC) + β (CC).<br><br><b>Le diagramme fer-carbone (le plus important en métallurgie) :</b><br><svg viewBox='0 0 300 180' style='width:100%;max-width:300px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:8px'><text x='150' y='14' text-anchor='middle' fill='#e2e8f0' font-size='9' font-weight='bold'>Diagramme fer-carbone (simplifié)</text><line x1='40' y1='25' x2='40' y2='160' stroke='#94a3b8' stroke-width='1'/><line x1='40' y1='160' x2='280' y2='160' stroke='#94a3b8' stroke-width='1'/><text x='160' y='175' text-anchor='middle' fill='#94a3b8' font-size='7'>% Carbone →</text><text x='12' y='95' fill='#94a3b8' font-size='7' transform='rotate(-90,12,95)'>Température °C →</text><text x='45' y='35' fill='#94a3b8' font-size='6'>1538</text><text x='45' y='55' fill='#94a3b8' font-size='6'>1394</text><text x='45' y='88' fill='#94a3b8' font-size='6'>912</text><text x='45' y='130' fill='#94a3b8' font-size='6'>727</text><text x='60' y='168' fill='#94a3b8' font-size='6'>0</text><text x='140' y='168' fill='#94a3b8' font-size='6'>0,8</text><text x='240' y='168' fill='#94a3b8' font-size='6'>2,0</text><rect x='60' y='28' width='200' height='22' rx='3' fill='rgba(239,68,68,0.12)'/><text x='160' y='43' text-anchor='middle' fill='#fca5a5' font-size='8'>Liquide</text><rect x='60' y='55' width='200' height='70' rx='3' fill='rgba(59,130,246,0.12)'/><text x='160' y='78' text-anchor='middle' fill='#93c5fd' font-size='10' font-weight='bold'>γ AUSTÉNITE</text><text x='160' y='92' text-anchor='middle' fill='#93c5fd' font-size='7'>CFC - stable à haute T°</text><text x='160' y='104' text-anchor='middle' fill='#93c5fd' font-size='7'>Dissout jusqu'à 2% C</text><rect x='60' y='128' width='80' height='28' rx='3' fill='rgba(5,150,105,0.12)'/><text x='100' y='142' text-anchor='middle' fill='#6ee7b7' font-size='8' font-weight='bold'>α FERRITE</text><text x='100' y='152' text-anchor='middle' fill='#6ee7b7' font-size='6'>CC - douce</text><rect x='145' y='128' width='115' height='28' rx='3' fill='rgba(168,85,247,0.12)'/><text x='202' y='142' text-anchor='middle' fill='#c4b5fd' font-size='7'>Perlite (α + Fe₃C)</text><text x='202' y='152' text-anchor='middle' fill='#c4b5fd' font-size='6'>Lamelles alternées</text><line x1='60' y1='128' x2='260' y2='128' stroke='#f97316' stroke-width='1.5' stroke-dasharray='4'/><text x='270' y='131' fill='#fdba74' font-size='6'>727 °C</text><text x='270' y='139' fill='#fdba74' font-size='5'>(eutectoïde)</text></svg>Ce diagramme est la base de TOUT en sidérurgie :<br>- L'<b>austénite (γ)</b> est la phase stable <b>à haute température</b> (structure CFC). Elle dissout bien le carbone.<br>- La <b>ferrite (α)</b> est la phase stable <b>à basse température</b> (structure CC). Elle dissout très peu de carbone.<br>- À 727 °C, l'austénite se transforme en <b>perlite</b> (mélange ferrite + cémentite Fe₃C) si on refroidit lentement.<br>- Si on refroidit <b>très vite</b> (trempe), l'austénite n'a pas le temps → elle se transforme en <b>martensite</b> (très dure, voir leçon suivante).<br><br><b>Pourquoi c'est utile en pratique ?</b><br>- <span class='key'>Traitements thermiques</span> : le diagramme dit à quelle température chauffer (ex : au-dessus de 912 °C pour être en austénite avant de tremper).<br>- <span class='key'>Fonderie</span> : le diagramme Al-Si donne la température de coulée optimale (eutectique).<br>- <span class='key'>Soudage</span> : connaître la zone de fusion partielle pour éviter les fissures à chaud.<br>- <span class='key'>Choix d'alliage</span> : comprendre pourquoi Ti-6Al-4V est biphasé (α+β) et comment ça influence ses propriétés.<br><br><div class='remember'><b>Retenir :</b> le diagramme de phases = la carte routière du métallurgiste. Axe X = composition, axe Y = température. Chaque zone dit quelle(s) phase(s) sont stables. C'est de là que viennent les noms austénite, ferrite, martensite dans les aciers.</div>"},
{t:"Aciers inoxydables",en:"Stainless steels",b:"<b>Avant de parler des inox, il faut comprendre d'où viennent les noms austénite, ferrite, martensite.</b> Ces noms désignent des <span class='key'>phases</span> du fer — c'est-à-dire des arrangements d'atomes différents, stables à des températures différentes. On les trouve sur le <b>diagramme de phases fer-carbone</b> (la leçon précédente explique ce qu'est un diagramme de phases).<br><br><svg viewBox='0 0 300 180' style='width:100%;max-width:300px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:8px'><text x='150' y='14' text-anchor='middle' fill='#e2e8f0' font-size='9' font-weight='bold'>Diagramme fer-carbone (simplifié)</text><line x1='40' y1='25' x2='40' y2='160' stroke='#94a3b8' stroke-width='1'/><line x1='40' y1='160' x2='280' y2='160' stroke='#94a3b8' stroke-width='1'/><text x='160' y='175' text-anchor='middle' fill='#94a3b8' font-size='7'>% Carbone →</text><text x='12' y='95' fill='#94a3b8' font-size='7' transform='rotate(-90,12,95)'>Température °C →</text><text x='45' y='35' fill='#94a3b8' font-size='6'>1538</text><text x='45' y='55' fill='#94a3b8' font-size='6'>1394</text><text x='45' y='85' fill='#94a3b8' font-size='6'>912</text><text x='45' y='130' fill='#94a3b8' font-size='6'>727</text><text x='60' y='168' fill='#94a3b8' font-size='6'>0</text><text x='140' y='168' fill='#94a3b8' font-size='6'>0,8</text><text x='240' y='168' fill='#94a3b8' font-size='6'>2,0</text><rect x='60' y='28' width='200' height='25' rx='3' fill='rgba(239,68,68,0.15)'/><text x='160' y='43' text-anchor='middle' fill='#fca5a5' font-size='8'>Liquide</text><rect x='60' y='55' width='200' height='70' rx='3' fill='rgba(59,130,246,0.15)'/><text x='160' y='80' text-anchor='middle' fill='#93c5fd' font-size='10' font-weight='bold'>γ Austénite (CFC)</text><text x='160' y='95' text-anchor='middle' fill='#93c5fd' font-size='7'>Stable à haute température</text><text x='160' y='107' text-anchor='middle' fill='#93c5fd' font-size='7'>Dissout bien le carbone</text><rect x='60' y='128' width='80' height='28' rx='3' fill='rgba(5,150,105,0.15)'/><text x='100' y='145' text-anchor='middle' fill='#6ee7b7' font-size='9' font-weight='bold'>α Ferrite (CC)</text><rect x='145' y='128' width='115' height='28' rx='3' fill='rgba(168,85,247,0.15)'/><text x='202' y='145' text-anchor='middle' fill='#c4b5fd' font-size='8'>α + Fe₃C (perlite)</text><line x1='60' y1='128' x2='260' y2='128' stroke='#f97316' stroke-width='1.5' stroke-dasharray='4'/><text x='270' y='131' fill='#fdba74' font-size='6'>727 °C</text></svg><b>Les 3 phases du fer :</b><br><br><span class='key'>Ferrite (α)</span> = fer à <b>température ambiante</b>. Structure <b>CC</b> (cubique centré). Magnétique. Douce, ductile. Dissout <b>très peu de carbone</b> (max 0,02 %).<br><br><span class='key'>Austénite (γ)</span> = fer à <b>haute température</b> (> 912 °C pour le fer pur). Structure <b>CFC</b> (cubique faces centrées). Non magnétique. Dissout <b>beaucoup de carbone</b> (jusqu'à 2 %). Normalement, quand on refroidit l'austénite lentement, elle redevient ferrite.<br><br><span class='key'>Martensite</span> = ce qui se passe quand on refroidit l'austénite <b>très vite</b> (trempe). Les atomes de carbone restent <b>piégés</b> dans le réseau qui essaie de passer de CFC à CC → structure déformée, sous tension interne → <b>très dure, très fragile</b>. La martensite n'existe pas sur le diagramme d'équilibre : c'est une phase <b>hors équilibre</b>, obtenue uniquement par trempe.<br><br><svg viewBox='0 0 300 70' style='width:100%;max-width:300px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:6px'><rect x='5' y='5' width='85' height='55' rx='6' fill='rgba(59,130,246,0.15)' stroke='#3b82f6' stroke-width='1.5'/><text x='47' y='22' text-anchor='middle' fill='#93c5fd' font-size='9' font-weight='bold'>Austénite γ</text><text x='47' y='34' text-anchor='middle' fill='#94a3b8' font-size='7'>CFC, > 912 °C</text><text x='47' y='46' text-anchor='middle' fill='#94a3b8' font-size='7'>Non magnétique</text><text x='47' y='56' text-anchor='middle' fill='#93c5fd' font-size='7'>Ductile</text><rect x='108' y='5' width='85' height='55' rx='6' fill='rgba(5,150,105,0.15)' stroke='#059669' stroke-width='1.5'/><text x='150' y='22' text-anchor='middle' fill='#6ee7b7' font-size='9' font-weight='bold'>Ferrite α</text><text x='150' y='34' text-anchor='middle' fill='#94a3b8' font-size='7'>CC, T ambiante</text><text x='150' y='46' text-anchor='middle' fill='#94a3b8' font-size='7'>Magnétique</text><text x='150' y='56' text-anchor='middle' fill='#6ee7b7' font-size='7'>Douce, ductile</text><rect x='210' y='5' width='85' height='55' rx='6' fill='rgba(239,68,68,0.15)' stroke='#ef4444' stroke-width='1.5'/><text x='252' y='22' text-anchor='middle' fill='#fca5a5' font-size='9' font-weight='bold'>Martensite</text><text x='252' y='34' text-anchor='middle' fill='#94a3b8' font-size='7'>CC déformé (trempe)</text><text x='252' y='46' text-anchor='middle' fill='#94a3b8' font-size='7'>Magnétique</text><text x='252' y='56' text-anchor='middle' fill='#ef4444' font-size='7'>Très dure, fragile</text></svg><b>Et les aciers inoxydables dans tout ça ?</b><br><br>Un <span class='key'>acier inoxydable</span> (inox) = acier avec <b>≥ 10,5 % de chrome</b>. Le chrome forme une couche invisible de <span class='key'>Cr₂O₃</span> (oxyde de chrome) en surface → <b>résistance à la corrosion</b>.<br><br>Ce qui change avec les inox classiques, c'est que les <b>éléments d'alliage</b> (chrome, nickel, molybdène) <b>stabilisent certaines phases</b> à température ambiante :<br><br>• Le <b>nickel</b> stabilise l'<b>austénite</b> → elle reste stable même à froid (au lieu de redevenir ferrite).<br>• Le <b>chrome</b> stabilise la <b>ferrite</b> → elle reste ferrite même à chaud.<br><br>C'est de là que viennent les familles d'inox :<br><br><span class='key'>Austénitiques</span> (304, 316) :<br>Beaucoup de nickel (8-10 %) + chrome (18 %) → l'austénite (CFC) est stable <b>à température ambiante</b>. <b>Non magnétiques</b>, très ductiles, excellente résistance à la corrosion. 70 % du marché. En aéro : tuyauterie, boulonnerie non critique, équipements cabine.<br><br><span class='key'>Martensitiques</span> (410, 440C, 17-4 PH) :<br>Moins de nickel, plus de carbone → on peut <b>tremper</b> pour former de la martensite. <b>Magnétiques</b>, durcissables par traitement thermique. Rm jusqu'à 1500+ MPa. En aéro : roulements, vannes, axes, pièces qui doivent être dures ET anticorrosion.<br><br><span class='key'>Ferritiques</span> (430) :<br>Beaucoup de chrome, peu de nickel, peu de carbone → structure ferritique (CC) stable. <b>Magnétiques</b>, moins ductiles. Moins utilisés en aéro mais bon marché.<br><br><b>Passivation des inox :</b><br>On renforce la couche de Cr₂O₃ par un bain d'<span class='key'>acide nitrique</span> (HNO₃) ou d'<span class='key'>acide citrique</span> (AMS 2700). Essentiel après usinage ou soudage (la surface a été perturbée → couche abîmée → risque de corrosion).<br><br><div class='remember'><b>Retenir :</b> Austénite, ferrite, martensite = 3 structures du fer, visibles sur le diagramme de phases fer-carbone. Dans les inox, les éléments d'alliage (Ni, Cr) stabilisent une de ces phases à température ambiante → d'où les familles austénitique / ferritique / martensitique. Et inox ≠ incorrodable : les inox peuvent se corroder par piqûres (chlorures), CSC, ou corrosion intergranulaire.</div>"},
],
L1:[
{q:"Un alliage est :",o:["Un métal de base + des éléments d'addition","Un métal pur sans ajout","Un mélange de plastiques","Un composite fibre + résine"],c:0,e:"Un <b>alliage</b> = un métal principal + un ou plusieurs éléments ajoutés pour améliorer les propriétés. Exemples : <b>acier</b> = fer + carbone, <b>2024</b> = aluminium + cuivre, <b>Ti-6Al-4V</b> = titane + alu + vanadium, <b>Inconel 718</b> = nickel + chrome + fer + niobium."},
{q:"Ti-6Al-4V signifie :",o:["Titane + 6 % aluminium + 4 % vanadium","Titane version 6, alliage 4V","Titane à 6 atomes par maille","Titane de catégorie 6, série 4V"],c:0,e:"La <b>nomenclature des alliages</b> donne le <b>métal de base</b> suivi des éléments d'addition et leur <b>pourcentage</b>. Ti-6Al-4V = <b>Titane</b> avec <b>6 % d'aluminium</b> et <b>4 % de vanadium</b>. C'est l'alliage de titane le plus utilisé en aéro (50 % du marché titane)."},
{q:"Le métal le plus léger en aéro est :",o:["L'aluminium (2,7 g/cm³)","Le titane (4,5 g/cm³)","L'acier (7,8 g/cm³)","Le nickel (8,9 g/cm³)"],c:0,e:"<b>Ordre des densités</b> : Alu (2,7) < Titane (4,5) < Acier (7,8) < Nickel (8,9). L'aluminium est le plus léger, c'est pourquoi il représente la majorité de la structure des avions. Le nickel est le plus lourd mais résiste aux températures extrêmes (>1000 °C)."},
{q:"L'acier est un alliage de :",o:["Fer + carbone","Aluminium + cuivre","Titane + vanadium","Nickel + chrome"],c:0,e:"<b>Acier</b> = <b>fer + carbone</b> (< 2 % de carbone). Plus de carbone = plus dur mais plus fragile. En aéro, on utilise des aciers spéciaux très résistants (300M, 4340) pour les trains d'atterrissage et la boulonnerie critique."},
{q:"Un matériau ductile :",o:["Se déforme beaucoup avant de casser","Casse net sans se déformer","Résiste à la chaleur","Conduit mal l'électricité"],c:0,e:"<b>Ductile</b> = se déforme beaucoup avant de casser (allongement A% élevé). Exemples : aluminium pur (A% ~40 %), acier doux (A% ~25 %). Le contraire est <b>fragile</b> : casse net (fonte, verre, céramique, A% ~1 %)."},
{q:"Un matériau fragile :",o:["Casse net sans beaucoup se déformer","Se déforme beaucoup avant de casser","Résiste très bien aux chocs","Est toujours très mou"],c:0,e:"<b>Fragile</b> = casse <b>net</b>, presque sans déformation préalable (A% très faible). Exemples : verre, céramique, fonte. Dangereux car la rupture est soudaine, sans signe avant-coureur. Les matériaux ductiles préviennent en se déformant visiblement avant de casser."},
{q:"Rm mesure :",o:["La résistance max à la traction","La dureté de surface","L'allongement à rupture","La ténacité à la fissure"],c:0,e:"<b>Rm</b> (Ultimate Tensile Strength, UTS) = la <b>contrainte maximale</b> que le matériau peut supporter avant de casser.<br><br>On la mesure par un <b>essai de traction</b> : on tire sur une éprouvette jusqu'à sa rupture. La courbe contrainte-déformation (σ-ε) donne :<br>• <b>Re</b> (limite élastique) = début de la déformation permanente<br>• <b>Rm</b> = contrainte max = point le plus haut de la courbe<br>• <b>A%</b> = allongement à rupture = mesure de la ductilité<br><br><b>Calcul de A% :</b><br>A% = (Lu - L0) / L0 × 100<br>L0 = longueur initiale de l'éprouvette, Lu = longueur finale mesurée après rupture (on rapproche les deux morceaux). Un A% élevé = matériau <b>ductile</b> (se déforme beaucoup avant de casser, ex : alu pur ~40 %). Un A% faible = matériau <b>fragile</b> (casse net, ex : fonte ~1 %).<br><br><b>Ordres de grandeur :</b> Alu 7075-T6 ≈ 570 MPa / A% ≈ 11 %, Ti-6Al-4V ≈ 1000 MPa / A% ≈ 14 %, Inconel 718 ≈ 1400 MPa / A% ≈ 12 %."},
{q:"Le fluage est :",o:["Déformation lente sous charge constante à chaud","Rupture rapide sous choc à froid","Corrosion en milieu salin","Fissuration sous cycles répétés"],c:0,e:"Le <b>fluage</b> (creep) = déformation progressive d'un matériau soumis à une contrainte <b>constante</b> à <b>haute température</b>. Critique pour les <b>aubes de turbine</b> qui supportent des forces centrifuges à 1000 °C+."},
{q:"L'essai Charpy mesure :",o:["La résilience","La dureté de surface","La résistance en traction","L'allongement à rupture"],c:0,e:"L'essai <b>Charpy</b> : un <b>pendule</b> frappe une éprouvette entaillée. On mesure l'<b>énergie absorbée</b> (en joules). Plus l'énergie est élevée = matériau ductile. Faible énergie = matériau fragile. Important pour les aciers à basse température."},
{q:"Re (ou Rp0.2) mesure :",o:["Le début de la déformation permanente","La contrainte à la rupture","La dureté Vickers","La ténacité du matériau"],c:0,e:"<b>Re</b> (limite élastique) = la contrainte à partir de laquelle le matériau se <b>déforme de façon permanente</b> (ne revient plus à sa forme initiale). Rp0.2 = convention : contrainte pour une déformation permanente de 0,2 %. En dessous de Re, le matériau est <b>élastique</b> (il revient)."},
{q:"La dureté d'un métal, c'est :",o:["Sa résistance quand on appuie dessus","Sa résistance à la traction","Son allongement avant rupture","Sa température de fusion"],c:0,e:"La <b>dureté</b> = la résistance d'un matériau à l'<b>enfoncement</b> (indentation). On enfonce un petit outil très dur (diamant) dans la surface et on mesure l'empreinte. Plusieurs échelles : <b>Vickers (HV)</b>, <b>Rockwell (HRC)</b>, <b>Brinell (HB)</b>. Plus l'empreinte est petite = plus le matériau est dur."},
{q:"Le fluage concerne surtout :",o:["Les pièces chaudes sous charge constante","Les pièces froides sous choc","Les pièces en contact avec l'eau","Les pièces peintes en surface"],c:0,e:"Le <b>fluage</b> = déformation lente d'un matériau à <b>haute température</b> sous charge <b>constante</b>. En aéro, c'est critique pour les <b>aubes de turbine</b> qui tournent à 1000 °C+ avec la force centrifuge. C'est pour ça qu'elles sont en superalliage de nickel."},
{q:"CFC signifie :",o:["Cubique Faces Centrées","Centre de Formation Cristalline","Coefficient de Forme Cubique","Courant Faraday Contrôlé"],c:0,e:"<b>CFC</b> (cubique faces centrées) = structure cristalline avec des atomes aux <b>coins et au centre de chaque face</b> du cube. Métaux CFC : aluminium, cuivre, nickel, or. Les CFC sont <b>très ductiles</b> (12 systèmes de glissement)."},
{q:"L'aluminium a une structure cristalline :",o:["CFC (cubique faces centrées)","CC (cubique centré)","HC (hexagonal compact)","Amorphe (pas de structure)"],c:0,e:"L'<b>aluminium</b> est <b>CFC</b> → très ductile, facile à déformer. Le fer est CC. Le titane (phase α) est HC. Le cuivre et le nickel sont aussi CFC."},
{q:"La trempe rend un acier :",o:["Très dur mais fragile","Mou et ductile","Inchangé","Plus léger"],c:0,e:"La <b>trempe</b> (quenching) = chauffage puis refroidissement <b>rapide</b> (eau ou huile). L'acier devient très <b>dur</b> (formation de martensite) mais aussi très <b>fragile</b>. C'est pour ça qu'on fait un <b>revenu</b> après."},
{q:"Le revenu après trempe sert à :",o:["Récupérer de la ductilité","Augmenter encore la dureté","Changer la composition chimique","Protéger contre la corrosion"],c:0,e:"Le <b>revenu</b> (tempering) = réchauffage modéré (150-650 °C) après trempe → on sacrifie un peu de dureté pour récupérer de la <b>ductilité</b>. <b>Trempe + revenu</b> = traitement classique des aciers aéro (300M, 4340 pour les trains d'atterrissage)."},
{q:"Le recuit rend un métal :",o:["Mou et ductile","Dur et fragile","Résistant à la corrosion","Plus lourd"],c:0,e:"Le <b>recuit</b> (annealing) = chauffage lent + refroidissement lent → le métal devient <b>mou et ductile</b>. On l'utilise pour faciliter la <b>mise en forme</b> (laminage, pliage) ou après un écrouissage pour restaurer la ductilité."},
{q:"Un grain en métallurgie est :",o:["Un petit cristal dans le métal","Un défaut de surface","Une particule de sable","Un composé chimique ajouté"],c:0,e:"Un métal = milliers de petits <b>cristaux</b> appelés <b>grains</b>. Chaque grain a la même structure cristalline mais une orientation différente. Des grains <b>fins</b> = métal plus résistant (loi de Hall-Petch)."},
{q:"Un joint de grain est :",o:["La frontière entre deux cristaux voisins","Un type de soudure","Une couche de peinture","Un défaut d'usinage"],c:0,e:"Le <b>joint de grain</b> = frontière entre deux grains cristallins d'orientations différentes. Les joints <b>bloquent les dislocations</b> → grains fins = plus résistant. Mais les joints sont aussi des sites de <b>corrosion intergranulaire</b>."},
{q:"La cémentation enrichit la surface en :",o:["Carbone","Azote","Zinc","Chrome"],c:0,e:"La <b>cémentation</b> = diffusion de <b>carbone</b> dans la surface de l'acier à haute température → la surface devient très <b>dure</b> tandis que le cœur reste <b>ductile</b>. Idéal pour les <b>engrenages</b> qui ont besoin d'une surface résistante à l'usure mais d'un cœur qui absorbe les chocs."},
{q:"La nitruration enrichit la surface en :",o:["Azote","Carbone","Zinc","Chrome"],c:0,e:"La <b>nitruration</b> = diffusion d'<b>azote</b> dans la surface de l'acier → formation de <b>nitrures</b> très durs en surface. Avantage vs cémentation : pas besoin de trempe après (moins de déformations). Utilisée pour les vilebrequins, cylindres, moules."},
{q:"La formule de l'allongement à rupture A% est :",o:["A% = (Lu - L0) / L0 × 100","A% = L0 / Lu × 100","A% = (L0 - Lu) / Lu × 100","A% = Lu × L0 / 100"],c:0,e:"<b>A%</b> (allongement à rupture) = <b>(Lu - L0) / L0 × 100</b><br><b>L0</b> = longueur initiale de l'éprouvette (avant essai)<br><b>Lu</b> = longueur finale mesurée après rupture (on rapproche les deux morceaux)<br><br>Exemple : éprouvette de 50 mm qui mesure 57 mm après rupture → A% = (57-50)/50 × 100 = <b>14 %</b>.<br><br>A% élevé = <b>ductile</b> (se déforme beaucoup). A% faible = <b>fragile</b> (casse net).<br><svg viewBox='0 0 280 150' style='width:100%;max-width:280px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:8px'><line x1='40' y1='130' x2='260' y2='130' stroke='#94a3b8' stroke-width='1.5'/><line x1='40' y1='130' x2='40' y2='15' stroke='#94a3b8' stroke-width='1.5'/><text x='150' y='148' text-anchor='middle' fill='#94a3b8' font-size='8'>Déformation ε →</text><text x='18' y='75' fill='#94a3b8' font-size='8' transform='rotate(-90,18,75)'>Contrainte σ →</text><path d='M40,130 L100,60' stroke='#3b82f6' stroke-width='2.5'/><path d='M100,60 Q130,38 170,32 Q200,30 220,35' stroke='#3b82f6' stroke-width='2.5' fill='none'/><path d='M220,35 L235,50' stroke='#3b82f6' stroke-width='2.5'/><circle cx='235' cy='50' r='4' fill='#ef4444'/><text x='245' y='53' fill='#fca5a5' font-size='7'>Rupture</text><line x1='40' y1='60' x2='100' y2='60' stroke='#059669' stroke-width='1' stroke-dasharray='3'/><text x='35' y='58' fill='#6ee7b7' font-size='8' text-anchor='end'>Re</text><circle cx='100' cy='60' r='3' fill='#059669'/><line x1='40' y1='30' x2='220' y2='30' stroke='#f97316' stroke-width='1' stroke-dasharray='3'/><text x='35' y='33' fill='#fdba74' font-size='8' text-anchor='end'>Rm</text><line x1='235' y1='130' x2='235' y2='50' stroke='#ef4444' stroke-width='1' stroke-dasharray='2'/><line x1='40' y1='128' x2='40' y2='132' stroke='#94a3b8' stroke-width='1'/><line x1='235' y1='128' x2='235' y2='132' stroke='#94a3b8' stroke-width='1'/><text x='138' y='125' text-anchor='middle' fill='#fca5a5' font-size='8'>← A% →</text></svg>Ordres de grandeur : Alu pur ~40 %, 7075-T6 ~11 %, Ti-6Al-4V ~14 %, fonte ~1 %."},
{q:"Déformation élastique vs plastique :",o:["Élastique = réversible, plastique = permanente","Élastique = permanente, plastique = réversible","Les deux sont réversibles","Les deux sont permanentes"],c:0,e:"<b>Élastique</b> = la déformation <b>disparaît</b> quand on arrête de tirer (comme un élastique). <b>Plastique</b> = la déformation est <b>permanente</b> (comme de la pâte à modeler). La <b>limite élastique</b> (Re) marque la frontière : en dessous = élastique (réversible), au-dessus = plastique (irréversible)."},
{q:"La fatigue d'un métal c'est :",o:["La rupture après des millions de cycles de charge","La rupture après un seul choc violent","La corrosion du métal dans l'eau","Le ramollissement à haute température"],c:0,e:"La <b>fatigue</b> = la rupture d'un métal après un grand nombre de <b>cycles de charge répétés</b>, même si chaque cycle est bien en dessous de la résistance max (Rm). Les fissures de fatigue naissent microscopiques et grandissent cycle après cycle jusqu'à la rupture. Critique en aéro : ailes, fuselage, trains, toutes les pièces subissent des millions de cycles."},
{q:"La densité d'un métal indique :",o:["Sa masse par rapport à son volume","Sa résistance mécanique","Sa dureté de surface","Sa température de fusion"],c:0,e:"La <b>densité</b> (ou masse volumique) = combien pèse un volume donné de métal. Unité : <b>g/cm³</b>. Alu = 2,7 (léger), Ti = 4,5 (moyen), Acier = 7,8 (lourd), Ni = 8,9 (très lourd). En aéro, on veut le plus <b>léger</b> possible → c'est pour ça que l'alu et les composites dominent la structure."},
{q:"Le liquidus sur un diagramme de phases est :",o:["La ligne au-dessus de laquelle tout est liquide","La ligne en dessous de laquelle tout est solide","La température ambiante","Le point de fusion du métal pur"],c:0,e:"Le <b>liquidus</b> = limite entre la zone 100 % liquide et la zone biphasée (liquide + solide). Au-dessus du liquidus = entièrement fondu. Le <b>solidus</b> = limite en dessous de laquelle tout est solide."},
{q:"Un point eutectique est :",o:["La composition qui fond à la température la plus basse","Le point de fusion le plus élevé","Le point où le métal est le plus dur","La composition la plus résistante"],c:0,e:"L'<b>eutectique</b> = composition précise qui fond à la <b>température la plus basse</b>. Il passe directement de solide à liquide. Utilisé en fonderie et en soudage (ex : Al-Si 12,6 % à 577 °C)."},
{q:"Un acier inoxydable contient au minimum :",o:["10,5 % de chrome","5 % de nickel","2 % de carbone","20 % de cuivre"],c:0,e:"Un <b>acier inoxydable</b> = acier avec ≥ <b>10,5 % de chrome</b>. Le chrome forme une couche de <b>Cr₂O₃</b> protectrice en surface."},
{q:"Les inox austénitiques (304, 316) sont :",o:["Non magnétiques et très ductiles","Magnétiques et très durs","Fragiles et cassants","Utilisés uniquement à haute température"],c:0,e:"Les <b>austénitiques</b> (304, 316) ont une structure CFC → <b>non magnétiques</b>, très ductiles, excellente résistance corrosion. C'est la famille d'inox la plus courante (70 % du marché)."},
{q:"Les inox martensitiques (410, 17-4 PH) sont :",o:["Magnétiques et durcissables par traitement thermique","Non magnétiques et très mous","Uniquement pour la décoration","Interdits en aéronautique"],c:0,e:"Les <b>martensitiques</b> sont <b>magnétiques</b> et durcissables par traitement thermique. Rm jusqu'à 1500+ MPa. En aéro : roulements, vannes, axes, pièces qui doivent être <b>dures ET anticorrosion</b>."},
],
L2:[
{q:"KIc mesure :",o:["La ténacité","La dureté de surface","La résistance en compression","L'allongement à rupture"],c:0,e:"<b>KIc</b> (facteur d'intensité de contrainte critique) = la résistance du matériau à la <b>propagation d'une fissure</b> existante. Un KIc élevé = le matériau tolère des fissures plus grandes sans casser. En MPa·√m."},
{q:"Le durcissement par précipitation (T6) fonctionne par :",o:["De petites particules qui bloquent les dislocations","Un refroidissement rapide seul","Une déformation à froid","Un ajout de fibres de carbone"],c:0,e:"Le traitement <b>T6</b> : 1) mise en solution (haute T° pour dissoudre les solutés), 2) trempe (refroidissement rapide), 3) <b>revenu artificiel</b> (T° intermédiaire → formation de petits <b>précipités</b> qui bloquent les dislocations = le matériau devient plus dur). C'est le mécanisme principal de durcissement des alliages d'alu aéro."},
{q:"Hall-Petch : des grains plus fins donnent un matériau :",o:["Plus dur et plus résistant","Plus mou et plus ductile","Plus fragile et cassant","Inchangé mécaniquement"],c:0,e:"La loi de <b>Hall-Petch</b> : plus les grains cristallins sont <b>fins</b>, plus il y a de <b>joints de grains</b> qui bloquent les dislocations → le matériau est plus <b>dur et résistant</b>. C'est pourquoi on contrôle la taille de grain en métallurgie aéro."},
{q:"Rp0.2 = 0,2 % signifie :",o:["Déformation permanente de 0,2 %","Résistance à 0,2 MPa","Dureté de 0,2 HV","Allongement de 0,2 mm"],c:0,e:"<b>Rp0.2</b> = la contrainte qui produit une <b>déformation permanente de 0,2 %</b>. C'est une convention parce que beaucoup de métaux n'ont pas de limite élastique franche (pas de plateau visible sur la courbe σ-ε). On trace une parallèle à 0,2 % de déformation et on lit la contrainte correspondante."},
{q:"Une dislocation est :",o:["Un défaut linéaire dans le cristal","Un trou dans la maille atomique","Une fissure macroscopique","Un atome manquant en surface"],c:0,e:"Une <b>dislocation</b> = défaut linéaire dans le réseau cristallin. C'est le mécanisme fondamental de la <b>déformation plastique</b> des métaux : les dislocations se déplacent sous contrainte et les atomes glissent plan par plan. Tous les mécanismes de durcissement (écrouissage, précipitation, Hall-Petch, solution solide) fonctionnent en <b>bloquant les dislocations</b>."},
{q:"L'écrouissage augmente la dureté par :",o:["Multiplication des dislocations à froid","Ajout d'éléments d'alliage","Chauffage à haute température","Trempe dans l'eau"],c:0,e:"<b>L'écrouissage</b> (work hardening) : la déformation à froid <b>multiplie les dislocations</b> qui s'enchevêtrent et se bloquent mutuellement → le matériau devient plus dur mais moins ductile. Ex : laminage à froid des tôles."},
{q:"Le durcissement par solution solide fonctionne par :",o:["Des atomes étrangers qui gênent les dislocations","Des précipités qui bloquent les dislocations","Des grains plus fins","Des fibres de renfort"],c:0,e:"En <b>solution solide</b>, des atomes étrangers (Cu dans Al, Cr dans Fe) s'insèrent dans la maille cristalline et créent des <b>distorsions locales</b> qui gênent le mouvement des dislocations → le matériau devient plus dur."},
{q:"Le recuit après écrouissage sert à :",o:["Restaurer la ductilité","Augmenter encore la dureté","Éliminer les atomes d'hydrogène","Déposer une couche protectrice"],c:0,e:"L'<b>écrouissage</b> durcit mais rend le métal <b>fragile</b>. Le <b>recuit</b> (chauffage > température de recristallisation) permet aux grains de se reformer → <b>restauration de la ductilité</b>. En aéro, on peut alterner écrouissage et recuit pour obtenir la forme ET les propriétés voulues."},
{q:"Le fer (Fe) à température ambiante a une structure :",o:["CC (cubique centré)","CFC (cubique faces centrées)","HC (hexagonal compact)","Amorphe"],c:0,e:"Le <b>fer</b> à température ambiante est <b>CC</b> (ferrite, phase α). Au-dessus de 912 °C, il devient <b>CFC</b> (austénite, phase γ). Cette transformation est la base de tous les traitements thermiques des aciers (trempe, revenu...)."},
{q:"La martensite dans un acier trempé est :",o:["Une phase très dure et fragile","Une phase molle et ductile","Un type de corrosion","Un alliage d'aluminium"],c:0,e:"La <b>martensite</b> se forme lors de la <b>trempe</b> d'un acier : le refroidissement est si rapide que le carbone n'a pas le temps de diffuser → structure tétragonale sursaturée en carbone → <b>très dure</b> (> 60 HRC) mais <b>fragile</b>. Le revenu relaxe les contraintes internes."},
{q:"La corrosion intergranulaire attaque :",o:["Les joints de grains du métal","La surface uniformément","Uniquement les inclusions","Le cœur sans toucher la surface"],c:0,e:"La <b>corrosion intergranulaire</b> attaque les <b>joints de grains</b> en priorité. Cause fréquente : appauvrissement en chrome aux joints de grains dans les inox (sensibilisation). Les grains se détachent les uns des autres → perte de résistance mécanique. Très dangereuse car invisible en surface."},
],L3:[
{q:"Un acier 300M (Rm = 1860 MPa) vs un 2024-T3 alu (Rm = 485 MPa). Lequel pour un train d'atterrissage ?",o:["Acier 300M (résistance et ténacité extrêmes)","Alu 2024-T3 (plus léger)","Les deux conviennent également","Aucun des deux (il faut du titane)"],c:0,e:"Le <b>train d'atterrissage</b> encaisse des charges énormes à l'atterrissage (impact, fatigue, usure). Il faut un Rm très élevé + bonne ténacité → <b>acier 300M</b> (variante du 4340). L'alu est trop faible. Le titane pourrait convenir mais coûte trop cher pour cette application. Le poids supplémentaire de l'acier est accepté car le train est petit par rapport à l'avion."},
{q:"Les 4 mécanismes de durcissement des métaux sont :",o:["Écrouissage","Solution solide","Précipitation","Taille de grain"],c:[0,1,2,3],m:true,e:"Les 4 mécanismes fondamentaux, tous basés sur le <b>blocage des dislocations</b> : <b>écrouissage</b> (multiplication des dislocations), <b>solution solide</b> (distorsion du réseau), <b>précipitation</b> (obstacles fins = T6), <b>taille de grain</b> (joints de grains = barrières). En aéro, on combine souvent plusieurs mécanismes."},
{q:"La relation de Hall-Petch dit que :",o:["Plus les grains sont fins, plus le métal est dur","Plus les grains sont gros, plus le métal est dur","La taille des grains n'a pas d'effet","Les grains fins augmentent la ductilité"],c:0,e:"<b>Hall-Petch</b> : σy = σ₀ + k/√d. Plus le diamètre de grain <b>d</b> diminue, plus la limite d'élasticité <b>σy</b> augmente. Les joints de grains bloquent les dislocations → grains fins = plus de joints = plus de barrières. En aéro, les traitements thermomécaniques visent un grain fin et homogène."},
{q:"Sur une courbe S-N (Wöhler), l'endurance illimitée d'un acier apparaît quand :",o:["La courbe devient horizontale (asymptote)","La courbe monte brusquement","La courbe croise l'axe vertical","L'éprouvette casse au premier cycle"],c:0,e:"Les aciers ont une <b>limite d'endurance</b> (σD) : en dessous de cette contrainte, la pièce peut supporter un nombre <b>infini</b> de cycles sans rompre. Sur la courbe S-N, c'est le <b>palier horizontal</b> (typiquement > 10⁶-10⁷ cycles). Attention : les alliages d'alu n'ont PAS de limite d'endurance → la courbe descend toujours."},
{q:"La transition ductile-fragile d'un acier dépend principalement de :",o:["La température (fragile à froid)","La couleur du métal","La vitesse de rotation","L'épaisseur du revêtement"],c:0,e:"Les aciers ferritiques (CC) ont une <b>température de transition ductile-fragile</b> (TTDF). En dessous → rupture <b>fragile</b> par clivage (sans déformation). C'est critique en aéro pour les pièces exposées au froid (-50 °C en altitude). Les aciers austénitiques (CFC) et les alliages alu n'ont pas cette transition."},
{q:"KIC (ténacité) d'un matériau représente :",o:["Sa résistance à la propagation de fissure","Sa dureté Vickers","Sa résistance en compression","Son allongement à rupture"],c:0,e:"<b>KIC</b> = facteur d'intensité de contrainte critique (mode I, ouverture). C'est la <b>ténacité</b> : plus KIC est élevé, plus le matériau tolère des fissures longues avant rupture brutale. En aéro (tolérance aux dommages), on veut un KIC élevé pour détecter les fissures avant qu'elles ne deviennent critiques."},
