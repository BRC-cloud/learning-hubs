<title>Learning Hub - Aéro & Matériaux</title>
<style>
:root{--pri:#1e3a5f;--pri2:#2563eb;--acc:#f97316;--bg:#f8fafc;--card:#fff;--text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;--green:#059669;--red:#dc2626;--yellow:#d97706;--purple:#7c3aed;--teal:#0d9488;--shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow:0 4px 12px rgba(0,0,0,.08);--shadow-lg:0 12px 32px rgba(0,0,0,.12);--ease:cubic-bezier(.23,1,.32,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.6}
nav{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:8px;height:56px;overflow-x:auto;box-shadow:0 1px 3px rgba(0,0,0,.08)}
nav h1{font-weight:700;font-size:16px;color:var(--pri2);white-space:nowrap;margin-right:16px}
.nav-tabs{display:flex;gap:4px;overflow-x:auto;align-items:center}
.nav-btn{background:none;color:var(--muted);border:none;padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;white-space:nowrap;transition:all .2s var(--ease);font-weight:500}
.nav-btn:hover{background:var(--bg);color:var(--text)}
.nav-btn.active{background:var(--pri2);color:white;font-weight:600}
main{max-width:960px;margin:0 auto;padding:32px 24px}
.page{display:none;animation:fadeIn .3s ease}.page.active{display:block}
h2{font-size:22px;margin:32px 0 16px;color:var(--pri)}
h3{font-size:18px;margin:24px 0 12px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes popIn{0%{transform:scale(.8);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.streak-bar{background:var(--card);border-radius:16px;padding:24px;margin-bottom:20px;display:flex;align-items:center;gap:20px;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.streak-num{font-size:42px;font-weight:900;color:var(--acc)}
.streak-info h3{font-size:16px;margin-bottom:4px;font-weight:700}
.streak-info p{font-size:14px;color:var(--muted)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:12px;padding:20px;text-align:center;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:all .25s var(--ease)}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-num{font-size:32px;font-weight:800}.stat-label{font-size:13px;color:var(--muted);margin-top:4px}
.s-green .stat-num{color:var(--green)}.s-yellow .stat-num{color:var(--yellow)}.s-red .stat-num{color:var(--red)}
.start-btn{display:block;width:100%;padding:14px 20px;background:var(--pri2);color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:12px;transition:all .2s var(--ease)}
.start-btn:hover{background:var(--pri);transform:translateY(-1px);box-shadow:var(--shadow)}
.start-btn:active{transform:translateY(0)}
.mod-row{background:var(--card);border-radius:12px;padding:16px 20px;border:1px solid var(--border);display:flex;align-items:center;gap:16px;cursor:pointer;margin-bottom:10px;transition:all .25s var(--ease);box-shadow:var(--shadow-sm)}
.mod-row:hover{border-color:var(--pri2);box-shadow:var(--shadow);transform:translateY(-2px)}
.mod-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;color:white}
.mod-info{flex:1}.mod-info h4{font-size:15px;font-weight:700}.mod-info p{font-size:13px;color:var(--muted)}
.prog-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:4px;transition:width .5s ease}
.mod-pct{font-size:15px;font-weight:800;min-width:40px;text-align:right}
.back-btn{background:none;border:none;font-size:1.1rem;cursor:pointer;padding:6px 10px;border-radius:8px;transition:all .2s var(--ease)}
.back-btn:hover{background:var(--bg)}
.course-header{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.course-header h2{font-size:18px;flex:1;font-weight:700}
.lesson{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm);transition:all .25s var(--ease)}
.lesson.open{box-shadow:var(--shadow)}
.lesson-head{padding:14px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s var(--ease)}
.lesson-head:hover{background:var(--bg)}
.lesson-check{width:22px;height:22px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.lesson-title{flex:1;font-size:15px;font-weight:600;color:var(--text)}
.lesson-en{font-size:13px;color:var(--muted);font-style:italic}
.lesson-arrow{color:var(--muted);font-size:14px;transition:transform .3s var(--ease)}
.lesson.open .lesson-arrow{transform:rotate(180deg)}
.lesson-body{display:none;padding:0 24px 24px;font-size:15px;line-height:1.8}
.lesson.open .lesson-body{display:block;animation:fadeIn .3s ease}
.key{font-weight:700;color:var(--pri2)}
.en{color:var(--teal);font-style:italic;font-size:13px}
.remember{background:#fefce8;border-left:4px solid var(--yellow);padding:16px 20px;margin-top:16px;font-size:14px;border-radius:0 10px 10px 0}
.formula{background:#f0f4ff;border:1px solid #bfdbfe;border-left:4px solid var(--pri2);border-radius:8px;padding:14px 18px;margin:12px 0;font-family:'Monaco','Menlo',monospace;font-size:14px}
.levels{display:flex;gap:12px;margin-bottom:20px}
.lvl-btn{flex:1;padding:16px;border-radius:12px;border:2px solid var(--border);background:var(--card);text-align:center;cursor:pointer;transition:all .25s var(--ease)}
.lvl-btn:hover{border-color:var(--pri2);transform:translateY(-2px);box-shadow:var(--shadow)}
.lvl-btn.active{border-color:var(--pri2);background:#eff6ff}
.lvl-btn.locked{opacity:.5;cursor:not-allowed;background:#f0f0f0}
.lvl-btn h4{font-size:14px;margin-bottom:4px;font-weight:700}.lvl-btn p{font-size:12px;color:var(--muted)}
.lvl-btn .score{font-size:18px;font-weight:800;color:var(--green)}
.lock-icon{font-size:1.2rem;color:var(--muted)}
.q-card{background:var(--card);border-radius:16px;padding:28px;border:1px solid var(--border);margin-bottom:16px;box-shadow:var(--shadow-sm)}
.q-num{font-size:13px;color:var(--muted);margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.q-text{font-size:17px;font-weight:600;color:var(--text);line-height:1.55;margin-bottom:20px}
.q-opts{display:flex;flex-direction:column;gap:10px}
.q-opt{background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:14px 20px;cursor:pointer;font-size:15px;transition:all .2s var(--ease);line-height:1.5;user-select:none}
.q-opt:hover{border-color:var(--pri2);background:#eff6ff}
.q-opt.correct{border-color:var(--green);background:#ecfdf5;animation:popIn .35s var(--ease)}
.q-opt.wrong{border-color:var(--red);background:#fef2f2;animation:shake .35s ease-out}
.q-opt.dim{opacity:.4;pointer-events:none}
.q-opt.selected{border-color:var(--pri2);background:#eff6ff}
.q-input{width:100%;padding:14px;border:2px solid var(--border);border-radius:10px;font-size:16px;font-family:system-ui;outline:none;transition:all .2s var(--ease)}
.q-input:focus{border-color:var(--pri2);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.q-input.correct{border-color:var(--green);background:#ecfdf5}
.q-input.wrong{border-color:var(--red);background:#fef2f2}
.q-type-badge{display:inline-block;background:var(--acc);color:white;font-size:11px;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle;font-weight:700}
.quiz-wrap{display:flex;gap:16px;align-items:flex-start}
.quiz-main{flex:1;min-width:0}
.quiz-notes{width:260px;flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;position:sticky;top:72px;box-shadow:var(--shadow-sm)}
.quiz-notes:hover{box-shadow:var(--shadow)}
.quiz-notes h4{font-size:13px;color:var(--pri);font-weight:700;padding:12px 16px;margin:0;background:rgba(37,99,235,.03);border-bottom:1px solid var(--border)}
.quiz-notes textarea{width:100%;min-height:280px;border:none;padding:12px 16px;font-size:14px;font-family:system-ui;resize:vertical;outline:none;box-sizing:border-box}
.quiz-notes textarea:focus{background:rgba(37,99,235,.02)}
.quiz-notes .np-actions{display:flex;gap:6px;padding:10px;border-top:1px solid var(--border)}
.quiz-notes .np-btn{flex:1;padding:8px;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
.np-copy{background:var(--pri2);color:white}
.np-copy:hover{box-shadow:0 2px 8px rgba(37,99,235,.2)}
@media(max-width:960px){.quiz-wrap{flex-direction:column}.quiz-notes{width:100%;position:static}}
.q-exp{display:none;background:#f0f7ff;border:1px solid #93c5fd;border-left:3px solid var(--pri2);border-radius:12px;padding:16px 20px;margin-top:16px;font-size:14px;line-height:1.7;color:#1e3a5f}
.q-exp.show{display:block;animation:slideUp .3s var(--ease)}
.q-next{display:none;width:100%;padding:14px;background:var(--pri2);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;transition:all .2s var(--ease)}
.q-next.show{display:block}
.q-next:hover{background:var(--pri);transform:translateY(-1px);box-shadow:var(--shadow)}
.q-validate{width:100%;padding:14px;background:var(--purple);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;transition:all .2s var(--ease)}
.q-validate:hover{background:#6d28d9;transform:translateY(-1px);box-shadow:var(--shadow)}
.q-multi-badge{display:inline-block;background:var(--purple);color:white;font-size:11px;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle;font-weight:700}
.dots{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.dot{width:12px;height:12px;border-radius:50%;background:var(--border);transition:all .3s var(--ease)}
.dot.right{background:var(--green)}.dot.wrong{background:var(--red)}.dot.cur{border:2px solid var(--pri2);background:white;box-shadow:0 0 0 3px rgba(37,99,235,.15);animation:pulse 1.2s ease-in-out infinite}
.result{background:var(--card);border-radius:16px;padding:32px 24px;text-align:center;border:1px solid var(--border);box-shadow:var(--shadow-lg);animation:popIn .5s var(--ease)}
.result .score{font-size:48px;font-weight:900;display:inline-block;animation:popIn .6s var(--ease) .2s both}.result .msg{font-size:16px;color:var(--muted);margin:8px 0 24px}
.result-row{display:flex;justify-content:center;gap:32px;margin-bottom:24px}
.result-row div{text-align:center}.result-row .n{font-size:24px;font-weight:800}.result-row .l{font-size:12px;color:var(--muted)}
.setting{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid var(--border)}
.setting:last-child{border:none}
.setting label{font-size:15px;font-weight:600}
.setting small{font-size:13px;color:var(--muted);display:block;margin-top:2px}
input[type="range"]{-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:var(--border);outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--pri2);cursor:pointer;box-shadow:0 2px 6px rgba(37,99,235,.3)}
input[type="range"]::-webkit-slider-thumb:hover{box-shadow:0 4px 12px rgba(37,99,235,.4);transform:scale(1.1)}
input[type="range"]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--pri2);cursor:pointer;border:none;box-shadow:0 2px 6px rgba(37,99,235,.3)}
.q-prog-grid{display:grid;gap:6px;margin:8px 0 16px}
.q-prog-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:13px;background:var(--card);border:1px solid var(--border);transition:all .25s var(--ease)}
.q-prog-item:hover{transform:translateX(2px);box-shadow:var(--shadow-sm)}
.q-prog-item.mastered{border-left:3px solid var(--green);background:linear-gradient(to right,#ecfdf5,var(--card))}.q-prog-item.learning{border-left:3px solid var(--yellow);background:linear-gradient(to right,#fefce8,var(--card))}.q-prog-item.new{border-left:3px solid var(--border)}
.q-prog-icon{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.mastery-msg{border-radius:10px;padding:10px 14px;margin:10px 0;font-size:14px;font-weight:600;animation:slideUp .4s var(--ease)}
.mastery-msg.gold{background:#fef3c7;color:#92400e;border:1px solid #fbbf24}
.mastery-msg.green{background:#ecfdf5;color:#065f46;border:1px solid #6ee7b7}
.lesson-wrap{display:flex;gap:16px;align-items:flex-start}
.lesson-content{flex:1;min-width:0}
.lesson-note-box{width:240px;flex-shrink:0;background:#fffbeb;border:1px solid #fbbf24;border-radius:12px;overflow:hidden}
.lesson-note-box h5{font-size:13px;color:#b45309;font-weight:700;padding:10px 14px;margin:0;background:rgba(251,191,36,.08);border-bottom:1px solid #fbbf24}
.lesson-note-box textarea{width:100%;min-height:120px;border:none;padding:10px 14px;font-size:14px;font-family:system-ui;resize:vertical;outline:none;background:transparent;box-sizing:border-box}
.lesson-note-box textarea:focus{background:rgba(255,255,255,.5)}
.lesson-note-box .ln-actions{display:flex;gap:6px;padding:8px 10px;border-top:1px solid #fbbf24}
.lesson-note-box .ln-btn{flex:1;padding:6px;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;background:rgba(255,255,255,.5)}
.lesson-note-box .ln-btn:hover{background:rgba(251,191,36,.15)}
@media(max-width:960px){.lesson-wrap{flex-direction:column}.lesson-note-box{width:100%}}
@media(max-width:480px){main{padding:16px 12px}.stats-grid{grid-template-columns:1fr;gap:10px}.stat-card{padding:14px}.nav-btn{padding:6px 10px;font-size:12px}}
.itw-card{background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border);margin-bottom:12px;box-shadow:var(--shadow-sm)}
.itw-cat{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;color:white;margin-bottom:10px}
.itw-q{font-size:16px;font-weight:700;margin-bottom:12px;line-height:1.5}
.itw-textarea{width:100%;min-height:140px;border:2px solid var(--border);border-radius:10px;padding:14px;font-size:15px;font-family:system-ui;resize:vertical;outline:none;transition:all .2s var(--ease);box-sizing:border-box}
.itw-textarea:focus{border-color:var(--pri2);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.itw-hint{font-size:13px;color:var(--muted);margin-top:6px}
.itw-reveal{background:var(--pri2);color:white;border:none;padding:12px 20px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;width:100%;transition:all .2s var(--ease)}
.itw-reveal:hover{background:var(--pri);transform:translateY(-1px);box-shadow:var(--shadow)}
.itw-keys{background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:16px;margin-top:12px;display:none;animation:slideUp .3s var(--ease)}
.itw-keys h5{font-size:14px;color:var(--green);margin-bottom:8px;font-weight:700}
.itw-keys li{font-size:14px;margin-bottom:4px;line-height:1.5;color:var(--text)}
.itw-self{display:none;margin-top:12px;gap:6px}
.itw-self button{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;color:white;transition:all .2s var(--ease)}
.itw-self button:hover{transform:translateY(-1px)}
.toggle{position:relative;display:inline-block;width:48px;height:26px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#d1d5db;border-radius:26px;transition:all .3s var(--ease)}
.toggle-slider:before{content:'';position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:white;border-radius:50%;transition:all .3s var(--ease);box-shadow:0 2px 4px rgba(0,0,0,.15)}
.toggle input:checked+.toggle-slider{background:var(--green)}
.toggle input:checked+.toggle-slider:before{transform:translateX(22px)}
body.dark{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--border:#334155;--shadow-sm:0 1px 3px rgba(0,0,0,.2);--shadow:0 4px 12px rgba(0,0,0,.3);--shadow-lg:0 12px 32px rgba(0,0,0,.4)}
body.dark nav{background:var(--card);border-color:var(--border)}
body.dark .stat-card,body.dark .streak-bar,body.dark .mod-row,body.dark .course-card,body.dark .q-card,body.dark .itw-card{background:var(--card);border-color:var(--border)}
body.dark .streak-bar{background:var(--card)}
body.dark .setting{border-color:var(--border)}
body.dark input[type="text"],body.dark textarea,body.dark .itw-textarea,body.dark .q-input{background:var(--bg);color:var(--text);border-color:var(--border)}
body.dark .lesson{background:var(--card);border-color:var(--border)}
body.dark .lesson-head:hover{background:rgba(255,255,255,.03)}
body.dark .lesson-note-box{background:#1c1917;border-color:#78716c}
body.dark .lesson-note-box h5{background:rgba(120,113,108,.1);border-color:#78716c;color:#fbbf24}
body.dark .lesson-note-box textarea{color:var(--text);background:transparent}
body.dark .q-opt{background:var(--card);border-color:var(--border)}
body.dark .q-opt:hover{background:rgba(37,99,235,.08);border-color:var(--pri2)}
body.dark .q-exp{background:#1e293b;border-color:#334155;color:#e2e8f0}
body.dark .remember{background:#1c1917;border-color:#d97706}
body.dark .formula{background:#1e293b;border-color:#334155}
body.dark input[type="range"]{background:var(--border)}
.stat-bar{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.stat-bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;font-weight:500}
.stat-bar-track{height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:5px;transition:width .8s cubic-bezier(.34,.1,.68,.55)}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden}
.exam-timer{text-align:center;font-size:24px;font-weight:800;color:var(--acc);margin-bottom:10px}
.search-hit{background:var(--card);border-radius:10px;padding:14px 16px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer}
.search-hit:active{background:var(--bg)}
.search-hit h4{font-size:14px;margin-bottom:4px}
.search-hit p{font-size:13px;color:var(--muted);line-height:1.4}
.search-hit .sh-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;color:white;margin-right:4px}

<script>
const SK='lhub_v4';
let S={streak:0,lastDate:null,sessionN:0,qps:15,boxes:{},lessonsDone:{},bestScores:{},notepad:'',lessonNotes:{},qIdVer:0,dark:false,history:[]};
try{const d=JSON.parse(localStorage.getItem(SK));if(d)S=Object.assign(S,d)}catch(e){}
if(!S.lessonNotes)S.lessonNotes={};
function save(){localStorage.setItem(SK,JSON.stringify(S))}
function markLesson(cId,i,el){const k=cId+'_'+i;if(el.checked)S.lessonsDone[k]=1;else delete S.lessonsDone[k];save();openCourse(cId);const les=document.getElementById('les_'+i);if(les)les.classList.add('open')}
function isLessonDone(cId,i){return!!S.lessonsDone[cId+'_'+i]}
function getBest(cId,lvl){return S.bestScores[cId+'_L'+lvl]||0}
function setBest(cId,lvl,pct){const k=cId+'_L'+lvl;if(pct>(S.bestScores[k]||0)){S.bestScores[k]=pct;save()}}
function isUnlocked(cId,lvl){if(lvl<=1)return true;return getBest(cId,lvl-1)>=75}
const LEITNER_DAYS=[0,1,3,7,14,30];
function todayStr(){return new Date().toISOString().slice(0,10)}
function getBox(qId){return S.boxes[qId]?.b||0}
function getDue(qId){return S.boxes[qId]?.d||'2000-01-01'}
function isDue(qId){return getDue(qId)<=todayStr()}
function setBox(qId,b){const nb=Math.min(5,Math.max(1,b));const dd=new Date();dd.setDate(dd.getDate()+LEITNER_DAYS[nb]);S.boxes[qId]={b:nb,d:dd.toISOString().slice(0,10),s:S.sessionN};save()}
function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function qHash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h).toString(36)}
function getQId(cId,lvl,i){return cId+'_'+qHash(C[cId][lvl][i].q)}
function getModForCourse(cId){const c=C[cId];if(!c)return null;return MODS.find(m=>m.id===c.mod)}
function isCourseUnlocked(cId){const mod=getModForCourse(cId);if(!mod||!mod.seq)return true;const idx=mod.courses.indexOf(cId);if(idx<=0)return true;const prev=mod.courses[idx-1];return allCourseLessonsDone(prev)&&getBest(prev,1)>=75}
function checkedLessonCount(cId){const c=C[cId];if(!c||!c.lessons)return 0;return c.lessons.filter((_,i)=>isLessonDone(cId,i)).length}
function getFilteredQuestions(cId,lvl){const c=C[cId];if(!c)return[];const qs=c[lvl]||[];const total=c.lessons?c.lessons.length:1;const done=checkedLessonCount(cId);if(done>=total)return qs;const ratio=done/total;return qs.slice(0,Math.max(1,Math.ceil(qs.length*ratio)))}

// ============================================================
// MODULE & COURSE DEFINITIONS
// ============================================================
const MODS=[
{id:'bia',name:'BIA - Aéronautique',icon:'✈️',color:'var(--pri2)',courses:['bia_aero','bia_meteo','bia_aeronefs','bia_nav','bia_histoire'],seq:true},
{id:'industrie',name:'Industrie Aéronautique',icon:'🏭',color:'var(--acc)',courses:['ind_safran','ind_airbus','ind_thales_dassault','ind_ecosysteme'],seq:true},
{id:'tds',name:'Traitements de Surface',icon:'🧪',color:'var(--green)',courses:['tds_bases','tds_procedes','tds_controle','tds_normes'],seq:true},
{id:'metaux',name:'Matériaux Métalliques',icon:'⚙️',color:'var(--purple)',courses:['met_bases','met_alu','met_ti_ni','met_essais'],seq:true},
{id:'composites',name:'Composites',icon:'🧬',color:'var(--teal)',courses:['comp_bases','comp_procedes','comp_defauts'],seq:true},
{id:'qualite',name:'Qualité & Certification Aéro',icon:'📋',color:'#b45309',courses:['qual_normes','qual_methodo','qual_outils','qual_metrologie'],seq:true},
];

// ============================================================
// COURSES DATA : lessons[] + quiz L1/L2/L3
// ============================================================
const C={

// ==================== BIA AÉRODYNAMIQUE ====================
bia_aero:{title:'Aérodynamique & Principes du vol',mod:'bia',
lessons:[
{t:"Les 4 forces du vol",en:"The 4 forces of flight",b:"Quatre forces agissent sur un avion en vol :<br><br>- <span class='key'>Portance</span> <span class='en'>(Lift)</span> : générée par les ailes, dirigée vers le haut, perpendiculaire au vent relatif<br>- <span class='key'>Poids</span> <span class='en'>(Weight)</span> : force de gravité, dirigée vers le bas<br>- <span class='key'>Poussée</span> <span class='en'>(Thrust)</span> : générée par le moteur, vers l'avant<br>- <span class='key'>Traînée</span> <span class='en'>(Drag)</span> : résistance de l'air, vers l'arrière<br><br><div class='remember'><b>En vol stabilisé</b> : Portance = Poids et Poussée = Traînée. Si une force change, l'avion accélère, monte, descend ou ralentit.</div>"},
{t:"Le profil d'aile et la portance",en:"Airfoil and lift",b:"Un profil d'aile a deux faces :<br>- <span class='key'>Extrados</span> <span class='en'>(Upper surface)</span> : dessus, bombé → l'air y va PLUS VITE<br>- <span class='key'>Intrados</span> <span class='en'>(Lower surface)</span> : dessous, plus plat → l'air y va MOINS VITE<br><br>Principe de <span class='key'>Bernoulli</span> : là où l'air va plus vite, la pression est plus faible → l'aile est 'aspirée' vers le haut = <span class='key'>portance</span>.<br><br>Autres termes :<br>- <span class='key'>Bord d'attaque</span> <span class='en'>(Leading edge)</span> : le nez arrondi de l'aile<br>- <span class='key'>Bord de fuite</span> <span class='en'>(Trailing edge)</span> : l'arrière fin de l'aile<br>- <span class='key'>Corde</span> <span class='en'>(Chord)</span> : ligne droite bord d'attaque → bord de fuite<br>- <span class='key'>Envergure</span> <span class='en'>(Wingspan)</span> : distance entre les 2 bouts d'ailes<br>- <span class='key'>Saumon</span> <span class='en'>(Wing tip)</span> : extrémité de l'aile (bord marginal)<br><br><div class='formula'>Portance Rz = ½ × ρ × V² × S × Cz</div>ρ = masse volumique air, V = vitesse, S = surface alaire, Cz = coefficient de portance"},
{t:"Incidence et décrochage",en:"Angle of attack and stall",b:"<span class='key'>Incidence</span> <span class='en'>(Angle of Attack, AoA)</span> = angle entre la <span class='key'>corde du profil</span> et la direction du <span class='key'>vent relatif</span>.<br><br>Le vent relatif <span class='en'>(Relative wind)</span> est toujours parallèle et de sens opposé à la trajectoire de l'avion.<br><br>Quand l'incidence augmente → Cz augmente → plus de portance... jusqu'à un point critique (~15-18°).<br><br><span class='key'>Décrochage</span> <span class='en'>(Stall)</span> : l'air 'décolle' de l'extrados → perte BRUTALE de portance. L'avion tombe.<br><br><div class='remember'><b>Piège BIA classique</b> : le décrochage se produit toujours à la MÊME INCIDENCE, PAS à la même vitesse. La vitesse de décrochage varie selon la masse, le facteur de charge, la configuration.</div>"},
{t:"Finesse",en:"Glide ratio",b:"<span class='key'>Finesse</span> <span class='en'>(Glide ratio, L/D)</span> = Portance / Traînée = Cz / Cx<br><br>C'est la distance que l'avion parcourt pour chaque unité de hauteur perdue.<br><br>Exemples : planeur haute performance = finesse 40-60, avion de ligne = finesse ~18, parachute = finesse ~3.<br><br><div class='formula'>Finesse 40 + altitude 2000 m au-dessus du terrain = portée max 80 km (sans vent)</div><br><div class='remember'><b>Exercice type BIA</b> : 'Un planeur de finesse 40 est à 2000 m, aéroport à 1500 m à 15 km.' → Hauteur dispo = 500 m, portée = 500 × 40 = 20 km > 15 km → il arrive avec 125 m de marge.</div>"},
{t:"Les 3 axes et les gouvernes",en:"3 axes and control surfaces",b:"<b>Pourquoi 3 axes ?</b><br>Un avion se déplace dans un espace en 3 dimensions. Pour le contrôler complètement, le pilote doit pouvoir le faire tourner autour de <b>3 axes</b> perpendiculaires qui passent tous par le <span class='key'>centre de gravité</span> de l'avion. Imagine une croix 3D plantée au milieu de l'avion :<br><br><b>Axe 1 — Axe transversal (aile gauche → aile droite) → TANGAGE</b><br><span class='key'>Tangage</span> <span class='en'>(Pitch)</span> = le nez monte ou descend. Comme quand tu fais 'oui' de la tête.<br>- Le pilote pousse ou tire le <b>manche</b> (avant/arrière)<br>- Ça bouge la <span class='key'>gouverne de profondeur</span> <span class='en'>(Elevator)</span>, une surface mobile sur la queue de l'avion (empennage horizontal)<br>- Manche en avant → nez descend → l'avion pique. Manche en arrière → nez monte → l'avion cabre.<br><br><b>Axe 2 — Axe longitudinal (nez → queue) → ROULIS</b><br><span class='key'>Roulis</span> <span class='en'>(Roll)</span> = les ailes s'inclinent (une monte, l'autre descend). Comme quand tu penches la tête sur le côté.<br>- Le pilote incline le <b>manche à gauche ou à droite</b><br>- Ça bouge les <span class='key'>ailerons</span> <span class='en'>(Ailerons)</span>, des surfaces mobiles en <b>bout d'ailes</b><br>- Ils fonctionnent en sens inverse : manche à droite → aileron droit se lève (moins de portance sur l'aile droite), aileron gauche s'abaisse (plus de portance sur l'aile gauche) → l'avion s'incline à droite<br>- C'est le roulis qui permet de <b>tourner</b> : l'avion s'incline puis la portance le fait virer<br><br><b>Axe 3 — Axe vertical (sol → ciel) → LACET</b><br><span class='key'>Lacet</span> <span class='en'>(Yaw)</span> = le nez tourne à gauche ou à droite. Comme quand tu fais 'non' de la tête.<br>- Le pilote appuie sur les <span class='key'>palonniers</span> <span class='en'>(Rudder pedals)</span> avec ses pieds<br>- Ça bouge la <span class='key'>gouverne de direction</span> <span class='en'>(Rudder)</span>, la surface mobile sur l'empennage vertical (la dérive, la 'queue verticale')<br>- Pédale droite → nez tourne à droite. Sert surtout à <b>coordonner les virages</b> et à compenser en cas de panne moteur<br><br><b>Résumé :</b><br>Tangage (manche avant/arrière) → profondeur (queue horizontale)<br>Roulis (manche gauche/droite) → ailerons (bouts d'ailes)<br>Lacet (pieds sur les palonniers) → direction (queue verticale)<br><br><div class='remember'>Astuce mémoire : <b>T-R-L</b> = <b>T</b>angage (tête qui dit oui), <b>R</b>oulis (tête qui penche), <b>L</b>acet (tête qui dit non). Et chaque mouvement a SA gouverne dédiée.</div>"},
{t:"Traînée et winglets",en:"Drag and winglets",b:"3 types de traînée :<br>- <span class='key'>Traînée de frottement</span> <span class='en'>(Skin friction drag)</span> : viscosité de l'air sur la surface<br>- <span class='key'>Traînée de forme/pression</span> <span class='en'>(Form/pressure drag)</span> : liée à la forme du profil<br>- <span class='key'>Traînée induite</span> <span class='en'>(Induced drag)</span> : tourbillons en bout d'ailes, augmente avec la portance<br><br><span class='key'>Winglets</span> = petites ailettes en bout d'aile → réduisent la traînée induite → économies de carburant (~3-5 %).<br><br>La traînée totale = traînée parasite (frottement + forme) + traînée induite. À basse vitesse, la traînée induite domine. À haute vitesse, la traînée parasite domine."},
{t:"Facteur de charge",en:"Load factor",b:"<span class='key'>Facteur de charge</span> <span class='en'>(Load factor, G)</span> n = Portance / Poids<br><br>- Vol droit stabilisé : <span class='key'>n = 1g</span><br>- Virage en palier à 60° d'inclinaison : <span class='key'>n = 2g</span> (formule : n = 1/cos(φ))<br>- Ressource (sortie de piqué) : n peut atteindre 3-6g<br><br>Quand n augmente, la vitesse de décrochage augmente aussi :<br><div class='formula'>Vs(virage) = Vs(palier) × √n</div><br>Limites structurales avion de ligne : <span class='key'>+2,5g / -1g</span>. Chasse : +9g / -3g.<br><br><div class='remember'><b>Conséquence pratique</b> : en virage serré (fort n), l'avion décroche à une vitesse PLUS ÉLEVÉE qu'en ligne droite. C'est un piège classique.</div>"},
{t:"Centrage et stabilité",en:"Center of gravity and stability",b:"<span class='key'>Centrage</span> <span class='en'>(Center of Gravity, CG)</span> : position du centre de gravité par rapport à l'aile.<br><br><span class='key'>Centrage avant</span> <span class='en'>(Forward CG)</span> : plus de stabilité, MOINS de maniabilité. L'empennage doit déporter plus → plus de traînée.<br><br><span class='key'>Centrage arrière</span> <span class='en'>(Aft CG)</span> : moins de stabilité, PLUS de maniabilité. Dangereux si trop arrière (instable).<br><br>La <span class='key'>configuration canard</span> <span class='en'>(Canard)</span> : empennage à l'AVANT de l'aile. Il génère de la portance (contrairement à l'empennage arrière qui déporte). Le canard décroche AVANT l'aile → protège du décrochage complet."},
],
L1:[
{q:"Les 4 forces en vol sont :",o:["Portance, poids, poussée, traînée","Portance, poids, poussée, friction","Portance, gravité, traction, résistance","Portance, poids, inertie, traînée"],c:0,e:"<b>Les 4 forces du vol :</b><br>• <b>Portance</b> <i>(Lift)</i> — créée par les ailes, pousse l'avion vers le haut<br>• <b>Poids</b> <i>(Weight)</i> — la gravité, tire vers le bas<br>• <b>Poussée</b> <i>(Thrust)</i> — le moteur, propulse vers l'avant<br>• <b>Traînée</b> <i>(Drag)</i> — résistance de l'air, freine l'avion<br><svg viewBox='0 0 280 170' style='max-width:250px;display:block;margin:.5rem auto'><rect x='95' y='76' width='90' height='14' rx='6' fill='#4B7BEC'/><line x1='120' y1='83' x2='70' y2='83' stroke='#4B7BEC' stroke-width='3'/><line x1='160' y1='83' x2='210' y2='83' stroke='#4B7BEC' stroke-width='3'/><line x1='102' y1='76' x2='102' y2='68' stroke='#4B7BEC' stroke-width='2'/><line x1='140' y1='70' x2='140' y2='22' stroke='#059669' stroke-width='2'/><polygon points='135,28 140,16 145,28' fill='#059669'/><text x='140' y='10' text-anchor='middle' font-size='10' fill='#059669' font-weight='bold'>Portance</text><line x1='140' y1='96' x2='140' y2='145' stroke='#dc2626' stroke-width='2'/><polygon points='135,139 140,152 145,139' fill='#dc2626'/><text x='140' y='165' text-anchor='middle' font-size='10' fill='#dc2626' font-weight='bold'>Poids</text><line x1='192' y1='83' x2='248' y2='83' stroke='#7c3aed' stroke-width='2'/><polygon points='242,78 255,83 242,88' fill='#7c3aed'/><text x='240' y='72' font-size='9' fill='#7c3aed' font-weight='bold'>Poussée</text><line x1='88' y1='83' x2='30' y2='83' stroke='#d97706' stroke-width='2'/><polygon points='36,78 23,83 36,88' fill='#d97706'/><text x='38' y='72' font-size='9' fill='#d97706' font-weight='bold'>Traînée</text></svg><b>Règle d'or :</b> en vol stabilisé, les forces s'annulent 2 à 2 → Portance = Poids, Poussée = Traînée."},
{q:"En vol stabilisé, la portance est égale :",o:["Au poids","À la poussée","À la traînée","À la vitesse"],c:0,e:"En vol <b>stabilisé</b> (= pas d'accélération, pas de montée/descente), les forces sont en <b>équilibre</b> :<br>• Portance = Poids → l'avion ne monte ni ne descend<br>• Poussée = Traînée → l'avion garde sa vitesse constante<br><br><b>Attention :</b> 'stabilisé' ≠ 'à l'arrêt'. Un avion à 900 km/h peut être en vol stabilisé tant qu'il ne change ni de vitesse ni d'altitude."},
{q:"L'extrados est :",o:["Le dessus de l'aile","Le dessous de l'aile","Le bout de l'aile","La partie avant de l'aile"],c:0,e:"L'<b>extrados</b> = le <b>dessus</b> de l'aile, la face <b>bombée</b>.<br><br><b>Pourquoi c'est important ?</b> L'air parcourt un chemin plus long sur l'extrados (bombé) que sur l'intrados (plat). Il va donc <b>plus vite</b> dessus → <b>moins de pression</b> (principe de Bernoulli) → l'aile est aspirée vers le haut = <b>portance</b>.<br><svg viewBox='0 0 260 110' style='max-width:240px;display:block;margin:.5rem auto'><path d='M30,55 Q70,20 140,28 Q200,32 235,50 Q200,54 140,56 Q70,64 30,55Z' fill='#eef3fa' stroke='#4B7BEC' stroke-width='2'/><text x='140' y='18' text-anchor='middle' font-size='9' fill='#059669' font-weight='bold'>EXTRADOS (dessus, bombé)</text><text x='140' y='74' text-anchor='middle' font-size='9' fill='#dc2626' font-weight='bold'>INTRADOS (dessous, plat)</text><circle cx='30' cy='55' r='3' fill='#d97706'/><text x='30' y='90' text-anchor='middle' font-size='8' fill='#d97706'>Bord d'attaque</text><circle cx='235' cy='50' r='2' fill='#7c3aed'/><text x='225' y='90' text-anchor='middle' font-size='8' fill='#7c3aed'>Bord de fuite</text><line x1='30' y1='55' x2='235' y2='50' stroke='#999' stroke-width='1' stroke-dasharray='3'/><text x='135' y='47' text-anchor='middle' font-size='7' fill='#999'>Corde</text></svg>"},
{q:"L'incidence est l'angle entre :",o:["La corde et le vent relatif","La corde et l'horizon","L'aile et le fuselage","L'aile et l'horizontale"],c:0,e:"L'<b>incidence</b> (Angle of Attack, AoA) = angle entre la <b>corde du profil</b> (ligne droite bord d'attaque → bord de fuite) et le <b>vent relatif</b> (direction d'où vient l'air).<br><svg viewBox='0 0 280 130' style='width:100%;max-width:280px;display:block;margin:.5rem auto'><path d='M40,75 Q90,50 160,55 Q200,57 240,70 Q200,72 160,73 Q90,80 40,75Z' fill='#e2e5ea' stroke='#1e3a5f' stroke-width='2'/><line x1='40' y1='75' x2='240' y2='70' stroke='#7c3aed' stroke-width='1.5' stroke-dasharray='4'/><text x='140' y='65' text-anchor='middle' font-size='8' fill='#7c3aed'>Corde</text><line x1='40' y1='75' x2='240' y2='85' stroke='#dc2626' stroke-width='1.5'/><polygon points='240,85 228,80 230,88' fill='#dc2626'/><text x='200' y='100' font-size='8' fill='#dc2626'>Vent relatif</text><path d='M80,74 A30,30 0 0,0 80,80' stroke='#059669' stroke-width='2' fill='none'/><text x='95' y='84' font-size='9' fill='#059669' font-weight='bold'>α</text><text x='140' y='120' text-anchor='middle' font-size='8' fill='#6b7280'>α = incidence (AoA)</text></svg><b>Piège classique :</b> ce n'est PAS l'angle avec l'horizon ! Un avion peut avoir le nez levé par rapport à l'horizon mais une faible incidence.<br><br><b>Conséquence :</b> si l'incidence dépasse ~15-18°, l'air décroche de l'extrados → perte brutale de portance = <b>décrochage</b> (stall)."},
{q:"Le saumon d'aile est :",o:["L'extrémité de l'aile","La jonction aile-fuselage","Le volet","Le bord d'attaque"],c:0,e:"<svg viewBox='0 0 320 90' style='width:100%;max-width:320px;display:block;margin:.5rem auto'><rect x='130' y='25' width='60' height='45' rx='8' fill='#e2e5ea' stroke='#1e3a5f' stroke-width='2'/><text x='160' y='52' text-anchor='middle' font-size='8' fill='#1e3a5f'>Fuselage</text><line x1='130' y1='47' x2='20' y2='40' stroke='#1e3a5f' stroke-width='3'/><line x1='190' y1='47' x2='300' y2='40' stroke='#1e3a5f' stroke-width='3'/><circle cx='20' cy='40' r='5' fill='#059669'/><text x='20' y='30' text-anchor='middle' font-size='8' fill='#059669' font-weight='bold'>Saumon</text><text x='20' y='58' text-anchor='middle' font-size='7' fill='#059669'>(wing tip)</text><circle cx='300' cy='40' r='5' fill='#059669'/><text x='300' y='30' text-anchor='middle' font-size='8' fill='#059669' font-weight='bold'>Saumon</text><circle cx='130' cy='47' r='4' fill='#d97706'/><text x='100' y='75' text-anchor='middle' font-size='8' fill='#d97706' font-weight='bold'>Emplanture</text><text x='100' y='85' text-anchor='middle' font-size='7' fill='#d97706'>(jonction)</text><line x1='40' y1='40' x2='280' y2='40' stroke='#7c3aed' stroke-width='1' stroke-dasharray='3'/><text x='160' y='15' text-anchor='middle' font-size='8' fill='#7c3aed'>← Envergure →</text></svg><b>Ne pas confondre :</b><br>• <b>Saumon</b> = bout de l'aile (c'est là qu'on met les winglets)<br>• <b>Emplanture</b> = jonction aile-fuselage (à l'opposé)"},
{q:"Le tangage est contrôlé par :",o:["La gouverne de profondeur","Les ailerons","La gouverne de direction","Les volets"],c:0,e:"<b>Tangage</b> (Pitch) = le nez monte/descend → commandé par la <b>gouverne de profondeur</b> (elevator) sur l'empennage horizontal.<br><br><b>Les 3 commandes :</b><br>• Manche avant/arrière → profondeur → <b>tangage</b> (nez haut/bas)<br>• Manche gauche/droite → ailerons → <b>roulis</b> (ailes s'inclinent)<br>• Pédales (palonniers) → direction → <b>lacet</b> (nez gauche/droite)<br><br><b>Mnémo :</b> P comme Profondeur = P comme Pitch = P comme le Panache du nez qui monte/descend."},
{q:"Le roulis correspond à :",o:["L'inclinaison des ailes","Le nez monte/descend","Le nez gauche/droite","La rotation sur l'axe vertical"],c:0,e:"Le <b>roulis</b> (Roll) = les ailes s'inclinent latéralement. Commandé par les <b>ailerons</b>, situés en bout d'aile.<br><br>Ils fonctionnent de façon <b>inversée</b> :<br>• Manche à droite → aileron droit <b>monte</b> (moins de portance) + aileron gauche <b>descend</b> (plus de portance) → l'avion s'incline à droite.<br><br><b>Ne pas confondre :</b><br>• Roulis (roll) = ailerons, ailes s'inclinent<br>• Lacet (yaw) = gouverne de direction, nez va à gauche/droite"},
{q:"Les winglets servent à :",o:["Réduire la traînée induite","Augmenter la vitesse max","Améliorer la visibilité","Protéger de la foudre"],c:0,e:"Les <b>winglets</b> = petites ailettes au bout des ailes, visibles sur tous les avions de ligne modernes.<br><br><svg viewBox='0 0 300 120' style='width:100%;max-width:300px;display:block;margin:.5rem auto'><line x1='30' y1='60' x2='230' y2='60' stroke='#1e3a5f' stroke-width='4'/><path d='M230,60 L250,30' stroke='#e8722a' stroke-width='4' fill='none'/><text x='255' y='30' font-size='10' fill='#e8722a' font-weight='bold'>Winglet</text><text x='120' y='55' font-size='9' fill='#6b7280' text-anchor='middle'>Aile</text><text x='30' y='75' font-size='9' fill='#6b7280'>Fuselage</text><path d='M200,80 C210,90 220,85 215,70' stroke='#dc2626' stroke-width='1.5' fill='none' stroke-dasharray='3'/><path d='M205,85 C215,95 225,90 220,75' stroke='#dc2626' stroke-width='1.5' fill='none' stroke-dasharray='3'/><text x='195' y='100' font-size='8' fill='#dc2626'>Tourbillons</text><text x='245' y='50' font-size='8' fill='#059669'>↑ cassés !</text></svg><b>Le problème :</b> en vol, l'air haute pression (sous l'aile) remonte vers la basse pression (dessus) au bout de l'aile, créant des <b>tourbillons</b> = énergie gaspillée = <b>traînée induite</b>.<br><br><b>La solution :</b> les winglets cassent ces tourbillons → <b>~3-5 % de carburant économisé</b>. Sur un A320 qui vole 3500 h/an, c'est des centaines de milliers de litres de kérosène en moins !"},
{q:"En vol droit stabilisé, le facteur de charge est :",o:["1g","0g","2g","0,5g"],c:0,e:"Le <b>facteur de charge</b> (n, en 'g') = Portance / Poids.<br><br><b>Exemples concrets :</b><br>• Vol droit stable → <b>n = 1g</b> (tu pèses ton poids normal)<br>• Virage à 60° d'inclinaison → <b>n = 2g</b> (tu pèses 2× ton poids)<br>• Ressource (sortie de piqué) → <b>3-6g</b><br>• Apesanteur (parabole) → <b>0g</b><br><br><b>Conséquence :</b> quand n augmente, la vitesse de décrochage augmente aussi. En virage serré, on peut décrocher à une vitesse bien plus élevée qu'en ligne droite !"},
{q:"Un centrage avant donne :",o:["Plus de stabilité, moins de maniabilité","Plus de maniabilité, moins de stabilité","Aucun effet","Plus de traînée induite"],c:0,e:"<svg viewBox='0 0 300 100' style='width:100%;max-width:300px;display:block;margin:.5rem auto'><path d='M50,50 L250,50' stroke='#e2e5ea' stroke-width='2'/><path d='M30,40 Q50,25 250,40 Q260,42 270,50 Q260,58 250,60 Q50,75 30,60 Z' stroke='#1e3a5f' stroke-width='2' fill='#e2e5ea'/><circle cx='100' cy='50' r='6' fill='#059669'/><text x='100' y='38' font-size='8' fill='#059669' text-anchor='middle' font-weight='bold'>CG avant</text><text x='100' y='70' font-size='7' fill='#059669' text-anchor='middle'>Stable, lourd</text><circle cx='190' cy='50' r='6' fill='#dc2626'/><text x='190' y='38' font-size='8' fill='#dc2626' text-anchor='middle' font-weight='bold'>CG arrière</text><text x='190' y='70' font-size='7' fill='#dc2626' text-anchor='middle'>Agile, risqué</text><text x='30' y='50' font-size='8' fill='#6b7280' dominant-baseline='middle'>Nez</text><text x='255' y='50' font-size='8' fill='#6b7280' dominant-baseline='middle'>Queue</text></svg>Le <b>centrage</b> = position du <b>centre de gravité</b> (CG) par rapport à l'aile.<br><br><b>Centrage AVANT</b> (CG vers le nez) → plus <b>stable</b> (l'avion revient en position tout seul après une perturbation), mais moins maniable. L'empennage doit compenser plus → plus de traînée.<br><br><b>Centrage ARRIÈRE</b> (CG vers la queue) → moins stable (dangereux si trop arrière → l'avion peut devenir incontrôlable), mais plus <b>maniable</b> (réagit vite).<br><br><b>Mnémo :</b> Avant = sûr mais lourd. Arrière = agile mais risqué. Les chasseurs militaires (Rafale, F-16) sont centrés arrière volontairement → très manœuvrables, mais ils ont besoin de commandes de vol électriques (fly-by-wire) pour rester contrôlables."},
{q:"C'est quoi un aéronef ?",o:["Tout appareil capable de se déplacer dans les airs","Uniquement un avion à réaction","Un avion militaire uniquement","Un appareil qui roule sur la piste"],c:0,e:"Un <b>aéronef</b> (aircraft) = tout appareil capable de s'élever et de circuler dans l'atmosphère. Ça inclut les <b>avions, hélicoptères, planeurs, ULM, ballons, dirigeables, drones</b>."},
{q:"Le fuselage c'est :",o:["Le corps principal de l'avion","Le bout de l'aile","Le train d'atterrissage","Le moteur"],c:0,e:"<svg viewBox='0 0 340 110' style='width:100%;max-width:340px;display:block;margin:.5rem auto'><path d='M30,50 Q40,30 80,30 L260,30 Q300,30 310,50 Q300,60 260,60 L80,60 Q40,60 30,50Z' fill='#e2e5ea' stroke='#1e3a5f' stroke-width='2'/><text x='170' y='50' text-anchor='middle' font-size='10' fill='#1e3a5f' font-weight='bold'>Fuselage</text><line x1='100' y1='45' x2='30' y2='30' stroke='#1e3a5f' stroke-width='2.5'/><line x1='100' y1='45' x2='30' y2='60' stroke='#1e3a5f' stroke-width='2.5'/><text x='25' y='22' font-size='7' fill='#059669'>Aile</text><line x1='260' y1='30' x2='290' y2='15' stroke='#1e3a5f' stroke-width='2'/><text x='295' y='15' font-size='7' fill='#d97706'>Dérive</text><line x1='250' y1='30' x2='300' y2='28' stroke='#1e3a5f' stroke-width='2'/><text x='305' y='30' font-size='7' fill='#7c3aed'>Stab. H</text><circle cx='120' cy='68' r='4' fill='#475569'/><circle cx='180' cy='68' r='4' fill='#475569'/><text x='150' y='82' text-anchor='middle' font-size='7' fill='#475569'>Train</text><ellipse cx='85' cy='65' rx='15' ry='8' fill='none' stroke='#f97316' stroke-width='1.5'/><text x='85' y='90' text-anchor='middle' font-size='7' fill='#f97316'>Moteur</text><text x='170' y='100' text-anchor='middle' font-size='8' fill='#94a3b8'>Vue schématique d'un avion</text></svg>Le <b>fuselage</b> = le <b>corps principal</b>. Structure <b>semi-monocoque</b> : cadres (anneaux) + lisses (longitudinaux) + revêtement (peau alu ou composite)."},
{q:"L'empennage c'est :",o:["La partie arrière de l'avion","Le nez de l'avion","Le train d'atterrissage","Les moteurs sous les ailes"],c:0,e:"<svg viewBox='0 0 240 110' style='width:100%;max-width:240px;display:block;margin:.5rem auto'><path d='M20,60 L180,60 Q200,60 210,55 L210,55' stroke='#1e3a5f' stroke-width='2.5' fill='none'/><path d='M20,65 L180,65 Q200,65 210,60' stroke='#1e3a5f' stroke-width='2.5' fill='none'/><rect x='170' y='20' width='5' height='42' rx='2' fill='#7c3aed' stroke='#7c3aed' stroke-width='1'/><text x='140' y='18' font-size='8' fill='#7c3aed' font-weight='bold'>Dérive</text><text x='140' y='28' font-size='7' fill='#7c3aed'>(vertical)</text><line x1='155' y1='58' x2='220' y2='55' stroke='#059669' stroke-width='3'/><text x='205' y='50' font-size='8' fill='#059669' font-weight='bold'>Stabilisateur</text><text x='215' y='68' font-size='7' fill='#059669'>(horizontal)</text><rect x='195' y='52' width='25' height='8' rx='2' fill='#d97706' opacity='0.5'/><text x='225' y='80' font-size='7' fill='#d97706'>Gouv. profondeur</text><rect x='170' y='20' width='8' height='12' rx='2' fill='#dc2626' opacity='0.5'/><text x='185' y='38' font-size='7' fill='#dc2626'>Gouv. direction</text><text x='120' y='100' text-anchor='middle' font-size='8' fill='#94a3b8'>Empennage = partie arrière</text></svg>Empennage <b>horizontal</b> : stabilisateur + gouverne de profondeur → <b>tangage</b>.<br>Empennage <b>vertical</b> : dérive + gouverne de direction → <b>lacet</b>."},
{q:"Les volets servent à :",o:["Augmenter la portance à basse vitesse","Augmenter la vitesse maximale","Réduire le poids de l'avion","Protéger le moteur de la pluie"],c:0,e:"<svg viewBox='0 0 300 130' style='width:100%;max-width:300px;display:block;margin:.5rem auto'><text x='10' y='15' font-size='9' fill='#6b7280' font-weight='bold'>Volets rentrés (croisière) :</text><path d='M30,45 Q80,30 200,40 Q220,42 230,45' stroke='#1e3a5f' stroke-width='3' fill='#e2e5ea'/><text x='240' y='48' font-size='8' fill='#6b7280'>→ Bord de fuite</text><text x='10' y='75' font-size='9' fill='#059669' font-weight='bold'>Volets sortis (atterrissage) :</text><path d='M30,105 Q80,85 180,95' stroke='#1e3a5f' stroke-width='3' fill='#e2e5ea'/><path d='M180,95 L200,110 Q210,115 215,112' stroke='#e8722a' stroke-width='3' fill='#fed7aa'/><text x='220' y='115' font-size='8' fill='#e8722a' font-weight='bold'>Volet</text><path d='M120,98 L120,120' stroke='#059669' stroke-width='1' marker-end='url(#arr)'/><text x='85' y='128' font-size='8' fill='#059669'>+ courbure + surface</text></svg>Les <b>volets</b> <span class='en'>(Flaps)</span> = surfaces mobiles sur le <b>bord de fuite</b> (arrière de l'aile). En les sortant, on augmente la <b>courbure</b> et la <b>surface</b> de l'aile → plus de portance à basse vitesse.<br><br><b>Quand les utilise-t-on ?</b><br>- <b>Décollage</b> : volets partiellement sortis (ex : flaps 15°) → portance suffisante pour décoller à vitesse réduite<br>- <b>Atterrissage</b> : volets plein sortis (ex : flaps 30-40°) → l'avion peut voler plus lentement → atterrir sur une piste plus courte<br>- <b>Croisière</b> : volets rentrés → moins de traînée, vitesse max<br><br>Sur un A320 : 4 positions de volets (0, 1, 2, 3, Full)."},
{q:"C'est quoi le bord d'attaque ?",o:["Le nez arrondi à l'avant de l'aile","L'arrière fin de l'aile","Le bout de l'aile","Le dessous de l'aile"],c:0,e:"<svg viewBox='0 0 300 120' style='width:100%;max-width:300px;display:block;margin:.5rem auto'><path d='M30,55 Q70,20 160,30 Q230,35 270,52 Q230,58 160,60 Q70,70 30,55Z' fill='#e2e5ea' stroke='#1e3a5f' stroke-width='2'/><circle cx='30' cy='55' r='5' fill='#059669'/><text x='30' y='82' text-anchor='middle' font-size='9' fill='#059669' font-weight='bold'>Bord d'attaque</text><text x='30' y='92' text-anchor='middle' font-size='7' fill='#059669'>(leading edge)</text><circle cx='270' cy='52' r='3' fill='#dc2626'/><text x='260' y='82' text-anchor='middle' font-size='9' fill='#dc2626' font-weight='bold'>Bord de fuite</text><text x='260' y='92' text-anchor='middle' font-size='7' fill='#dc2626'>(trailing edge)</text><text x='160' y='22' text-anchor='middle' font-size='8' fill='#7c3aed'>Extrados (dessus)</text><text x='160' y='75' text-anchor='middle' font-size='8' fill='#d97706'>Intrados (dessous)</text><line x1='30' y1='55' x2='270' y2='52' stroke='#94a3b8' stroke-width='1' stroke-dasharray='3'/><text x='150' y='50' text-anchor='middle' font-size='7' fill='#94a3b8'>Corde</text><path d='M5,55 L25,55' stroke='#059669' stroke-width='2'/><polygon points='23,52 30,55 23,58' fill='#059669'/><text x='10' y='48' font-size='7' fill='#059669'>Air →</text></svg>Le <b>bord d'attaque</b> = la partie <b>avant arrondie</b> de l'aile, celle qui rencontre l'air en premier. Le <b>bord de fuite</b> = l'arrière fin (où se trouvent volets et ailerons)."},
{q:"L'envergure d'un avion c'est :",o:["La distance entre les deux bouts d'ailes","La longueur du fuselage","La hauteur de l'avion au sol","Le diamètre du moteur"],c:0,e:"L'<b>envergure</b> (wingspan) = la distance entre les deux <b>saumons</b> (extrémités d'ailes). Ex : A320 = 36 m, A380 = 80 m, B747 = 64 m."},
{q:"Le train d'atterrissage sert à :",o:["Supporter l'avion au sol et absorber les chocs à l'atterrissage","Augmenter la portance en vol","Contrôler la direction en vol","Refroidir les freins en croisière"],c:0,e:"Le <b>train d'atterrissage</b> (landing gear) = roues + amortisseurs + freins. Configuration standard : <b>tricycle</b>. Matériaux : acier haute résistance (300M), freins en <b>carbone</b>."},
{q:"C'est quoi la corde d'un profil d'aile ?",o:["La ligne droite du bord d'attaque au bord de fuite","L'épaisseur maximale de l'aile","La courbure du dessus de l'aile","La distance entre deux nervures"],c:0,e:"<svg viewBox='0 0 280 90' style='width:100%;max-width:280px;display:block;margin:.5rem auto'><path d='M30,45 Q70,20 150,28 Q220,32 255,42 Q220,48 150,50 Q70,58 30,45Z' fill='#e2e5ea' stroke='#1e3a5f' stroke-width='2'/><line x1='30' y1='45' x2='255' y2='42' stroke='#dc2626' stroke-width='2'/><circle cx='30' cy='45' r='3' fill='#dc2626'/><circle cx='255' cy='42' r='3' fill='#dc2626'/><text x='140' y='38' text-anchor='middle' font-size='9' fill='#dc2626' font-weight='bold'>CORDE</text><text x='30' y='70' text-anchor='middle' font-size='7' fill='#059669'>Bord d'attaque</text><text x='250' y='60' text-anchor='middle' font-size='7' fill='#7c3aed'>Bord de fuite</text><line x1='140' y1='28' x2='140' y2='50' stroke='#d97706' stroke-width='1' stroke-dasharray='3'/><text x='155' y='18' font-size='7' fill='#d97706'>Épaisseur max</text></svg>La <b>corde</b> (chord) = la ligne droite du bord d'attaque au bord de fuite. C'est la référence pour mesurer l'<b>incidence</b>. Surface alaire = envergure × corde moyenne."},
],
L2:[
{q:"Le décrochage se produit toujours à la même :",o:["Incidence","Vitesse","Altitude","Assiette"],c:0,e:"Toujours même incidence critique (~15-18°). La vitesse de décrochage varie (masse, facteur de charge)."},
{q:"La portance est perpendiculaire :",o:["Au vent relatif","À la corde du profil","À l'horizon","Au fuselage"],c:0,e:"Perpendiculaire au vent relatif, pas à l'horizon ni à la corde."},
{q:"Le vent relatif est :",o:["Parallèle et opposé à la trajectoire","Le vent météorologique","Perpendiculaire à la portance","Variable selon l'altitude"],c:0,e:"Toujours parallèle et de sens opposé à la trajectoire."},
{q:"Le facteur de charge en virage à 60° :",o:["2g","1,5g","3g","1g"],c:0,e:"n = 1/cos(60) = 1/0,5 = 2g."},
{q:"Manche à droite → l'aileron droit :",o:["Se lève","S'abaisse","Ne bouge pas","Se braque vers le bas"],c:0,e:"Aileron droit se lève → moins de portance à droite → l'avion s'incline à droite."},
{q:"La finesse est le rapport :",o:["Cz/Cx","Cx/Cz","Poussée/poids","Poids/surface"],c:0,e:"Finesse = L/D = Cz/Cx. Plus c'est grand, plus l'avion plane loin."},
{q:"Un empennage canard :",o:["Génère de la portance et décroche avant l'aile","Génère une déportance","Décroche après l'aile","N'a aucun rôle aérodynamique"],c:0,e:"Canard = portance + décroche avant l'aile (sécurité anti-décrochage)."},
{q:"Quand le facteur de charge augmente, la vitesse de décrochage :",o:["Augmente","Diminue","Reste la même","Dépend de l'altitude"],c:0,e:"Vs(virage) = Vs × √n. Plus de g → décrochage plus tôt."},
],
L3:[
{q:"Planeur finesse 40, altitude 2000 m, terrain à 1000 m, distance 20 km :",o:["Il arrive avec 500 m de marge","Il n'arrive pas","Il arrive juste","Il arrive avec 250 m de marge"],c:0,e:"Hauteur dispo = 1000 m. Portée = 1000 × 40 = 40 km > 20 km. Il utilise 500 m pour 20 km, arrive à 1500 m soit 500 m au-dessus."},
{q:"En virage en palier symétrique, le facteur de charge ne dépend que de :",o:["L'inclinaison","La vitesse","La masse","L'altitude"],c:0,e:"n = 1/cos(φ). Ne dépend QUE de l'angle d'inclinaison."},
{q:"La différence de vitesse entre extrados et intrados :",o:["Engendre une différence de pression créant la portance","Augmente la traînée uniquement","Ralentit l'avion","Est un phénomène parasite"],c:0,e:"Bernoulli : vitesse plus grande → pression plus faible. Différence de pression = portance."},
{q:"Flexion de l'aile en vol : le longeron subit :",o:["Compression extrados, traction intrados","Traction extrados, compression intrados","Compression partout","Traction partout"],c:0,e:"La portance pousse l'aile vers le haut → compression dessus (extrados), traction dessous (intrados)."},
{q:"Le réchauffage carburateur entraîne :",o:["Une diminution de la puissance","Une augmentation de la puissance","Aucun changement","Un risque de surchauffe moteur"],c:0,e:"Air chaud = moins dense = mélange plus riche = moins de puissance."},
{q:"Un avion en virage à 60° d'inclinaison subit un facteur de charge de :",o:["2g","1,5g","3g","1g"],c:0,e:"n = 1/cos(60°) = 1/0,5 = <b>2g</b>. À 60° d'inclinaison, le poids apparent double. La vitesse de décrochage augmente de √2 ≈ 41 %. C'est un calcul classique du BIA."},
{q:"Un avion vole à 200 kt (IAS). Le vent de face est de 30 kt. Sa vitesse sol est :",o:["170 kt","230 kt","200 kt","130 kt"],c:0,e:"<b>Vitesse sol (GS)</b> = TAS ± vent. Vent de face → GS = TAS - vent. En simplifiant IAS ≈ TAS au niveau de la mer : GS = 200 - 30 = <b>170 kt</b>. Un vent arrière l'aurait accéléré à 230 kt sol."},
{q:"La Vs en virage à 45° d'inclinaison, si Vs palier = 60 kt :",o:["71 kt","60 kt","85 kt","50 kt"],c:0,e:"Vs(virage) = Vs × √n. n = 1/cos(45°) = 1/0,707 = 1,41. Vs = 60 × √1,41 = 60 × 1,19 = <b>71 kt</b>. En virage serré, le décrochage survient à une vitesse plus élevée."},
{q:"La portance dépend de V². Si la vitesse double, la portance :",o:["Quadruple","Double","Triple","Reste identique"],c:0,e:"Rz = ½ρV²SCz. Si V × 2 → V² × 4 → <b>portance × 4</b>. C'est pour ça que la vitesse est le paramètre le plus puissant pour contrôler la portance."},
{q:"En atmosphère ISA, la température à 5000 m d'altitude est :",o:["-17,5 °C","15 °C","0 °C","-32,5 °C"],c:0,e:"ISA au sol = 15 °C. Gradient = -6,5 °C/km. À 5000 m : 15 - (5 × 6,5) = 15 - 32,5 = <b>-17,5 °C</b>."},
{q:"La configuration canard protège du décrochage car :",o:["Le plan canard décroche AVANT l'aile principale","L'aile principale décroche avant le canard","Le canard augmente la traînée","Le canard remplace les volets"],c:0,e:"Dans un canard, le <b>plan avant décroche en premier</b>. Quand il décroche, le nez descend naturellement → l'incidence diminue → l'aile principale ne décroche pas. C'est une protection naturelle contre le décrochage."},
{q:"Le lacet inverse en virage est corrigé par :",o:["Le palonnier (gouverne de direction)","Le manche avant/arrière","Les volets","La manette des gaz"],c:0,e:"En virage, l'aileron baissé crée plus de traînée que l'aileron levé → le nez part du côté extérieur au virage (<b>lacet inverse</b>). On corrige avec le <b>palonnier</b> (rudder) pour coordonner le virage. Un virage bien coordonné = bille centrée."},
{q:"À altitude constante, si la masse augmente, la vitesse de décrochage :",o:["Augmente","Diminue","Reste identique","Dépend de la température"],c:0,e:"Plus de masse → plus de poids → il faut plus de portance → il faut voler plus vite pour maintenir Rz = P. Vs = √(2mg / ρSCzmax). Si m augmente, <b>Vs augmente</b>. Un avion lourd (plein de carburant) décroche à une vitesse plus élevée."},
]},

// ==================== BIA MÉTÉOROLOGIE ====================
bia_meteo:{title:'Météorologie & Aérologie',mod:'bia',
lessons:[
{t:"L'atmosphère standard (ISA)",en:"International Standard Atmosphere",b:"Modèle de référence mondial :<br>- Au niveau de la mer : <span class='key'>T = 15 °C</span>, <span class='key'>P = 1013,25 hPa</span>, <span class='key'>ρ = 1,225 kg/m³</span><br>- <span class='key'>Gradient thermique</span> : -6,5 °C/km (soit <span class='key'>-2 °C/1000 ft</span>)<br>- Composition : <span class='key'>78 % azote</span> (N₂), <span class='key'>21 % oxygène</span> (O₂), ~1 % argon<br><br>Couches atmosphériques :<br>- <span class='key'>Troposphère</span> <span class='en'>(Troposphere)</span> : 0-11 km (à Paris). C'est là que vole l'aviation. Météo active.<br>- <span class='key'>Tropopause</span> : limite supérieure, ~11 km / -56,5 °C à nos latitudes<br>- <span class='key'>Stratosphère</span> : au-dessus, température stable puis augmente (couche d'ozone)<br><br><div class='remember'><b>Piège BIA</b> : la tropopause varie ! ~7 km aux pôles, ~11 km à Paris, ~17 km à l'équateur.</div>"},
{t:"Les nuages",en:"Clouds",b:"Classification par altitude :<br>- <span class='key'>Hauts</span> (6-12 km) : préfixe <span class='key'>cirro-</span> → cirrus, cirrostratus, cirrocumulus (cristaux de glace)<br>- <span class='key'>Moyens</span> (2-6 km) : préfixe <span class='key'>alto-</span> → altostratus, altocumulus<br>- <span class='key'>Bas</span> (0-2 km) : <span class='key'>stratus, stratocumulus</span> → visibilité réduite, bruine<br>- <span class='key'>Développement vertical</span> : <span class='key'>cumulus</span> (beau temps si petits), <span class='key'>cumulonimbus (Cb)</span> = LE danger<br><br>Formes :<br>- <span class='key'>Stratiforme</span> <span class='en'>(Stratiform)</span> : couche plate, air stable → bruine, plafond bas<br>- <span class='key'>Cumuliforme</span> <span class='en'>(Cumuliform)</span> : bourgeonnant, air instable → averses, orages<br><br><div class='remember'><b>BIA</b> : les cumulus sont les nuages recherchés pour le vol à voile (ascendances thermiques). Le Cb est TOUJOURS à éviter.</div>"},
{t:"Fronts et masses d'air",en:"Fronts and air masses",b:"<span class='key'>Front froid</span> <span class='en'>(Cold front)</span> : air froid pousse SOUS l'air chaud. Pente raide → soulèvement rapide → <span class='key'>Cb, orages, averses intenses</span>. Passage rapide.<br><br><span class='key'>Front chaud</span> <span class='en'>(Warm front)</span> : air chaud glisse AU-DESSUS de l'air froid. Pente douce → nuages stratiformes, pluie continue, dégradation progressive.<br><br><span class='key'>Occlusion</span> : front froid rattrape le front chaud → zone très nuageuse et pluvieuse, plafond bas.<br><br><span class='key'>Traîne</span> <span class='en'>(Post-frontal zone)</span> : zone derrière le front froid → éclaircies et averses alternées.<br><br>Vents (hémisphère nord) :<br>- <span class='key'>Anticyclone</span> (H) : haute pression, beau temps, vents tournent dans le sens <span class='key'>horaire</span><br>- <span class='key'>Dépression</span> (L) : basse pression, mauvais temps, vents sens <span class='key'>anti-horaire</span>"},
{t:"Dangers météo en aviation",en:"Weather hazards",b:"<span class='key'>Givrage</span> <span class='en'>(Icing)</span> : vol dans des couches saturées à température négative → glace sur les ailes → perte de portance, blocage gouvernes.<br><br><span class='key'>Cumulonimbus (Cb)</span> : turbulences sévères, grêle, foudre, cisaillement de vent. On le <span class='key'>contourne TOUJOURS</span>.<br><br><span class='key'>Cisaillement de vent</span> <span class='en'>(Windshear)</span> : variation brutale de vent → danger surtout à l'atterrissage et au décollage.<br><br><span class='key'>Brouillard de rayonnement</span> <span class='en'>(Radiation fog)</span> : nuit claire, vent faible, sol humide → refroidissement du sol par rayonnement → brouillard au lever du jour.<br><br><span class='key'>Jet-stream</span> : courants d'altitude très rapides (200-300 km/h). Utilisés par les avions de ligne (vent arrière = économies)."},
{t:"Calages altimétriques et point de rosée",en:"Altimeter settings and dew point",b:"<span class='key'>QNH</span> : pression ramenée au niveau de la mer → l'altimètre affiche l'<span class='key'>altitude</span> (hauteur / mer)<br><span class='key'>QFE</span> : pression au niveau de l'aérodrome → l'altimètre affiche la <span class='key'>hauteur</span> (hauteur / terrain)<br><span class='key'>1013,25 hPa</span> (standard) : utilisé en croisière au-dessus de l'altitude de transition → niveaux de vol (FL)<br><br><span class='key'>Point de rosée</span> <span class='en'>(Dew point)</span> : température à laquelle l'air atteint la saturation (100 % humidité). Si T ambiante descend au point de rosée → condensation → nuages ou brouillard.<br><br><span class='key'>METAR</span> : observation météo d'un aérodrome (toutes les 30 min)<br><span class='key'>TAF</span> : prévision météo d'un aérodrome (9-30 h)<br><br><div class='remember'><b>Danger</b> : en air froid, l'altitude réelle est INFÉRIEURE à l'altitude indiquée. Risque de collision avec le relief.</div>"},
],
L1:[
{q:"Température au niveau de la mer en ISA :",o:["15 °C","20 °C","0 °C","10 °C"],c:0,e:"L'<b>ISA</b> (International Standard Atmosphere) est un modèle de référence mondial pour l'aviation :<br>• Température : <b>15 °C</b> au niveau de la mer<br>• Pression : <b>1013,25 hPa</b><br>• Elle diminue de <b>-6,5 °C par km</b> d'altitude (-2 °C / 1000 ft)<br><br>Tous les instruments de vol sont calibrés sur ce modèle. Quand la météo réelle s'en écarte, il faut corriger."},
{q:"Pression standard au niveau de la mer :",o:["1013,25 hPa","1000 hPa","1020 hPa","980 hPa"],c:0,e:"1013,25 hPa = valeur ISA de référence."},
{q:"Le gradient thermique standard est :",o:["-6,5 °C/km","-10 °C/km","-2 °C/km","-4 °C/km"],c:0,e:"Le <b>gradient thermique standard</b> = la température baisse de <b>6,5 °C par km</b> d'altitude (ou 2 °C par 1000 ft).<br><br><b>Application :</b> au niveau de la mer, ISA = 15 °C. À 3000 m → 15 - (3 × 6,5) = <b>-4,5 °C</b>.<br><br>Ce gradient ne s'applique que dans la <b>troposphère</b> (0-11 km). Au-dessus (stratosphère), la température reste constante puis remonte."},
{q:"Composition de l'air : gaz principal :",o:["Azote (78 %)","Oxygène (78 %)","CO₂ (78 %)","Argon (78 %)"],c:0,e:"78 % azote (N₂), 21 % oxygène (O₂)."},
{q:"Le Cb (cumulonimbus) est dangereux car :",o:["Turbulences, givrage, grêle, foudre","Il réduit la vitesse de l'avion","Il bloque les radars","Il provoque du brouillard"],c:0,e:"LE danger météo. On le contourne TOUJOURS."},
{q:"Le préfixe 'cirro-' désigne les nuages :",o:["De haute altitude","De basse altitude","De moyenne altitude","À développement vertical"],c:0,e:"Cirro = haute altitude. Alto = moyenne. Strato/cumulo = basse."},
{q:"Un anticyclone (H) correspond à :",o:["Haute pression, beau temps","Basse pression, mauvais temps","Température élevée","Vent fort"],c:0,e:"H = haute pression = beau temps. L = dépression = mauvais temps."},
{q:"Le QNH permet d'afficher :",o:["L'altitude par rapport à la mer","La hauteur par rapport au terrain","Le niveau de vol standardisé","La température extérieure"],c:0,e:"<b>QNH</b> = le calage barométrique qui fait afficher l'<b>altitude</b> (hauteur au-dessus du niveau de la mer).<br><svg viewBox='0 0 280 120' style='width:100%;max-width:280px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:6px'><line x1='20' y1='100' x2='260' y2='100' stroke='#3b82f6' stroke-width='2'/><text x='265' y='103' fill='#93c5fd' font-size='7'>Mer</text><rect x='80' y='75' width='60' height='25' rx='2' fill='#475569'/><text x='110' y='90' text-anchor='middle' fill='#94a3b8' font-size='7'>Aérodrome</text><path d='M180,35 L190,30 L200,35 L195,35 L195,45 L185,45 L185,35 Z' fill='#f97316' transform='scale(0.8) translate(80,-10)'/><text x='230' y='40' fill='#fdba74' font-size='7'>Avion</text><line x1='110' y1='100' x2='110' y2='75' stroke='#a855f7' stroke-width='1.5' stroke-dasharray='3'/><text x='55' y='90' fill='#c4b5fd' font-size='7'>QFE</text><line x1='230' y1='100' x2='230' y2='35' stroke='#059669' stroke-width='1.5' stroke-dasharray='3'/><text x='242' y='70' fill='#6ee7b7' font-size='7'>QNH</text><line x1='30' y1='15' x2='260' y2='15' stroke='#94a3b8' stroke-width='1' stroke-dasharray='2'/><text x='50' y='12' fill='#94a3b8' font-size='7'>1013,25 hPa → FL</text><text x='80' y='113' text-anchor='middle' fill='#c4b5fd' font-size='7'>QFE = hauteur/terrain</text><text x='200' y='113' text-anchor='middle' fill='#6ee7b7' font-size='7'>QNH = altitude/mer</text></svg>"},
{q:"Un stratus c'est :",o:["Un nuage bas en couche, souvent bruine ou brouillard","Un nuage d'orage très dangereux","Un nuage de haute altitude en cristaux de glace","Un nuage en forme de tour"],c:0,e:"Le <b>stratus</b> = nuage <b>bas</b> (0-2 km), en <b>couche</b> plate et uniforme, gris. Il donne de la <b>bruine</b> et réduit la <b>visibilité</b>. Quand il touche le sol = <b>brouillard</b>. Air <b>stable</b> = nuages stratiformes (couches). Air <b>instable</b> = nuages cumuliformes (développement vertical)."},
{q:"Un front froid se caractérise par :",o:["Orages, averses intenses, passage rapide","Pluie fine continue et brouillard","Beau temps et ciel dégagé","Nuages hauts uniquement"],c:0,e:"Le <b>front froid</b> = l'air froid pousse <b>sous</b> l'air chaud. Pente raide → soulèvement <b>rapide</b> → <b>Cb</b> (cumulonimbus), orages, averses intenses. Le passage est <b>bref mais violent</b>. Après le front froid = la <b>traîne</b> (éclaircies + averses alternées)."},
{q:"La troposphère c'est :",o:["La couche basse de l'atmosphère où vole l'aviation","La couche la plus haute de l'atmosphère","La couche où se forme la couche d'ozone","L'espace au-delà de 100 km"],c:0,e:"La <b>troposphère</b> = la couche la plus basse de l'atmosphère, de <b>0 à ~11 km</b>. C'est là que se produisent tous les phénomènes <b>météorologiques</b> et que vole l'aviation.<br><svg viewBox='0 0 220 140' style='width:100%;max-width:220px;display:block;margin:.5rem auto;background:linear-gradient(to top,#1e3a5f,#0f172a);border-radius:8px;padding:6px'><rect x='20' y='95' width='180' height='35' rx='0' fill='#22543d' opacity='0.5'/><text x='110' y='118' text-anchor='middle' fill='#6ee7b7' font-size='9' font-weight='bold'>TROPOSPHÈRE</text><text x='110' y='128' text-anchor='middle' fill='#94a3b8' font-size='7'>0-11 km · météo · aviation</text><line x1='20' y1='95' x2='200' y2='95' stroke='#f97316' stroke-width='1.5' stroke-dasharray='4'/><text x='110' y='91' text-anchor='middle' fill='#fdba74' font-size='8'>Tropopause (~11 km, -56 °C)</text><rect x='20' y='55' width='180' height='38' rx='0' fill='#1e3a5f' opacity='0.3'/><text x='110' y='78' text-anchor='middle' fill='#93c5fd' font-size='9' font-weight='bold'>STRATOSPHÈRE</text><text x='110' y='88' text-anchor='middle' fill='#64748b' font-size='7'>11-50 km · ozone</text><rect x='20' y='30' width='180' height='23' rx='0' fill='#312e81' opacity='0.3'/><text x='110' y='45' text-anchor='middle' fill='#a5b4fc' font-size='8'>MÉSOSPHÈRE</text><text x='195' y='130' fill='#059669' font-size='7'>Sol</text><text x='195' y='98' fill='#f97316' font-size='7'>11 km</text><text x='195' y='58' fill='#64748b' font-size='7'>50 km</text></svg>"},
{q:"Le givrage en vol c'est :",o:["De la glace qui se forme sur l'avion en vol","Le refroidissement du carburant au sol","La condensation sur les vitres du cockpit","Le verglas sur la piste"],c:0,e:"Le <b>givrage</b> (icing) = de la <b>glace</b> qui se forme sur les surfaces de l'avion (ailes, empennage, entrées d'air) en vol dans des <b>nuages à température négative</b>. Danger : la glace modifie le profil de l'aile → perte de <b>portance</b>, augmentation de la <b>traînée</b>, blocage des <b>gouvernes</b>."},
],
L2:[
{q:"Tropopause à la latitude de Paris :",o:["~11 km / -56 °C","~7 km / -45 °C","~17 km / -80 °C","~15 km / -60 °C"],c:0,e:"11 km à Paris, 7 km aux pôles, 17 km à l'équateur."},
{q:"Brouillard observé au lever du jour, ciel clair, pas de vent :",o:["Brouillard de rayonnement","Brouillard d'advection","Brouillard d'évaporation","Brouillard d'inversion"],c:0,e:"Nuit claire + vent nul + sol humide = refroidissement par rayonnement."},
{q:"L'occlusion est une zone :",o:["Très nuageuse et pluvieuse avec plafond bas","Toujours sans nuage","De très haute pression","De vents calmes"],c:0,e:"Front froid rattrape le front chaud → zone de convergence = nuages + pluie."},
{q:"Les vents tournent en sens horaire autour :",o:["D'un anticyclone (hémisphère nord)","D'une dépression (hémisphère nord)","D'un anticyclone (hémisphère sud)","De l'équateur"],c:0,e:"Hémisphère nord : horaire autour H, anti-horaire autour L."},
{q:"Le jet-stream désigne :",o:["Des courants puissants à haute altitude","Un type de moteur","Une tornade","Un nuage d'altitude"],c:0,e:"Courants d'altitude utilisés par les avions de ligne pour économiser du carburant."},
{q:"T = +12 °C, point de rosée = +4 °C. L'air sera saturé à :",o:["+4 °C","+12 °C","+8 °C","0 °C"],c:0,e:"Point de rosée = température à laquelle l'air atteint 100 % humidité."},
{q:"En air froid, l'altitude réelle est :",o:["Inférieure à l'altitude indiquée","Supérieure","Identique","Variable"],c:0,e:"Air froid = air plus dense = pression chute plus vite = altimètre 'surestime'. Danger relief."},
],
L3:[
{q:"Isotherme 0 °C au FL80. Température au FL60 (gradient standard) :",o:["+4 °C","+2 °C","-4 °C","-2 °C"],c:0,e:"FL80→FL60 = descente de 2000 ft. +2 °C/1000 ft = +4 °C. Donc 0+4 = +4 °C."},
{q:"Masse volumique de l'air en ISA :",o:["1,225 kg/m³","1225 kg/m³","1,225 g/m³","122,5 g/m³"],c:0,e:"1,225 kg/m³. Attention aux unités (piège classique)."},
{q:"Cumulus = nuages recherchés pour :",o:["Le vol à voile","Le vol IFR","Le parachutisme","La photographie aérienne"],c:0,e:"Cumulus = ascendances thermiques exploitables par les planeurs."},
{q:"Le givrage cellule se produit lors :",o:["Du vol dans des couches saturées à température négative","Du refroidissement des structures au sol","Du dépôt de glace sous averses de grêle","De la traversée d'un anticyclone"],c:0,e:"Nuages + T < 0 = eau surfondue gèle au contact de la cellule."},
]},

// ==================== BIA AÉRONEFS ====================
bia_aeronefs:{title:'Étude des aéronefs',mod:'bia',
lessons:[
{t:"Structure de l'avion",en:"Aircraft structure",b:"<span class='key'>Fuselage</span> : structure semi-monocoque = <span class='key'>cadres</span> <span class='en'>(frames)</span> + <span class='key'>lisses/raidisseurs</span> <span class='en'>(stringers)</span> + <span class='key'>revêtement</span> <span class='en'>(skin)</span> qui participe aux efforts.<br><br><span class='key'>Aile</span> : <span class='key'>longerons</span> <span class='en'>(spars)</span> = résistance en flexion. <span class='key'>Nervures</span> <span class='en'>(ribs)</span> = donnent le profil. Revêtement = efforts de torsion.<br><br><span class='key'>Empennage</span> <span class='en'>(Tail)</span> : horizontal (profondeur) + vertical (direction).<br><span class='key'>Train d'atterrissage</span> <span class='en'>(Landing gear)</span> : tricycle (roulette de nez) ou classique (roulette de queue)."},
{t:"Les moteurs d'avion",en:"Aircraft engines explained",b:"<b>Principe de base de tout réacteur :</b> aspirer → comprimer → brûler → éjecter. L'air entre par l'avant, on le comprime, on ajoute du kérosène et on l'allume, les gaz chauds sortent par l'arrière → poussée.<br><br><b>Les 4 sections :</b><br>1. <span class='key'>Fan / Entrée d'air</span> <span class='en'>(Air intake)</span> : le gros ventilateur visible à l'avant<br>2. <span class='key'>Compresseur</span> <span class='en'>(Compressor)</span> : étages de petites ailettes qui compriment l'air (pression ×30 à ×50)<br>3. <span class='key'>Chambre de combustion</span> <span class='en'>(Combustion chamber)</span> : kérosène injecté + allumé → 1500 °C<br>4. <span class='key'>Turbine</span> <span class='en'>(Turbine)</span> : les gaz chauds font tourner des roues à aubes, qui entraînent le compresseur et le fan via un arbre<br>+ <span class='key'>Tuyère</span> <span class='en'>(Nozzle)</span> : les gaz sortent à grande vitesse → poussée<br><br><b>Les types de moteurs :</b><br><br><span class='key'>Turboréacteur simple flux</span> <span class='en'>(Turbojet)</span> : tout l'air passe dans le compresseur et la chambre. Très rapide mais bruyant et gourmand. Utilisé sur les anciens avions et les chasseurs.<br><br><span class='key'>Turboréacteur double flux</span> <span class='en'>(Turbofan)</span> : un gros <span class='key'>fan</span> devant envoie la majorité de l'air AUTOUR du moteur (flux froid) sans le brûler. Seule une partie passe dans le cœur (flux chaud). <span class='key'>Taux de dilution</span> <span class='en'>(Bypass ratio)</span> = flux froid / flux chaud. LEAP ≈ 11:1. Plus c'est haut → moins bruyant, moins gourmand. C'est le standard des avions de ligne.<br><br><span class='key'>Turbopropulseur</span> <span class='en'>(Turboprop)</span> : la turbine entraîne une <span class='key'>hélice</span> via un réducteur. Plus économe à basse vitesse. Ex : ATR 72, A400M.<br><br><span class='key'>Turbomoteur</span> <span class='en'>(Turboshaft)</span> : comme un turboprop, mais la turbine entraîne un <span class='key'>rotor d'hélicoptère</span> au lieu d'une hélice. Ex : Safran Helicopter Engines.<br><br><span class='key'>Postcombustion</span> <span class='en'>(Afterburner)</span> : on injecte du carburant directement <b>après la turbine</b>, dans la tuyère. Énorme boost de poussée (+50 %) mais consomme 2 à 3× plus. Utilisé uniquement sur les chasseurs militaires (M88 du Rafale, F135 du F-35) pour le décollage court et le combat.<br><br><span class='key'>Open-fan / RISE</span> : le futur. Des hélices visibles sans nacelle, comme un turboprop mais à grande vitesse. -20 % vs LEAP. Horizon 2035+."},
{t:"Instruments de bord",en:"Flight instruments",b:"<span class='key'>Anémomètre</span> <span class='en'>(Airspeed indicator)</span> : mesure la vitesse (IAS). Utilise la pression dynamique = P totale - P statique.<br><span class='key'>Altimètre</span> <span class='en'>(Altimeter)</span> : mesure l'altitude. Utilise la <span class='key'>pression statique</span> uniquement.<br><span class='key'>Variomètre</span> <span class='en'>(VSI, Vertical Speed Indicator)</span> : vitesse verticale (ft/min). Défaut : ne donne PAS d'information instantanée, il faut une phase stabilisée.<br><span class='key'>Horizon artificiel</span> <span class='en'>(Attitude indicator)</span> : attitude de l'avion (tangage + roulis).<br><span class='key'>Conservateur de cap</span> <span class='en'>(Heading indicator)</span> : cap magnétique.<br><span class='key'>Bille-aiguille</span> <span class='en'>(Turn coordinator)</span> : coordination du virage."},
{t:"Autres aéronefs",en:"Other aircraft types",b:"<span class='key'>Hélicoptère</span> <span class='en'>(Helicopter)</span> : rotor principal = sustentation + propulsion. <span class='key'>Rotor anticouple</span> <span class='en'>(Tail rotor)</span> = empêche la rotation du fuselage autour de l'axe de lacet (couple de réaction).<br><br><span class='key'>Planeur</span> <span class='en'>(Glider)</span> : pas de moteur. Vol grâce aux ascendances thermiques (sous les cumulus) et dynamiques (vent de pente).<br><br><span class='key'>ULM</span> <span class='en'>(Microlight)</span> : avion ultra-léger motorisé. Masse max 450-600 kg.<br><br>L'<span class='key'>hydraulique</span> <span class='en'>(Hydraulic systems)</span> dans les commandes de vol sert à diminuer les efforts du pilote."},
],
L1:[
{q:"Un altimètre utilise la pression :",o:["Statique uniquement","Dynamique uniquement","Totale (statique + dynamique)","Différentielle (entre 2 prises)"],c:0,e:"L'<b>altimètre</b> mesure la <b>pression statique</b> de l'air ambiant. Plus on monte, plus la pression baisse → l'altimètre en déduit l'altitude. L'<b>anémomètre</b> utilise la différence entre pression totale et statique."},
{q:"Le profil de l'aile est donné par :",o:["Les nervures (ribs)","Les longerons (spars)","Les lisses (stringers)","Le revêtement (skin)"],c:0,e:"Les <b>nervures</b> donnent la <b>forme du profil</b> de l'aile (la section en forme de goutte d'eau). Les <b>longerons</b> résistent à la <b>flexion</b>. Le <b>revêtement</b> reprend la <b>torsion</b>. Les <b>lisses</b> raidissent le revêtement."},
{q:"Le rotor anticouple de l'hélicoptère sert à :",o:["Empêcher la rotation du fuselage","Augmenter la vitesse de croisière","Permettre le décollage vertical","Améliorer la portance du rotor"],c:0,e:"Sans rotor anticouple, le <b>couple de réaction</b> du rotor principal ferait tourner le fuselage dans le sens inverse. Le rotor de queue compense ce couple. Alternative : le fenestron (rotor caréné dans la queue)."},
{q:"Le taux de dilution d'un turbofan est :",o:["Le rapport flux froid / flux chaud","Le diamètre du fan en mètres","La puissance totale en daN","Le rapport de compression global"],c:0,e:"Le <b>taux de dilution</b> (bypass ratio) = débit du flux froid (extérieur, qui contourne le cœur) / débit du flux chaud (qui passe par le cœur). LEAP = ~11 (11 kg d'air froid pour 1 kg d'air chaud). Plus c'est élevé → moins bruyant, moins gourmand."},
{q:"L'hydraulique dans les commandes de vol sert à :",o:["Diminuer les efforts du pilote","Gagner du poids sur l'avion","Augmenter la vitesse maximale","Refroidir les gouvernes en vol"],c:0,e:"L'<b>hydraulique</b> fournit une assistance pour bouger les <b>gouvernes</b>. Sur un gros avion, les forces aérodynamiques sur les gouvernes sont trop importantes pour être déplacées à la seule force des bras. Les commandes de vol électriques (fly-by-wire) envoient un signal électrique aux vérins hydrauliques."},
{q:"Un anémomètre mesure :",o:["La vitesse (pression dynamique)","L'altitude (pression statique)","La vitesse verticale (variation)","Le cap magnétique"],c:0,e:"L'<b>anémomètre</b> (airspeed indicator) mesure la <b>vitesse</b> de l'avion par rapport à l'air. Il utilise la <b>pression dynamique</b> = pression totale (tube de Pitot) - pression statique. Il donne la vitesse <b>indiquée</b> (IAS), pas la vitesse sol."},
