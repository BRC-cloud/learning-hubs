// ==================== QUALITÉ - NORMES & CERTIFICATIONS ====================
qual_normes:{title:'Normes & Certifications Aéro',mod:'qualite',
lessons:[
{t:"EN 9100 : le référentiel qualité aéro",en:"EN 9100: aerospace quality standard",b:"<b>D'abord, c'est quoi l'ISO 9001 ?</b><br><span class='key'>ISO</span> = Organisation Internationale de Normalisation. L'<span class='key'>ISO 9001</span> est LA norme mondiale du <b>management de la qualité</b>. Elle s'applique à toutes les industries (auto, pharma, agroalimentaire...). Elle dit : 'votre entreprise doit avoir un système organisé pour garantir la qualité de ses produits'. C'est le socle commun.<br><br><b>Et l'EN 9100 alors ?</b><br><span class='key'>EN</span> = Norme Européenne (European Norm). <span class='key'>AS</span> = Aerospace Standard (norme américaine SAE). EN 9100 (Europe) et AS 9100 (USA) = la <b>même norme</b>, publiée des deux côtés de l'Atlantique. C'est l'<b>ISO 9001 + des exigences supplémentaires</b> spécifiques à l'aéronautique, spatial et défense.<br><br><b>Ce qu'elle ajoute par rapport à l'ISO 9001 :</b><br>- <span class='key'>Gestion de configuration</span> : traçabilité complète de chaque pièce et de ses modifications<br>- <span class='key'>Maîtrise des procédés spéciaux</span> : TdS, soudage, CND, traitements thermiques doivent être qualifiés<br>- <span class='key'>Gestion des risques</span> : obligation d'identifier et traiter les risques produit et processus<br>- <span class='key'>Prévention des pièces contrefaites</span> : vérification de l'authenticité des matériaux et composants<br>- <span class='key'>Livraison à l'heure (OTD)</span> <span class='en'>(On-Time Delivery)</span> : indicateur suivi et exigé par les donneurs d'ordre<br><br><b>Les variantes :</b><br>- <span class='key'>EN/AS 9100</span> : pour les entreprises qui <b>conçoivent et fabriquent</b> (Safran, Airbus)<br>- <span class='key'>EN/AS 9110</span> : pour les organismes de <b>maintenance</b> (MRO)<br>- <span class='key'>EN/AS 9120</span> : pour les <b>distributeurs</b> de pièces aéro<br><br><div class='remember'>En entretien : 'L'EN 9100 c'est l'ISO 9001 adaptée à l'aéro. Elle ajoute la <b>traçabilité pièce</b>, les <b>procédés spéciaux</b>, la <b>gestion de configuration</b> et la <b>prévention des contrefaçons</b>. C'est le ticket d'entrée pour tout fournisseur aéro.'</div>"},
{t:"Nadcap : l'accréditation procédés spéciaux",en:"Nadcap: special processes accreditation",b:"<b>C'est quoi un procédé spécial ?</b><br>Un <span class='key'>procédé spécial</span> <span class='en'>(Special Process)</span> = un procédé dont le résultat <b>ne peut pas être vérifié par simple inspection visuelle</b>. On ne voit pas si l'anodisation fait 15 µm en regardant la pièce, on ne voit pas si la trempe a donné la bonne dureté. Donc il faut <b>prouver</b> que le procédé est maîtrisé AVANT de produire.<br><br><b>C'est quoi Nadcap ?</b><br><span class='key'>Nadcap</span> = Programme National d'Accréditation des Sous-traitants Aéronautiques et Défense <span class='en'>(National Aerospace and Defense Contractors Accreditation Program)</span>. C'est un programme d'<b>accréditation</b> géré par le <span class='key'>PRI</span> (Performance Review Institute, Institut d'Évaluation de la Performance).<br><br><b>Pourquoi Nadcap ?</b><br>Les procédés spéciaux ont un impact direct sur la <b>sécurité des vols</b>. Un mauvais traitement de surface peut provoquer une corrosion → fissure → rupture. Nadcap vérifie que le fournisseur maîtrise vraiment ses procédés.<br><br><b>Catégories de procédés couverts :</b><br>- <span class='key'>Chemical Processing</span> (Traitements chimiques) : anodisation, conversion chimique, décapage, passivation, électrodéposition<br>- <span class='key'>Coatings</span> (Revêtements) : peinture, projection thermique, dépôt sous vide<br>- <span class='key'>NDT / CND</span> (Contrôle Non Destructif) : ultrasons, ressuage, magnétoscopie, radiographie<br>- <span class='key'>Heat Treating</span> (Traitements Thermiques) : trempe, revenu, mise en solution<br>- <span class='key'>Welding</span> (Soudage) : TIG, laser, friction<br>- <span class='key'>Shot Peening</span> (Grenaillage de précontrainte) : renforcement fatigue<br><br><b>Déroulement :</b> audit sur site (2-5 jours) par un auditeur PRI → rapport de conformité → accréditation (18 ou 24 mois) → re-audit périodique.<br><br><div class='remember'>Nadcap est <b>exigé</b> par les grands donneurs d'ordre (Airbus, Safran, Boeing). Un sous-traitant TdS sans Nadcap ne peut pas travailler pour l'aéro. C'est le <b>ticket d'entrée</b> dans la supply chain.</div>"},
{t:"PART 21 / EASA : la certification aéro",en:"PART 21 / EASA certification",b:"L'<span class='key'>EASA</span> (European Union Aviation Safety Agency) est l'autorité de certification en Europe. Son équivalent US est la <span class='key'>FAA</span>.<br><br><b>PART 21 :</b> le règlement qui définit comment un produit aéro est certifié.<br>- <span class='key'>DOA</span> (Design Organisation Approval) : autorisation de concevoir (bureau d'études)<br>- <span class='key'>POA</span> (Production Organisation Approval) : autorisation de produire en série<br>- <span class='key'>Type Certificate (TC)</span> : le certificat qui dit 'cet avion est apte au vol'<br><br><b>Concrètement pour un ingénieur matériaux :</b><br>- Chaque matériau utilisé doit être dans la <span class='key'>liste des matériaux qualifiés</span><br>- Tout changement de fournisseur matière = nouvelle qualification<br>- Les procédés spéciaux doivent être qualifiés et figurer dans les spécifications du TC<br><br><div class='remember'>En entretien : 'je comprends que chaque modification matériau ou procédé passe par une boucle de qualification encadrée par la certification EASA, et que ça impose une rigueur documentaire importante.'</div>"},
],
L1:[
{q:"L'EN 9100 est :",o:["Le référentiel qualité spécifique aéronautique","Une norme de dimensionnement mécanique","Un standard de peinture aéro","Une norme environnementale"],c:0,e:"L'<b>EN 9100</b> = le système de management qualité (SMQ) pour l'aéronautique, spatial et défense. C'est l'<b>ISO 9001 + exigences aéro</b> supplémentaires (traçabilité, procédés spéciaux, gestion de configuration)."},
{q:"Nadcap accrédite :",o:["Les procédés spéciaux (TdS, CND, soudage, TT)","Les compagnies aériennes","Les pilotes de ligne","Les écoles d'ingénieurs"],c:0,e:"<b>Nadcap</b> = accréditation des <b>procédés spéciaux</b> en aéro : traitements de surface, contrôle non destructif, soudage, traitements thermiques. Géré par le PRI. Exigé par Airbus, Safran, Boeing."},
{q:"L'EASA c'est :",o:["L'autorité de certification aviation en Europe","Un fabricant de moteurs","Un programme de maintenance","Une compagnie aérienne"],c:0,e:"<b>EASA</b> (European Union Aviation Safety Agency) = l'autorité qui certifie que les avions, moteurs et pièces sont aptes au vol en Europe. Équivalent US : <b>FAA</b>."},
{q:"Un procédé spécial en aéro c'est :",o:["Un procédé dont le résultat ne peut pas être vérifié à 100 % sur la pièce finie","Tout procédé qui utilise de l'électricité","Un procédé réservé aux militaires","Un procédé qui ne nécessite pas de qualification"],c:0,e:"Un <b>procédé spécial</b> = un procédé dont la conformité ne peut pas être entièrement vérifiée par inspection ou essai sur le produit fini. Exemples : TdS (on ne peut pas vérifier l'adhérence sans détruire la pièce), soudage, TT, CND. D'où l'obligation de <b>qualifier le procédé</b> en amont."},
{q:"La différence principale entre EN 9100 et ISO 9001 :",o:["La traçabilité pièce et les procédés spéciaux","Le nombre de pages du document","La langue de rédaction","Le prix de la certification"],c:0,e:"L'EN 9100 reprend l'ISO 9001 et ajoute : <b>traçabilité pièce</b> (chaque composant traçable), <b>procédés spéciaux</b> qualifiés, <b>gestion de configuration</b>, <b>prévention des contrefaçons</b>, et suivi de la <b>livraison à l'heure</b> (OTD)."},
{q:"POA signifie :",o:["Production Organisation Approval","Pilot Operation Authorization","Process Optimization Analysis","Product Origin Assessment"],c:0,e:"<b>POA</b> = Production Organisation Approval. C'est l'autorisation EASA de <b>produire en série</b> des pièces ou équipements aéronautiques. Sans POA, impossible de livrer des pièces certifiées."},
{q:"La FAA c'est :",o:["L'autorité de certification aviation aux États-Unis","L'agence spatiale européenne","Un fabricant de composites","Un syndicat de pilotes"],c:0,e:"<b>FAA</b> (Federal Aviation Administration) = l'équivalent américain de l'EASA. Elle certifie les avions et les pièces pour le marché US. Les certifications EASA et FAA sont souvent mutuellement reconnues (Bilateral Aviation Safety Agreement)."},
{q:"L'EN 9110 concerne :",o:["Les organismes de maintenance aéronautique","Les fabricants de moteurs uniquement","La formation des pilotes","Le design des cabines passagers"],c:0,e:"L'<b>EN 9110</b> = SMQ pour les organismes de <b>maintenance, réparation et révision</b> (MRO). L'EN 9100 concerne la production/conception, l'EN 9110 la maintenance, l'EN 9120 les distributeurs de pièces aéro."},
{q:"Un procédé spécial doit être :",o:["Qualifié avant utilisation en production","Utilisé sans vérification préalable","Réservé aux prototypes uniquement","Approuvé uniquement par le client final"],c:0,e:"Un procédé spécial (TdS, soudage, TT, CND) doit être <b>qualifié</b> : on prouve qu'il produit des résultats conformes et reproductibles. La qualification inclut des essais, la formation des opérateurs, et la validation des paramètres. Ensuite, Nadcap vérifie que tout reste maîtrisé."},
],
L2:[
{q:"Un audit Nadcap dure en moyenne :",o:["2 à 5 jours sur site","1 heure par téléphone","6 mois en ligne","15 minutes de visite"],c:0,e:"Un audit Nadcap = <b>2 à 5 jours</b> sur site avec un auditeur PRI spécialisé. Il vérifie les procédures, les enregistrements, les équipements, les compétences des opérateurs et réalise des audits de production en temps réel."},
{q:"La gestion de configuration en EN 9100 sert à :",o:["Tracer chaque modification produit et garantir la cohérence","Configurer les ordinateurs de l'usine","Gérer les plannings de production","Optimiser la chaîne d'approvisionnement"],c:0,e:"La <b>gestion de configuration</b> = maîtriser les modifications : chaque changement sur une pièce (matériau, cote, procédé) est documenté, approuvé et tracé. On sait exactement quelle version de quelle pièce est montée sur quel avion."},
{q:"Un fournisseur TdS sans Nadcap peut-il travailler pour Airbus ?",o:["Non, Nadcap est exigé par les grands donneurs d'ordre","Oui, c'est facultatif","Seulement pour les pièces non critiques","Seulement avec une dérogation permanente"],c:0,e:"<b>Non.</b> Les grands donneurs d'ordre (Airbus, Boeing, Safran) <b>exigent Nadcap</b> pour les procédés spéciaux. Sans accréditation, impossible de travailler sur des pièces de vol. C'est un ticket d'entrée dans la supply chain aéro."},
{q:"Le DOA permet à une entreprise de :",o:["Concevoir et certifier des modifications aéro","Produire en série sans contrôle","Piloter des avions commerciaux","Vendre des billets d'avion"],c:0,e:"<b>DOA</b> (Design Organisation Approval) = autorisation de <b>concevoir</b> des produits ou modifications aéro. L'entreprise peut émettre des données de conception approuvées. C'est le bureau d'études certifié."},
],
L3:[
{q:"En EN 9100, la prévention des pièces contrefaites impose de :",o:["Vérifier l'authenticité des matériaux et la traçabilité fournisseur","Peindre toutes les pièces en rouge","Doubler le prix des matériaux","Importer uniquement de pays européens"],c:0,e:"L'EN 9100 exige de <b>vérifier l'authenticité</b> des matériaux : certificats matière (EN 10204 3.1), traçabilité coulée, fournisseurs approuvés, inspection à réception. Les pièces contrefaites sont un vrai danger en aéro (matériau non conforme → rupture en service)."},
{q:"L'accréditation Nadcap Chemical Processing couvre :",o:["Anodisation, conversion chimique, décapage, passivation, électrodéposition","Uniquement la peinture","Uniquement le soudage","Les essais mécaniques"],c:0,e:"Nadcap <b>Chemical Processing</b> = tous les procédés chimiques et électrochimiques de surface : anodisation, conversion chimique, décapage, passivation, électrodéposition (nickelage, chromage, Zn-Ni). C'est le scope le plus courant pour un ingénieur TdS."},
{q:"Un certificat matière EN 10204 type 3.1 signifie :",o:["Certificat émis par le producteur avec résultats d'essais sur la coulée","Simple déclaration de conformité sans essais","Certificat émis par un organisme tiers","Aucune traçabilité"],c:0,e:"<b>3.1</b> = certificat de réception émis par le <b>producteur</b> du matériau, avec les <b>résultats d'essais</b> réalisés sur la coulée ou le lot. C'est le standard en aéro. Le 3.2 ajoute la validation par un organisme indépendant."},
]},

// ==================== QUALITÉ - MÉTHODOLOGIE (FAI, Cpk, SPC) ====================
qual_methodo:{title:'FAI, Cpk & Maîtrise Statistique',mod:'qualite',
lessons:[
{t:"FAI : First Article Inspection",en:"First Article Inspection",b:"La <span class='key'>FAI</span> (First Article Inspection) = l'<b>inspection complète</b> de la première pièce produite avec le procédé série.<br><br><b>Objectif :</b> prouver que le procédé de fabrication est capable de produire une pièce conforme au plan et aux spécifications.<br><br><b>Contenu d'un dossier FAI (AS 9102) :</b><br>- <span class='key'>Formulaire 1</span> : identification de la pièce (référence, révision, matériau, fournisseur)<br>- <span class='key'>Formulaire 2</span> : traçabilité matière + procédés spéciaux (certificats matière 3.1, rapports Nadcap)<br>- <span class='key'>Formulaire 3</span> : résultats de mesure de TOUTES les cotes du plan (valeur mesurée vs tolérance)<br><br><b>Quand refaire une FAI ?</b><br>- Changement de fournisseur matière<br>- Modification du plan ou de la spécification<br>- Changement de procédé ou d'outillage majeur<br>- Arrêt de production > 2 ans (selon le client)<br><br><div class='remember'>La FAI est une <b>photographie qualité</b> du procédé à un instant T. Elle prouve que tu sais fabriquer la pièce conforme. C'est souvent le premier livrable demandé quand tu qualifies un nouveau procédé TdS.</div>"},
{t:"Cpk et capabilité procédé",en:"Cpk and process capability",b:"Le <span class='key'>Cpk</span> mesure si ton procédé est <b>capable</b> de produire des pièces dans les tolérances.<br><br><b>Formule simplifiée :</b><br><div class='formula'>Cpk = min( (LSS - moyenne) / 3σ , (moyenne - LSI) / 3σ )</div><br>LSS = limite supérieure de spécification, LSI = limite inférieure, σ = écart-type du procédé.<br><br><b>Interprétation :</b><br>- <span class='key'>Cpk ≥ 1,33</span> : procédé capable (standard aéro)<br>- <span class='key'>Cpk ≥ 1,67</span> : procédé très capable (exigence pour procédés critiques)<br>- Cpk < 1 : procédé non capable → trop de pièces hors tolérance<br><br><b>Exemple concret TdS :</b><br>Spécification épaisseur anodisation : 15 ± 5 µm (LSI = 10, LSS = 20 µm).<br>Si ta moyenne = 16 µm et σ = 1,2 µm → Cpk = min((20-16)/3,6 , (16-10)/3,6) = min(1,11 , 1,67) = <b>1,11</b> → pas assez capable, il faut recentrer le procédé.<br><br><div class='remember'>En entretien : 'je sais calculer un Cpk et interpréter la capabilité d'un procédé. Un Cpk de 1,33 minimum est requis en aéro.'</div>"},
{t:"SPC : cartes de contrôle",en:"SPC: control charts",b:"Le <span class='key'>SPC</span> (Statistical Process Control) = suivre un procédé en temps réel pour détecter les dérives <b>avant</b> de produire des pièces non conformes.<br><br><b>Carte de contrôle X-bar / R :</b><br>- On mesure régulièrement un échantillon (ex : 5 pièces toutes les 2 heures)<br>- On trace la <span class='key'>moyenne</span> (X-bar) et l'<span class='key'>étendue</span> (R) sur un graphique<br>- <span class='key'>Limites de contrôle</span> (LCS, LCI) = moyenne ± 3σ. Calculées à partir des données, PAS les tolérances du plan.<br><br><b>Règles d'alerte (Nelson) :</b><br>- 1 point hors limites → alarme<br>- 7 points consécutifs du même côté de la moyenne → tendance (dérive)<br>- 6 points consécutifs croissants ou décroissants → trend<br><br><b>Exemple TdS :</b><br>Tu suis l'épaisseur de dépôt nickel toutes les 50 pièces. Si la moyenne dérive vers le haut → le bain se concentre, il faut ajuster.<br><br><div class='remember'>Le SPC ne remplace pas le contrôle final. Il <b>anticipe</b> les problèmes. Un procédé 'sous contrôle' est un procédé dont les variations sont <b>aléatoires et prévisibles</b>.</div>"},
],
L1:[
{q:"La FAI (First Article Inspection) sert à :",o:["Prouver que le procédé série produit une pièce conforme","Tester la résistance d'un avion complet","Vérifier le CV d'un opérateur","Mesurer la température d'un four"],c:0,e:"La <b>FAI</b> = inspection complète de la <b>première pièce série</b>. Elle prouve que le procédé est capable de produire une pièce conforme au plan. Dossier selon <b>AS 9102</b> (3 formulaires)."},
{q:"Un Cpk de 1,33 signifie :",o:["Le procédé est capable (standard aéro)","Le procédé est hors contrôle","La pièce est non conforme","Il faut arrêter la production"],c:0,e:"<b>Cpk ≥ 1,33</b> = le procédé est <b>capable</b> : il produit des pièces dans les tolérances avec une marge de sécurité suffisante. C'est le seuil standard en aéronautique."},
{q:"Le SPC sert à :",o:["Détecter les dérives du procédé avant de produire des non-conformes","Calculer le prix des pièces","Planifier les congés des opérateurs","Mesurer la dureté des matériaux"],c:0,e:"<b>SPC</b> (Statistical Process Control) = suivre le procédé en temps réel avec des <b>cartes de contrôle</b>. Si la carte montre une dérive, on corrige AVANT de produire des pièces hors tolérance."},
{q:"Le dossier FAI selon AS 9102 contient :",o:["3 formulaires : identification, traçabilité, mesures","Un seul tableau de mesures","Uniquement le plan de la pièce","Le CV de l'opérateur"],c:0,e:"AS 9102 = <b>3 formulaires</b>. F1 : identification pièce. F2 : traçabilité matière + procédés spéciaux. F3 : <b>toutes les cotes</b> du plan mesurées (valeur mesurée vs tolérance)."},
{q:"Les limites de contrôle SPC sont calculées à partir de :",o:["Les données du procédé (moyenne ± 3σ)","Les tolérances du plan","Le prix de vente de la pièce","La température ambiante"],c:0,e:"Les <b>limites de contrôle</b> (LCS/LCI) = moyenne ± 3σ, calculées à partir des <b>données réelles du procédé</b>. Ce ne sont PAS les tolérances du plan. Un point hors limites de contrôle signale une cause spéciale (dérive, incident)."},
{q:"Quand faut-il refaire une FAI ?",o:["Changement de procédé, fournisseur matière ou plan","Chaque lundi matin","Uniquement à la création de l'entreprise","Jamais, une FAI est valable à vie"],c:0,e:"On refait une FAI si : changement de <b>fournisseur matière</b>, modification du <b>plan ou spécification</b>, changement de <b>procédé ou outillage</b> majeur, ou arrêt de production prolongé (> 2 ans)."},
{q:"L'écart-type (σ) mesure :",o:["La dispersion des valeurs autour de la moyenne","La valeur maximale mesurée","Le nombre de pièces produites","La température du four"],c:0,e:"L'<b>écart-type</b> (σ, sigma) = mesure de la <b>dispersion</b> : plus σ est petit, plus les valeurs sont regroupées autour de la moyenne. En SPC et Cpk, σ est le paramètre clé : un procédé avec un petit σ est un procédé <b>précis</b>."},
{q:"Un plan de contrôle définit :",o:["Quoi contrôler, comment, à quelle fréquence et par qui","Le prix de vente des pièces","Le planning de congés","Les fournisseurs de matière première"],c:0,e:"Le <b>plan de contrôle</b> (control plan) = document qui liste pour chaque caractéristique : <b>quoi</b> mesurer, avec <b>quel instrument</b>, à <b>quelle fréquence</b>, <b>qui</b> le fait, et <b>quoi faire</b> si la mesure est hors tolérance. C'est le lien entre l'AMDEC et le contrôle quotidien."},
{q:"La carte de contrôle X-bar suit :",o:["La moyenne des échantillons dans le temps","Le prix de revient","La satisfaction client","La température ambiante"],c:0,e:"La carte <b>X-bar</b> trace la <b>moyenne</b> de petits échantillons (ex : 5 pièces) au fil du temps. Si la moyenne dérive, elle sort des limites de contrôle → alarme. Elle est toujours couplée avec une carte <b>R</b> (étendue) qui suit la dispersion."},
],
L2:[
{q:"Un Cpk de 0,8 signifie :",o:["Le procédé n'est pas capable, trop de pièces hors tolérance","Le procédé est excellent","La pièce est parfaite","Il faut augmenter les tolérances"],c:0,e:"<b>Cpk < 1</b> = procédé <b>non capable</b>. La dispersion du procédé est trop grande par rapport aux tolérances → un pourcentage significatif de pièces sera hors spécification. Il faut améliorer le procédé (réduire σ) ou recentrer la moyenne."},
{q:"La différence entre Cp et Cpk :",o:["Le Cp mesure la dispersion, le Cpk ajoute le centrage","Cp et Cpk sont identiques","Le Cp est toujours plus petit que le Cpk","Le Cpk ne s'applique qu'aux composites"],c:0,e:"<b>Cp</b> = (LSS-LSI)/6σ → mesure la <b>dispersion</b> seule (le procédé est-il assez précis ?). <b>Cpk</b> prend en compte le <b>centrage</b> (la moyenne est-elle bien centrée ?). Cpk ≤ Cp toujours. Si Cpk << Cp → le procédé est précis mais décentré."},
{q:"7 points consécutifs au-dessus de la moyenne sur une carte SPC signifient :",o:["Une dérive du procédé (cause spéciale)","Le procédé fonctionne normalement","Il faut changer d'opérateur","La carte est mal calibrée"],c:0,e:"<b>7 points du même côté</b> = règle de Nelson → <b>dérive</b>. Le procédé a changé (usure outil, bain qui se concentre, température qui dérive). Il faut investiguer la <b>cause spéciale</b> et corriger avant de continuer à produire."},
{q:"Pour un procédé critique en aéro, le Cpk exigé est souvent :",o:["≥ 1,67","≥ 0,5","≥ 1,00","= 0"],c:0,e:"Pour les <b>procédés critiques</b> (caractéristiques clés, safety items), les donneurs d'ordre exigent souvent <b>Cpk ≥ 1,67</b> (voire 2,0). C'est plus exigeant que le 1,33 standard car une défaillance sur ces caractéristiques peut avoir un impact sur la sécurité du vol."},
],
L3:[
{q:"Tu mesures 30 épaisseurs de dépôt, moyenne 17 µm, σ = 1,5 µm, tolérance 10-25 µm. Le Cpk vaut :",o:["Environ 1,56 (capable)","Environ 0,5 (non capable)","Environ 3,0 (excellent)","Impossible à calculer"],c:0,e:"Cpk = min((25-17)/(3×1,5) , (17-10)/(3×1,5)) = min(8/4,5 , 7/4,5) = min(1,78 , <b>1,56</b>) = <b>1,56</b>. Supérieur à 1,33 → procédé <b>capable</b>. Mais attention, Cpk = 1,56 < 1,67 → si c'est un procédé critique, il faut encore améliorer."},
{q:"La différence entre cause commune et cause spéciale en SPC :",o:["Commune = variation normale du procédé, spéciale = événement anormal à corriger","Les deux sont identiques","Commune = grave, spéciale = bénigne","Commune = extérieure, spéciale = intérieure"],c:0,e:"<b>Cause commune</b> = variation <b>inhérente</b> au procédé (légères fluctuations normales). Le procédé est 'sous contrôle'. <b>Cause spéciale</b> = événement <b>anormal</b> (usure outil, erreur opérateur, lot matière différent). Il faut identifier et éliminer les causes spéciales."},
{q:"Le formulaire 2 de la FAI (AS 9102) contient :",o:["La traçabilité matière et les procédés spéciaux utilisés","Uniquement les dimensions mesurées","Le planning de production","La liste des opérateurs formés"],c:0,e:"<b>Formulaire 2</b> = <b>traçabilité</b>. Il liste les <b>matériaux</b> (certificats 3.1, n° de coulée), les <b>procédés spéciaux</b> appliqués (TdS, TT, CND) avec les références de qualification (Nadcap, QPRI), et les sous-traitants impliqués."},
]},

// ==================== QUALITÉ - OUTILS (8D, AMDEC, ISHIKAWA) ====================
qual_outils:{title:'Outils Qualité (8D, AMDEC, Ishikawa)',mod:'qualite',
lessons:[
{t:"Le 8D : résolution de problème structurée",en:"8D problem solving methodology",b:"Le <span class='key'>8D</span> (8 Disciplines) = une méthode structurée pour résoudre un problème qualité, de la détection à la clôture.<br><br><b>Les 8 étapes :</b><br><span class='key'>D1</span> : Former l'équipe (pluridisciplinaire : production, qualité, méthodes, matériaux)<br><span class='key'>D2</span> : Décrire le problème (quoi, où, quand, combien, qui est impacté)<br><span class='key'>D3</span> : Actions immédiates de containment (isoler les pièces suspectes, trier le stock)<br><span class='key'>D4</span> : Identifier la cause racine (Ishikawa, 5 Pourquoi, analyse de données)<br><span class='key'>D5</span> : Choisir les actions correctives permanentes<br><span class='key'>D6</span> : Implémenter et vérifier l'efficacité des actions<br><span class='key'>D7</span> : Prévenir la récurrence (modifier procédures, plans de contrôle, AMDEC)<br><span class='key'>D8</span> : Féliciter l'équipe et clôturer<br><br><div class='remember'>En entretien, cite un exemple : 'Sur un problème d'adhérence de revêtement, j'ai utilisé un 8D : containment immédiat (tri des pièces), 5 Pourquoi pour trouver la cause racine (rinçage insuffisant), action corrective (ajout d'un bain de rinçage), suivi Cpk pour vérifier l'efficacité.'</div>"},
{t:"AMDEC : anticiper les défaillances",en:"FMEA: Failure Mode and Effects Analysis",b:"L'<span class='key'>AMDEC</span> (Analyse des Modes de Défaillance, de leurs Effets et de leur Criticité) = identifier les défaillances <b>potentielles</b> AVANT qu'elles ne se produisent.<br><br><b>3 types :</b><br>- <span class='key'>AMDEC Produit</span> : défaillances du produit en service<br>- <span class='key'>AMDEC Procédé</span> : défaillances du procédé de fabrication (la plus courante en production)<br>- <span class='key'>AMDEC Moyen</span> : défaillances des équipements<br><br><b>Cotation :</b><br>Pour chaque mode de défaillance, on évalue 3 critères (de 1 à 10) :<br>- <span class='key'>G</span> (Gravité) : impact sur le client/la sécurité<br>- <span class='key'>O</span> (Occurrence) : fréquence probable<br>- <span class='key'>D</span> (Détection) : capacité à détecter le défaut avant livraison<br><div class='formula'>IPR = G × O × D (Indice de Priorité du Risque)</div><br>IPR élevé → action prioritaire. Objectif : réduire l'IPR en agissant sur O (améliorer le procédé) ou D (ajouter un contrôle).<br><br><div class='remember'>L'AMDEC est un <b>document vivant</b> : on la met à jour à chaque 8D, changement de procédé ou retour client. En entretien : 'je sais animer une AMDEC procédé et prioriser les actions par IPR.'</div>"},
{t:"Ishikawa et 5 Pourquoi",en:"Ishikawa diagram and 5 Whys",b:"Deux outils complémentaires pour trouver la <b>cause racine</b> d'un problème :<br><br><span class='key'>Ishikawa</span> (diagramme en arêtes de poisson / 5M) :<br>On classe les causes potentielles en <b>5 familles</b> :<br>- <span class='key'>Matière</span> : matériau, lot, fournisseur<br>- <span class='key'>Méthode</span> : procédure, gamme, paramètres<br>- <span class='key'>Main-d'œuvre</span> : formation, compétence, erreur humaine<br>- <span class='key'>Milieu</span> : environnement, température, humidité, propreté<br>- <span class='key'>Machine/Moyen</span> : équipement, outillage, calibration<br><br>On brainstorme les causes dans chaque famille, puis on vérifie/élimine chaque hypothèse avec des données.<br><br><span class='key'>5 Pourquoi</span> :<br>On enchaîne 'Pourquoi ?' jusqu'à la cause racine :<br>Problème : dépôt rugueux → Pourquoi ? Particules dans le bain → Pourquoi ? Filtration défaillante → Pourquoi ? Filtre colmaté → Pourquoi ? Pas de planning de remplacement → Pourquoi ? Pas de maintenance préventive sur les filtres → <b>Cause racine</b> : absence de maintenance préventive.<br><br><div class='remember'>L'Ishikawa ouvre le champ (exploration), les 5 Pourquoi creusent en profondeur (cause racine). Toujours les utiliser ensemble dans un D4 de 8D.</div>"},
],
L1:[
{q:"Le 8D est une méthode de :",o:["Résolution de problème qualité structurée","Calcul de résistance mécanique","Planification de production","Recrutement d'ingénieurs"],c:0,e:"Le <b>8D</b> (8 Disciplines) = méthode structurée en 8 étapes pour résoudre un problème qualité : de la formation de l'équipe (D1) à la clôture (D8), en passant par le containment (D3) et la cause racine (D4)."},
{q:"L'AMDEC sert à :",o:["Anticiper les défaillances potentielles avant qu'elles arrivent","Mesurer la dureté d'un matériau","Calculer la vitesse d'un avion","Former les nouveaux employés"],c:0,e:"<b>AMDEC</b> = identifier les <b>défaillances potentielles</b>, évaluer leur criticité (G×O×D = IPR) et définir des actions pour les prévenir. C'est un outil <b>préventif</b>, pas curatif."},
{q:"Le diagramme d'Ishikawa classe les causes en :",o:["5M (Matière, Méthode, Main-d'œuvre, Milieu, Machine)","3P (Prix, Produit, Promotion)","2F (Force, Fatigue)","7S (les 7 sûretés)"],c:0,e:"L'<b>Ishikawa</b> (diagramme en arêtes de poisson) classe les causes potentielles en <b>5 familles</b> : Matière, Méthode, Main-d'œuvre, Milieu, Machine. On brainstorme les causes dans chaque famille."},
{q:"Le D3 dans un 8D c'est :",o:["Les actions immédiates de containment","La description du problème","L'identification de la cause racine","La clôture du dossier"],c:0,e:"<b>D3 = containment</b> : actions immédiates pour <b>protéger le client</b>. Exemples : isoler les pièces suspectes, trier le stock, bloquer les expéditions, mettre en place un contrôle renforcé temporaire. C'est URGENT, on fait ça AVANT de chercher la cause racine."},
{q:"IPR en AMDEC signifie :",o:["Indice de Priorité du Risque (G × O × D)","Inspection Préliminaire Rapide","Indicateur de Performance Réseau","Index de Prix de Revient"],c:0,e:"<b>IPR</b> = Gravité × Occurrence × Détection. Plus l'IPR est élevé, plus le risque est prioritaire. On agit en priorité sur les IPR les plus hauts en améliorant le procédé (↓ O) ou le contrôle (↓ D)."},
{q:"Les 5 Pourquoi servent à :",o:["Remonter jusqu'à la cause racine en enchaînant 'Pourquoi ?'","Poser 5 questions au client","Faire 5 essais de qualification","Vérifier 5 cotes sur le plan"],c:0,e:"On enchaîne 'Pourquoi ?' (en général 4 à 6 fois) pour descendre des symptômes jusqu'à la <b>cause racine</b>. Exemple : pièce non conforme → procédé mal réglé → paramètre pas mis à jour → modification non communiquée → <b>absence de processus de communication des modifications</b>."},
{q:"Un poka-yoke c'est :",o:["Un système anti-erreur qui empêche physiquement l'erreur humaine","Un outil de mesure japonais","Un type de soudage","Un logiciel de planification"],c:0,e:"<b>Poka-yoke</b> (détrompeur) = dispositif qui rend l'erreur <b>physiquement impossible</b>. Exemple TdS : un rack qui ne rentre dans le bain que si les pièces sont bien orientées. Plus fiable que la formation seule car ça ne dépend pas de la vigilance humaine."},
{q:"La matrice de décision en D5 du 8D sert à :",o:["Comparer et choisir la meilleure action corrective parmi plusieurs options","Décider qui licencier","Choisir le fournisseur le moins cher","Planifier les vacances de l'équipe"],c:0,e:"En <b>D5</b>, on a souvent plusieurs actions correctives possibles. La <b>matrice de décision</b> les compare sur des critères : efficacité, coût, délai, risque de récurrence. On pondère les critères et on choisit l'action avec le meilleur score global."},
{q:"Une non-conformité majeure vs mineure :",o:["Majeure = risque pour la sécurité ou la navigabilité, mineure = écart documentaire","Les deux sont identiques","Mineure est plus grave que majeure","Majeure ne nécessite pas d'action"],c:0,e:"<b>Non-conformité majeure</b> : écart qui compromet la <b>sécurité</b>, la navigabilité ou la conformité réglementaire. Action corrective immédiate exigée. <b>Non-conformité mineure</b> : écart documentaire ou organisationnel sans impact sécurité. Action corrective dans un délai convenu."},
],
L2:[
{q:"La différence entre AMDEC produit et AMDEC procédé :",o:["L'AMDEC produit analyse les défaillances en service, le procédé analyse les défaillances de fabrication","Elles sont identiques","L'AMDEC produit est plus simple","L'AMDEC procédé ne concerne que les machines"],c:0,e:"<b>AMDEC produit</b> : 'que se passe-t-il si cette pièce casse en vol ?' (défaillances en <b>service</b>). <b>AMDEC procédé</b> : 'que se passe-t-il si le bain TdS est trop chaud ?' (défaillances de <b>fabrication</b>). En production, l'AMDEC procédé est la plus utilisée."},
{q:"En AMDEC, pour réduire l'IPR on agit en priorité sur :",o:["L'Occurrence (améliorer le procédé) et la Détection (ajouter un contrôle)","La Gravité uniquement","Le prix de revient","Le nombre d'opérateurs"],c:0,e:"On ne peut souvent pas changer la <b>Gravité</b> (c'est lié à l'impact sur le client). On agit sur : <b>O</b> (réduire la probabilité en améliorant le procédé) et <b>D</b> (améliorer la détection en ajoutant un contrôle). Action sur O = préventif, action sur D = détectif."},
{q:"Le containment (D3) vs l'action corrective (D5/D6) :",o:["Le containment est immédiat et temporaire, l'action corrective est permanente","Le containment est permanent","L'action corrective est toujours rapide","Les deux sont identiques"],c:0,e:"<b>D3 containment</b> = réaction <b>immédiate</b> pour protéger le client (tri, blocage, contrôle renforcé). <b>Temporaire.</b> <b>D5/D6 action corrective</b> = solution <b>permanente</b> qui élimine la cause racine (modifier procédé, former, ajouter un poka-yoke). Le containment s'arrête quand l'action corrective est validée."},
{q:"Un diagramme de Pareto en qualité sert à :",o:["Identifier les 20 % de causes qui produisent 80 % des défauts","Mesurer la résistance des matériaux","Planifier la maintenance préventive","Calculer le rendement d'un bain"],c:0,e:"<b>Pareto</b> (loi 80/20) : on classe les causes de non-conformité par fréquence décroissante. En général, <b>20 % des causes</b> génèrent <b>80 % des défauts</b>. On traite d'abord les plus fréquentes → impact maximum avec effort minimum."},
],
L3:[
{q:"Tu trouves un lot de pièces avec un défaut d'adhérence TdS. Ta première action est :",o:["Containment : isoler le lot, bloquer les expéditions, trier le stock","Chercher la cause racine pendant 2 semaines","Envoyer un email au fournisseur","Modifier l'AMDEC"],c:0,e:"<b>D3 d'abord !</b> On <b>protège le client</b> immédiatement : isoler le lot suspect, bloquer les expéditions, trier le stock en-cours et le stock fini. ENSUITE on cherche la cause racine (D4). En aéro, la priorité absolue est d'empêcher qu'une pièce non conforme arrive sur un avion."},
{q:"L'AMDEC donne un IPR de 280 pour 'contamination bain → dépôt rugueux'. Tu proposes :",o:["Ajouter un contrôle de bain régulier (↓ D) et une maintenance préventive des filtres (↓ O)","Ne rien faire car 280 est acceptable","Augmenter le prix de vente","Changer de secteur industriel"],c:0,e:"IPR 280 (ex : G=7, O=8, D=5) → élevé, action prioritaire. On agit sur <b>O</b> : maintenance préventive des filtres, planning de renouvellement du bain. Et sur <b>D</b> : contrôle qualité du bain (analyse chimique périodique, cellule de Hull). Objectif : IPR < 100."},
{q:"La différence entre action corrective et action préventive :",o:["Corrective = après un problème avéré, préventive = avant que ça n'arrive","Les deux sont identiques","Corrective = temporaire, préventive = permanente","Préventive = après un problème"],c:0,e:"<b>Action corrective</b> : traite un problème <b>qui s'est produit</b> (8D, réclamation client). <b>Action préventive</b> : traite un risque <b>qui ne s'est pas encore produit</b> (AMDEC, retour d'expérience d'un autre site). Les deux sont exigées par l'EN 9100."},
]},

// ==================== QUALITÉ - MÉTROLOGIE ====================
qual_metrologie:{title:'Métrologie & Contrôle',mod:'qualite',
lessons:[
{t:"Métrologie dimensionnelle en aéro",en:"Dimensional metrology in aerospace",b:"La <span class='key'>métrologie</span> = la science de la mesure. En aéro, chaque cote du plan doit être mesurée et la mesure doit être <b>fiable</b>.<br><br><b>Instruments courants :</b><br>- <span class='key'>Pied à coulisse</span> <span class='en'>(Caliper)</span> : résolution 0,02 mm. Mesures extérieures, intérieures, profondeur.<br>- <span class='key'>Micromètre</span> <span class='en'>(Micrometer)</span> : résolution 0,001 mm. Plus précis que le pied à coulisse.<br>- <span class='key'>Comparateur</span> <span class='en'>(Dial gauge)</span> : mesure de petites variations (battement, planéité). Résolution 0,01 ou 0,001 mm.<br>- <span class='key'>Colonne de mesure</span> : mesure de hauteur précise.<br>- <span class='key'>Machine tridimensionnelle (MMT)</span> <span class='en'>(CMM)</span> : palpeur 3D qui mesure des géométries complexes. Standard pour les FAI.<br>- <span class='key'>Rugosimètre</span> <span class='en'>(Profilometer)</span> : mesure de la rugosité de surface (Ra, Rz).<br><br><b>Épaisseur de revêtement (TdS) :</b><br>- <span class='key'>Courants de Foucault</span> <span class='en'>(Eddy current)</span> : mesure non destructive sur substrat conducteur<br>- <span class='key'>Coupe micrographique</span> : destructif mais très précis. On coupe, on polit, on mesure au microscope."},
{t:"Étalonnage et traçabilité métrologique",en:"Calibration and metrological traceability",b:"Un instrument de mesure <b>dérive</b> dans le temps. L'<span class='key'>étalonnage</span> <span class='en'>(Calibration)</span> vérifie et corrige cette dérive.<br><br><b>Chaîne de traçabilité :</b><br>Étalon national (LNE en France) → étalon de référence du labo → étalon de travail → instrument de mesure.<br>Chaque maillon est <b>raccordé</b> au précédent par un étalonnage documenté.<br><br><b>En pratique :</b><br>- Chaque instrument a une <b>étiquette verte</b> avec la date du prochain étalonnage<br>- Pas d'étiquette ou date dépassée = instrument <b>interdit d'utilisation</b><br>- Les intervalles sont définis selon la criticité et l'usage (6 mois, 1 an, 2 ans)<br>- Les certificats d'étalonnage sont conservés comme preuve qualité<br><br><b>Si un instrument est trouvé hors tolérance à l'étalonnage :</b><br>Il faut faire une <b>analyse d'impact</b> : toutes les mesures faites depuis le dernier étalonnage conforme sont suspectes. Potentiel rappel de pièces.<br><br><div class='remember'>En entretien : 'je sais que la fiabilité des mesures dépend de la traçabilité métrologique, et qu'un instrument non étalonné peut invalider toute une production.'</div>"},
{t:"MSA : analyse du système de mesure",en:"MSA: Measurement System Analysis",b:"Le <span class='key'>MSA</span> (Measurement System Analysis) = vérifier que ton système de mesure est <b>fiable et reproductible</b>.<br><br><b>Les composantes de la variation de mesure :</b><br>- <span class='key'>Répétabilité</span> <span class='en'>(Repeatability)</span> : même opérateur, même pièce, même instrument → les résultats varient-ils ?<br>- <span class='key'>Reproductibilité</span> <span class='en'>(Reproducibility)</span> : opérateurs différents, même pièce, même instrument → les résultats varient-ils ?<br><br><b>Étude R&R (Gage R&R) :</b><br>- 3 opérateurs mesurent 10 pièces, 3 fois chacun (90 mesures)<br>- On calcule la part de variation due au système de mesure vs la variation des pièces<br>- <span class='key'>%R&R < 10 %</span> : système acceptable<br>- <span class='key'>%R&R entre 10 et 30 %</span> : acceptable sous conditions<br>- <span class='key'>%R&R > 30 %</span> : système de mesure non fiable, à améliorer<br><br><div class='remember'>Avant de calculer un Cpk, il faut s'assurer que le système de mesure est fiable (MSA). Sinon le Cpk ne vaut rien : on mesure la variation de l'instrument, pas celle du procédé.</div>"},
],
L1:[
{q:"Un pied à coulisse a une résolution de :",o:["0,02 mm","0,001 mm","1 mm","0,1 µm"],c:0,e:"Le <b>pied à coulisse</b> standard = résolution <b>0,02 mm</b> (20 µm). Pour plus de précision, on utilise un micromètre (0,001 mm)."},
{q:"L'étalonnage d'un instrument sert à :",o:["Vérifier et corriger la dérive de l'instrument","Nettoyer l'instrument","Augmenter sa résolution","Le rendre plus rapide"],c:0,e:"L'<b>étalonnage</b> = comparer l'instrument à un <b>étalon de référence</b> pour vérifier s'il mesure juste. Si l'écart est trop grand, on ajuste ou on réforme l'instrument."},
{q:"Une MMT (machine tridimensionnelle) sert à :",o:["Mesurer des géométries 3D complexes avec un palpeur","Usiner des pièces en 3D","Imprimer des pièces en 3D","Peser des pièces"],c:0,e:"La <b>MMT</b> (CMM en anglais) = un bras robotisé avec un <b>palpeur</b> qui touche la pièce en plusieurs points pour reconstituer sa géométrie 3D. Standard pour les <b>FAI</b> (mesure de toutes les cotes)."},
{q:"L'épaisseur d'un revêtement TdS se mesure souvent par :",o:["Courants de Foucault (non destructif)","Balance de précision","Thermomètre","Règle graduée"],c:0,e:"Les <b>courants de Foucault</b> (eddy current) = méthode <b>non destructive</b> pour mesurer l'épaisseur d'un revêtement sur substrat conducteur. Rapide, portable, pas besoin de couper la pièce. La coupe micrographique est plus précise mais destructive."},
{q:"Un instrument sans étiquette d'étalonnage valide est :",o:["Interdit d'utilisation","Utilisable normalement","Plus précis que les autres","Réservé aux urgences"],c:0,e:"<b>Interdit.</b> Un instrument non étalonné (ou avec un étalonnage périmé) ne peut pas être utilisé pour des mesures de production ou de contrôle. Les mesures faites avec un tel instrument sont <b>non valides</b>."},
{q:"Le MSA vérifie :",o:["La fiabilité et la reproductibilité du système de mesure","La vitesse de production","La résistance du matériau","Le coût de fabrication"],c:0,e:"<b>MSA</b> = s'assurer que le système de mesure (instrument + opérateur + méthode) est <b>fiable</b>. Si le système de mesure varie trop, les données de Cpk et de contrôle ne sont pas fiables."},
{q:"Un micromètre est plus précis qu'un pied à coulisse car :",o:["Sa résolution est 0,001 mm vs 0,02 mm","Il est plus gros","Il coûte moins cher","Il mesure la température"],c:0,e:"<b>Micromètre</b> = résolution <b>0,001 mm</b> (1 µm). <b>Pied à coulisse</b> = résolution <b>0,02 mm</b> (20 µm). Le micromètre est 20× plus précis. On l'utilise quand les tolérances sont serrées (ex : ± 0,01 mm)."},
{q:"La règle du 1/10 en métrologie dit :",o:["L'instrument doit avoir une résolution au moins 10× meilleure que la tolérance","On mesure 10 pièces maximum","On utilise 10 instruments différents","On étalonne tous les 10 jours"],c:0,e:"<b>Règle du 1/10</b> : la résolution de l'instrument doit être au moins <b>10 fois plus fine</b> que la tolérance à vérifier. Exemple : tolérance ± 0,1 mm → résolution instrument ≤ 0,01 mm. Cela garantit que l'incertitude de mesure est négligeable par rapport à la tolérance."},
{q:"Le Gage R&R étudie :",o:["La variation due à l'instrument et aux opérateurs","La vitesse de production","La résistance des matériaux","Le coût de maintenance"],c:0,e:"<b>Gage R&R</b> = étude quantitative qui décompose la variation totale de mesure en : <b>répétabilité</b> (variation de l'instrument) + <b>reproductibilité</b> (variation entre opérateurs). 3 opérateurs × 10 pièces × 3 répétitions = 90 mesures."},
],
L2:[

function renderDash(){
  document.getElementById('dStreak').textContent=S.streak;
  document.getElementById('dLast').textContent='Dernière session : '+(S.lastDate||'jamais');
  let mast=0,learn=0,nw=0;
  Object.keys(C).forEach(cId=>{
    ['L1','L2','L3'].forEach(lvl=>{
      (C[cId][lvl]||[]).forEach((_,i)=>{
        const b=getBox(getQId(cId,lvl,i));
        if(b>=4)mast++;else if(b>=1)learn++;else nw++;
      });
    });
  });
  document.getElementById('dMast').textContent=mast;
  document.getElementById('dLearn').textContent=learn;
  document.getElementById('dNew').textContent=nw;
  let dueCount=0;
  Object.keys(C).forEach(cId=>{
    if(!isCourseUnlocked(cId)||checkedLessonCount(cId)===0)return;
    ['L1','L2','L3'].forEach(lvl=>{
      if(!isUnlocked(cId,parseInt(lvl[1])))return;
      const filtered=getFilteredQuestions(cId,lvl);
      const allQs=C[cId][lvl]||[];
      filtered.forEach(q=>{const origIdx=allQs.indexOf(q);const qId=getQId(cId,lvl,origIdx>=0?origIdx:0);if(getBox(qId)>=1&&isDue(qId))dueCount++});
    });
  });
  const dueLabel=dueCount>0?' ('+dueCount+' à réviser)':'';
  document.getElementById('dailyBtn').textContent='Session du jour ('+S.qps+' questions)'+dueLabel;

  const el=document.getElementById('dMods');
  el.innerHTML=MODS.map(m=>{
    let tot=0,done=0;
    m.courses.forEach(cId=>{if(!C[cId])return;['L1','L2','L3'].forEach(l=>{const qs=C[cId][l]||[];tot+=qs.length;qs.forEach((_,i)=>{if(getBox(getQId(cId,l,i))>=4)done++})})});
    const pct=tot?Math.round(done/tot*100):0;
    return `<div class="mod-row" onclick="openMod('${m.id}')"><div class="mod-icon" style="background:${m.color}">${m.icon}</div><div class="mod-info"><h4>${m.name}</h4><p>${m.courses.length} cours</p><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${m.color}"></div></div></div><div class="mod-pct">${pct}%</div></div>`;
  }).join('');
}

function openMod(modId){
  const mod=MODS.find(m=>m.id===modId);
  if(!mod){showPage('modules');return}
  const pg=document.getElementById('pg-course');
  let html=`<div class="course-header"><button class="back-btn" onclick="showPage('dashboard')">←</button><h2>${mod.icon} ${mod.name}</h2></div>`;
  let totalQ=0;
  mod.courses.forEach(cId=>{if(!C[cId]||!isCourseUnlocked(cId))return;['L1','L2','L3'].forEach(l=>{if(isUnlocked(cId,parseInt(l[1])))(C[cId][l]||[]).forEach(()=>totalQ++)})});
  if(totalQ>0)html+=`<button class="start-btn" onclick="startModQuiz('${modId}')">Quiz du module (${totalQ} questions)</button>`;
  if(mod.seq)html+=`<p style="font-size:.7rem;color:var(--muted);margin-bottom:.4rem">Progression séquentielle : valide le quiz L1 de chaque chapitre (70 %) pour débloquer le suivant.</p>`;
  html+=`<h3 style="font-size:.82rem;color:var(--muted);margin-bottom:.4rem">Cours</h3>`;
  mod.courses.forEach((cId,ci)=>{
    if(!C[cId])return;
    const c=C[cId];
    const locked=!isCourseUnlocked(cId);
    if(locked){
      const prev=C[mod.courses[ci-1]];
      html+=`<div class="mod-row" style="opacity:.5;cursor:default"><div class="mod-info"><h4>🔒 ${c.title}</h4><p>Valide d'abord « ${prev?prev.title:'précédent'} » (tous les cours + L1 à 75 %)</p></div></div>`;
      return;
    }
    const lc=c.lessons.length;
    const ld=c.lessons.filter((_,i)=>isLessonDone(cId,i)).length;
    let qM=0,qT=0;
    ['L1','L2','L3'].forEach(l=>{(C[cId][l]||[]).forEach((_,i)=>{qT++;if(getBox(getQId(cId,l,i))>=4)qM++})});
    html+=`<div class="mod-row" onclick="openCourse('${cId}')"><div class="mod-info"><h4>${c.title}</h4><p>${lc} leçons (${ld}/${lc}) | ${qT} quiz (${qM} maîtrisées)</p></div><div class="mod-pct" style="font-size:.72rem;color:${ld===lc&&qM===qT?'var(--green)':'var(--muted)'}">${qT?Math.round(qM/qT*100):0}%</div></div>`;
  });
  pg.innerHTML=html;
  showPage('course');
}

  const allLessonsDone=c.lessons.every((_,i)=>isLessonDone(cId,i));

    if(!unlocked){html+=`<div class="lvl-btn locked"><div class="lock-icon">🔒</div><h4>${name}</h4><p>Obtiens 75 % au N${lvlNum-1} d'abord</p></div>`;return}

    html+=`<div class="lvl-btn" onclick="startQuiz('${cId}','${lvl}')"><h4>${name}</h4><p>${filtered.length} questions${partial}</p>${best?`<div class="score">${best}%</div>`:''}</div>`;

      }).join('');

    });
  }

  pg.innerHTML=html;
  showPage('course');
}

// QUIZ ENGINE (with shuffle + multi-select)
// ============================================================
let quiz={qs:[],cur:0,res:[],cId:'',lvl:'',_map:null,_sel:new Set(),_answered:false};

function startQuiz(cId,lvl){
  const filtered=getFilteredQuestions(cId,lvl);
  const allQs=C[cId][lvl]||[];
  const qs=filtered.map((q,i)=>{const origIdx=allQs.indexOf(q);return{...q,id:getQId(cId,lvl,origIdx>=0?origIdx:i),cId}});
  shuffleArr(qs);
  quiz={qs,cur:0,res:[],cId,lvl,_map:null,_sel:new Set(),_answered:false};
  showPage('quiz');
  renderQuiz();
}

function allCourseLessonsDone(cId){const c=C[cId];return c&&c.lessons&&c.lessons.every((_,i)=>isLessonDone(cId,i))}
function startDaily(){
  const allQ=[];
  MODS.forEach(m=>m.courses.forEach(cId=>{
    if(!C[cId]||!isCourseUnlocked(cId)||checkedLessonCount(cId)===0)return;
    ['L1','L2','L3'].forEach(lvl=>{
      if(!isUnlocked(cId,parseInt(lvl[1])))return;
      const filtered=getFilteredQuestions(cId,lvl);
      const allQs=C[cId][lvl]||[];
      filtered.forEach((q)=>{
        const origIdx=allQs.indexOf(q);
        const qId=getQId(cId,lvl,origIdx>=0?origIdx:0);
        const b=getBox(qId);
        allQ.push({...q,id:qId,box:b,cId,lvl});
      });
    });
  }));
  const td=todayStr();
  const dueWeak=allQ.filter(q=>q.box>=1&&q.box<=2&&isDue(q.id));
  const dueStrong=allQ.filter(q=>q.box>=3&&isDue(q.id));
  const nw=allQ.filter(q=>q.box===0);
  const notDue=allQ.filter(q=>q.box>=1&&!isDue(q.id));
  shuffleArr(dueWeak);shuffleArr(dueStrong);shuffleArr(nw);shuffleArr(notDue);
  const sel=[...dueWeak.slice(0,S.qps)];
  while(sel.length<S.qps&&dueStrong.length)sel.push(dueStrong.shift());
  while(sel.length<S.qps&&nw.length)sel.push(nw.shift());
  const maxNotDue=Math.max(2,Math.floor(S.qps*0.15));
  let ndAdded=0;
  while(sel.length<S.qps&&notDue.length&&ndAdded<maxNotDue){sel.push(notDue.shift());ndAdded++}
  while(sel.length<S.qps&&notDue.length)sel.push(notDue.shift())
  shuffleArr(sel);
  sel.forEach(q=>{if(q.box>=4&&!q.m&&!q.txt&&!q.w){const ci=Array.isArray(q.c)?q.c[0]:q.c;const ans=q.o[ci];if(ans.length<=45&&!ans.includes(','))  {q.txt=true;q.a=[ans]}}});
  if(!sel.length){alert('Aucune question disponible. Ouvre un module et lis les cours !');return}
  quiz={qs:sel,cur:0,res:[],cId:'daily',lvl:'mix',_map:null,_sel:new Set(),_answered:false};
  showPage('quiz');
  renderQuiz();
}

function getNotesHtml(){return '<div class="quiz-notes"><h4>Mes notes / remarques</h4><textarea id="notepadText" oninput="saveNotepad()" placeholder="Remarques, questions à ajouter, améliorations..."></textarea><div class="np-actions"><button class="np-btn np-copy" style="background:var(--pri);color:white" onclick="copyNotepad()">Copier</button><button class="np-btn" style="background:var(--bg)" onclick="clearNotepad()">Effacer</button></div></div>'}
function loadNotes(){const t=document.getElementById('notepadText');if(!t)return;if(quiz&&quiz.cur<quiz.qs.length){t.value='';t.placeholder='Note sur cette question...'}else if(S.notepad)t.value=S.notepad}

function renderQuiz(){
  const pg=document.getElementById('pg-quiz');
  if(quiz.cur>=quiz.qs.length){renderResult();return}
  const q=quiz.qs[quiz.cur];
  const isMulti=!!q.m;
  const isText=!!q.txt;
  quiz._answered=false;
  quiz._sel=new Set();

  let optHtml='';
  if(isText){
    optHtml=`<input type="text" class="q-input" id="qInput" placeholder="Tape ta réponse..." autocomplete="off" onkeydown="if(event.key==='Enter'&&!quiz._answered)answerText()"><button class="q-validate" id="qVal" onclick="answerText()" style="margin-top:.4rem">Valider</button>`;
  } else {
    let opts,cIdx;
    if(q.w&&q.w.length&&!isMulti){
      const correct=q.o[Array.isArray(q.c)?q.c[0]:q.c];
      const pool=[...q.w];shuffleArr(pool);
      opts=[correct,...pool.slice(0,3)];
      cIdx=0;
    } else {
      opts=[...q.o];
      cIdx=Array.isArray(q.c)?q.c[0]:q.c;
    }
    const indices=opts.map((_,i)=>i);
    shuffleArr(indices);
    quiz._map=indices;
    quiz._opts=opts;
    quiz._cIdx=cIdx;
    indices.forEach((origIdx,dispIdx)=>{
      if(isMulti){
        optHtml+=`<div class="q-opt" data-i="${dispIdx}" onclick="toggleOpt(${dispIdx})"><span class="chk">☐</span> ${opts[origIdx]}</div>`;
      } else {
        optHtml+=`<div class="q-opt" onclick="answer(${dispIdx})">${opts[origIdx]}</div>`;
      }
    });
  }

  const dots=quiz.qs.map((_,i)=>`<span class="dot ${i<quiz.cur?(quiz.res[i]?'right':'wrong'):i===quiz.cur?'cur':''}"></span>`).join('');
  const backAction=quiz.cId==='exam'?`showPage('dashboard')`:quiz.cId==='daily'?`showPage('dashboard')`:quiz.cId.startsWith('mod_')?`openMod('${quiz.cId.replace('mod_','')}')`:`openCourse('${quiz.cId}')`;
  const quizTitle=quiz.cId==='exam'?'Examen blanc':quiz.cId==='daily'?'Session du jour':quiz.cId.startsWith('mod_')?(MODS.find(m=>m.id===quiz.cId.replace('mod_',''))?.name||'Module'):(C[quiz.cId]?.title||'');
  let cLabel='';
  if(q.cId&&(quiz.cId==='daily'||quiz.cId.startsWith('mod_'))){
    const cData=C[q.cId];
    if(cData){const mod=getModForCourse(q.cId);cLabel=mod?(mod.icon+' '+mod.name+' · '+cData.title):cData.title}
  }
  const typeBadge=isText?' <span class="q-type-badge">Réponse libre</span>':isMulti?' <span class="q-multi-badge">Plusieurs réponses</span>':'';

  const timerHtml=quiz.cId==='exam'?'<div class="exam-timer" id="examTimerEl">30:00</div>':'';
  pg.innerHTML=`<div class="course-header"><button class="back-btn" onclick="${backAction}">&times;</button><h2>${quizTitle}</h2></div>${timerHtml}<div class="dots">${dots}</div><div class="quiz-wrap"><div class="quiz-main"><div class="q-card"><div class="q-num">${cLabel?'<span style="color:var(--pri2)">'+cLabel+'</span> · ':''}Question ${quiz.cur+1}/${quiz.qs.length}${typeBadge}</div><div class="q-text">${q.q}</div><div class="q-opts">${optHtml}</div>${isMulti&&!isText?'<button class="q-validate" id="qVal" onclick="validateMulti()">Valider</button>':''}<div class="q-exp" id="qExp"></div><button class="q-next" id="qNext" onclick="nextQ()">Suivante →</button></div></div>${getNotesHtml()}</div>`;
  if(quiz.cId==='exam')updateExamTimer();
  loadNotes();
  if(isText)setTimeout(()=>{const inp=document.getElementById('qInput');if(inp)inp.focus()},100);
}

function answerText(){
  if(quiz._answered)return;
  quiz._answered=true;
  const q=quiz.qs[quiz.cur];
  const input=document.getElementById('qInput');
  const val=input.value.trim();
  const norm=s=>s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
  const nVal=norm(val);
  const ok=nVal.length>=2&&q.a.some(a=>{const nA=norm(a);if(nVal===nA)return true;const aw=nA.split(' ').filter(w=>w.length>2);if(!aw.length)return nVal===nA;const hits=aw.filter(w=>nVal.includes(w));return hits.length>=Math.ceil(aw.length*0.6)});
  quiz.res.push(ok);
  const b=getBox(q.id);
  setBox(q.id,ok?Math.min(5,(b||0)+1):1);
  input.classList.add(ok?'correct':'wrong');
  input.disabled=true;
  const valBtn=document.getElementById('qVal');
  if(valBtn)valBtn.style.display='none';
  showExp(ok,q.a[0],q.e,q.id);
}

function toggleOpt(dispIdx){
  if(quiz._answered)return;
  if(quiz._sel.has(dispIdx))quiz._sel.delete(dispIdx);
  else quiz._sel.add(dispIdx);
  document.querySelectorAll('.q-opt').forEach((el,i)=>{
    const has=quiz._sel.has(i);
    el.querySelector('.chk').textContent=has?'☑':'☐';
    el.classList.toggle('selected',has);
  });
}

function validateMulti(){
  if(quiz._answered)return;
  quiz._answered=true;
  const q=quiz.qs[quiz.cur];
  const correctOrig=Array.isArray(q.c)?q.c:[q.c];
  const selectedOrig=[...quiz._sel].map(d=>quiz._map[d]);
  const ok=correctOrig.length===selectedOrig.length&&correctOrig.every(c=>selectedOrig.includes(c));
  quiz.res.push(ok);
  const b=getBox(q.id);
  setBox(q.id,ok?Math.min(5,(b||0)+1):1);
  document.querySelectorAll('.q-opt').forEach((el,i)=>{
    const origIdx=quiz._map[i];
    if(correctOrig.includes(origIdx))el.classList.add('correct');
    else if(quiz._sel.has(i))el.classList.add('wrong');
    else el.classList.add('dim');
    el.style.pointerEvents='none';
  });
  document.getElementById('qVal').style.display='none';
  const correctAnswers=correctOrig.map(ci=>quiz._opts[ci]).join(', ');
  showExp(ok,correctAnswers,q.e,q.id);
}

function answer(dispIdx){
  if(quiz._answered)return;
  quiz._answered=true;
  const q=quiz.qs[quiz.cur];
  const origIdx=quiz._map[dispIdx];
  const ok=origIdx===quiz._cIdx;
  quiz.res.push(ok);
  const b=getBox(q.id);
  setBox(q.id,ok?Math.min(5,(b||0)+1):1);
  document.querySelectorAll('.q-opt').forEach((el,i)=>{
    const orig=quiz._map[i];
    if(orig===quiz._cIdx)el.classList.add('correct');
    else if(i===dispIdx&&!ok)el.classList.add('wrong');
    if(orig!==quiz._cIdx&&i!==dispIdx)el.classList.add('dim');
    el.style.pointerEvents='none';
  });
  const correctAnswer=quiz._opts[quiz._cIdx];
  showExp(ok,correctAnswer,q.e,q.id);
}

function showExp(ok,correctAnswer,explanation,qId){
  const el=document.getElementById('qExp');
  const box=qId?getBox(qId):0;
  let h='';
  if(ok){
    h='<b style="color:var(--green)">✓ Bonne réponse !</b>';
    if(box>=4)h+='<div class="mastery-msg green">🏆 Question maîtrisée ! Concentre-toi sur celles que tu ne connais pas encore.</div>';
    else if(box>=3)h+='<div class="mastery-msg gold">Presque maîtrisée ! Encore '+(4-box)+' bonne(s) réponse(s).</div>';
    h+='<br>'+explanation;
  } else {
    h='<b style="color:var(--red)">✗ Mauvaise réponse</b><br>La bonne réponse était : <b>'+correctAnswer+'</b><br><br>'+explanation;
  }
  el.innerHTML=h;
  el.classList.add('show');
  document.getElementById('qNext').classList.add('show');
}

function launchConfetti(){

    const dur=1500+Math.random()*1500;const delay=Math.random()*400;
    p.animate([{transform:`translateY(0) rotate(0deg)`,opacity:1},{transform:`translateY(${window.innerHeight+50}px) rotate(${360+Math.random()*720}deg)`,opacity:0}],{duration:dur,delay,easing:'cubic-bezier(.25,.46,.45,.94)',fill:'forwards'});

  const today=new Date().toISOString().split('T')[0];
  if(S.lastDate!==today){
    const yest=new Date(Date.now()-864e5).toISOString().split('T')[0];

    S.lastDate=today;
  }
  if(!S.history)S.history=[];

  const backAction=isExam?`showPage('dashboard')`:quiz.cId==='daily'?`showPage('dashboard')`:quiz.cId.startsWith('mod_')?`openMod('${quiz.cId.replace('mod_','')}')`:`openCourse('${quiz.cId}')`;

function startModQuiz(modId){
  const mod=MODS.find(m=>m.id===modId);
  if(!mod)return;
  const allQ=[];
  mod.courses.forEach(cId=>{if(!C[cId]||!isCourseUnlocked(cId))return;['L1','L2','L3'].forEach(lvl=>{if(!isUnlocked(cId,parseInt(lvl[1])))return;(C[cId][lvl]||[]).forEach((q,i)=>{allQ.push({...q,id:getQId(cId,lvl,i),cId})})})});
  shuffleArr(allQ);
  const sel=allQ.slice(0,Math.min(S.qps,allQ.length));
  sel.forEach(q=>{const b=getBox(q.id);if(b>=4&&!q.m&&!q.txt&&!q.w){const ci=Array.isArray(q.c)?q.c[0]:q.c;const ans=q.o[ci];if(ans.length<=45&&!ans.includes(','))  {q.txt=true;q.a=[ans]}}});
  if(!sel.length){alert('Aucune question débloquée dans ce module.');return}
  quiz={qs:sel,cur:0,res:[],cId:'mod_'+modId,lvl:'mix',_map:null,_sel:new Set(),_answered:false};
  showPage('quiz');renderQuiz();
}

function startReviewErrors(){
  const weak=[];
  MODS.forEach(m=>m.courses.forEach(cId=>{
    if(!C[cId]||!isCourseUnlocked(cId)||checkedLessonCount(cId)===0)return;
    ['L1','L2','L3'].forEach(lvl=>{
      if(!isUnlocked(cId,parseInt(lvl[1])))return;
      const filtered=getFilteredQuestions(cId,lvl);
      const allQs=C[cId][lvl]||[];
      filtered.forEach((q)=>{
        const origIdx=allQs.indexOf(q);
        const qId=getQId(cId,lvl,origIdx>=0?origIdx:0);
        const b=getBox(qId);
        if(b>=1&&b<=2)weak.push({...q,id:qId,box:b,cId,lvl});
      });
    });
  }));
  if(!weak.length){alert('Aucune erreur à réviser ! Toutes tes questions faibles sont déjà en boîte 3+.');return}
  shuffleArr(weak);
  const sel=weak.slice(0,Math.min(S.qps,weak.length));
  quiz={qs:sel,cur:0,res:[],cId:'daily',lvl:'mix',_map:null,_sel:new Set(),_answered:false};
  showPage('quiz');renderQuiz();
}

function doSearch(query){
  const el=document.getElementById('searchResults');
  if(!query||query.length<2){el.innerHTML='<p style="color:var(--muted);font-size:.82rem;text-align:center">Tape au moins 2 caractères pour chercher.</p>';return}
  const q=query.toLowerCase();
  const results=[];
  MODS.forEach(m=>{
    m.courses.forEach(cId=>{
      if(!C[cId])return;
      const course=C[cId];
      (course.lessons||[]).forEach((les,i)=>{
        const inTitle=(les.t||'').toLowerCase().includes(q);
        const inBody=(les.b||'').toLowerCase().includes(q);
        if(inTitle||inBody){
          let snippet=(les.b||'').replace(/<[^>]+>/g,' ').substring(0,150);
          results.push({type:'lesson',mod:m,cId,title:les.t,snippet,courseTitle:course.title});
        }
      });
      ['L1','L2','L3'].forEach(lvl=>{
        (course[lvl]||[]).forEach((qq,i)=>{
          const inQ=(qq.q||'').toLowerCase().includes(q);
          const inE=(qq.e||'').toLowerCase().includes(q);
          if(inQ||inE){
            results.push({type:'quiz',mod:m,cId,title:qq.q,snippet:(qq.e||'').replace(/<[^>]+>/g,' ').substring(0,120),courseTitle:course.title,lvl});
          }
        });
      });
    });
  });
  if(!results.length){el.innerHTML='<p style="color:var(--muted);font-size:.82rem;text-align:center">Aucun résultat pour "'+query+'".</p>';return}
  const re=new RegExp('('+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  el.innerHTML=results.slice(0,30).map(r=>{
    const hl=s=>s.replace(re,'<mark>$1</mark>');
    const tag=r.type==='lesson'?'Leçon':'Quiz '+r.lvl;
    return `<div class="search-hit" onclick="showPage('modules');openMod('${r.mod.id}');setTimeout(()=>openCourse('${r.cId}'),100)"><span class="sh-tag" style="background:${r.mod.color}">${tag}</span><h4>${hl(r.title)}</h4><p>${hl(r.snippet)}...</p><p style="font-size:.62rem;opacity:.6">${r.courseTitle}</p></div>`;
  }).join('')+((results.length>30)?`<p style="text-align:center;color:var(--muted);font-size:.72rem">${results.length-30} résultats supplémentaires...</p>`:'');
}

let examTimer=null;
function startExam(){
  const allQ=[];
  MODS.forEach(m=>m.courses.forEach(cId=>{
    if(!C[cId]||!isCourseUnlocked(cId)||!allCourseLessonsDone(cId))return;
    ['L1','L2','L3'].forEach(lvl=>{
      if(!isUnlocked(cId,parseInt(lvl[1])))return;
      (C[cId][lvl]||[]).forEach((q,i)=>{
        allQ.push({...q,id:getQId(cId,lvl,i),box:getBox(getQId(cId,lvl,i)),cId,lvl});
      });
    });
  }));
  if(allQ.length<10){alert('Pas assez de questions débloquées pour un examen. Continue les modules !');return}
  shuffleArr(allQ);
  const sel=allQ.slice(0,30);
  quiz={qs:sel,cur:0,res:[],cId:'exam',lvl:'mix',_map:null,_sel:new Set(),_answered:false,examStart:Date.now(),examTime:30*60*1000};
  showPage('quiz');
  renderQuiz();
  if(examTimer)clearInterval(examTimer);
  examTimer=setInterval(updateExamTimer,1000);
}

function updateExamTimer(){
  if(!quiz||quiz.cId!=='exam')return clearInterval(examTimer);
  const el=document.getElementById('examTimerEl');
  if(!el)return;
  const elapsed=Date.now()-quiz.examStart;
  const remaining=Math.max(0,quiz.examTime-elapsed);
  const min=Math.floor(remaining/60000);
  const sec=Math.floor((remaining%60000)/1000);
  el.textContent=String(min).padStart(2,'0')+':'+String(sec).padStart(2,'0');
  if(remaining<=0){clearInterval(examTimer);if(quiz.cur<quiz.qs.length){quiz.cur=quiz.qs.length;renderResult()}}
}

function renderHistoryChart(){
  const h=(S.history||[]).slice(-20);
  if(!h.length)return '<p style="color:var(--muted);font-size:.78rem;text-align:center;margin:.5rem 0">Aucune session enregistrée.</p>';
  const w=Math.max(300,h.length*36);
  const maxH=100;const chartH=100;const barW=24;const gap=12;
  let bars='';
  h.forEach((s,i)=>{
    const x=i*(barW+gap)+gap;
    const bh=Math.max(2,s.p/maxH*chartH*0.75);
    const y=chartH-bh;
    const col=s.p>=70?'var(--green)':s.p>=50?'var(--yellow)':'var(--red)';
    bars+=`<rect class="hc-bar" x="${x}" y="${y}" width="${barW}" height="${bh}" fill="${col}" rx="2"/>`;
    bars+=`<text class="hc-val" x="${x+barW/2}" y="${y-4}">${s.p}%</text>`;
    bars+=`<text class="hc-label" x="${x+barW/2}" y="${chartH+12}">${s.d.slice(5)}</text>`;
  });
  return `<div class="history-chart"><svg viewBox="0 0 ${w} ${chartH+18}" style="width:${w}px;height:${chartH+18}px"><line x1="0" y1="${chartH*0.25}" x2="${w}" y2="${chartH*0.25}" stroke="var(--border)" stroke-dasharray="3"/><text x="2" y="${chartH*0.25-2}" style="font-size:7px;fill:var(--muted)">70%</text>${bars}</svg></div>`;
}

function renderGlossary(filter){
  const f=(filter||'').toLowerCase();
  const el=document.getElementById('glossList');
  const modMap={};MODS.forEach(m=>{modMap[m.id]=m});
  const filtered=GLOSSARY.filter(g=>!f||g.t.toLowerCase().includes(f)||g.d.toLowerCase().includes(f)).sort((a,b)=>a.t.localeCompare(b.t));
  if(!filtered.length){el.innerHTML='<p style="color:var(--muted);font-size:.82rem;text-align:center">Aucun terme trouvé.</p>';return}

    const tag=mod?`<span class="glossary-tag" style="background:${mod.color}">${mod.icon} ${mod.name}</span>`:'';
    return `<div class="glossary-card">${tag}<h4>${g.t}</h4><p>${g.d}</p></div>`;
  }).join('');
}

function importBackup(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.boxes&&!data.lessonsDone){alert('Fichier invalide : pas de données de progression.');return}
      if(!confirm('Restaurer cette sauvegarde ? Ta progression actuelle sera remplacée.'))return;
      S=Object.assign(S,data);
      save();
      location.reload();
    }catch(err){alert('Erreur de lecture : '+err.message)}
  };
  reader.readAsText(file);
  input.value='';
}
