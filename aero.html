{q:"Les 3 stades du fluage dans l'ordre sont :",o:["Primaire (décéléré), secondaire (stationnaire), tertiaire (accéléré)","Tertiaire, secondaire, primaire","Élastique, plastique, rupture","Instantané, permanent, réversible"],c:0,e:"Le <b>fluage</b> = déformation lente sous charge constante à haute température. <b>Stade I</b> : vitesse décroissante (écrouissage). <b>Stade II</b> : vitesse constante (équilibre écrouissage/restauration) → c'est le stade utile pour la conception. <b>Stade III</b> : vitesse croissante → striction → rupture. Les aubes de turbine travaillent en stade II."},
{q:"Le diagramme Fe-C : à 0,8 % de carbone, la structure à température ambiante est :",o:["100 % perlite (eutectoïde)","Ferrite pure","Austénite stable","Cémentite pure"],c:0,e:"À <b>0,8 % C</b> = composition <b>eutectoïde</b>. L'austénite se transforme entièrement en <b>perlite</b> (lamelles alternées de ferrite + cémentite) lors du refroidissement lent. En dessous de 0,8 % = hypoeutectoïde (ferrite + perlite). Au-dessus = hypereutectoïde (cémentite + perlite)."},
]},

// ==================== MÉTAUX - ALU ====================
met_alu:{title:'Alliages d\'aluminium',mod:'metaux',
lessons:[
{t:"Séries d'alliages alu",en:"Aluminum alloy series",b:"<span class='key'>2xxx</span> (Al-Cu) : <span class='key'>2024</span> = fuselage, bonne fatigue. Traitement T3, T4.<br><span class='key'>7xxx</span> (Al-Zn-Mg) : <span class='key'>7075</span> = très haute résistance, ailes/longerons. Sensible CSC.<br><span class='key'>6xxx</span> (Al-Mg-Si) : <span class='key'>6061</span> = bon compromis, extrudable.<br><br>Traitements thermiques :<br><span class='key'>T3</span> : mise en solution + trempe + écroui + maturation naturelle<br><span class='key'>T6</span> : mise en solution + trempe + <span class='key'>revenu artificiel</span> (précipitation durcissante)<br><span class='key'>T7</span> : sur-revenu (moins dur mais meilleure CSC)"},
{t:"Les traitements T de l'aluminium",en:"Aluminum temper designations",b:"Le <span class='key'>T</span> suivi d'un chiffre = la <span class='key'>recette de cuisine</span> du métal. On chauffe et on refroidit de façons différentes pour obtenir des propriétés différentes :<br><br><span class='key'>T3</span> : mise en solution → trempe → écrouissage → <b>maturation naturelle</b> (à température ambiante, les atomes bougent lentement). Alu 2024-T3 = fuselage.<br><br><span class='key'>T4</span> : comme T3 mais sans écrouissage.<br><br><span class='key'>T6</span> : mise en solution → trempe → <b>revenu artificiel</b> (chauffage au four ~175 °C). Les atomes forment des petits <span class='key'>précipités</span> qui durcissent le métal. C'est le traitement le plus courant. 7075-T6 = ailes.<br><br><span class='key'>T7</span> : comme T6 mais chauffé plus longtemps (<b>sur-revenu</b>). Moins dur, mais <b>meilleure résistance à la corrosion sous contrainte</b> (CSC). 7075-T73 pour les longerons.<br><br><div class='remember'><b>Mise en solution</b> = chauffer pour dissoudre les éléments (comme du sucre dans l'eau chaude).<br><b>Trempe</b> = refroidir vite pour les garder piégés.<br><b>Revenu</b> = rechauffer doucement pour former des précipités durcissants.</div>"},
{t:"Corrosion de l'aluminium",en:"Aluminum corrosion",b:"L'aluminium <b>ne rouille pas</b> (pas de fer), mais il se <span class='key'>corrode</span> quand même ! Sa couche d'oxyde naturelle (Al₂O₃) est fine (2-5 nm) et peut être attaquée.<br><br><b>Types de corrosion de l'alu :</b><br>- <span class='key'>Piqûres</span> <span class='en'>(Pitting)</span> : petits trous profonds, surtout en milieu chloruré (sel). Très fréquent.<br>- <span class='key'>CSC</span> (Corrosion Sous Contrainte) <span class='en'>(SCC)</span> : fissuration sous contrainte + milieu corrosif. Le 7075-T6 y est très sensible → on utilise le T7 pour réduire le risque.<br>- <span class='key'>Exfoliante</span> <span class='en'>(Exfoliation)</span> : feuillets qui se soulèvent sur les tôles laminées (2xxx, 7xxx).<br>- <span class='key'>Galvanique</span> : quand deux métaux différents sont en contact (ex : rivet acier dans tôle alu → l'alu se corrode en premier).<br><br><b>Protections :</b><br>- <span class='key'>Anodisation</span> : on épaissit la couche d'oxyde (ASA, TSA, OAC)<br>- <span class='key'>Plaquage</span> (cladding) : couche d'alu pur collée sur la tôle (anode sacrificielle)<br>- <span class='key'>Conversion chimique</span> : TCP (remplace Alodine CrVI)<br>- <span class='key'>Peinture</span> : primaire + finition"},
],
L1:[
{q:"L'aluminium est le métal le plus utilisé en avion car :",o:["Il est léger et résistant","Il est le plus dur qui existe","Il résiste à 1000 °C","Il ne coûte rien"],c:0,e:"L'<b>aluminium</b> a une densité de seulement <b>2,7 g/cm³</b> (3 fois plus léger que l'acier). Combiné à une bonne résistance mécanique grâce aux alliages (2024, 7075), c'est le matériau de base de la structure des avions. L'A320 est encore majoritairement en aluminium."},
{q:"La série d'alliage alu 2xxx a comme élément principal :",o:["Le cuivre (Cu)","Le zinc (Zn)","Le magnésium (Mg)","Le silicium (Si)"],c:0,e:"Les séries d'alliage alu : le <b>premier chiffre</b> indique l'élément d'alliage principal :<br>• <b>2xxx</b> = Al + <b>Cuivre</b> (Cu) → 2024 pour le fuselage<br>• <b>6xxx</b> = Al + <b>Mg + Si</b> → 6061, bon compromis<br>• <b>7xxx</b> = Al + <b>Zinc</b> (Zn) + Mg → 7075, le plus résistant"},
{q:"L'alliage 2024 est un :",o:["Al-Cu (aluminium-cuivre)","Al-Zn (aluminium-zinc)","Al-Si (aluminium-silicium)","Al-Mg (aluminium-magnésium)"],c:0,e:"Le <b>2024</b> est un alliage <b>Al-Cu</b> (série 2xxx). Utilisé pour le <b>fuselage</b> car il a une excellente résistance en <b>fatigue</b> (les cycles de pressurisation). Traitements : T3, T4."},
{q:"L'alliage 7075 est utilisé pour :",o:["Les ailes et les longerons","Le fuselage et la cabine","La boulonnerie et les rivets","Les tuyères et les aubes"],c:0,e:"Le <b>7075</b> (Al-Zn-Mg, série 7xxx) est l'alliage alu le plus résistant. Utilisé pour les <b>ailes et longerons</b> où la résistance mécanique est critique. Défaut : sensible à la <b>corrosion sous contrainte</b> (CSC)."},
{q:"T3, T4, T6, T7 sont :",o:["Des codes de traitement thermique de l'aluminium","Des types de titane","Des normes de sécurité","Des séries d'alliage"],c:0,e:"Le <b>T</b> suivi d'un chiffre = le <b>traitement thermique</b> appliqué à l'alliage d'alu. C'est comme une recette de cuisine pour le métal : on chauffe et on refroidit de façons différentes pour obtenir des propriétés différentes.<br><br>• <b>T3</b> = mise en solution + trempe + maturation <b>naturelle</b> (à température ambiante, lent)<br>• <b>T4</b> = idem T3 mais sans écrouissage<br>• <b>T6</b> = mise en solution + trempe + revenu <b>artificiel</b> (au four, plus dur)<br>• <b>T7</b> = comme T6 mais chauffé plus longtemps (sur-revenu, moins dur mais meilleure tenue corrosion)"},
{q:"Le traitement T6 est :",o:["Mise en solution + trempe + revenu","Recuit complet à haute température","Écrouissage à froid uniquement","Maturation naturelle sans chauffage"],c:0,e:"<b>T6</b> = 1) mise en solution, 2) trempe, 3) <b>revenu artificiel</b> (précipitation durcissante). C'est le traitement le plus courant en aéro pour les alliages d'alu. Le T7 (sur-revenu) est moins dur mais plus résistant à la CSC."},
{q:"La mise en solution consiste à :",o:["Chauffer le métal pour dissoudre les éléments d'addition","Plonger le métal dans un bain acide","Ajouter du solvant sur la surface","Fondre complètement le métal"],c:0,e:"La <b>mise en solution</b> = on chauffe l'alliage à haute température (ex : 495 °C pour le 2024) pour <b>dissoudre les éléments d'addition</b> (Cu, Zn, Mg) dans la matrice alu. C'est comme dissoudre du sucre dans de l'eau chaude. Ensuite, la <b>trempe</b> refroidit vite pour garder les atomes 'piégés' en solution."},
{q:"Un 'revenu artificiel' c'est :",o:["Un chauffage modéré au four pour durcir le métal","Un refroidissement dans l'eau glacée","Un traitement chimique de surface","Un test de contrôle qualité"],c:0,e:"Le <b>revenu artificiel</b> (aging) = chauffer le métal à température modérée (~175 °C pour l'alu, pendant quelques heures). Les atomes dissous forment de petits <b>précipités</b> qui durcissent le métal. C'est l'étape finale du <b>T6</b>. La <b>maturation naturelle</b> (T3, T4) fait la même chose mais à température ambiante (plus lent, moins dur)."},
{q:"La série 6xxx (comme le 6061) est :",o:["Al-Mg-Si, bon compromis, extrudable","Al-Cu, très haute résistance","Al-Zn, sensible à la corrosion","Al-Li, ultra-léger"],c:0,e:"Le <b>6061</b> (Al-Mg-Si) offre un <b>bon compromis</b> résistance/formabilité. Il est facilement <b>extrudable</b> (profilés). Moins résistant que le 7075, mais plus facile à mettre en forme et moins sensible à la corrosion."},
{q:"Le T7 (sur-revenu) offre par rapport au T6 :",o:["Moins de dureté, meilleure tenue CSC","Plus de dureté, moins de ductilité","Plus de dureté, meilleure tenue CSC","Aucune différence significative"],c:0,e:"Le <b>T7</b> = sur-revenu : on chauffe plus longtemps que pour le T6, les précipités grossissent → <b>moins dur</b> mais les contraintes internes sont réduites → <b>meilleure résistance à la corrosion sous contrainte</b> (CSC). Utilisé quand la CSC est un risque critique (7xxx)."},
{q:"Le 2024-T3 est utilisé pour le fuselage car :",o:["Excellente résistance en fatigue","Très haute résistance statique","Excellente résistance à la corrosion","Facilité de soudage"],c:0,e:"Le fuselage subit des <b>cycles de pressurisation</b> (montée/descente) → fatigue. Le <b>2024-T3</b> a la meilleure résistance en <b>fatigue</b> des alliages alu courants. Pour la corrosion, on le protège par <b>plaquage</b> (feuille d'alu pur collée dessus) ou anodisation."},
{q:"Le Rm du 7075-T6 est environ :",o:["570 MPa","200 MPa","1000 MPa","1400 MPa"],c:0,e:"<b>7075-T6</b> ≈ <b>570 MPa</b>. C'est l'alliage alu le plus résistant mécaniquement en aéro. Pour comparaison : 2024-T3 ≈ 485 MPa, 6061-T6 ≈ 310 MPa. 1000 MPa = titane Ti-6Al-4V. 1400 MPa = Inconel 718."},
{q:"L'élément d'alliage principal du 2xxx est :",o:["Le cuivre (Cu)","Le zinc (Zn)","Le silicium (Si)","Le magnésium (Mg)"],c:0,e:"Séries alu : <b>2xxx = Al-Cu</b> (cuivre). 7xxx = Al-Zn-Mg (zinc+magnésium). 6xxx = Al-Mg-Si (magnésium+silicium). Le cuivre dans le 2024 permet le durcissement par précipitation (phases Al₂Cu)."},
{q:"La maturation naturelle (T3, T4) se fait à :",o:["Température ambiante","400 °C pendant 2 h","100 °C pendant 24 h","-20 °C pendant 1 h"],c:0,e:"La <b>maturation naturelle</b> = durcissement par précipitation à <b>température ambiante</b>. Les précipités se forment <b>lentement</b> (zones GP). T3 = mise en solution + trempe + écrouissage + maturation naturelle. T4 = sans écrouissage. T6 = revenu <b>artificiel</b> (chauffage ~175 °C, plus rapide et plus dur)."},
],
L2:[
{q:"La CSC (corrosion sous contrainte) touche surtout :",o:["Les alliages 7xxx (Al-Zn)","Les alliages 6xxx (Al-Mg-Si)","L'aluminium pur","Les alliages 1xxx"],c:0,e:"La <b>CSC</b> (Stress Corrosion Cracking) = fissuration d'un alliage sous l'effet combiné d'une <b>contrainte mécanique</b> et d'un <b>environnement corrosif</b>. Les <b>7xxx</b> (surtout 7075-T6) y sont particulièrement sensibles. Le traitement T7 réduit ce risque."},
{q:"Le plaquage (cladding) d'une tôle 2024 consiste à :",o:["Recouvrir d'alu pur pour la corrosion","Ajouter du chrome pour la dureté","Déposer du nickel par électrolyse","Appliquer une peinture époxy"],c:0,e:"Le <b>plaquage</b> (cladding) : on colle une fine couche d'<b>alu pur</b> (série 1xxx) sur la tôle 2024. L'alu pur se corrode préférentiellement (anode sacrificielle) et protège le 2024. Technique utilisée massivement sur les fuselages."},
{q:"Les zones GP (Guinier-Preston) sont :",o:["Les premiers amas atomiques avant les précipités","Des fissures microscopiques dans le grain","Des bulles de gaz piégées à la coulée","Des défauts créés par le soudage"],c:0,e:"Les <b>zones GP</b> = premiers amas d'atomes de soluté (Cu dans le 2024) qui se forment lors de la maturation. Elles sont <b>cohérentes</b> avec la matrice (même réseau cristallin, légèrement distordu). Séquence de précipitation : solution solide → zones GP → θ'' → θ' → θ (Al₂Cu). Les zones GP et θ'' durcissent le plus."},
{q:"Le 7075-T73 vs 7075-T6 : pourquoi accepter moins de Rm ?",o:["Résistance CSC bien meilleure en T73","Le T73 est moins cher à produire","Le T73 se soude plus facilement","Le T6 est interdit en aéro"],c:0,e:"Le <b>T73</b> (sur-revenu) donne un Rm inférieur au T6 (~500 vs ~570 MPa), mais la résistance à la <b>corrosion sous contrainte</b> (CSC) est <b>bien meilleure</b>. Sur des pièces fortement chargées en environnement corrosif (longerons, semelles d'aile), le gain en durabilité justifie la perte de résistance statique."},
{q:"La corrosion exfoliante de l'alu est :",o:["Des feuillets qui se soulèvent en couches","Des trous profonds localisés","Une corrosion uniforme sur toute la surface","Une corrosion uniquement en milieu acide"],c:0,e:"La <b>corrosion exfoliante</b> = la corrosion progresse le long des <b>joints de grains aplatis</b> (structure laminée) → des feuillets de métal se soulèvent comme des pages de livre. Fréquente sur les alliages 2xxx et 7xxx laminés, surtout en environnement marin. Visible et spectaculaire."},
{q:"L'alliage Al-Li est intéressant car :",o:["Le lithium allège l'alu","Le lithium rend l'alu plus ductile","Le lithium est très bon marché","Le lithium protège contre la corrosion"],c:0,e:"Les alliages <b>Al-Li</b> (2195, 2050) = aluminium + lithium. Chaque % de Li ajouté réduit la densité de ~3 % et augmente le module de ~6 %. Utilisés dans l'A350 (fuselage, cadres). Plus chers que les 2xxx/7xxx classiques mais plus légers."},
{q:"Le terme 'clad' sur une tôle alu signifie :",o:["Plaquée d'une couche d'alu pur protecteur","Traitée thermiquement au T6","Anodisée en ASA","Peinte avec un primaire anticorrosion"],c:0,e:"<b>Clad</b> = la tôle alu est <b>plaquée</b> d'une fine couche d'alu pur (série 1xxx) des deux côtés. L'alu pur se corrode préférentiellement (anode sacrificielle) et protège l'alliage structural. Épaisseur du cladding : ~5 % de l'épaisseur totale de chaque côté."},
],L3:[
{q:"Aile d'avion : 7075-T6 ou 2024-T3 ?",o:["7075-T6 (résistance statique prioritaire)","2024-T3 (fatigue prioritaire)","Les deux sont équivalents pour les ailes","Aucun des deux (titane obligatoire)"],c:0,e:"Les <b>ailes et longerons</b> sont dimensionnés par la <b>résistance statique</b> (portance, flexion) → <b>7075-T6</b> (Rm 570 MPa vs 485 MPa pour le 2024). Le <b>fuselage</b> est dimensionné par la <b>fatigue</b> (pressurisation cyclique) → <b>2024-T3</b>. La CSC du 7075 est gérée par le traitement T73 ou la protection de surface."},
{q:"Protection anticorrosion d'un rivet 2024 en zone humide :",o:["Anodisation + primaire anticorrosion","Aucune protection","Galvanisation au zinc à chaud","Nickelage électrolytique épais"],c:0,e:"Les rivets 2024 en zone humide (bord d'attaque, zone d'éclissage) reçoivent une <b>anodisation</b> (couche d'oxyde protectrice) + un <b>primaire anticorrosion</b> (historiquement chromique, remplacé par des primaires sans CrVI). L'alu ne rouille pas mais il se corrode (piqûres, CSC, corrosion galvanique). La galvanisation est pour l'acier, pas l'alu."},
]},

// ==================== MÉTAUX - TI/NI ====================
met_ti_ni:{title:'Titane & Superalliages Ni',mod:'metaux',
lessons:[
{t:"Titane Ti-6Al-4V",en:"Titanium Ti-6Al-4V",b:"50 % du marché Ti. 6 % Al + 4 % V. Biphasique alpha+bêta.<br>Densité 4,43 (vs 7,8 acier). Rm ~1000 MPa. Tenue 400-500 °C.<br>Usages : disques/aubes compresseur, pièces structurales.<br>Excellente résistance corrosion (TiO₂ naturelle). Usinage difficile."},
{t:"Superalliages base nickel",en:"Nickel-based superalloys",b:"Parties chaudes (1000-1100 °C).<br><span class='key'>Inconel 718</span> : le plus courant. Ni+Cr+Fe+Nb+Mo. Disques, carters.<br><span class='key'>Waspaloy</span> : Ni+Cr+Co+Mo. Aubes turbine.<br>TdS : barrières thermiques (YSZ) + aluminisation + grenaillage."},
{t:"Du fan à la turbine : quel métal où ?",en:"Materials across the engine",b:"Dans un turboréacteur, la <span class='key'>température augmente</span> de l'avant vers l'arrière. Le choix du métal suit cette contrainte :<br><br><span class='key'>Fan</span> (entrée d'air, ~100 °C) : aubes en <b>composite</b> (tissé 3D, LEAP) ou <b>titane</b>. Carter en composite.<br><br><span class='key'>Compresseur BP</span> (~200 °C) : disques et aubes en <b>titane</b> (Ti-6Al-4V).<br><br><span class='key'>Compresseur HP</span> (~400 °C) : disques et aubes en <b>titane</b> (limite haute du Ti).<br><br><span class='key'>Chambre de combustion</span> (~1500 °C flamme) : parois en <b>superalliage Ni</b> (Hastelloy X).<br><br><span class='key'>Turbine HP</span> (~1000 °C) : aubes en <b>superalliage Ni monocristallin</b> + barrière thermique YSZ + refroidissement interne. Disques en <b>Inconel 718</b>.<br><br><span class='key'>Turbine BP</span> (~700 °C) : aubes en <b>superalliage Ni</b> ou <b>CMC</b> (SiC/SiC dans le LEAP).<br><br><div class='remember'>Règle simple : plus c'est chaud, plus c'est lourd et cher. On met le métal le plus léger possible compatible avec la température.</div>"},
],
L1:[
{q:"Un superalliage est un alliage qui résiste à :",o:["Très haute température (>600 °C)","Très basse température (<-100 °C)","L'eau de mer uniquement","La lumière UV"],c:0,e:"Un <b>superalliage</b> est un alliage conçu pour fonctionner à <b>très haute température</b> (600 à 1100 °C) sous de fortes contraintes mécaniques. En aéro, les superalliages de <b>nickel</b> (Inconel 718, Waspaloy) sont utilisés dans les parties chaudes du moteur (turbine, chambre de combustion)."},
{q:"Le '6Al' dans Ti-6Al-4V signifie :",o:["6 % d'aluminium dans l'alliage","6 atomes par maille cristalline","Version 6 de l'alliage","Dureté de 6 sur l'échelle"],c:0,e:"Dans la nomenclature des alliages, les chiffres donnent le <b>pourcentage massique</b> de chaque élément d'addition. <b>Ti-6Al-4V</b> = <b>Ti</b>tane (base) + <b>6 %</b> d'<b>Al</b>uminium + <b>4 %</b> de <b>V</b>anadium. L'aluminium stabilise la phase alpha (résistance), le vanadium stabilise la phase bêta (ductilité)."},
{q:"Quel métal tient plus de 1000 °C en moteur ?",o:["Le nickel","L'aluminium","Le titane","Le cuivre"],c:0,e:"Seuls les <b>superalliages de nickel</b> (Inconel 718, Waspaloy) tiennent >1000 °C en service continu. L'alu fond à 660 °C. Le titane est limité à ~500 °C. C'est pour ça que les <b>aubes de turbine HP</b> sont en superalliage Ni + barrière thermique (YSZ)."},
{q:"Le titane c'est quoi en un mot ?",o:["Un métal mi-lourd, résistant et anticorrosion","Le métal le plus lourd","Un composite fibre-métal","Un traitement de surface"],c:0,e:"Le <b>titane</b> = un métal de densité intermédiaire (<b>4,5 g/cm³</b>, entre l'alu à 2,7 et l'acier à 7,8). Il est <b>très résistant</b> (Rm ~1000 MPa) et possède une couche d'oxyde naturelle (TiO₂) qui le rend <b>pratiquement incorrodable</b>. En aéro : disques et aubes de compresseur, pièces structurales."},
{q:"Pourquoi le titane ne rouille pas ?",o:["Sa couche d'oxyde naturelle le protège","Il est recouvert de peinture en usine","On lui applique un traitement de surface obligatoire","Le titane est trop noble pour réagir"],c:0,e:"Le titane forme une couche de <b>TiO₂</b> (oxyde de titane) naturelle et ultra-stable à sa surface. Cette couche se reforme instantanément si on la raye. C'est une <b>passivation naturelle</b> exceptionnelle → le titane résiste à l'eau de mer, aux acides, à la plupart des milieux corrosifs."},
{q:"Le titane est plus lourd ou plus léger que l'acier ?",o:["Plus léger","Plus lourd","Même poids","Ça dépend de l'alliage"],c:0,e:"Le titane (<b>4,5 g/cm³</b>) est presque <b>2 fois plus léger</b> que l'acier (7,8 g/cm³). Mais il est plus lourd que l'alu (2,7 g/cm³). Son avantage : il est <b>aussi résistant que l'acier</b> tout en étant beaucoup plus léger. C'est ce rapport résistance/poids qui le rend précieux en aéro."},
{q:"L'Inconel 718 est un alliage à base de :",o:["Nickel (Ni)","Aluminium (Al)","Titane (Ti)","Fer (Fe)"],c:0,e:"L'<b>Inconel 718</b> = superalliage à base de <b>nickel</b> + chrome + fer + niobium + molybdène. C'est le superalliage le <b>plus courant</b> en aéro. Utilisé pour les <b>disques de turbine</b>, carters, et pièces structurales de moteur. Rm ≈ 1400 MPa, tenue jusqu'à ~700 °C."},
{q:"C'est quoi une barrière thermique ?",o:["Une couche céramique qui isole de la chaleur","Une couche de peinture ignifuge","Un alliage qui fond à haute température","Un système de refroidissement par eau"],c:0,e:"Une <b>barrière thermique</b> (TBC, Thermal Barrier Coating) = couche de <b>céramique</b> (YSZ = zircone yttriée) déposée par projection plasma sur les aubes de turbine. Elle <b>isole le métal de la chaleur</b> des gaz (1500 °C+). Sans cette couche, le superalliage fondrait. Épaisseur : 100-400 µm."},
{q:"Le titane est limité en température à environ :",o:["400-500 °C","1000 °C","100 °C","2000 °C"],c:0,e:"Le titane perd ses propriétés mécaniques au-dessus de <b>400-500 °C</b>. C'est pour ça qu'on l'utilise dans le <b>compresseur</b> (température modérée) mais pas dans la <b>turbine</b> (>1000 °C → superalliage nickel + barrière thermique)."},
{q:"Les aubes de turbine HP sont en :",o:["Superalliage base nickel","Alliage d'aluminium","Alliage de titane","Acier inoxydable"],c:0,e:"La turbine HP fonctionne à <b>1000 °C+</b> → seuls les <b>superalliages base nickel</b> (Inconel 718, Waspaloy) tiennent. L'alu fond à 660 °C, le titane est limité à ~500 °C. Les superalliages sont protégés par des <b>barrières thermiques</b> (YSZ) et de l'<b>aluminisation</b>."},
{q:"Le Ti-6Al-4V est utilisé pour :",o:["Compresseur et pièces structurales","Turbine haute pression","Fuselage et cabine","Rivets et petites fixations"],c:0,e:"Le <b>Ti-6Al-4V</b> (50 % du marché titane) : densité <b>4,43</b> (vs 7,8 acier), Rm ~1000 MPa, tenue jusqu'à <b>400-500 °C</b>. Utilisé pour les disques et aubes de <b>compresseur</b> + pièces <b>structurales</b>. Pas assez résistant en température pour la turbine HP."},
{q:"La densité du titane est :",o:["4,43 (environ moitié de l'acier)","7,8 (comme l'acier)","2,7 (comme l'aluminium)","8,9 (comme le nickel)"],c:0,e:"<b>Ti = 4,43</b>, soit environ la moitié de l'acier (7,8). C'est ce qui en fait un matériau de choix en aéro : <b>léger ET résistant</b>. L'alu (2,7) est plus léger mais bien moins résistant. Le nickel (8,9) est plus lourd mais tient les hautes températures."},
{q:"L'Inconel 718 contient principalement :",o:["Nickel + chrome + fer + niobium","Aluminium + cuivre + silicium","Titane + aluminium + vanadium","Fer + carbone + manganèse"],c:0,e:"L'<b>Inconel 718</b> (superalliage Ni) : <b>Ni + Cr + Fe + Nb + Mo</b>. C'est le superalliage le plus courant en aéro. Utilisé pour les disques de turbine et les carters. Tenue à 650 °C en continu."},
{q:"La couche d'oxyde naturelle du titane (TiO₂) est :",o:["Ultra-stable et protectrice","Fragile et poreuse","Épaisse mais peu protectrice","Inexistante sans traitement"],c:0,e:"Le titane forme naturellement une couche de <b>TiO₂</b> extrêmement <b>stable et protectrice</b>. C'est pourquoi le titane résiste très bien à la corrosion, même en milieu marin ou acide. Pas besoin de traitement anticorrosion dans la plupart des cas."},
{q:"Le Waspaloy est utilisé pour :",o:["Les aubes de turbine haute température","Le fuselage des avions","Les vitres du cockpit","La boulonnerie courante"],c:0,e:"Le <b>Waspaloy</b> (Ni+Cr+Co+Mo) est un superalliage de nickel conçu pour les <b>aubes de turbine</b> qui opèrent à 700-800 °C+. Plus résistant au fluage que l'Inconel 718 mais plus cher et plus difficile à usiner."},
{q:"Le titane est difficile à usiner car :",o:["Il est dur, réactif et mauvais conducteur thermique","Il est trop mou et se déforme","Il rouille pendant l'usinage","Il s'oxyde trop vite à l'air ambiant"],c:0,e:"Le titane est <b>dur</b> (Rm ~1000 MPa), <b>réactif chimiquement</b> à chaud (il colle aux outils), et surtout un <b>mauvais conducteur thermique</b> → la chaleur reste concentrée sur l'arête de coupe de l'outil → usure très rapide. On utilise des outils en carbure ou CBN avec beaucoup de lubrifiant."},
{q:"La température max d'utilisation du Ti-6Al-4V est :",o:["400-500 °C","1000 °C","200 °C","800 °C"],c:0,e:"Le <b>Ti-6Al-4V</b> tient jusqu'à <b>400-500 °C</b>. Au-delà, il perd trop de résistance et s'oxyde. C'est pour ça qu'il est utilisé dans le <b>compresseur</b> (air ~400 °C) mais pas dans la <b>turbine HP</b> (gaz ~1000 °C+, domaine des superalliages nickel)."},
],
L2:[
{q:"Un alliage alpha+bêta (comme le Ti-6Al-4V) a :",o:["Deux phases cristallines distinctes","Une seule phase cubique","Pas de structure cristalline","Trois phases en équilibre"],c:0,e:"Le Ti-6Al-4V est <b>biphasique α+β</b>. La phase <b>α</b> (hexagonale) donne la résistance au fluage. La phase <b>β</b> (cubique) donne la ductilité et la formabilité. L'aluminium stabilise α, le vanadium stabilise β."},
{q:"La barrière thermique YSZ est faite de :",o:["Zircone stabilisée à l'yttrium","Alumine renforcée de fibres","Carbure de silicium","Nitrure de bore"],c:0,e:"<b>YSZ</b> = Yttria-Stabilized Zirconia (ZrO₂ + Y₂O₃). C'est un <b>isolant thermique</b> céramique déposé sur les aubes de turbine HP. Il permet au superalliage de supporter des températures de gaz supérieures à sa propre limite de fusion, grâce au refroidissement interne de l'aube."},
{q:"L'aluminisation des aubes de turbine crée :",o:["Une couche d'aluminiure protectrice anti-oxydation","Une couche d'alu pur anti-corrosion","Un dépôt d'alumine isolante","Un alliage Al-Ni dans la masse"],c:0,e:"L'<b>aluminisation</b> = diffusion d'aluminium dans la surface du superalliage Ni → formation d'une couche d'<b>aluminiure</b> (NiAl). À haute température, cette couche forme de l'<b>alumine</b> (Al₂O₃) en surface qui protège contre l'<b>oxydation</b>. C'est la sous-couche classique avant la barrière thermique YSZ."},
{q:"L'Inconel 718 tient en continu jusqu'à :",o:["~650 °C","~400 °C","~1000 °C","~200 °C"],c:0,e:"L'<b>Inconel 718</b> est limité à ~<b>650 °C</b> en continu (les précipités γ'' se dissolvent au-delà). Pour les températures plus élevées (700-1000 °C), on utilise le <b>Waspaloy</b> ou des superalliages monocristallins (CMSX-4, René N5). L'Inconel 718 reste le plus utilisé car il est le plus facile à forger et usiner."},
{q:"Le procédé HIP (Hot Isostatic Pressing) sur une pièce coulée en superalliage sert à :",o:["Refermer les porosités internes sous pression et température","Augmenter la taille des grains","Déposer un revêtement protecteur","Usiner les canaux de refroidissement"],c:0,e:"Le <b>HIP</b> = compression isostatique à chaud (typiquement 1200 °C, 100-200 MPa d'argon). La pression + température <b>referment les microporosités</b> de fonderie par diffusion. Résultat : meilleure tenue en fatigue (les pores sont des amorces de fissure). Obligatoire sur les pièces critiques de turbine."},
{q:"La phase α du titane est de structure :",o:["Hexagonale compacte (HC)","Cubique centrée (CC)","Cubique faces centrées (CFC)","Amorphe"],c:0,e:"Le titane a deux phases : <b>α</b> = <b>hexagonale compacte</b> (HC), stable à basse température, bonne résistance au fluage. <b>β</b> = <b>cubique centrée</b> (CC), stable à haute température, plus ductile. Le Ti-6Al-4V contient les deux phases → compromis résistance/ductilité."},
{q:"Le revêtement MCrAlY sur une aube de turbine est :",o:["Une sous-couche anti-oxydation sous la barrière thermique","Un lubrifiant haute température","Un isolant électrique","Un traitement de surface esthétique"],c:0,e:"<b>MCrAlY</b> (M = Ni ou Co) est une <b>sous-couche d'adhérence et anti-oxydation</b> déposée entre le superalliage et la barrière thermique YSZ. Elle forme de l'<b>alumine protectrice</b> (Al₂O₃) en surface, empêchant l'oxydation du métal de base. Sans MCrAlY, la barrière thermique n'adhère pas et le superalliage s'oxyde."},
],L3:[
{q:"Compresseur HP → turbine HP : quel changement de matériau et pourquoi ?",o:["Titane → superalliage Ni (la température augmente)","Alu → titane (la pression augmente)","Acier → composite (le poids diminue)","Nickel → titane (la corrosion augmente)"],c:0,e:"Dans un turboréacteur, la température augmente de l'avant vers l'arrière : <b>compresseur</b> (~400 °C) = <b>titane</b> (Ti-6Al-4V), puis <b>chambre de combustion et turbine HP</b> (~1000 °C+) = <b>superalliages de nickel</b> (Inconel 718, Waspaloy). Le choix du matériau suit directement la contrainte thermique."},
{q:"Inconel 718 vs Waspaloy : lequel pour un disque de turbine ?",o:["Inconel 718 (forgeabilité + coût)","Waspaloy (meilleure usinabilité)","Les deux sont identiques en performance","Aucun des deux (on utilise du titane)"],c:0,e:"Les <b>disques de turbine</b> sont de grandes pièces forgées → l'<b>Inconel 718</b> est préféré car il se <b>forge mieux</b>, se soude bien, et coûte moins cher. Le <b>Waspaloy</b> est réservé aux <b>aubes</b> (plus petites) où sa meilleure tenue en fluage est indispensable. Le titane ne tient pas les 650 °C du disque turbine."},
{q:"Les aubes monocristallines (CMSX-4) résistent mieux au fluage car :",o:["Pas de joints de grains = pas de glissement intergranulaire","Le monocristal est plus léger","Le monocristal conduit mieux la chaleur","Le monocristal se forge plus facilement"],c:0,e:"Le <b>fluage</b> à haute température progresse principalement par <b>glissement aux joints de grains</b>. Un <b>monocristal</b> n'a pas de joints de grains → ce mécanisme est supprimé → durée de vie en fluage multipliée par 5 à 10 vs polycristallin. C'est pourquoi les aubes de turbine HP sont coulées en monocristal (solidification dirigée)."},
{q:"Le rôle des précipités γ' (gamma prime) dans les superalliages Ni :",o:["Bloquer les dislocations pour durcir l'alliage","Améliorer la conductivité thermique","Réduire la densité de l'alliage","Protéger contre la corrosion"],c:0,e:"Les précipités <b>γ'</b> (Ni₃Al, Ni₃Ti) sont des particules ordonnées cohérentes avec la matrice γ. Ils <b>bloquent les dislocations</b> et, fait remarquable, leur résistance <b>augmente avec la température</b> (anomalie de limite d'élasticité). C'est le principal mécanisme de durcissement des superalliages (60-70 % de γ' dans les aubes monocristallines)."},
{q:"Pourquoi le titane est interdit dans les zones > 500 °C d'un moteur ?",o:["Il s'enflamme en cas de frottement (titanium fire)","Il fond à 500 °C","Il devient radioactif","Il perd sa couleur et se décolore"],c:0,e:"Le titane est <b>pyrophorique</b> au-delà de 500 °C : en cas de <b>frottement</b> (contact rotor-stator), il peut s'enflammer et la combustion se propage (le Ti brûle dans l'azote aussi). C'est le phénomène de <b>titanium fire</b>, un risque majeur en motorisation. Au-delà de 500 °C → superalliages Ni obligatoires."},
]},
