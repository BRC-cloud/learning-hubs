{cat:'TdS',color:'var(--green)',q:"Un lot de pièces anodisées revient non conforme : l'épaisseur de couche est trop faible. Quelles causes investiguez-vous ?",hint:"Pense aux 5M (Matière, Milieu, Méthode, Machine, Main-d'œuvre). L'anodisation = un procédé électrochimique, donc pense aux paramètres du bain (concentration, température) et aux paramètres électriques (courant, temps, contact).",keys:["① Réflexe qualité d'abord : isoler le lot suspect, sortir la fiche suiveuse (paramètres enregistrés vs spécification). Comparer avec les derniers lots conformes → qu'est-ce qui a changé ?","② Bain — Milieu : concentration H₂SO₄ trop élevée → la dissolution l'emporte sur la formation (la couche se dissout plus vite qu'elle ne se forme). Température du bain trop haute → même effet, dissolution accélérée","③ Électrique — Machine/Méthode : densité de courant trop faible = formation trop lente de la couche. Temps de traitement trop court. Vérifier l'alimentation électrique et le programme de traitement","④ Accrochage — Main-d'œuvre/Machine : contact électrique défaillant sur le montage → certaines pièces ne reçoivent pas assez de courant. Surcharge du bain (trop de pièces = courant partagé)","⑤ Matière première : alliage non conforme, teneur en silicium élevée. Le Si forme des phases insolubles qui bloquent la croissance de la couche anodique → toujours vérifier le certificat matière","⑥ Conclusion : structurer l'analyse en diagramme d'Ishikawa (5M), prioriser par probabilité, vérifier les enregistrements avant de lancer des essais"]},
{cat:'TdS',color:'var(--green)',q:"Qu'est-ce que la corrosion galvanique ? Comment la prévient-on en assemblage aéro ?",keys:["① Définition : deux métaux différents en contact + un électrolyte (humidité, condensation, eau salée) → le métal le plus actif (anode) se corrode pour protéger le plus noble. C'est une pile électrochimique non désirée","② Cas concret aéro : les panneaux fuselage en alu 2024 sont rivetés à des panneaux en composite CFRP. Les fibres de carbone sont conductrices et très nobles dans la série galvanique (proche du platine). Résultat : l'alu se corrode au niveau de chaque fixation","③ Série galvanique (du plus actif au plus noble) : Mg > Al > Zn > Fe > Ni > Cu > Ti passif > CFRP. Plus l'écart de potentiel entre les deux matériaux est grand, plus la corrosion est agressive et rapide","④ Pourquoi des fixations titane ? Le Ti passivé a un potentiel intermédiaire compatible avec l'alu ET le CFRP (faible écart avec les deux). Une fixation acier sur tôle alu = corrosion galvanique garantie de l'alu","⑤ Protection multi-barrières en assemblage : mastic d'interposition (type PR-1776) entre les surfaces en contact, primer anticorrosion sur l'alu, rondelles isolantes aux interfaces, sealant humide posé avant serrage des fixations","⑥ Exemples concrets : aile A350 = panneaux CFRP assemblés avec fixations titane (jamais acier). Fuselage A320 = tôles alu 2024 rivetées entre elles (même métal = pas de couple galvanique, pas de risque)"]},
{cat:'Qualité',color:'#b45309',q:"Qu'est-ce qu'un FAI (First Article Inspection) et pourquoi est-il critique en aéro ?",keys:["① Définition : le FAI = inspection complète de la toute première pièce produite. On vérifie TOUTES les cotes et exigences du plan, pas un échantillon. C'est le feu vert avant la production série","② Pourquoi c'est critique : il valide que le procédé de fabrication est capable de produire des pièces conformes. En aéro, on ne peut pas se permettre de découvrir un problème après avoir produit 500 pièces","③ Le document normé : formulaire AS9102, composé de 3 parties. Form 1 = référence plan et indices. Form 2 = caractéristiques matériaux et procédés spéciaux. Form 3 = résultats de mesure (chaque cote du plan mesurée et enregistrée)","④ Quand le refaire : obligatoire à la première production, mais aussi après tout changement significatif — nouvel outillage, nouveau fournisseur matière, modification du procédé, déménagement de ligne. Tout changement remet le compteur à zéro","⑤ L'enjeu contractuel : le FAI engage la responsabilité du fournisseur auprès du donneur d'ordre (Airbus, Safran...). Un FAI incomplet ou erroné = non-conformité majeure en audit AS9100/Nadcap"]},
{cat:'Qualité',color:'#b45309',q:"Un Cpk de 0,8 sur une cote critique. Que faites-vous ?",keys:["① Diagnostic immédiat : Cpk 0,8 est inférieur à 1,33 (seuil aéro) → le procédé n'est PAS capable. Statistiquement, environ 1 à 2 % des pièces sortent hors tolérance. C'est inacceptable sur une cote critique","② Action court terme (contenir le problème) : tri 100 % des pièces du lot pour isoler les non-conformes. Si des pièces hors tolérance sont déjà livrées → alerte client immédiate et demande de concession si nécessaire","③ Analyse des causes (5M/Ishikawa) : Machine (usure outil, jeu dans la broche), Méthode (paramètres de coupe non optimaux), Matière (lot matière différent, dureté variable), Main-d'œuvre (opérateur), Mesure (vérifier que le moyen de mesure lui-même est capable)","④ Actions correctives : deux leviers. Recentrer le procédé (réglage machine si la moyenne est décalée par rapport à la cible). ET/OU réduire la dispersion (maintenance préventive, serrage des tolérances outils, stabilisation thermique)","⑤ Objectif et suivi : en aéro, Cpk minimum 1,33, idéalement 1,67 ou plus pour les caractéristiques critiques (KC). Mettre en place une carte de contrôle SPC pour surveiller la dérive en continu et réagir avant la prochaine non-conformité"]},
{cat:'Composites',color:'var(--teal)',q:"Quels sont les principaux défauts qu'on peut trouver dans une pièce composite stratifiée ? Comment les détecte-t-on ?",keys:["① Le point clé à poser d'entrée : en composite, les défauts sont souvent INVISIBLES en surface (contrairement aux métaux où on voit une fissure). D'où l'importance du contrôle non destructif (CND) systématique","② Les défauts de fabrication : porosité (bulles d'air piégées pendant la cuisson autoclave), délaminage (séparation entre plis, souvent dû à un choc ou un défaut de drapage), inclusion (corps étranger oublié dans le stratifié — film, gant...)","③ Les défauts géométriques : ondulation de fibres (wrinkling — les fibres ne sont plus alignées, forte perte de résistance en compression) et manque de résine (dry spot — fibres sèches, pas imprégnées, zone fragile)","④ Méthode de détection principale : ultrasons C-scan. On balaie la surface, les échos ultrasonores révèlent les discontinuités internes. C'est le CND n°1 en composite aéro, utilisé en production et en maintenance","⑤ Méthodes complémentaires : thermographie infrarouge (délaminages proches de la surface, rapide pour grandes surfaces), CT-scan/rayons X (visualisation 3D des défauts complexes comme le wrinkling), tap test (méthode simple au marteau pour détecter un délaminage en maintenance)","⑥ Les critères d'acceptation : chaque programme (A350, LEAP...) définit des seuils — pourcentage de porosité max, taille de délaminage admissible. Au-delà = rebut ou réparation selon la zone"]},
{cat:'Général',color:'var(--pri)',q:"Présentez votre parcours en 2 minutes : formation, expérience, et pourquoi ce poste vous intéresse.",keys:["① Formation — 20 secondes : 'Ingénieure en chimie et sciences des matériaux, diplômée de Paris-Saclay.' Pas de détail sur les cours, juste le positionnement. Court et factuel","② Expérience — 60 secondes : 'J'ai acquis mon expérience chez Aptar Group, en R&D matériaux.' Deux axes concrets : le développement d'un revêtement CVD (projet structurant, de la formulation à la qualification) et la caractérisation/sélection matière (DSC, FTIR, plans d'essais)","③ Ce que j'en retiens — 20 secondes : la compétence transversale. Travailler à l'interface entre R&D, laboratoire et production. Savoir transformer un besoin technique en plan d'essais, analyser les résultats, proposer une solution industrialisable","④ Pourquoi ce poste — 20 secondes : le lien CONCRET entre ce que j'ai fait et ce que le poste demande. 'Vos missions de [X] correspondent directement à mon parcours en [Y].' Montrer qu'on a lu l'annonce","⑤ Posture à tenir : ingénieure confirmée qui apporte une expertise, jamais une étudiante qui cherche à apprendre. Jamais 'je souhaite développer mon expertise' → toujours 'j'apporte mon expertise en...' ou 'je mets à profit mon expérience en...'"]},
{cat:'Général',color:'var(--pri)',q:"Donnez un exemple de problème technique que vous avez résolu. Contexte, démarche, résultat.",keys:["① Situation (poser le décor en 2 phrases) : 'Chez Aptar, nous avions un problème de [X] sur [produit/ligne].' Contexte industriel concret, pas académique. Donner l'enjeu : pourquoi c'était important","② Tâche (votre rôle) : 'J'étais en charge de [identifier la cause / proposer une solution / qualifier le nouveau matériau].' Clarifier votre périmètre de responsabilité — ce que VOUS avez fait, pas l'équipe","③ Action (la démarche méthodique) : 'J'ai structuré un plan d'essais : hypothèses → caractérisation → essais comparatifs → analyse des résultats.' Montrer la RIGUEUR de la démarche, pas juste le résultat. C'est ici qu'on voit l'ingénieure","④ Résultat (mesurable) : 'Le taux de conformité est passé de 40 à 80 %' ou 'La solution a été validée et industrialisée en 3 mois.' Un chiffre ou un livrable concret. Sans résultat mesurable, l'histoire n'a pas de conclusion","⑤ Prise de recul : 'Ce projet m'a appris [méthode / gestion de priorités / communication transverse].' ET 'Avec le recul, j'aurais [fait différemment X].' → montre la maturité et la capacité d'auto-critique. C'est souvent LA question de suivi"]},
{cat:'Général',color:'var(--pri)',q:"Pourquoi l'aéronautique et pas un autre secteur industriel ?",keys:["① Accroche personnelle : 'Ce qui m'a attirée, c'est le niveau d'exigence.' En aéro, une erreur matériau peut avoir des conséquences critiques → chaque décision technique est rigoureuse, documentée et tracée. Pour quelqu'un de rigoureux, c'est valorisant","② Le lien avec ma formation : la chimie des matériaux est au cœur de l'aéro — alliages d'aluminium, superalliages nickel, composites carbone, traitements de surface avancés. Mon Master couvre exactement ces sujets, ce n'est pas un secteur choisi par défaut","③ Ce qui distingue l'aéro des autres industries : un écosystème structuré (normes EN/AS, certifications Nadcap, qualifications procédés) où la compétence technique est reconnue et valorisée, pas juste le volume de production ou le coût","④ L'impact concret : on travaille sur des pièces qui volent — moteurs, cellules, satellites. C'est tangible et motivant. Quand un avion décolle, les matériaux et les traitements de surface qu'on a qualifiés sont dedans","⑤ Ma vision long terme : construire une expertise matériaux profonde (caractérisation, défaillance, qualification) dans un secteur qui pousse constamment vers l'innovation — nouveaux alliages, composites CMC, fabrication additive, substitution du chrome hexavalent"]},
];

let itwState={cur:0,revealed:[]};

function startInterview(){
  shuffleArr(ITW_Q);
  itwState={cur:0,revealed:[]};
  showPage('interview');
  renderInterview();
}

function renderInterview(){
  const pg=document.getElementById('pg-interview');
  const q=ITW_Q[itwState.cur];
  const n=itwState.cur+1;
  const tot=ITW_Q.length;
  pg.innerHTML=`
    <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.8rem">
      <button onclick="showPage('dashboard');renderDash()" style="background:none;border:none;font-size:1.2rem;cursor:pointer">←</button>
      <h3 style="font-size:.9rem;flex:1">Simulation Entretien (${n}/${tot})</h3>
    </div>
    <div class="itw-card">
      <div class="itw-cat" style="background:${q.color}">${q.cat}</div>
      <div class="itw-q">${q.q}</div>
      <textarea class="itw-textarea" id="itwAnswer" placeholder="Rédigez votre réponse ici comme si vous étiez en entretien..."></textarea>
      <p class="itw-hint">Prenez le temps de structurer votre réponse avant de révéler les points clés.</p>
      ${q.hint?'<p class="itw-hint" style="color:var(--green);font-style:italic;margin-top:.2rem">💡 '+q.hint+'</p>':''}
      <button class="itw-reveal" onclick="revealKeys()">Révéler les points clés attendus</button>
      <div class="itw-keys" id="itwKeys">
        <h5>Points clés à mentionner :</h5>
        <ul>${q.keys.map(k=>'<li>'+k+'</li>').join('')}</ul>
      </div>
      <div class="itw-self" id="itwSelf" style="display:none;margin-top:.5rem;gap:.3rem">
        <p style="font-size:.78rem;color:var(--muted);margin-bottom:.3rem">Auto-évaluation : combien de points clés avez-vous mentionnés ?</p>
        <div style="display:flex;gap:.3rem">
          <button onclick="itwNext('miss')" style="background:var(--red);flex:1;padding:.5rem;border:none;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;color:white">0-1 point</button>
          <button onclick="itwNext('partial')" style="background:var(--yellow);flex:1;padding:.5rem;border:none;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;color:white">2-3 points</button>
          <button onclick="itwNext('good')" style="background:var(--green);flex:1;padding:.5rem;border:none;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;color:white">4+ points</button>
        </div>
      </div>
    </div>
    ${itwState.cur<tot-1?'':'<p style="text-align:center;color:var(--muted);font-size:.82rem">Dernière question de la session.</p>'}
  `;
}

function revealKeys(){
  document.getElementById('itwKeys').style.display='block';
  document.getElementById('itwSelf').style.display='block';
}

function itwNext(rating){
  itwState.revealed.push(rating);
  if(itwState.cur<ITW_Q.length-1){
    itwState.cur++;
    renderInterview();
    window.scrollTo(0,0);
  } else {
    renderItwResult();
  }
}

function renderItwResult(){
  const pg=document.getElementById('pg-interview');
  const total=itwState.revealed.length;
  const good=itwState.revealed.filter(r=>r==='good').length;
  const partial=itwState.revealed.filter(r=>r==='partial').length;
  const miss=itwState.revealed.filter(r=>r==='miss').length;
  const score=Math.round((good*2+partial)/(total*2)*100);
  pg.innerHTML=`
    <div style="text-align:center;padding:1.5rem 0">
      <div style="font-size:2.5rem;font-weight:800;color:${score>=70?'var(--green)':score>=40?'var(--yellow)':'var(--red)'}">${score}%</div>
      <p style="color:var(--muted);margin:.4rem 0">Score simulation entretien</p>
      <div style="display:flex;justify-content:center;gap:1rem;margin:1rem 0">
        <div><span style="font-weight:700;color:var(--green)">${good}</span><br><small style="color:var(--muted)">Maîtrisées</small></div>
        <div><span style="font-weight:700;color:var(--yellow)">${partial}</span><br><small style="color:var(--muted)">Partielles</small></div>
        <div><span style="font-weight:700;color:var(--red)">${miss}</span><br><small style="color:var(--muted)">À travailler</small></div>
      </div>
      <button class="start-btn" onclick="startInterview()" style="max-width:300px;margin:.5rem auto">Recommencer</button>
      <button class="start-btn" onclick="showPage('dashboard');renderDash()" style="max-width:300px;margin:.3rem auto;background:var(--bg);color:var(--text);border:1px solid var(--border)">Retour accueil</button>
    </div>
  `;
}

// INIT
initDark();
renderDash();
</script>

</body>
</html>
