tds_bases:{title:'Électrochimie & Bases TdS',mod:'tds',
lessons:[
{t:"C'est quoi un traitement de surface (TdS) ?",en:"What is surface treatment?",b:"Un <span class='key'>traitement de surface</span> = modifier la <b>surface</b> d'une pièce métallique pour la protéger ou améliorer ses propriétés, <b>sans changer le métal à l'intérieur</b>.<br><br><b>Pourquoi c'est indispensable en aéro ?</b><br>- <span class='key'>Corrosion</span> : un avion vole dans l'humidité, le sel marin, la pluie → le métal se détériore<br>- <span class='key'>Usure</span> : des pièces frottent les unes contre les autres → il faut une surface dure<br>- <span class='key'>Fatigue</span> : les vibrations créent des microfissures → le <span class='key'>grenaillage</span> (= projeter des billes à haute vitesse sur la pièce pour créer des contraintes de compression qui empêchent les fissures) renforce la surface<br>- <span class='key'>Température</span> : les aubes de turbine à 1000 °C+ → barrière thermique<br><br><b>Les grandes familles de TdS :</b><br>- <span class='key'>Anodisation</span> : on fait pousser une couche d'oxyde sur l'aluminium (protection + dureté)<br>- <span class='key'>Conversion chimique</span> : couche fine de protection sans courant (Alodine, TCP)<br>- <span class='key'>Électrodéposition</span> : on dépose un autre métal sur la pièce (nickelage, chromage, Zn-Ni)<br>- <span class='key'>Passivation</span> : on renforce la couche d'oxyde naturelle (inox, titane)<br>- <span class='key'>Projection thermique</span> : on projette des particules (HVOF, barrières thermiques)"},
{t:"Oxydation et réduction",en:"Oxidation and reduction",b:"<span class='key'>Oxydation</span> <span class='en'>(Oxidation)</span> = perte d'électrons. Se produit à l'<span class='key'>anode</span>.<br><span class='key'>Réduction</span> <span class='en'>(Reduction)</span> = gain d'électrons. Se produit à la <span class='key'>cathode</span>.<br><br>Mnémonique : <span class='key'>AN-OX</span> (Anode = Oxydation).<br><br>En TdS :<br>- <span class='key'>Anodisation</span> : la pièce est l'anode → elle s'oxyde → couche d'oxyde protectrice<br>- <span class='key'>Électrodéposition</span> : la pièce est la cathode → les ions métalliques se déposent dessus"},
{t:"Loi de Faraday",en:"Faraday's law",b:"<div class='formula'>m = (M × I × t) / (n × F)</div>m = masse déposée (g), M = masse molaire (g/mol), I = courant (A), t = temps (s), n = électrons échangés, <span class='key'>F = 96 485 C/mol</span> (constante de Faraday).<br><br>En pratique : plus de courant ou plus de temps = couche plus épaisse."},
{t:"Série galvanique et pH",en:"Galvanic series and pH",b:"Chaque métal a un potentiel standard (E°) :<br>Nobles : Au > Pt > Ag > Cu > Ti (passif)<br>Actifs : Fe (-0,44 V) > Zn (-0,76 V) > <span class='key'>Al (-1,66 V)</span> > Mg (-2,37 V)<br><br>2 métaux en contact + électrolyte → le <span class='key'>plus actif se corrode</span> (corrosion galvanique).<br><br><span class='key'>pH</span> = -log[H⁺]. 0-14, neutre = 7.<br>Bains acides (pH 0-6) : décapage, anodisation sulfurique.<br>Bains alcalins (pH 8-14) : dégraissage, zingage alcalin."},
{t:"La voie humide : bains et chimie",en:"Wet processing: baths and chemistry",b:"La <span class='key'>voie humide</span> = tous les procédés TdS où la pièce est plongée dans un <b>bain liquide</b> (solution aqueuse). C'est la majorité des TdS en aéro.<br><br><b>Un bain, c'est quoi concrètement ?</b><br>Une <span class='key'>cuve</span> (inox, polypropylène ou titane) remplie d'une <b>solution chimique</b> = de l'eau + des <b>sels</b> dissous. Les sels libèrent des <span class='key'>ions</span> dans l'eau (ex : NiSO₄ → Ni²⁺ + SO₄²⁻). Ce sont ces ions qui font le travail.<br><br><b>Les paramètres critiques d'un bain :</b><br>- <span class='key'>Concentration</span> (g/L) : combien de produit chimique par litre. Trop peu = trop lent, trop = dépôt rugueux<br>- <span class='key'>Température</span> (°C) : chaque bain a sa plage. Ex : ASA = 18-22 °C (froid), Watts = 45-65 °C (chaud)<br>- <span class='key'>pH</span> : acide/neutre/basique. Le pH doit rester stable sinon le traitement change de qualité<br>- <span class='key'>Agitation</span> : on remue le bain (air comprimé ou mécanique) pour que la solution se renouvelle partout<br>- <span class='key'>Densité de courant</span> (A/dm²) : pour les procédés électrochimiques, le courant divisé par la surface de la pièce<br><br><b>Maintenance du bain :</b> on <b>analyse</b> régulièrement (concentration, pH, impuretés) et on <b>corrige</b> : rajout de sels, ajustement pH, filtration. Un bain mal entretenu = non-conformités."},
{t:"Rinçage et eau en TdS",en:"Rinsing and water in surface treatment",b:"Le <span class='key'>rinçage</span> est une étape invisible mais <b>critique</b>. Entre chaque bain, on plonge la pièce dans de l'eau pour enlever les résidus du bain précédent.<br><br><b>Pourquoi c'est si important ?</b><br>Sans rinçage, le liquide du bain précédent <span class='key'>contamine</span> le bain suivant. Ex : des traces d'acide de décapage dans le bain de nickelage → dépôt de mauvaise qualité.<br><br><b>Types de rinçage :</b><br>- <span class='key'>Rinçage simple</span> : un bac d'eau, on plonge. Le plus basique.<br>- <span class='key'>Rinçage cascade</span> : 2-3 bacs en série. L'eau propre arrive dans le dernier bac et déborde vers les précédents. Économise l'eau.<br>- <span class='key'>Rinçage final</span> : en eau <span class='key'>déminéralisée</span> (eau DI) pour ne pas laisser de traces de calcaire.<br><br><b>Eau déminéralisée :</b> de l'eau purifiée dont on a retiré les <b>ions</b> (calcium, magnésium, chlore). L'eau du robinet contient trop d'impuretés pour les bains de TdS.<br><br><b>L'entraînement</b> (drag-out) = le film de liquide qui reste sur la pièce quand on la sort. On fait une <b>pause d'égouttage</b> pour limiter les pertes et la contamination."},
{t:"La corrosion : types et protection",en:"Corrosion types and protection",b:"La <span class='key'>corrosion</span> = la dégradation d'un métal par son environnement (eau, air, sel, acides). C'est l'ennemi n°1 en aéro.<br><br><b>Les grands types de corrosion :</b><br>- <span class='key'>Corrosion uniforme</span> : attaque régulière sur toute la surface (rouille de l'acier)<br>- <span class='key'>Corrosion par piqûres</span> (pitting) : petits trous profonds, très dangereux car invisibles en surface<br>- <span class='key'>Corrosion galvanique</span> : deux métaux différents en contact + eau → le plus actif se corrode<br>- <span class='key'>Corrosion sous contrainte</span> (CSC) : fissures causées par la combinaison d'une contrainte + un environnement corrosif<br>- <span class='key'>Corrosion intergranulaire</span> : attaque le long des joints de grains du métal<br>- <span class='key'>Corrosion exfoliante</span> : les couches du métal se soulèvent comme des feuilles (alu laminé)<br><br><b>Comment on se protège ?</b><br>1. <span class='key'>Choix du matériau</span> : choisir un alliage résistant à la corrosion (inox, titane)<br>2. <span class='key'>TdS</span> : anodisation, conversion chimique, peinture, nickelage...<br>3. <span class='key'>Conception</span> : éviter les pièges à eau, isoler les couples galvaniques<br>4. <span class='key'>Protection cathodique</span> : anode sacrificielle (zinc sur acier)"},
{t:"Électrochimie appliquée aux TdS",en:"Applied electrochemistry for surface treatment",b:"Tout ce que tu as appris en électrochimie s'applique directement aux TdS :<br><br><b>La cellule électrochimique en TdS :</b><br>Même principe que la <span class='key'>cellule 3 électrodes</span> du labo :<br>- <span class='key'>Anode</span> : fournit les ions métalliques (anode soluble) ou produit l'oxydation (anode inerte)<br>- <span class='key'>Cathode</span> : reçoit le dépôt (la pièce à traiter en électrodéposition)<br>- <span class='key'>Électrolyte</span> : le bain (solution d'ions métalliques)<br><br><b>La loi de Faraday en pratique :</b><br>En TdS on raisonne en <span class='key'>épaisseur</span> plutôt qu'en masse : épaisseur ∝ densité de courant × temps. Double le temps → double l'épaisseur. Double le courant → double l'épaisseur.<br><br><b>Densité de courant (A/dm²) :</b><br>Courant divisé par la surface de la pièce. Chaque bain a sa plage optimale. Trop faible = dépôt lent et mat. Trop forte = dépôt rugueux, brûlé, risque de <span class='key'>FPH</span>.<br><br><b>Rendement cathodique :</b><br>Pas tout le courant sert au dépôt : une partie produit de l'<span class='key'>hydrogène</span> (H₂). Bain de Watts (Ni) ≈ 95 %. Chromage dur ≈ 15 % (beaucoup d'H₂ → risque FPH élevé).<br><br><div class='remember'><b>Lien cours → industrie :</b> le <span class='key'>potentiostat</span> du labo impose un potentiel précis. En industrie TdS, on travaille plutôt en <b>courant imposé</b> (galvanostat) car c'est plus simple à contrôler à grande échelle.</div>"},
],
L1:[
{q:"Un traitement de surface sert à :",o:["Protéger la surface de la pièce","Changer le métal de base","Fondre la pièce pour la reformer","Assembler deux pièces entre elles"],c:0,e:"Un <b>traitement de surface</b> modifie uniquement la <b>surface</b> d'une pièce (quelques micromètres) pour la protéger contre la corrosion, l'usure, ou la chaleur. Le métal à l'intérieur reste identique. Exemples : anodisation de l'alu, nickelage de l'acier, barrière thermique sur les aubes de turbine."},
{q:"La corrosion d'un métal, c'est :",o:["La dégradation du métal par son environnement","Un traitement volontaire de protection","Le durcissement du métal par la chaleur","L'assemblage de deux métaux différents"],c:0,e:"La <b>corrosion</b> = la dégradation naturelle d'un métal au contact de son environnement (eau, air, sel, acides). Exemples : la <b>rouille</b> sur l'acier (oxyde de fer), la <b>corrosion galvanique</b> de l'alu en contact avec l'acier. Le TdS existe principalement pour <b>empêcher</b> la corrosion."},
{q:"La FPH (Fragilisation Par Hydrogène) c'est :",o:["L'hydrogène entre dans l'acier et le fragilise","Le fer perd ses atomes d'hydrogène","L'acier absorbe trop d'eau en surface","L'hydrogène protège l'acier de la corrosion"],c:0,e:"La <b>FPH</b> = pendant certains TdS (nickelage, décapage acide), de l'<b>hydrogène atomique</b> pénètre dans l'acier et le rend <b>fragile</b>.<br><svg viewBox='0 0 300 90' style='width:100%;max-width:300px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:6px'><defs><marker id='afph' markerWidth='8' markerHeight='6' refX='8' refY='3' orient='auto'><path d='M0,0 L8,3 L0,6' fill='#60a5fa'/></marker></defs><rect x='10' y='25' width='70' height='40' rx='4' fill='#334155' stroke='#94a3b8' stroke-width='1.5'/><text x='45' y='43' text-anchor='middle' fill='#e2e8f0' font-size='8' font-weight='bold'>Bain TdS</text><text x='45' y='55' text-anchor='middle' fill='#ef4444' font-size='7'>H⁺ → H</text><line x1='85' y1='45' x2='110' y2='45' stroke='#60a5fa' stroke-width='2' marker-end='url(#afph)'/><rect x='115' y='25' width='70' height='40' rx='4' fill='#475569' stroke='#f97316' stroke-width='2'/><text x='150' y='40' text-anchor='middle' fill='#fdba74' font-size='8' font-weight='bold'>Acier</text><text x='150' y='52' text-anchor='middle' fill='#fca5a5' font-size='7'>H piégé</text><text x='150' y='62' text-anchor='middle' fill='#fca5a5' font-size='6'>→ FRAGILE</text><line x1='190' y1='45' x2='215' y2='45' stroke='#60a5fa' stroke-width='2' marker-end='url(#afph)'/><rect x='220' y='25' width='70' height='40' rx='4' fill='#1e3a5f' stroke='#059669' stroke-width='2'/><text x='255' y='40' text-anchor='middle' fill='#6ee7b7' font-size='8' font-weight='bold'>Dégazage</text><text x='255' y='52' text-anchor='middle' fill='#6ee7b7' font-size='7'>190-230 °C</text><text x='255' y='62' text-anchor='middle' fill='#94a3b8' font-size='6'>4-24 h</text><text x='150' y='82' text-anchor='middle' fill='#fca5a5' font-size='8'>⚠ Délai max : 4 h après traitement !</text></svg>La pièce peut <b>casser sans prévenir</b> des heures ou jours plus tard. Solution obligatoire : <b>dégazage</b> dans les 4 h."},
{q:"Pourquoi traiter les surfaces en aéronautique ?",o:["Contre la corrosion, l'usure et la fatigue","Pour décorer les pièces de couleur","Pour rendre le métal transparent","Pour augmenter la masse de l'avion"],c:0,e:"En aéro, les TdS sont <b>critiques pour la sécurité</b>. Sans traitement : l'alu se corrode, les pièces s'usent, les fissures de fatigue se propagent. Un avion a des centaines de pièces traitées : fuselage (anodisation), train d'atterrissage (chromage/Zn-Ni), aubes turbine (barrière thermique)."},
{q:"À l'anode il se passe :",o:["Oxydation","Réduction","Rien","Corrosion galvanique"],c:0,e:"<b>AN-OX</b> = le mnémo essentiel : <b>AN</b>ode = <b>OX</b>ydation.<br><br><b>Oxydation</b> = perte d'électrons (à l'anode). Exemples : le métal qui se corrode perd des électrons, l'alu qui s'anodise forme une couche d'oxyde.<br><br><b>Réduction</b> = gain d'électrons (à la cathode). Exemples : les ions Cu²⁺ qui se déposent comme du cuivre métallique.<br><br><b>Application TdS :</b> en anodisation, la pièce est l'anode (elle s'oxyde → couche protectrice). En électrodéposition (nickelage, chromage), la pièce est la cathode (elle reçoit le dépôt)."},
{q:"Dans l'anodisation, la pièce est :",o:["L'anode","La cathode","L'électrolyte","Le bain"],c:0,e:"<b>AN</b>odisation → la pièce est l'<b>AN</b>ode. Elle s'oxyde → couche d'oxyde protectrice (Al₂O₃).<br><svg viewBox='0 0 280 110' style='width:100%;max-width:280px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:6px'><text x='140' y='14' text-anchor='middle' fill='#e2e8f0' font-size='9' font-weight='bold'>Cellule d'anodisation</text><rect x='40' y='40' width='200' height='50' rx='4' fill='#0e4429' stroke='#059669' stroke-width='1.5'/><text x='140' y='82' text-anchor='middle' fill='#6ee7b7' font-size='8'>H₂SO₄ (électrolyte)</text><rect x='70' y='28' width='30' height='55' rx='2' fill='#3b82f6' stroke='#60a5fa' stroke-width='2'/><rect x='66' y='28' width='4' height='55' rx='1' fill='#f97316'/><text x='85' y='25' text-anchor='middle' fill='#93c5fd' font-size='8' font-weight='bold'>ANODE</text><text x='85' y='100' text-anchor='middle' fill='#fdba74' font-size='7'>Pièce Al + oxyde</text><rect x='180' y='28' width='20' height='55' rx='2' fill='#475569' stroke='#94a3b8' stroke-width='1.5'/><text x='190' y='25' text-anchor='middle' fill='#94a3b8' font-size='8'>Cathode</text><text x='50' y='50' fill='#ef4444' font-size='8' font-weight='bold'>+</text><text x='210' y='50' fill='#3b82f6' font-size='8' font-weight='bold'>-</text><path d='M50,38 L50,22 L210,22 L210,38' stroke='#94a3b8' stroke-width='1.5' fill='none'/><text x='130' y='20' text-anchor='middle' fill='#94a3b8' font-size='7'>Courant DC</text></svg>Mnémo : <b>AN-OX</b> → ANode = OXydation."},
{q:"Dans l'électrodéposition, la pièce est :",o:["La cathode","L'anode","L'électrolyte","Le courant"],c:0,e:"Cathode = réduction = les ions métalliques se déposent."},
{q:"Le pH d'un bain de décapage est plutôt :",o:["Acide","Basique","Neutre","Variable"],c:0,e:"Décapage = bain acide. Dégraissage = bain alcalin."},
{q:"La rouille est :",o:["L'oxydation du fer au contact de l'eau et de l'air","Un traitement de surface volontaire","La corrosion du cuivre","Un revêtement protecteur"],c:0,e:"La <b>rouille</b> = oxyde de fer (Fe₂O₃) formé quand l'acier est au contact de l'<b>eau</b> et de l'<b>oxygène</b>. Contrairement à l'oxyde d'aluminium (Al₂O₃) ou au TiO₂ qui protègent, la rouille est <b>poreuse et non protectrice</b> → la corrosion continue en profondeur."},
{q:"La corrosion par piqûres, c'est :",o:["Des petits trous localisés dans le métal","Une corrosion uniforme sur toute la surface","Une corrosion entre deux métaux différents","Une corrosion par l'hydrogène"],c:0,e:"La <b>corrosion par piqûres</b> (pitting) = des <b>petits trous profonds</b> qui se forment localement, souvent là où la couche protectrice est endommagée. Très dangereuse car difficile à détecter visuellement."},
{q:"La galvanisation, c'est :",o:["Recouvrir l'acier de zinc pour le protéger","Recouvrir l'acier de cuivre","Anodiser de l'aluminium","Passiver de l'inox"],c:0,e:"La <b>galvanisation</b> = déposer une couche de <b>zinc</b> sur l'acier. Le zinc se corrode à la place de l'acier (anode sacrificielle) = <b>protection cathodique</b>."},
{q:"Un électrolyte est :",o:["Un liquide qui conduit l'électricité","Un métal pur très résistant","Un gaz de soudage","Un isolant électrique"],c:0,e:"Un <b>électrolyte</b> = liquide contenant des <b>ions</b> qui conduisent le courant. Exemples : eau salée, solutions acides ou basiques. Nécessaire pour la corrosion galvanique et pour tous les procédés électrochimiques (anodisation, électrodéposition)."},
{q:"Le dégraissage sert à :",o:["Enlever les graisses et huiles de la surface","Déposer du nickel sur la pièce","Mesurer l'épaisseur du revêtement","Durcir la surface du métal"],c:0,e:"Le <b>dégraissage</b> = première étape de toute gamme de TdS. On enlève les <b>graisses, huiles et contaminations</b> de la surface. Bain <b>alcalin</b> (pH > 7). Si la surface n'est pas parfaitement propre, le traitement qui suit sera mauvais (défaut d'adhérence, corrosion)."},
{q:"Le décapage sert à :",o:["Enlever les oxydes de la surface","Déposer une couche protectrice","Graisser la pièce","Peindre la pièce"],c:0,e:"Le <b>décapage</b> = dissolution des <b>oxydes</b> (couche d'oxyde naturelle) à la surface du métal. Bain <b>acide</b> (pH < 7). Après le dégraissage, le décapage prépare une surface métallique propre pour le traitement."},
{q:"Un µm (micromètre) c'est :",o:["Un millième de millimètre","Un millième de mètre","Un millième de centimètre","Un millionième de kilomètre"],c:0,e:"<b>1 µm</b> = 0,001 mm = un <b>millième de millimètre</b>. C'est l'unité standard pour les épaisseurs de dépôt en TdS. Exemples : anodisation ASA = 5-25 µm, conversion chimique = 0,5-4 µm, OAS dure = 25-150 µm. Un cheveu humain fait ~70 µm."},
{q:"C'est quoi une anode ?",o:["L'électrode où se produit l'oxydation","L'électrode où se produit la réduction","Le liquide conducteur du bain","L'alimentation électrique"],c:0,e:"L'<b>anode</b> = l'électrode où se produit l'<b>oxydation</b> (perte d'électrons). Mnémo : <b>AN-OX</b>. En anodisation, la pièce est l'anode → elle s'oxyde → couche protectrice. En électrodéposition, l'anode est le métal source (nickel, zinc) qui se dissout."},
{q:"C'est quoi une cathode ?",o:["L'électrode où se produit la réduction","L'électrode où se produit l'oxydation","Le bain acide","Le courant électrique"],c:0,e:"La <b>cathode</b> = l'électrode où se produit la <b>réduction</b> (gain d'électrons). Mnémo : <b>CAT-RÉD</b>. En électrodéposition (nickelage, chromage), la pièce est la cathode → les ions métalliques se déposent dessus."},
{q:"Un bain en TdS c'est :",o:["Une cuve remplie de solution chimique","Un four de traitement thermique","Un appareil de mesure","Un outil de découpe"],c:0,e:"Un <b>bain</b> en TdS = une cuve remplie d'une <b>solution chimique</b> dans laquelle on plonge les pièces à traiter. Chaque étape de la gamme a son bain : bain de dégraissage (alcalin), bain de décapage (acide), bain de traitement (anodisation, nickelage...), bains de rinçage (eau)."},
{q:"REACH en un mot c'est :",o:["La réglementation sur les produits chimiques dangereux","Une technique de traitement de surface","Un outil de contrôle qualité","Une certification pour les pilotes"],c:0,e:"<b>REACH</b> = Registration, Evaluation, Authorisation of CHemicals. C'est le règlement européen qui oblige à <b>remplacer les substances chimiques les plus dangereuses</b>. En TdS aéro, ça touche le CrVI (chromage, Alodine, OAC) et le cadmium (cadmiage)."},
{q:"C'est quoi un ion ?",o:["Un atome qui a gagné ou perdu des électrons","Un atome neutre sans charge","Un électron libre dans un fil","Une molécule d'eau"],c:0,e:"Un <b>ion</b> = un atome (ou groupe d'atomes) portant une <b>charge électrique</b>. Il a gagné des électrons (ion négatif = <b>anion</b>, ex : Cl⁻, SO₄²⁻) ou perdu des électrons (ion positif = <b>cation</b>, ex : Na⁺, Cu²⁺, Ni²⁺). En TdS, les ions métalliques en solution se déposent sur la cathode."},
{q:"C'est quoi la dissolution ?",o:["Un solide qui se disperse dans un liquide","Un liquide qui s'évapore","Un métal qui fond","Un gaz qui se condense"],c:0,e:"La <b>dissolution</b> = un solide se <b>disperse dans un liquide</b> sous forme d'ions ou de molécules. Ex : le sel (NaCl) se dissout dans l'eau → Na⁺ + Cl⁻. En TdS, les sels métalliques se dissolvent pour former le bain (ex : NiSO₄ → Ni²⁺ + SO₄²⁻)."},
{q:"La voie humide en TdS c'est :",o:["Traiter les pièces dans des bains liquides","Projeter des particules sèches sur la surface","Traiter dans un four sous vide","Polir la pièce mécaniquement"],c:0,e:"La <b>voie humide</b> = tous les procédés TdS où la pièce est plongée dans un <b>bain liquide</b> (solution aqueuse). Ça inclut le dégraissage, le décapage, l'anodisation, l'électrodéposition, la conversion chimique, la passivation. La voie humide représente la majorité des TdS en aéro."},
{q:"Pourquoi la température du bain est importante ?",o:["Elle contrôle la vitesse des réactions chimiques","Elle change la couleur du bain","Elle n'a aucun effet sur le procédé","Elle sert uniquement au confort de l'opérateur"],c:0,e:"La <b>température</b> accélère ou ralentit les <b>réactions chimiques</b>. Trop chaud = le dépôt est rugueux, le bain se dégrade vite, l'acide attaque trop la pièce. Trop froid = les réactions sont trop lentes, le dépôt n'adhère pas bien. Chaque bain a une plage de température stricte (ex : ASA = 18-22 °C, Watts = 45-65 °C)."},
{q:"C'est quoi la concentration d'un bain ?",o:["La quantité de produit dissous par litre","La température du bain en degrés","Le volume total de la cuve","Le courant appliqué en ampères"],c:0,e:"La <b>concentration</b> = la quantité de produit chimique dissous dans un litre de bain, exprimée en <b>g/L</b> ou <b>mol/L</b>. Si la concentration baisse (le bain s'appauvrit avec l'usage), la qualité du traitement se dégrade. C'est pour ça qu'on <b>analyse le bain régulièrement</b> et qu'on rajoute des produits (réajustement)."},
{q:"Pourquoi rincer entre chaque bain ?",o:["Pour éviter la contamination croisée","Pour sécher la pièce","Pour mesurer l'épaisseur","Pour chauffer la pièce"],c:0,e:"Le <b>rinçage</b> entre chaque bain est obligatoire pour enlever les résidus du bain précédent. Sans rinçage, on <b>contamine le bain suivant</b> (contamination croisée) → le bain se dégrade, la qualité du traitement chute. On utilise de l'eau (souvent déminéralisée) en cascade."},
{q:"C'est quoi l'agitation d'un bain ?",o:["Remuer le bain pour uniformiser le traitement","Chauffer le bain à ébullition","Ajouter de l'acide dans le bain","Filtrer les impuretés du bain"],c:0,e:"L'<b>agitation</b> = mettre le bain en mouvement (air comprimé, agitateur mécanique, mouvement de la pièce) pour <b>renouveler la solution</b> au contact de la surface. Sans agitation, les ions se consomment localement → épaisseur inégale, dépôt de mauvaise qualité."},
{q:"C'est quoi la densité de courant ?",o:["Le courant divisé par la surface de la pièce","La masse du bain par litre","L'épaisseur du dépôt en micromètres","La concentration du bain en g/L"],c:0,e:"La <b>densité de courant</b> = le courant (en ampères) divisé par la surface de la pièce (en dm²). Unité : <b>A/dm²</b>. C'est un paramètre clé : trop faible = dépôt trop lent, trop forte = dépôt brûlé, rugueux, mal adhérent. Chaque procédé a une plage optimale."},
{q:"C'est quoi un acide ?",o:["Un produit qui libère des ions H⁺ dans l'eau","Un produit qui libère des ions OH⁻ dans l'eau","Un liquide à pH neutre","Un métal dissous dans l'eau"],c:0,e:"Un <b>acide</b> = une substance qui libère des <b>ions H⁺</b> (protons) dans l'eau. Plus il y a de H⁺, plus c'est acide, plus le pH est bas. Exemples en TdS : <b>H₂SO₄</b> (acide sulfurique, anodisation), <b>HNO₃</b> (acide nitrique, passivation inox), <b>HCl</b> (acide chlorhydrique, décapage)."},
{q:"C'est quoi une base (alcalin) ?",o:["Un produit qui libère des ions OH⁻ dans l'eau","Un produit qui libère des ions H⁺ dans l'eau","Un acide très concentré","Un métal pur"],c:0,e:"Une <b>base</b> (alcalin) = une substance qui libère des <b>ions OH⁻</b> (hydroxyde) dans l'eau. Plus de OH⁻ = plus basique = pH élevé. Exemples en TdS : <b>NaOH</b> (soude, dégraissage alcalin), <b>KOH</b> (potasse). Les bases dissolvent les graisses (<b>saponification</b>)."},
{q:"Pourquoi contrôler le pH du bain ?",o:["Le pH détermine si les réactions chimiques fonctionnent correctement","Le pH n'a aucune importance en TdS","Le pH sert uniquement à colorer le bain","Le pH mesure la température du bain"],c:0,e:"Le <b>pH</b> doit rester dans une plage précise pour que le procédé fonctionne. pH trop bas ou trop haut = mauvaise qualité de dépôt, dissolution du substrat, ou réaction parasite. Exemples : bain de Watts pH 3,5-4,5, anodisation sulfurique pH ~1, dégraissage pH 10-13."},
{q:"C'est quoi le pouvoir de répartition ?",o:["La capacité du bain à déposer uniformément sur toute la pièce","La vitesse de dissolution du bain","La résistance chimique du dépôt","La température maximale du bain"],c:0,e:"Le <b>pouvoir de répartition</b> (throwing power) = la capacité d'un bain à déposer une épaisseur <b>uniforme</b> même sur les formes complexes (trous, angles, recoins). Le nickel chimique a un excellent pouvoir de répartition (pas de courant). Le chromage dur a un mauvais pouvoir de répartition."},
{q:"Le rendement cathodique c'est :",o:["Le pourcentage du courant qui sert réellement au dépôt","La masse totale de métal dans le bain","La durée du traitement en minutes","La tension électrique appliquée"],c:0,e:"Le <b>rendement cathodique</b> = le % du courant qui sert <b>effectivement à déposer du métal</b>. Le reste est perdu en réactions parasites (dégagement d'hydrogène H₂). Ex : nickelage ~95 % (très efficace), chromage dur ~15 % (beaucoup d'H₂ = risque FPH !)."},
{q:"C'est quoi un additif de bain ?",o:["Un produit ajouté pour améliorer la qualité du dépôt","Le métal de base à déposer","L'eau du bain","Le courant électrique"],c:0,e:"Les <b>additifs</b> = des produits chimiques ajoutés en petite quantité pour améliorer la qualité du dépôt : <b>brillanteurs</b> (aspect brillant), <b>nivelants</b> (surface lisse), <b>mouillants</b> (évite les piqûres de gaz). Sans additifs, le dépôt serait mat, rugueux et plein de défauts."},
{q:"La maintenance du bain consiste à :",o:["Analyser et corriger la composition régulièrement","Changer le bain chaque jour","Uniquement mesurer la température","Rien, le bain se maintient tout seul"],c:0,e:"La <b>maintenance de bain</b> = <b>analyser</b> régulièrement la composition (concentration en sels, pH, additifs, contaminations) et <b>corriger</b> : rajouter des produits consommés, ajuster le pH, filtrer, retirer les contaminants. Un bain mal maintenu = dépôt non conforme = non-conformités."},
{q:"C'est quoi la contamination d'un bain ?",o:["Des impuretés qui dégradent la qualité du traitement","Le niveau normal du bain","L'ajout volontaire d'additifs","La température idéale du bain"],c:0,e:"La <b>contamination</b> = des <b>impuretés indésirables</b> dans le bain (ions métalliques étrangers, graisses, particules). Sources : mauvais rinçage, chute de pièces, corrosion des équipements. Conséquences : dépôt rugueux, tacheté, mal adhérent, fragile."},
{q:"L'eau déminéralisée sert à :",o:["Préparer les bains et rincer sans apporter d'impuretés","Accélérer les réactions chimiques","Remplacer les acides dans le décapage","Refroidir les pièces après traitement thermique"],c:0,e:"L'<b>eau déminéralisée</b> (eau démin, eau DI) = de l'eau purifiée dont on a retiré les <b>ions</b> (Ca²⁺, Mg²⁺, Cl⁻...). En TdS, elle sert à <b>préparer les bains</b> (pas d'impuretés) et au <b>rinçage final</b> (pas de taches de séchage). L'eau du robinet contient trop de calcaire et de chlore."},
{q:"La filtration d'un bain sert à :",o:["Retirer les particules en suspension","Augmenter la concentration du bain","Chauffer le bain uniformément","Mesurer le pH du bain"],c:0,e:"La <b>filtration</b> = faire passer le bain à travers un <b>filtre</b> pour retirer les particules solides en suspension (poussières, fragments métalliques, précipités). Sans filtration, ces particules se piègent dans le dépôt → surface rugueuse, défauts d'aspect."},
{q:"Que se passe-t-il chimiquement pendant l'anodisation de l'alu ?",o:["L'aluminium s'oxyde et forme une couche protectrice","Le chrome se dépose sur l'aluminium","L'acide dissout tout le métal","Le nickel remplace l'aluminium"],c:0,e:"Pendant l'<b>anodisation</b>, l'aluminium (anode) s'oxyde : <b>Al → Al₂O₃</b>. La couche d'oxyde d'aluminium (alumine) se forme à la surface de la pièce. Cette couche est dure, isolante, résistante à la corrosion. En même temps, l'acide sulfurique dissout partiellement l'oxyde → formation de pores."},
{q:"En industrie TdS, on travaille plutôt en :",o:["Courant imposé (galvanostat)","Potentiel imposé (potentiostat)","Sans électricité","Courant alternatif"],c:0,e:"En industrie TdS, on utilise un <b>galvanostat</b> (courant imposé) plutôt qu'un potentiostat. C'est plus simple à contrôler à grande échelle : on règle le courant et on le maintient constant."},
{q:"C'est quoi la cellule de Hull en TdS ?",o:["Une cellule de test pour évaluer un bain sur une plage de densités de courant","Un réservoir pour stocker les bains usés","Un appareil de mesure de pH","Un dispositif de séchage des pièces"],c:0,e:"La <b>cellule de Hull</b> = une cuve de forme trapézoïdale. Grâce à sa géométrie, la distance anode-cathode varie → la <b>densité de courant</b> varie le long de la cathode. En un seul essai, on voit l'aspect du dépôt à toutes les densités de courant. Outil essentiel pour <b>optimiser les bains</b>."},
{q:"Doubler le temps de dépôt en électrodéposition :",o:["Double l'épaisseur du dépôt","Double la dureté du dépôt","N'a aucun effet","Divise l'épaisseur par deux"],c:0,e:"Selon la <b>loi de Faraday</b>, l'épaisseur est proportionnelle au courant × le temps. Doubler le temps = doubler l'épaisseur (à courant constant)."},
{q:"Le rendement cathodique du bain de Watts (nickel) est d'environ :",o:["95 %","15 %","50 %","100 %"],c:0,e:"Le bain de Watts (nickelage) a un rendement d'environ <b>95 %</b> : presque tout le courant sert à déposer du nickel. Le chromage dur n'a que ~15 % (beaucoup d'hydrogène → risque FPH)."},
],

{q:"F (constante de Faraday) = :",o:["96 485 C/mol","9 648 C/mol","964 850 C/mol","96,485 C/mol"],c:0,e:"<b>F = 96 485 C/mol</b> = la charge électrique portée par une mole d'électrons. C'est la constante fondamentale de l'électrochimie.<br><br>Elle sert dans la <b>loi de Faraday</b> : m = (M × I × t) / (n × F). Plus de courant (I) ou plus de temps (t) = couche plus épaisse."},
{q:"Al (E°=-1,66 V) en contact avec Fe (E°=-0,44 V) :",o:["L'alu se corrode (anode)","Le fer se corrode (anode)","Les deux se corrodent","Aucun ne se corrode"],c:0,e:"Le métal au potentiel <b>le plus négatif</b> (le plus actif) se corrode = il devient l'<b>anode sacrificielle</b>. Ici Al (-1,66 V) < Fe (-0,44 V), donc l'alu se sacrifie pour protéger le fer.<br><br><b>Application aéro :</b> c'est pour ça qu'on ne met jamais une fixation acier directement sur une tôle alu sans isolation (risque de corrosion galvanique de l'alu)."},
{q:"Le zinc (Zn) est plus actif que le fer (Fe), donc :",o:["Le zinc protège le fer","Le fer protège le zinc","Les deux sont protégés","Aucun n'est protégé"],c:0,e:"Zn (E° = -0,76 V) est plus actif que Fe (E° = -0,44 V). Le zinc se corrode à la place du fer = <b>protection cathodique</b>. C'est le principe de la galvanisation (couche de zinc sur l'acier)."},
{q:"Un bain de dégraissage est plutôt :",o:["Alcalin (pH > 7)","Acide (pH < 7)","Neutre (pH = 7)","Variable selon le métal"],c:0,e:"<b>Dégraissage</b> = bain alcalin (pH 8-14), car les solutions basiques dissolvent les graisses (saponification). <b>Décapage</b> = bain acide (pH 0-6), pour dissoudre les oxydes."},
{q:"Le mnémo AN-OX signifie :",o:["ANode = OXydation","ANgle = OXygène","ANalyse = OXyde","ANtenne = OXydant"],c:0,e:"<b>AN-OX</b> : l'<b>AN</b>ode est le siège de l'<b>OX</b>ydation (perte d'électrons). L'autre face : la <b>CAT</b>hode est le siège de la <b>RÉD</b>uction. Mnémo complet : AN-OX / CAT-RÉD."},
{q:"La corrosion galvanique se produit quand :",o:["Deux métaux différents sont en contact avec un électrolyte","Un seul métal est exposé à l'air sec","On applique un courant électrique volontaire","Le métal est chauffé au-dessus de 500 °C"],c:0,e:"<b>Corrosion galvanique</b> = 3 conditions nécessaires :<br><svg viewBox='0 0 280 100' style='width:100%;max-width:280px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:6px'><rect x='20' y='25' width='60' height='50' rx='4' fill='#1e3a5f' stroke='#3b82f6' stroke-width='2'/><text x='50' y='48' text-anchor='middle' fill='#93c5fd' font-size='9' font-weight='bold'>Al</text><text x='50' y='60' text-anchor='middle' fill='#64748b' font-size='7'>actif (-)</text><rect x='200' y='25' width='60' height='50' rx='4' fill='#3f1e1e' stroke='#ef4444' stroke-width='2'/><text x='230' y='48' text-anchor='middle' fill='#fca5a5' font-size='9' font-weight='bold'>Cu</text><text x='230' y='60' text-anchor='middle' fill='#64748b' font-size='7'>noble (+)</text><line x1='82' y1='50' x2='198' y2='50' stroke='#94a3b8' stroke-width='2'/><text x='140' y='45' text-anchor='middle' fill='#94a3b8' font-size='8'>contact</text><rect x='85' y='65' width='110' height='18' rx='3' fill='#0e4429' stroke='#059669' stroke-width='1'/><text x='140' y='78' text-anchor='middle' fill='#6ee7b7' font-size='8'>Électrolyte (eau)</text><path d='M50,25 C50,10 50,10 60,10 L65,15' stroke='#ef4444' stroke-width='1.5' fill='none'/><text x='75' y='14' fill='#fca5a5' font-size='7'>Se corrode !</text><text x='140' y='98' text-anchor='middle' fill='#94a3b8' font-size='8'>Le plus actif se sacrifie pour le plus noble</text></svg>Ex : alu + acier + eau → l'alu se corrode. En aéro, on isole toujours les métaux différents (mastic, rondelle isolante)."},
{q:"Le métal le plus noble de cette liste est :",o:["Or (Au)","Aluminium (Al)","Zinc (Zn)","Magnésium (Mg)"],c:0,e:"<svg viewBox='0 0 260 110' style='width:100%;max-width:260px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:6px'><text x='130' y='14' text-anchor='middle' fill='#e2e8f0' font-size='9' font-weight='bold'>Série galvanique</text><line x1='30' y1='25' x2='30' y2='95' stroke='#94a3b8' stroke-width='1.5'/><polygon points='27,27 30,20 33,27' fill='#94a3b8'/><text x='15' y='35' fill='#059669' font-size='7'>Noble</text><text x='15' y='90' fill='#ef4444' font-size='7'>Actif</text><rect x='50' y='25' width='40' height='12' rx='3' fill='#b45309'/><text x='70' y='34' text-anchor='middle' fill='#fde68a' font-size='8' font-weight='bold'>Au</text><rect x='95' y='25' width='30' height='12' rx='3' fill='#78350f'/><text x='110' y='34' text-anchor='middle' fill='#fde68a' font-size='8'>Cu</text><rect x='50' y='45' width='30' height='12' rx='3' fill='#475569'/><text x='65' y='54' text-anchor='middle' fill='#e2e8f0' font-size='8'>Ti</text><rect x='85' y='45' width='30' height='12' rx='3' fill='#374151'/><text x='100' y='54' text-anchor='middle' fill='#d1d5db' font-size='8'>Fe</text><rect x='50' y='65' width='30' height='12' rx='3' fill='#1e3a5f'/><text x='65' y='74' text-anchor='middle' fill='#93c5fd' font-size='8'>Zn</text><rect x='85' y='65' width='30' height='12' rx='3' fill='#1e3a5f'/><text x='100' y='74' text-anchor='middle' fill='#93c5fd' font-size='8'>Al</text><rect x='50' y='85' width='30' height='12' rx='3' fill='#7f1d1d'/><text x='65' y='94' text-anchor='middle' fill='#fca5a5' font-size='8' font-weight='bold'>Mg</text><text x='200' y='34' fill='#6ee7b7' font-size='7'>Ne se corrode pas</text><text x='200' y='94' fill='#fca5a5' font-size='7'>Se corrode en 1er</text></svg>L'<b>or</b> est le plus noble (ne se corrode jamais). Le <b>magnésium</b> est le plus actif (se corrode en premier dans tout couple galvanique)."},
{q:"Le métal le plus actif de cette liste est :",o:["Magnésium (Mg)","Cuivre (Cu)","Titane (Ti)","Fer (Fe)"],c:0,e:"<b>Mg</b> (E° = -2,37 V) est le plus actif. Il se corrode en premier dans tout couple galvanique. C'est pour ça qu'on utilise des anodes de Mg pour protéger les coques de bateau (protection cathodique par anode sacrificielle)."},
{q:"Une anode sacrificielle est :",o:["Un métal actif qui se corrode à la place de la pièce","Un métal noble qui protège par revêtement","Un isolant qui empêche le contact électrique","Un acide qui dissout la couche d'oxyde"],c:0,e:"L'<b>anode sacrificielle</b> = un métal <b>plus actif</b> que la pièce à protéger, placé en contact. Il se corrode à sa place. Exemples : Zn sur acier (galvanisation), Mg sur coques de bateau, Zn sur canalisations enterrées."},
{q:"L'entraînement (drag-out) en TdS c'est :",o:["Le liquide du bain qui reste accroché à la pièce quand on la sort","Le mouvement de la pièce dans le bain","La vitesse de déposition du métal","Le transfert d'électrons dans le circuit"],c:0,e:"L'<b>entraînement</b> (drag-out) = le <b>film de liquide</b> qui reste sur la pièce quand on la sort du bain. Ce liquide contamine le bain suivant et appauvrit le bain source. C'est pour ça qu'on fait des <b>pauses d'égouttage</b> et qu'on utilise des <b>bains de récupération</b> (bains morts) avant le rinçage."},
{q:"L'acide borique (H₃BO₃) dans le bain de Watts sert de :",o:["Tampon de pH","Source de nickel","Agent brillanteur","Mouillant de surface"],c:0,e:"L'<b>acide borique</b> dans le bain de Watts joue le rôle de <b>tampon de pH</b> : il stabilise le pH autour de 3,5-4,5. Sans tampon, le pH fluctuerait à chaque dépôt (dégagement de H₂ en cathode = pH local augmente) → dépôt irrégulier, contraintes internes."},
{q:"Le rendement cathodique du chromage dur est :",o:["Très faible (~15 %, beaucoup d'H₂ dégagé)","Très élevé (~95 %)","Moyen (~50 %)","Variable selon la température"],c:0,e:"Le <b>chromage dur</b> a un rendement cathodique très faible : seulement <b>~15 %</b> du courant sert à déposer du chrome. Les 85 % restants sont perdus en <b>dégagement d'hydrogène</b> (H₂). Conséquence : beaucoup d'hydrogène atomique pénètre dans l'acier → risque élevé de <b>FPH</b>. C'est une des raisons (avec le CrVI) du remplacement par le HVOF."},
{q:"Température typique d'un bain d'anodisation sulfurique (ASA) :",o:["18-22 °C (bain plutôt froid)","60-80 °C (bain chaud)","100 °C (ébullition)","Température ambiante sans contrôle"],c:0,e:"L'<b>ASA</b> se fait à <b>18-22 °C</b>. Le bain doit rester froid car l'acide sulfurique <b>dissout l'oxyde</b> en même temps qu'il se forme. À basse température, la formation l'emporte sur la dissolution → couche épaisse. Si trop chaud → l'acide dissout plus vite que l'oxyde ne se forme → couche fine et molle."},
{q:"Température typique d'un bain de nickelage (Watts) :",o:["45-65 °C (bain chaud)","18-22 °C (bain froid)","100 °C (ébullition)","0-5 °C (bain glacé)"],c:0,e:"Le <b>bain de Watts</b> fonctionne à <b>45-65 °C</b>. La chaleur augmente la conductivité du bain, la vitesse de dépôt, et réduit les contraintes internes. Mais trop chaud → évaporation, décomposition des additifs."},
{q:"La saponification en dégraissage c'est :",o:["La réaction de la soude avec les graisses","L'ajout de savon dans le bain","La dissolution du métal par l'acide","Le rinçage à l'eau chaude"],c:0,e:"La <b>saponification</b> = la réaction chimique entre une <b>base forte</b> (NaOH, soude) et les <b>graisses</b> (huiles, corps gras). Le résultat est du <b>savon</b> soluble dans l'eau → la graisse se détache de la surface. C'est le principe du <b>dégraissage alcalin</b>."},
{q:"Un bain acide a un pH :",o:["Inférieur à 7","Supérieur à 7","Égal à 7","De 10 à 14"],c:0,e:"<b>pH < 7</b> = acide. pH = 7 = neutre. pH > 7 = basique/alcalin. En TdS : décapage = pH 0-3 (très acide), anodisation = pH ~1 (acide), dégraissage = pH 10-13 (alcalin), nickelage Watts = pH 3,5-4,5 (légèrement acide)."},
],
L3:[
{q:"Nickelage : I = 5 A, t = 30 min, M(Ni) = 58,7 g/mol, n = 2. Masse déposée :",o:["~2,7 g","~5,5 g","~27 g","~0,27 g"],c:0,e:"m = (M × I × t) / (n × F) = (58,7 × 5 × 1800) / (2 × 96485) = 528 300 / 192 970 ≈ <b>2,74 g</b>.<br><br>Astuce : convertir les minutes en secondes (30 min = 1800 s) avant de calculer."},
{q:"Pour doubler l'épaisseur d'un dépôt, on peut :",o:["Doubler le temps OU doubler le courant","Doubler la température du bain","Changer le type d'électrolyte","Augmenter le pH du bain"],c:0,e:"D'après la loi de Faraday (m = M×I×t / n×F), la masse déposée est <b>proportionnelle au courant (I) et au temps (t)</b>. Doubler l'un ou l'autre = doubler l'épaisseur. La température et le pH influencent la qualité du dépôt, pas directement l'épaisseur théorique."},
{q:"Fixation acier sur tôle alu : quel risque sans isolation ?",o:["L'alu se corrode","L'acier se corrode","Les deux se corrodent également","Aucun risque si pièce peinte"],c:0,e:"Acier (E° = -0,44 V) + Alu (E° = -1,66 V) → l'alu est beaucoup plus actif → il se corrode autour de la fixation. <b>Solution en aéro :</b> interposer un isolant (mastic, rondelle) + primaire anticorrosion, ou utiliser des fixations en titane (proche de l'alu dans la série)."},
{q:"Quel métal protège cathodiquement une coque de bateau ?",o:["Magnésium (anode sacrificielle)","Or (revêtement noble)","Cuivre (alliage marin)","Chrome (passivation)"],c:0,e:"Le <b>magnésium</b> (E° = -2,37 V) est le métal le plus actif de la série galvanique. Fixé sur la coque en acier, il se corrode <b>à la place de l'acier</b>. On remplace les anodes régulièrement. En aéro : même principe avec le zinc (galvanisation des aciers)."},
{q:"pH = 2 dans un bain. C'est :",o:["Un bain acide (décapage)","Un bain alcalin (dégraissage)","Un bain neutre (rinçage)","Un bain oxydant (anodisation)"],c:0,e:"pH 2 = fortement <b>acide</b>. En TdS, les bains acides servent au <b>décapage</b> (dissolution des oxydes). pH < 7 = acide, pH 7 = neutre, pH > 7 = alcalin/basique. Un bain de dégraissage est typiquement à pH 10-13."},
{q:"Quelle combinaison provoque la corrosion galvanique la PLUS rapide ?",o:["Mg + Cu (grande différence de potentiel)","Fe + Zn (différence modérée)","Al + Ti (potentiels proches)","Cu + Ag (les deux nobles)"],c:0,e:"La vitesse de corrosion galvanique dépend de la <b>différence de potentiel</b> entre les deux métaux. Mg (-2,37 V) + Cu (+0,34 V) = écart de 2,71 V → corrosion très rapide du Mg. Plus l'écart est grand, plus la corrosion est agressive."},
{q:"Réaction simplifiée de l'anodisation de l'alu :",o:["2Al + 3H₂O → Al₂O₃ + 6H⁺ + 6e⁻","Al + H₂SO₄ → AlSO₄ + H₂","Al₂O₃ → 2Al + 3O","Ni²⁺ + 2e⁻ → Ni"],c:0,e:"À l'anode : <b>2Al + 3H₂O → Al₂O₃ + 6H⁺ + 6e⁻</b>. L'alu perd des électrons (oxydation) et se combine à l'oxygène de l'eau pour former de l'<b>alumine</b> (Al₂O₃). En parallèle, l'acide sulfurique dissout partiellement l'alumine → c'est la compétition formation/dissolution qui crée les <b>pores</b>."},
{q:"Si la concentration d'un bain d'anodisation augmente trop :",o:["La couche est plus attaquée par l'acide","La couche devient plus épaisse et plus dure","Rien ne change","Le bain devient neutre"],c:0,e:"Plus la <b>concentration en H₂SO₄</b> est élevée, plus l'acide <b>dissout</b> la couche d'oxyde en formation → couche plus <b>poreuse</b> et <b>moins protectrice</b>. C'est pour ça que chaque spec impose une plage de concentration stricte et qu'on analyse le bain régulièrement."},
{q:"Réaction cathodique lors du nickelage :",o:["Ni²⁺ + 2e⁻ → Ni","Ni → Ni²⁺ + 2e⁻","H₂O → H₂ + O","Al → Al₂O₃"],c:0,e:"À la cathode (la pièce), les <b>ions nickel</b> en solution captent 2 électrons et se déposent sous forme de <b>nickel métallique</b> : Ni²⁺ + 2e⁻ → Ni. En parallèle, une réaction parasite produit de l'hydrogène : 2H⁺ + 2e⁻ → H₂ → c'est le <b>rendement cathodique</b> qui dit quel % va au dépôt vs à l'H₂."},
{q:"Pourquoi l'OAS dure se fait en bain froid (-5 à 5 °C) ?",o:["Le froid limite la dissolution de la couche par l'acide","Le froid accélère le dépôt","Le froid rend l'alu plus conducteur","Le froid empêche les bulles de gaz"],c:0,e:"À basse température, la <b>dissolution chimique</b> de l'alumine par l'acide sulfurique est <b>ralentie</b>. La formation d'oxyde l'emporte sur la dissolution → on atteint des épaisseurs de <b>25-150 µm</b> (vs 5-25 µm en ASA classique à 20 °C). Haute densité de courant + bain froid = couche épaisse et dure."},
{q:"Rendement cathodique = 85 %, masse théorique (Faraday) = 3,2 g. Masse réelle déposée :",o:["2,72 g","3,76 g","3,20 g","0,48 g"],c:0,e:"Masse réelle = masse théorique × rendement = 3,2 × 0,85 = <b>2,72 g</b>. Le rendement cathodique < 100 % car une partie du courant sert à produire de l'<b>hydrogène</b> (2H⁺ + 2e⁻ → H₂) au lieu de déposer le métal. Un rendement de 85 % est typique du nickelage Watts."},
{q:"D'après l'équation de Nernst, le potentiel d'une électrode dépend de :",o:["La concentration des ions en solution et la température","La couleur de l'électrode","Le volume total du bain","La pression atmosphérique uniquement"],c:0,e:"<b>Nernst</b> : E = E° + (RT/nF) × ln([ox]/[red]). Le potentiel d'électrode dépend du <b>potentiel standard E°</b>, de la <b>température T</b>, et du <b>rapport des concentrations</b> oxydant/réducteur. En TdS, si la concentration en ions métalliques baisse → le potentiel change → la qualité du dépôt évolue."},
{q:"La densité de courant en anodisation est exprimée en :",o:["A/dm² (ampères par décimètre carré)","V/cm (volts par centimètre)","°C/min (degrés par minute)","g/L (grammes par litre)"],c:0,e:"La <b>densité de courant</b> j = I/S, exprimée en <b>A/dm²</b>. C'est le paramètre clé en anodisation : il détermine la vitesse de croissance de la couche. Typiquement : ASA = 1-2 A/dm², OAS dure = 3-6 A/dm². Monter j = couche plus rapide mais risque de brûlure si refroidissement insuffisant."},
{q:"Un bain de nickelage montre des piqûres sur les dépôts. Cause probable :",o:["Bulles d'hydrogène piégées (manque d'agent mouillant)","Bain trop froid","Courant trop faible","pH trop élevé"],c:0,e:"Les <b>piqûres</b> (pitting) = bulles de <b>H₂</b> qui restent collées à la surface pendant le dépôt et empêchent le nickel de se déposer localement. Solution : ajouter un <b>agent mouillant</b> (tensioactif) qui réduit la tension de surface → les bulles se détachent. C'est un des défauts les plus fréquents en nickelage."},
{q:"La vitesse de corrosion (mm/an) se calcule à partir de icor par :",o:["La loi de Faraday (masse perdue → épaisseur)","La loi d'Ohm","La loi de Newton","La loi de Fick"],c:0,e:"On mesure <b>icor</b> (courant de corrosion) par les <b>droites de Tafel</b>. Puis la <b>loi de Faraday</b> convertit icor en masse perdue par unité de temps : m = (M × icor × t)/(n × F). En divisant par la densité et la surface → <b>vitesse de corrosion en mm/an</b>. C'est la méthode standard en électrochimie de la corrosion."},
]},

tds_procedes:{title:'Procédés de traitement',mod:'tds',
lessons:[
{t:"Les grandes familles de procédés TdS",en:"Overview of surface treatment processes",b:"<b>6 grandes familles de procédés TdS en aéro :</b><br><br><span class='key'>Anodisation</span> : on fait pousser la couche d'oxyde naturelle de l'alu en utilisant du courant. La pièce est l'anode. Couche poreuse de 2 à 150 µm. Très utilisée en aéro.<br><br><span class='key'>Conversion chimique</span> : on crée une couche protectrice par une réaction chimique SANS courant. Fine (0,5-4 µm). Ex : Alodine, TCP.<br><br><span class='key'>Électrodéposition</span> : on dépose un autre métal sur la pièce grâce à un courant. La pièce est la cathode. Ex : nickelage, chromage, Zn-Ni.<br><br><span class='key'>Dépôt chimique</span> : on dépose un métal SANS courant (réaction autocatalytique). Ex : nickel chimique. Épaisseur uniforme partout.<br><br><span class='key'>Passivation</span> : on renforce la couche d'oxyde naturelle sans rien déposer. Ex : passivation de l'inox (HNO₃), TiO₂ du titane.<br><br><span class='key'>Projection thermique</span> : on projette des particules à haute vitesse. Ex : HVOF (remplace le chromage dur), plasma (barrières thermiques YSZ)."},
{t:"Anodisation",en:"Anodizing",b:"<span class='key'>ASA</span> (H₂SO₄) : 5-25 µm, dure, résistance usure.<br><span class='key'>OAC</span> (CrO₃) : 2-5 µm, excellente corrosion. CrVI = CMR toxique.<br><span class='key'>TSA</span> (tartrique-sulfurique) : remplace OAC, sans CrVI. L'avenir.<br><span class='key'>OAS dure</span> : 25-150 µm, 400-500 HV. Bain froid, haute densité courant.<br><br>Structure couche : hexagonale poreuse (nid d'abeille). <span class='key'>Colmatage</span> <span class='en'>(Sealing)</span> : ferme les pores (eau bouillante ou sels Ni → bœhmite)."},
{t:"Conversion chimique et passivation",en:"Chemical conversion and passivation",b:"<span class='key'>Conversion chimique</span> : réaction SANS courant → couche fine (0,5-4 µm).<br><span class='key'>Alodine 1200</span> : CrVI, jaune. Toxique → remplacée par <span class='key'>TCP</span> (CrIII, non toxique). Noms : SurTec 650, Bonderite.<br><br><span class='key'>Passivation</span> : renforce la couche d'oxyde NATURELLE (pas de dépôt).<br>Inox : HNO₃ ou acide citrique → enrichit en Cr → Cr₂O₃ renforcée.<br>Titane : TiO₂ naturelle ultra-stable. Alu : Al₂O₃ naturelle (2-5 nm)."},
{t:"Électrodéposition et dépôt chimique",en:"Electroplating and electroless plating",b:"<span class='key'>Électrodéposition</span> <span class='en'>(Electroplating)</span> : pièce = cathode. Courant nécessaire.<br>Nickelage (bain de Watts), chromage dur (CrVI → HVOF), cadmiage (toxique → <span class='key'>Zn-Ni</span>).<br><br><span class='key'>Dépôt chimique</span> <span class='en'>(Electroless plating)</span> : SANS courant. Réaction autocatalytique.<br>Nickel chimique (Ni-P) : épaisseur <span class='key'>parfaitement uniforme</span> partout."},
{t:"Gamme de traitement type",en:"Typical process sequence",b:"1. Accrochage → 2. Dégraissage alcalin → 3. Rinçage → 4. Décapage → 5. Rinçage cascade → 6. Traitement → 7. Rinçage → 8. Colmatage/séchage → 9. Contrôle<br><br>Test propreté : <span class='key'>waterbreak test</span> (film d'eau continu = propre).<br>Tout écart paramètres = <span class='key'>non-conformité</span>."},
{t:"Grenaillage de précontrainte",en:"Shot peening",b:"Le <span class='key'>grenaillage de précontrainte</span> <span class='en'>(Shot peening)</span> = projeter des billes (acier, verre, céramique) à haute vitesse sur la surface d'une pièce.<br><br><b>Pourquoi ?</b> Les impacts créent des <span class='key'>contraintes de compression</span> en surface. Ces contraintes empêchent les fissures de s'amorcer → la pièce dure <span class='key'>beaucoup plus longtemps en fatigue</span>.<br><br>C'est un traitement <b>mécanique</b> (pas chimique).<br><br><b>Où en aéro :</b><br>- <span class='key'>Pieds d'aubes</span> de compresseur et turbine<br>- <span class='key'>Engrenages</span> et arbres<br>- <span class='key'>Trains d'atterrissage</span><br>- Toute pièce soumise à la fatigue<br><br>Contrôle : <span class='key'>intensité Almen</span> (éprouvette calibrée qui se courbe sous l'impact des billes).<br><span class='key'>Couverture</span> = le pourcentage de surface impactée (100 % = chaque point a reçu au moins un impact)."},
{t:"Peinture aéronautique",en:"Aerospace painting",b:"La peinture aéro est un <span class='key'>système multicouche</span> :<br><br>1. <span class='key'>Préparation de surface</span> : dégraissage + conversion chimique (TCP) ou anodisation<br>2. <span class='key'>Primaire anticorrosion</span> <span class='en'>(Primer)</span> : couche qui protège le métal. Historiquement au <span class='key'>chromate de strontium</span> (CrVI) → remplacé par des primaires sans CrVI (sol-gel, phosphate de zinc).<br>3. <span class='key'>Finition</span> <span class='en'>(Topcoat)</span> : couche visible, couleur, résistance aux UV et à l'érosion. Souvent polyuréthane.<br><br>Le <span class='key'>sol-gel</span> est une alternative REACH au primaire chromique : couche d'accrochage hybride organique-inorganique, sans CrVI.<br><br><b>En aéro, la peinture n'est pas décorative :</b> c'est une <span class='key'>protection anticorrosion</span>. Un avion est repeint tous les 5-8 ans. La peinture pèse 200-600 kg sur un A320 !"},
{t:"Prétraitements : dégraissage et décapage",en:"Pre-treatments: degreasing and pickling",b:"Avant tout TdS, la surface doit être <b>parfaitement propre</b>. Les prétraitements préparent la surface :<br><br><span class='key'>Dégraissage</span> <span class='en'>(Degreasing)</span> :<br>Enlever les graisses, huiles, empreintes. Deux familles :<br>- <span class='key'>Alcalin</span> (NaOH, soude) : standard en aéro. Bain chaud (50-80 °C). Saponifie les graisses = les transforme en savon soluble.<br>- <span class='key'>Solvant</span> : trichloréthylène (interdit REACH), nettoyants aqueux modernes. Plus rapide mais plus cher.<br>- Contrôle : <span class='key'>waterbreak test</span> (film d'eau continu = propre, gouttes = encore gras).<br><br><span class='key'>Décapage</span> <span class='en'>(Pickling / Etching)</span> :<br>Enlever les oxydes, la calamine, les couches de corrosion :<br>- <span class='key'>Décapage acide</span> : HNO₃, H₂SO₄, HF selon le métal. Attaque chimique de la surface.<br>- <span class='key'>Décapage alcalin</span> : NaOH pour l'alu (dissolution Al₂O₃).<br>- <span class='key'>Décapage mécanique</span> : sablage, grenaillage. Pas de chimie.<br>- Attention : le décapage acide sur acier → risque de <span class='key'>FPH</span> (hydrogène pénètre).<br><br><span class='key'>Désoxydation</span> <span class='en'>(Deoxidizing)</span> :<br>Décapage léger pour l'alu (bain sulfo-chromique ou sulfo-ferrique) → retire la couche d'oxyde sans trop attaquer le métal. Prépare la surface pour l'anodisation.<br><br><div class='remember'>Séquence standard : dégraissage → rinçage → décapage → rinçage → traitement. <b>Chaque étape est critique</b> : un mauvais dégraissage = mauvaise adhérence du traitement.</div>"},
{t:"Collage structural en aéro",en:"Structural bonding in aerospace",b:"Le <span class='key'>collage structural</span> <span class='en'>(Structural bonding)</span> = assembler des pièces avec une <b>colle</b> (adhésif) qui transfère les efforts mécaniques. En forte croissance en aéro :<br><br><b>Pourquoi coller au lieu de riveter ?</b><br>- Pas de trous → pas de <span class='key'>concentration de contrainte</span> → meilleure fatigue<br>- <b>Répartition uniforme</b> des efforts sur toute la surface collée<br>- Plus <b>léger</b> (pas de rivets = gain de masse)<br>- Assemblage de matériaux <b>différents</b> (alu + composite, alu + titane)<br><br><b>Adhésifs aéro :</b><br>- <span class='key'>Époxy</span> : le plus courant (FM 73, FM 300). Thermodurcissable, cure à 120-180 °C.<br>- <span class='key'>Polyimide</span> : haute température (>250 °C).<br>- Film adhésif ou pâte selon l'application.<br><br><b>Préparation de surface = clé de l'adhérence :</b><br>Le collage structural exige une surface <b>parfaitement préparée</b>. Étapes :<br>1. Dégraissage<br>2. Anodisation (PAA, Phosphoric Acid Anodize) ou <span class='key'>sol-gel</span><br>3. Application du primaire d'adhérence<br>4. Collage + polymérisation en autoclave<br><br><b>Contrôle :</b> test de pelage, cisaillement (lap shear), CND ultrasons (décollements).<br><br><div class='remember'>Le collage est un <b>procédé spécial</b> (Nadcap). La préparation de surface est le facteur n°1 de la qualité du collage → c'est un domaine TdS à part entière.</div>"},
],
L1:[
{q:"L'anodisation s'applique sur quel métal ?",o:["L'aluminium","L'acier","Le nickel","Le cuivre"],c:0,e:"L'<b>anodisation</b> est un traitement principalement pour l'<b>aluminium</b>. On fait pousser sa couche d'oxyde naturelle (Al₂O₃) en utilisant un courant. La pièce alu est l'anode → la couche d'oxyde s'épaissit et protège contre la corrosion et l'usure."},
{q:"L'électrodéposition consiste à :",o:["Déposer un métal sur la pièce avec du courant","Faire pousser l'oxyde naturel du métal","Projeter des particules à haute vitesse","Plonger la pièce dans un acide sans courant"],c:0,e:"<b>Électrodéposition</b> = on utilise un <b>courant électrique</b> pour déposer un <b>autre métal</b> sur la pièce. La pièce est la <b>cathode</b> (elle reçoit les ions métalliques). Exemples : <b>nickelage</b> (Ni), <b>chromage</b> (Cr), <b>cadmiage</b> (Cd → remplacé par Zn-Ni)."},
{q:"Une conversion chimique se fait :",o:["Sans courant électrique","Avec un fort courant électrique","Par projection de particules","Par chauffage au four"],c:0,e:"La <b>conversion chimique</b> = une réaction chimique entre le bain et le métal crée une couche protectrice <b>sans courant</b>. Couche très fine (0,5-4 µm). Ex : <b>Alodine 1200</b> (CrVI, jaune) → remplacée par <b>TCP</b> (CrIII, incolore). Bonne base d'accrochage pour la peinture."},
{q:"L'ASA produit une couche de :",o:["5-25 µm","2-5 µm","100+ µm","0,5 µm"],c:0,e:"<b>ASA</b> (Anodisation Sulfurique classique) produit une couche de <b>5 à 25 µm</b>. C'est l'anodisation la plus courante. Pour comparer : OAC (chromique) = 2-5 µm, OAS dure (hard coat) = 25-150 µm."},
{q:"La TSA remplace :",o:["L'anodisation chromique","L'électrodéposition de nickel","La passivation de l'inox","Le décapage acide"],c:0,e:"<b>TSA</b> (tartrique-sulfurique) = alternative <b>sans CrVI</b> à l'OAC (anodisation chromique). L'OAC utilise du chrome hexavalent (CrVI), toxique et cancérigène → REACH impose de le remplacer."},
{q:"Le TCP remplace :",o:["L'Alodine 1200","L'ASA","Le nickelage","Le chromage"],c:0,e:"<b>TCP</b> = Trivalent Chrome Process. Remplace l'<b>Alodine 1200</b> (conversion chimique au CrVI). Le TCP utilise du CrIII (non toxique) au lieu du CrVI (cancérigène). Couche bleutée/incolore au lieu de jaune."},
{q:"Le Zn-Ni remplace :",o:["Le cadmiage","Le chromage dur","L'anodisation","La passivation"],c:0,e:"<b>Zn-Ni</b> (zinc-nickel) remplace le <b>cadmiage</b> (Cd, toxique). Le cadmium offrait une excellente protection anticorrosion mais est interdit par REACH. Le Zn-Ni (12-15 % Ni) offre des performances comparables sans la toxicité."},
{q:"Le waterbreak test vérifie :",o:["La propreté de surface","L'épaisseur du dépôt","La dureté","L'adhérence"],c:0,e:"Film d'eau continu = propre. Gouttes = contamination grasse."},
{q:"Le bain de Watts sert au :",o:["Nickelage électrolytique","Chromage dur","Anodisation sulfurique","Décapage acide"],c:0,e:"Le <b>bain de Watts</b> (NiSO₄ + NiCl₂ + H₃BO₃) est le bain classique de <b>nickelage électrolytique</b>. Inventé en 1916 par Oliver Watts, il reste la formulation la plus utilisée pour le nickelage."},
{q:"La passivation de l'inox utilise :",o:["HNO₃ ou acide citrique","Acide sulfurique concentré","Soude caustique","Bain de chromage"],c:0,e:"La <b>passivation</b> des inox (AMS 2700) renforce la couche de <b>Cr₂O₃</b> naturelle. Deux acides : <b>HNO₃</b> (acide nitrique, classique) ou <b>acide citrique</b> (alternative plus verte, en croissance). Le but est d'enrichir la surface en chrome pour résister à la corrosion."},
{q:"Le cadmium est toxique, son remplaçant en aéro est :",o:["Le Zn-Ni","Le chrome dur","L'or","Le cuivre pur"],c:0,e:"Le <b>cadmium</b> est toxique et réglementé par REACH. Son remplaçant en aéro est le <b>Zn-Ni</b> (alliage zinc-nickel ~12-15 % Ni) qui offre une protection comparable contre la corrosion sans la toxicité."},
{q:"Le grenaillage de précontrainte sert à :",o:["Améliorer la résistance en fatigue","Protéger contre la corrosion","Déposer un métal sur la pièce","Mesurer l'épaisseur du dépôt"],c:0,e:"Le <b>grenaillage</b> (shot peening) projette des billes sur la surface pour créer des <b>contraintes de compression</b>. Ces contraintes empêchent les fissures de fatigue de s'amorcer → la pièce dure beaucoup plus longtemps."},
{q:"Le grenaillage est un traitement :",o:["Mécanique","Électrochimique","Thermique","Optique"],c:0,e:"Le grenaillage est un traitement <b>mécanique</b> : on projette physiquement des billes. Il n'y a pas de réaction chimique ni de courant électrique."},
{q:"Un primaire (primer) en peinture aéro sert à :",o:["Protéger le métal contre la corrosion","Donner la couleur à l'avion","Augmenter la dureté de surface","Conduire l'électricité"],c:0,e:"Le <b>primaire</b> (primer) = la première couche de peinture, directement sur le métal traité. Son rôle est la <b>protection anticorrosion</b>. Historiquement au chromate de strontium (CrVI), remplacé par des alternatives REACH (sol-gel, phosphate de zinc)."},
{q:"Le sol-gel en peinture aéro remplace :",o:["Le primaire au chromate","L'anodisation sulfurique","Le nickelage électrolytique","Le grenaillage"],c:0,e:"Le <b>sol-gel</b> est une alternative REACH au primaire chromique (CrVI). C'est une couche d'accrochage hybride organique-inorganique, sans CrVI. De plus en plus utilisé chez Airbus."},
{q:"L'intensité Almen mesure :",o:["L'intensité du grenaillage","L'épaisseur d'un dépôt","La dureté de surface","Le pH d'un bain"],c:0,e:"L'<b>intensité Almen</b> : on expose une éprouvette calibrée (plaquette Almen) aux billes. Elle se courbe sous l'impact. La <b>flèche de courbure</b> indique l'intensité du grenaillage. C'est le contrôle standard."},
{q:"La peinture d'un avion pèse :",o:["200 à 600 kg","5 à 10 kg","2 à 5 tonnes","Moins d'1 kg"],c:0,e:"La peinture d'un A320 pèse <b>200 à 600 kg</b>. Ce n'est pas négligeable ! C'est pour ça que les compagnies low-cost ont parfois des livrées plus simples. Mais la peinture est obligatoire : elle <b>protège la structure</b> contre la corrosion et les UV."},
{q:"C'est quoi le colmatage ?",o:["Fermer les pores de la couche anodique","Ouvrir des trous dans le revêtement","Dégraisser la pièce avant traitement","Appliquer un primaire de peinture"],c:0,e:"Le <b>colmatage</b> (sealing) = fermer les <b>pores</b> de la couche anodique pour la rendre étanche et améliorer la résistance à la corrosion. La couche anodique est comme un nid d'abeille avec des trous ouverts → le colmatage bouche ces trous (eau bouillante ou sels de nickel)."},
{q:"Le HVOF c'est :",o:["Projeter des particules à très haute vitesse","Un bain chimique de dégraissage","Un test de contrôle qualité","Un type de résine composite"],c:0,e:"<b>HVOF</b> = High Velocity Oxy-Fuel = on projette des particules (WC-Co) à <b>plus de 700 m/s</b> grâce à une flamme. Le revêtement obtenu est très dur et résistant à l'usure. Il <b>remplace le chromage dur</b> (CrVI, toxique) en aéro."},
{q:"La projection thermique c'est :",o:["Projeter des particules chaudes sur la surface","Plonger la pièce dans un bain chaud","Chauffer la pièce au four","Refroidir rapidement la pièce"],c:0,e:"La <b>projection thermique</b> = on chauffe des particules (métal, céramique) et on les projette à haute vitesse sur la surface. Elles s'écrasent et forment un revêtement. Familles : <b>HVOF</b> (particules dures, usure), <b>plasma</b> (barrières thermiques céramiques sur aubes)."},
{q:"Un dépôt chimique (electroless) se fait :",o:["Sans courant électrique","Avec un courant très fort","Par projection thermique","Par trempage dans l'eau pure"],c:0,e:"Le <b>dépôt chimique</b> (electroless) = le métal se dépose grâce à une <b>réaction chimique autocatalytique</b>, <b>sans courant</b>. Ex : nickel chimique (Ni-P). Grand avantage : épaisseur <b>uniforme partout</b>, même dans les trous et les formes complexes."},
{q:"La couverture en grenaillage c'est :",o:["Le pourcentage de surface ayant reçu un impact","L'épaisseur du revêtement après traitement","La température du bain pendant le procédé","Le courant appliqué pendant le dépôt"],c:0,e:"La <b>couverture</b> = le pourcentage de surface qui a reçu au moins un impact de bille. <b>100 %</b> = chaque point de la surface a été impacté. En aéro, on exige toujours 100 % ou plus (200 % = 2 fois le temps pour 100 %). On vérifie avec un traceur fluorescent (Peenscan)."},
{q:"Le dégraissage alcalin fonctionne par :",o:["Saponification des graisses","Dissolution de l'oxyde de surface","Projection de particules","Dépôt d'une couche protectrice"],c:0,e:"Le <b>dégraissage alcalin</b> (NaOH) transforme les graisses en <b>savon soluble</b> (saponification). Bain chaud (50-80 °C). C'est la première étape chimique de toute gamme TdS."},
{q:"Le décapage acide sur acier présente un risque de :",o:["FPH (hydrogène pénètre dans l'acier)","Dépôt de nickel non désiré","Dissolution complète de la pièce","Coloration verte"],c:0,e:"Pendant le <b>décapage acide</b>, l'acide attaque le métal et produit de l'<b>hydrogène</b>. Cet hydrogène peut pénétrer dans l'acier → risque de <b>FPH</b>. On limite le temps de décapage et on fait un dégazage si nécessaire."},
{q:"Le collage structural est meilleur que le rivetage pour :",o:["La résistance en fatigue","La facilité de démontage","Le coût de production","La rapidité de mise en œuvre"],c:0,e:"Le <b>collage structural</b> évite de percer des trous → pas de concentration de contrainte → meilleure <b>résistance en fatigue</b>. Il répartit les efforts uniformément mais est plus complexe à mettre en œuvre."},
{q:"La préparation de surface avant collage structural nécessite :",o:["Dégraissage + anodisation ou sol-gel + primaire","Un simple nettoyage à l'eau","Aucune préparation particulière","Un décapage acide seul"],c:0,e:"Le collage structural exige : 1) dégraissage, 2) anodisation phosphorique (PAA) ou <b>sol-gel</b>, 3) primaire d'adhérence, 4) collage. La préparation de surface est le facteur n°1 de la tenue du collage."},
],
L2:[
{q:"La structure de la couche anodique est :",o:["Hexagonale poreuse","Compacte lisse et dense","Amorphe et irrégulière","Cubique à faces centrées"],c:0,e:"La couche d'oxyde formée par anodisation a une structure <b>hexagonale poreuse</b> (comme un nid d'abeille vu de dessus). Les pores sont cylindriques et verticaux → il faut les <b>fermer par colmatage</b> (eau bouillante ou sels de nickel → formation de bœhmite Al₂O₃·H₂O)."},
{q:"Nickel chimique vs électrolytique :",o:["Uniforme partout, sans courant","Plus épais, avec courant fort","Moins résistant à l'usure","Plus poreux et fragile"],c:0,e:"Le nickel <b>chimique</b> (electroless, Ni-P) se dépose <b>sans courant</b> par réaction autocatalytique. Avantage majeur : épaisseur <b>parfaitement uniforme</b> partout, même dans les trous et angles. Le nickel électrolytique (bain de Watts) nécessite du courant et l'épaisseur varie selon la géométrie."},
{q:"Le HVOF remplace :",o:["Le chromage dur","L'anodisation sulfurique","La passivation des inox","Le cadmiage"],c:0,e:"<b>HVOF</b> (High Velocity Oxy-Fuel) projette des particules de WC-Co à plus de 700 m/s. Le revêtement obtenu est très dur et résistant à l'usure → remplace le <b>chromage dur</b> (CrVI, toxique) dans le cadre de REACH."},
{q:"Quels traitements contiennent du CrVI ?",o:["OAC","Alodine 1200","Chromage dur","TSA"],c:[0,1,2],m:true,e:"<b>OAC</b> (anodisation chromique), <b>Alodine 1200</b> (conversion chimique) et <b>chromage dur</b> utilisent du CrVI (CMR toxique). Leurs remplaçants REACH : TSA, TCP et HVOF respectivement."},
{q:"Le colmatage d'une couche anodique sert à :",o:["Fermer les pores pour la corrosion","Augmenter l'épaisseur du dépôt","Colorer la surface en jaune","Améliorer la conductivité"],c:0,e:"Le <b>colmatage</b> (sealing) ferme les pores de la couche anodique pour améliorer la <b>résistance à la corrosion</b>. Méthodes : eau bouillante (bœhmite) ou sels de nickel. On vérifie avec le <b>dye spot test</b> (goutte de colorant : si elle pénètre, le colmatage est insuffisant)."},
{q:"L'OAS dure (hard coat) produit une couche de :",o:["25 à 150 µm, très dure","2 à 5 µm, souple","100+ µm, poreuse","0,5 µm, transparente"],c:0,e:"L'<b>OAS dure</b> (hard anodizing) : bain froid, haute densité de courant → couche de <b>25 à 150 µm</b>, dureté 400-500 HV. Utilisée pour la résistance à l'usure (chemises de cylindres, glissières)."},
{q:"Première étape d'une gamme de traitement :",o:["Dégraissage","Traitement principal","Colmatage","Contrôle qualité"],c:0,e:"La gamme type : 1. Accrochage → 2. <b>Dégraissage</b> alcalin → 3. Rinçage → 4. Décapage → 5. Rinçage cascade → 6. Traitement → 7. Rinçage → 8. Colmatage/séchage → 9. Contrôle. Le dégraissage est toujours la première étape chimique."},
{q:"L'Alodine 1200 produit une couche :",o:["Jaune (CrVI), 0,5-4 µm","Transparente (CrIII), 50 µm","Noire (anodisation), 25 µm","Blanche (zinc), 10 µm"],c:0,e:"L'<b>Alodine 1200</b> = conversion chimique au CrVI. La couche est <b>jaune irisé</b>, très fine (0,5-4 µm). Elle offre une bonne base d'accrochage pour la peinture et une protection anticorrosion. Remplacée par le <b>TCP</b> (CrIII, incolore/bleuté)."},
{q:"Le rinçage cascade sert à :",o:["Éviter la contamination entre bains","Accélérer le dépôt chimique","Augmenter l'épaisseur du traitement","Sécher la pièce rapidement"],c:0,e:"Le <b>rinçage cascade</b> utilise plusieurs bacs en série (l'eau propre arrive dans le dernier, déborde vers les précédents). But : <b>éliminer les résidus</b> du bain précédent pour ne pas contaminer le bain suivant. Économise l'eau par rapport au rinçage simple."},
{q:"La densité de courant en OAS dure est :",o:["Élevée (2-4 A/dm²) en bain froid","Faible (0,5 A/dm²) en bain chaud","Nulle (dépôt chimique sans courant)","Variable selon le pH uniquement"],c:0,e:"L'<b>OAS dure</b> (hard anodizing) utilise une <b>haute densité de courant</b> (2-4 A/dm²) dans un bain <b>froid</b> (-5 à 5 °C). Le froid limite la dissolution de la couche par l'acide sulfurique, permettant d'atteindre des épaisseurs de 25-150 µm."},
{q:"Le grenaillage est contrôlé par :",o:["L'intensité Almen et le taux de couverture","Le pH du bain et la température","La densité de courant et le temps","L'épaisseur du dépôt et la dureté"],c:0,e:"Le grenaillage est contrôlé par deux paramètres : 1) <b>l'intensité Almen</b> (mesure de la force des impacts via une éprouvette calibrée) et 2) le <b>taux de couverture</b> (100 % = chaque point de la surface a reçu au moins un impact). Spécification type : AMS 2430."},
{q:"Le système peinture aéro comprend :",o:["Préparation + primaire + finition","Uniquement une couche de finition","Anodisation + primaire uniquement","Décapage + primaire uniquement"],c:0,e:"Système peinture complet : 1) <b>Préparation de surface</b> (dégraissage + conversion chimique ou anodisation) → 2) <b>Primaire anticorrosion</b> (protection du métal) → 3) <b>Finition</b> (topcoat, couleur, résistance UV/érosion, souvent polyuréthane)."},
],
L3:[
{q:"Substitutions REACH correctes :",o:["OAC → TSA","Alodine → TCP","Chromage dur → HVOF","Cadmiage → Zn-Ni"],c:[0,1,2,3],m:true,e:"Les 4 substitutions REACH majeures en aéro : OAC → TSA (anodisation), Alodine 1200 → TCP (conversion chimique), chromage dur → HVOF (usure), cadmiage → Zn-Ni (corrosion)."},
{q:"Une pièce alu avec des trous borgnes doit être nickelée uniformément. Quel procédé ?",o:["Nickel chimique (electroless)","Nickelage électrolytique (Watts)","Chromage dur","Anodisation sulfurique"],c:0,e:"Le <b>nickel chimique</b> (Ni-P, electroless) se dépose <b>sans courant</b> par réaction autocatalytique. Son avantage majeur : épaisseur <b>parfaitement uniforme</b> partout, y compris dans les trous borgnes et les géométries complexes. Le nickelage électrolytique dépend de la densité de courant → épaisseur inégale sur les formes complexes."},
{q:"OAC → TSA : pourquoi la TSA et pas l'ASA comme remplaçant ?",o:["La TSA a une meilleure tenue en corrosion que l'ASA","L'ASA est interdite par REACH","La TSA est plus épaisse que l'ASA","L'ASA ne fonctionne pas sur l'aluminium"],c:0,e:"L'<b>ASA</b> (anodisation sulfurique classique) donne une couche épaisse (5-25 µm) mais sa résistance à la corrosion est inférieure à celle de l'<b>OAC</b>. La <b>TSA</b> (tartrique-sulfurique) atteint un compromis : pas de CrVI + <b>meilleure résistance corrosion</b> que l'ASA grâce à l'acide tartrique qui stabilise la couche. L'ASA reste utilisée pour l'usure et la dureté."},
]},

tds_controle:{title:'Contrôle qualité & FPH',mod:'tds',
lessons:[
{t:"FPH (Fragilisation par Hydrogène)",en:"Hydrogen Embrittlement (HE)",b:"Pendant électrodéposition ou décapage acide, l'<span class='key'>hydrogène atomique</span> pénètre dans le métal.<br>→ <span class='key'>Fissuration retardée</span> : la pièce semble OK puis casse sans prévenir.<br>Métaux sensibles : aciers >1000 MPa.<br><span class='key'>Dégazage</span> <span class='en'>(Baking)</span> : 190-230 °C, 4-24 h, dans les <span class='key'>4 h</span> après dépôt.<br>Norme : ASTM F519."},
{t:"Contrôles post-traitement",en:"Post-treatment inspection",b:"<span class='key'>Épaisseur</span> : courants de Foucault (non destructif) ou coupe micrographique.<br><span class='key'>Adhérence</span> : quadrillage ISO 2409 (grille + scotch, note 0-5).<br><span class='key'>Corrosion</span> : brouillard salin ISO 9227 (5 % NaCl, 35 °C).<br><span class='key'>Dureté</span> : micro-Vickers (HV). <span class='key'>Colmatage</span> : dye spot test."},
{t:"Les méthodes CND en TdS",en:"NDT methods in surface treatment",b:"Après un traitement de surface, les <span class='key'>contrôles non destructifs</span> vérifient la qualité sans abîmer la pièce :<br><br><span class='key'>Courants de Foucault</span> : mesurer l'<b>épaisseur</b> d'un dépôt (anodisation, nickelage, chromage). Rapide, précis, sans contact. L'appareil portable affiche directement l'épaisseur en µm.<br><br><span class='key'>Dye spot test</span> : vérifier le <b>colmatage</b> d'une couche anodique. Une goutte de colorant : si elle pénètre = colmatage insuffisant.<br><br><span class='key'>Waterbreak test</span> : vérifier la <b>propreté</b> de surface avant traitement. Film d'eau continu = propre. Gouttes qui se rétractent = contamination grasse.<br><br><span class='key'>Ressuage</span> : détecter les <b>fissures</b> de surface après traitement ou usinage.<br><br><span class='key'>Micro-Vickers</span> : mesurer la <b>dureté</b> d'une couche mince (coupe micrographique, semi-destructif).<br><br><span class='key'>Brouillard salin</span> : tester la <b>résistance à la corrosion</b> (5 % NaCl, 35 °C, des centaines d'heures). Essai accéléré sur éprouvettes témoins.<br><br><div class='remember'>Après chaque TdS, on vérifie au minimum : <b>épaisseur</b> (courants de Foucault), <b>adhérence</b> (quadrillage), <b>aspect</b> (visuel). Les contrôles de corrosion et dureté sont faits sur des éprouvettes témoins.</div>"},
{t:"Métrologie de surface",en:"Surface metrology",b:"La <span class='key'>métrologie de surface</span> = mesurer et quantifier l'état d'une surface :<br><br><span class='key'>Rugosité</span> <span class='en'>(Surface roughness)</span> :<br>- <span class='key'>Ra</span> : moyenne arithmétique des écarts de profil. Unité : <b>µm</b>. Le paramètre le plus courant.<br>- <span class='key'>Rz</span> : moyenne des hauteurs max pic-vallée sur 5 longueurs de base.<br>- Mesure par <b>palpeur</b> (stylet qui parcourt la surface) ou <b>optique</b> (interférométrie, confocal).<br>- En TdS : la rugosité du substrat influence l'<b>adhérence</b> du dépôt. Trop lisse = n'accroche pas. Trop rugueux = dépôt irrégulier.<br><br><span class='key'>Angle de contact</span> <span class='en'>(Contact angle)</span> :<br>- Une goutte d'eau sur la surface. Petit angle (<90°) = <b>hydrophile</b> (mouillant). Grand angle (>90°) = <b>hydrophobe</b>.<br>- En TdS : mesurer la <span class='key'>mouillabilité</span> → vérifier la propreté (dégraissage réussi = surface hydrophile) ou l'efficacité d'un traitement hydrophobe.<br><br><span class='key'>Épaisseur de couche</span> :<br>- <b>Courants de Foucault</b> : non destructif, rapide, sur pièce finie.<br>- <b>Coupe micrographique</b> : destructif mais très précis (microscope optique).<br>- <b>XRF</b> (fluorescence X) : non destructif, donne aussi la composition.<br><br><div class='remember'><b>En industrie :</b> la rugosité (Ra) et l'épaisseur de couche sont les deux mesures les plus fréquentes en TdS. Le Ra est spécifié sur quasiment tous les plans de pièces.</div>"},
],
L1:[
{q:"Après un traitement de surface, on contrôle :",o:["L'épaisseur, l'adhérence, la corrosion","Uniquement la couleur de la pièce","La masse totale de l'avion","La température du bain"],c:0,e:"Après chaque TdS, on vérifie que le traitement est conforme. Les 4 contrôles principaux :<br>- <b>Épaisseur</b> : courants de Foucault ou coupe micrographique<br>- <b>Adhérence</b> : test de quadrillage (grille + scotch)<br>- <b>Corrosion</b> : brouillard salin<br>- <b>Dureté</b> : micro-Vickers (HV)<br>Si un contrôle échoue = la pièce est <b>rejetée</b> (non-conformité)."},
{q:"CND signifie :",o:["Contrôle Non Destructif","Courant Normal Direct","Chimie Naturelle Durable","Corrosion Non Détectable"],c:0,e:"<b>CND</b> = Contrôle Non Destructif. On inspecte la pièce <b>sans la casser ni l'abîmer</b>. Méthodes : <b>ultrasons</b> (délaminage), <b>courants de Foucault</b> (épaisseur de dépôt), <b>ressuage</b> (fissures de surface), <b>radiographie</b> (défauts internes). Essentiel en aéro car on ne peut pas casser chaque pièce pour vérifier !"},
{q:"La FPH est dangereuse car :",o:["La pièce semble OK puis casse sans prévenir","Elle provoque une coloration visible","Elle est détectable au contrôle visuel","Elle ne concerne que les alliages d'alu"],c:0,e:"La <b>FPH</b> (Fragilisation par Hydrogène) provoque une <b>fissuration retardée</b> : la pièce passe tous les contrôles visuels, puis casse sans prévenir en service. C'est pour ça qu'elle est si dangereuse, surtout sur les <b>aciers haute résistance</b> (>1000 MPa)."},
{q:"Dégazage après électrodéposition sur acier HR :",o:["190-230 °C, 4-24 h, dans les 4 h","400 °C pendant 1 h, dans les 24 h","Pas nécessaire si bain alcalin","24 h à température ambiante, sans délai"],c:0,e:"<b>Dégazage</b> (baking) : <b>190-230 °C</b>, pendant <b>4 à 24 h</b>, et il faut commencer <b>dans les 4 h</b> après le dépôt. Ce délai de 4 h est critique : passé ce temps, l'hydrogène s'est piégé de façon irréversible dans les défauts du métal."},
{q:"Le brouillard salin teste :",o:["La résistance à la corrosion","L'adhérence du revêtement","La dureté de surface","L'épaisseur de la couche"],c:0,e:"<b>Brouillard salin</b> (ISO 9227) : on expose la pièce à un brouillard de <b>5 % NaCl à 35 °C</b> pendant des centaines d'heures. On note le temps avant apparition de la corrosion. Plus c'est long = meilleure protection."},
{q:"Le test de quadrillage (ISO 2409) mesure :",o:["L'adhérence du revêtement","La dureté de surface","La résistance à la corrosion","L'épaisseur de la couche"],c:0,e:"On trace une <b>grille</b> sur le revêtement avec un cutter, puis on applique un <b>scotch</b> et on l'arrache. On note de <b>0</b> (rien ne part = parfait) à <b>5</b> (tout se décolle = rejet). ISO 2409."},
{q:"Les courants de Foucault mesurent :",o:["L'épaisseur du revêtement","La dureté de surface","La résistance chimique","La température du bain"],c:0,e:"Les <b>courants de Foucault</b> (eddy currents) sont une méthode <b>non destructive</b> pour mesurer l'épaisseur d'un revêtement sur un substrat conducteur. Rapide, précis, sans contact. L'alternative destructive est la <b>coupe micrographique</b>."},
{q:"Le dye spot test vérifie :",o:["La qualité du colmatage","L'épaisseur de la couche","La dureté du dépôt","La propreté de surface"],c:0,e:"Le <b>dye spot test</b> : on dépose une goutte de colorant sur la couche anodique colmatée. Si le colorant <b>pénètre dans les pores</b> = colmatage insuffisant → rejet. Si la goutte reste en surface = colmatage OK."},
