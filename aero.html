met_essais:{title:'Essais mécaniques',mod:'metaux',
lessons:[
{t:"Essais mécaniques en aéro",en:"Mechanical testing",b:"<span class='key'>Traction</span> <span class='en'>(Tensile test)</span> : éprouvette tirée → courbe σ-ε → Rm, Re, A%.<br><span class='key'>Dureté</span> <span class='en'>(Hardness)</span> : Vickers (HV, pyramide diamant), Rockwell (HRC, cône).<br><span class='key'>Résilience</span> <span class='en'>(Impact test)</span> : Charpy (pendule → énergie J).<br><span class='key'>Fatigue</span> <span class='en'>(Fatigue)</span> : courbe S-N (Wöhler). Cycles avant rupture.<br><span class='key'>Fluage</span> <span class='en'>(Creep)</span> : déformation vs temps à haute température."},
{t:"La courbe de traction pas à pas",en:"Tensile test step by step",b:"L'essai de traction est <b>LE test fondamental</b> en métallurgie. On tire sur une barre (éprouvette) jusqu'à ce qu'elle casse :<br><br><b>1. Zone élastique</b> (début de la courbe, droite) :<br>Le métal s'allonge mais <b>revient</b> si on arrête de tirer. Comme un élastique.<br><br><b>2. Limite élastique</b> (<span class='key'>Re</span>) :<br>Le point où la déformation devient <b>permanente</b>. Au-delà, le métal ne revient plus. C'est la limite de conception : en aéro, on reste TOUJOURS en dessous de Re.<br><br><b>3. Zone plastique</b> (courbe qui monte puis descend) :<br>Le métal se déforme de façon permanente. Le point le plus haut = <span class='key'>Rm</span> (résistance max).<br><br><b>4. Striction</b> (la barre s'amincit localement) :<br>Une zone se réduit en section → la contrainte y augmente → la rupture arrive.<br><br><b>5. Rupture</b> :<br>La barre casse. On mesure <span class='key'>A%</span> = combien elle s'est allongée.<br><br><div class='remember'><b>Re</b> = début déformation permanente (limite de conception)<br><b>Rm</b> = contrainte max (résistance du matériau)<br><b>A%</b> = allongement à rupture (ductilité)</div>"},
{t:"Les contrôles non destructifs (CND)",en:"Non-destructive testing (NDT)",b:"En aéro, on ne peut pas casser chaque pièce pour vérifier qu'elle est bonne ! Les <span class='key'>CND</span> <span class='en'>(NDT)</span> inspectent <b>sans endommager</b>.<br><br><span class='key'>Ressuage</span> <span class='en'>(Penetrant testing)</span> : liquide coloré/fluo → pénètre dans les fissures → révélateur blanc → fissures visibles. <b>Défauts de surface uniquement</b>.<br><br><span class='key'>Magnétoscopie</span> <span class='en'>(Magnetic particle)</span> : champ magnétique + poudre → s'accumule sur les fissures. <b>Acier et fer uniquement</b> (ferromagnétiques).<br><br><span class='key'>Ultrasons</span> <span class='en'>(Ultrasonic testing)</span> : onde sonore envoyée dans la pièce → réfléchie par les défauts. <b>Défauts internes</b> (fissures, inclusions, délaminage composites).<br><br><span class='key'>Courants de Foucault</span> <span class='en'>(Eddy currents)</span> : bobine électrique → induit des courants → perturbés par les défauts ou l'épaisseur. <b>Épaisseur TdS</b> + fissures surface.<br><br><span class='key'>Radiographie</span> <span class='en'>(X-ray)</span> : rayons X traversent la pièce → comme une radio médicale. <b>Défauts internes</b>.<br><br><div class='remember'>Surface = ressuage (tous métaux) ou magnétoscopie (acier).<br>Interne = ultrasons ou radiographie.<br>Épaisseur dépôt = courants de Foucault.</div>"},
{t:"Caractérisation : DSC, FTIR, DRX, MEB",en:"Materials characterization techniques",b:"Les techniques de caractérisation du labo s'appliquent directement en industrie :<br><br><span class='key'>DSC</span> (Differential Scanning Calorimetry) :<br>Mesure les flux de chaleur → détecte la <span class='key'>Tg</span> (transition vitreuse des polymères), la <span class='key'>Tf</span> (fusion), la <span class='key'>cristallisation</span>. En aéro : vérifier que la résine époxy est bien réticulée (Tg attendue), contrôler un vieillissement.<br><br><span class='key'>FTIR</span> (spectroscopie infrarouge) :<br>Identifie les <span class='key'>liaisons chimiques</span> (C=O, O-H, N-H...). En aéro : identifier un polymère inconnu, vérifier une contamination, suivre une dégradation chimique.<br><br><span class='key'>DRX</span> (Diffraction des Rayons X) :<br>Identifie les <span class='key'>phases cristallines</span> d'un métal ou d'une couche. En aéro : vérifier qu'un traitement thermique a produit la bonne phase, identifier un produit de corrosion.<br><br><span class='key'>MEB-EDS</span> (Microscope Électronique à Balayage + analyse chimique) :<br>Image à fort grossissement + <span class='key'>composition chimique locale</span>. En aéro : analyser un faciès de rupture, mesurer l'épaisseur d'une couche TdS, identifier une inclusion.<br><br><div class='remember'><b>En industrie :</b> ces techniques servent à la <b>qualification matière</b>, au <b>contrôle qualité</b>, et à l'<b>analyse de défaillance</b>. Tu les retrouveras dans tout labo matériaux aéro.</div>"},
{t:"Analyse de défaillance",en:"Failure analysis",b:"L'<span class='key'>analyse de défaillance</span> <span class='en'>(Failure analysis)</span> = comprendre <b>pourquoi</b> une pièce a cassé ou s'est dégradée. Compétence clé en industrie aéro.<br><br><b>La démarche :</b><br>1. <span class='key'>Observation visuelle</span> : photos, mesures, état de la pièce<br>2. <span class='key'>Fractographie</span> : examiner le faciès de rupture au MEB<br>   - Cupules → rupture <b>ductile</b><br>   - Facettes lisses → rupture <b>fragile</b> (clivage)<br>   - Stries (beach marks) → rupture par <b>fatigue</b><br>   - Intergranulaire → corrosion ou FPH<br>3. <span class='key'>Métallographie</span> : coupe + polissage + attaque chimique → microstructure au microscope<br>4. <span class='key'>Analyses chimiques</span> : MEB-EDS, DRX, FTIR → identifier phases, contaminations, produits de corrosion<br>5. <span class='key'>Cause racine</span> : remonter à l'origine (matériau, procédé, conception, utilisation)<br><br><b>Outils qualité associés :</b><br>- <span class='key'>8D</span> : résolution de problème en 8 étapes (identifier, contenir, analyser, corriger, vérifier)<br>- <span class='key'>Ishikawa</span> (5M) : diagramme causes-effets (Matière, Méthode, Machine, Main d'œuvre, Milieu)<br>- <span class='key'>5 Pourquoi</span> : remonter à la cause racine en demandant 'pourquoi ?' itérativement<br><br><div class='remember'>En aéro, chaque rupture ou non-conformité doit être <b>documentée</b> et analysée. L'expertise matériaux (fractographie, métallographie, caractérisation) est au cœur de cette démarche.</div>"},
{t:"Corrosion électrochimique : Tafel et protection",en:"Electrochemical corrosion: Tafel and protection",b:"La corrosion est un phénomène <span class='key'>électrochimique</span>. Ce que tu as appris en TP (potentiostat, courbes de polarisation) s'applique directement :<br><br><b>Potentiel de corrosion (<span class='key'>Ecor</span>) :</b><br>Le potentiel auquel un métal se stabilise naturellement dans un électrolyte. Plus Ecor est <b>négatif</b> = métal plus <b>actif</b> (se corrode plus facilement). On le mesure vs une <b>électrode de référence</b> (ECS, Ag/AgCl).<br><br><b>Courant de corrosion (<span class='key'>icor</span>) :</b><br>La vitesse à laquelle le métal se corrode. On le détermine par les <span class='key'>droites de Tafel</span> : on trace log(i) vs E autour de Ecor. Les pentes des branches anodique et cathodique permettent d'extrapoler icor.<br><br><b>Courbe de polarisation i = f(E) :</b><br>On balaie le potentiel et on mesure le courant. On observe :<br>- Le domaine <span class='key'>cathodique</span> (réduction, courant négatif)<br>- Le <span class='key'>potentiel de corrosion</span> Ecor (courant = 0)<br>- Le domaine <span class='key'>anodique</span> : dissolution du métal, puis <b>passivation</b> (plateau de courant si couche protectrice), puis <b>transpassivation</b> (dissolution de la couche).<br><br><b>Protection :</b><br>- <span class='key'>Cathodique</span> : imposer un potentiel plus négatif (anode sacrificielle Zn, ou courant imposé). Le métal ne peut plus s'oxyder.<br>- <span class='key'>Anodique</span> : maintenir le métal dans le domaine passif (ex : passivation des inox).<br><br><div class='remember'><b>En industrie TdS :</b> on utilise les courbes de polarisation pour <b>qualifier un revêtement anticorrosion</b> : le revêtement doit déplacer Ecor vers des valeurs plus nobles et réduire icor.</div>"},
],
L1:[
{q:"L'essai de traction donne :",o:["Rm, Re, A%","La dureté HV et HRC","L'énergie de rupture","La ténacité KIc"],c:0,e:"L'essai de <b>traction</b> : on tire sur une éprouvette jusqu'à sa rupture. La courbe σ-ε donne 3 valeurs : <b>Re</b> (début déformation permanente), <b>Rm</b> (contrainte max), <b>A%</b> (allongement à rupture = ductilité)."},
{q:"La courbe S-N (Wöhler) concerne :",o:["La fatigue (cycles répétés)","Le fluage (haute température)","La corrosion (milieu salin)","La dureté (indentation)"],c:0,e:"La courbe <b>S-N</b> (Wöhler) : on trace la <b>contrainte</b> (S) en fonction du <b>nombre de cycles</b> (N) avant rupture. Plus la contrainte est faible, plus la pièce tient de cycles. Certains aciers ont une <b>limite d'endurance</b> (contrainte sous laquelle la pièce ne casse jamais)."},
{q:"La dureté Vickers (HV) utilise :",o:["Une pyramide en diamant","Une bille en acier","Un cône en carbure","Un pendule oscillant"],c:0,e:"<b>Vickers</b> : on enfonce une <b>pyramide en diamant</b> (angle 136°) sous une charge connue. On mesure la diagonale de l'empreinte → HV. C'est la méthode la plus utilisée en aéro car elle marche sur tous les matériaux et toutes les épaisseurs.<br><br><b>Rockwell</b> (HRC) utilise un cône diamant. <b>Brinell</b> (HB) utilise une bille."},
{q:"L'essai de fatigue simule :",o:["Des contraintes cycliques répétées","Un choc unique violent","Une contrainte constante à chaud","Une immersion en milieu corrosif"],c:0,e:"L'essai de <b>fatigue</b> soumet la pièce à des <b>contraintes cycliques</b> (traction-compression alternées) jusqu'à rupture. C'est critique en aéro : les ailes fléchissent à chaque turbulence, le fuselage se pressurise à chaque vol. Des millions de cycles s'accumulent."},
{q:"Le fluage est critique pour quelle pièce moteur :",o:["Les aubes de turbine HP","Les pales du fan","Le carter de soufflante","Les boulons de fixation"],c:0,e:"Les <b>aubes de turbine HP</b> subissent à la fois une <b>contrainte constante</b> (force centrifuge de la rotation) et une <b>haute température</b> (1000 °C+). Ce sont les conditions exactes du <b>fluage</b> (creep). C'est pour ça qu'elles sont en superalliage de nickel avec barrière thermique."},
{q:"L'essai Brinell (HB) utilise :",o:["Une bille en acier ou carbure","Une pyramide en diamant","Un cône en diamant","Un pendule de choc"],c:0,e:"<b>Brinell (HB)</b> = indenteur <b>bille</b> (acier ou carbure de tungstène). Utilisé pour les matériaux à gros grains (fontes, aciers coulés). <b>Vickers (HV)</b> = pyramide diamant. <b>Rockwell (HRC)</b> = cône diamant. Charpy = pendule (résilience, pas dureté)."},
{q:"La courbe σ-ε d'un essai de traction montre :",o:["La contrainte en fonction de la déformation","La dureté en fonction du temps","La température en fonction de la charge","L'épaisseur en fonction du courant"],c:0,e:"La courbe <b>σ-ε</b> (sigma-epsilon) = contrainte (σ, en MPa) vs déformation (ε, en %). On lit dessus : le domaine <b>élastique</b> (pente linéaire), la <b>limite élastique</b> (Re), le <b>Rm</b> (contrainte max), et <b>A%</b> (déformation à rupture)."},
{q:"Un essai destructif :",o:["Casse ou endommage la pièce pour la tester","Teste sans abîmer la pièce","Utilise des rayons X","Mesure l'épaisseur d'un dépôt"],c:0,e:"Un essai <b>destructif</b> = on <b>casse ou endommage</b> la pièce. Exemples : traction (on tire jusqu'à rupture), Charpy (pendule), coupe micrographique (on coupe). La pièce est sacrifiée mais la mesure est directe."},
{q:"La fractographie sert à :",o:["Analyser la surface de rupture pour identifier la cause de la casse","Mesurer la dureté d'un matériau","Calculer les contraintes en service","Peser les éprouvettes après essai"],c:0,e:"La <b>fractographie</b> = observer la <b>surface de rupture</b> au microscope (optique ou MEB) pour identifier le mécanisme de ruine : fatigue (stries de fatigue), rupture fragile (clivage), rupture ductile (cupules). Outil essentiel en <b>analyse de défaillance</b>."},
{q:"La micrographie en métallurgie sert à :",o:["Observer la microstructure du métal","Mesurer la température de fusion","Peser la pièce avec précision","Calculer la résistance en traction"],c:0,e:"La <b>micrographie</b> = on coupe la pièce, on polit la surface, on attaque chimiquement (acide) pour révéler les <b>grains</b>, les <b>phases</b>, les précipités, les défauts. On observe au <b>microscope optique</b> ou <b>MEB</b> (microscope électronique à balayage). C'est un essai <b>destructif</b>."},
{q:"C'est quoi le MPa ?",o:["L'unité de contrainte mécanique","Une unité de température","Une unité de masse","Une unité d'épaisseur"],c:0,e:"<b>MPa</b> = <b>mégapascal</b> = 1 million de pascals. C'est l'unité de <b>contrainte mécanique</b> (force par surface). On l'utilise pour exprimer la résistance des matériaux : Rm du 7075-T6 = 570 MPa, Ti-6Al-4V = 1000 MPa, Inconel 718 = 1400 MPa. 1 MPa ≈ 10 kg/cm²."},
{q:"La différence entre essai destructif et non destructif :",o:["Destructif = on casse la pièce, non destructif = on la garde intacte","Non destructif = plus précis que destructif","Destructif = plus rapide","Il n'y a aucune différence"],c:0,e:"Essai <b>destructif</b> : on <b>casse ou endommage</b> la pièce (traction, Charpy, coupe micrographique). On sacrifie la pièce.<br>Essai <b>non destructif</b> (CND) : on teste <b>sans abîmer</b> la pièce (ultrasons, ressuage, radiographie, courants de Foucault). Indispensable en aéro car on ne peut pas casser chaque pièce !"},
{q:"C'est quoi une éprouvette ?",o:["Un échantillon standard pour les essais mécaniques","Un outil de mesure de température","Un type de revêtement de surface","Un appareil de contrôle qualité"],c:0,e:"Une <b>éprouvette</b> (test specimen) = un <b>échantillon</b> de matériau usiné à des dimensions standardisées pour réaliser des essais mécaniques. Exemples : éprouvette de traction (forme d'os de chien), éprouvette Charpy (barreau entaillé), éprouvette Almen (plaquette de grenaillage). Les dimensions sont normalisées pour que les résultats soient comparables."},
{q:"La magnétoscopie détecte :",o:["Les fissures de surface sur les matériaux ferromagnétiques","Les défauts internes dans l'aluminium","L'épaisseur des dépôts","La composition chimique du métal"],c:0,e:"La <b>magnétoscopie</b> = on magnétise la pièce (acier, fer) et on saupoudre de poudre magnétique. La poudre s'accumule au-dessus des <b>fissures</b> (le champ magnétique est perturbé). Rapide et sensible, mais <b>uniquement sur les matériaux ferromagnétiques</b> (pas l'alu, pas le titane)."},
{q:"La DSC mesure :",o:["Les flux de chaleur (Tg, Tf, cristallisation)","La résistance mécanique","L'épaisseur d'un dépôt","La composition chimique"],c:0,e:"La <b>DSC</b> (Differential Scanning Calorimetry) mesure les <b>flux de chaleur</b>. On détecte : la <b>Tg</b> (transition vitreuse), la <b>Tf</b> (fusion), la cristallisation, et le taux de réticulation."},
{q:"La FTIR identifie :",o:["Les liaisons chimiques d'un matériau","La microstructure cristalline","La dureté de surface","L'épaisseur d'un revêtement"],c:0,e:"La <b>FTIR</b> (infrarouge) identifie les <b>liaisons chimiques</b> (C=O, O-H, N-H...). En aéro : identifier un polymère, vérifier une contamination, suivre un vieillissement."},
{q:"La DRX identifie :",o:["Les phases cristallines d'un matériau","Les défauts de surface","La résistance en traction","Le taux de porosité"],c:0,e:"La <b>DRX</b> (Diffraction des Rayons X) identifie les <b>phases cristallines</b>. Chaque phase a un 'code-barres' unique. En aéro : vérifier un traitement thermique, identifier un produit de corrosion."},
{q:"Le MEB-EDS permet de :",o:["Imager en détail et analyser la composition chimique locale","Mesurer la résistance en traction","Mesurer l'épaisseur par ultrasons","Tester l'adhérence d'un revêtement"],c:0,e:"Le <b>MEB</b> image la surface à fort grossissement (x50 à x100 000+). L'<b>EDS</b> analyse les rayons X émis pour donner la <b>composition chimique locale</b>. Indispensable en analyse de défaillance."},
{q:"La rupture fragile se reconnaît au MEB par :",o:["Des facettes de clivage planes et brillantes","Des cupules profondes et arrondies","Des stries de fatigue régulières","Une surface lisse et polie"],c:0,e:"Au MEB, la <b>rupture fragile</b> montre des <b>facettes de clivage</b> : surfaces planes et brillantes le long des plans cristallographiques. La <b>rupture ductile</b> montre des <b>cupules</b> (dimples) : petites cavités arrondies. La <b>fatigue</b> montre des <b>stries</b> (beach marks à l'échelle macro, striations au MEB)."},
{q:"Ecor (potentiel de corrosion) est :",o:["Le potentiel d'équilibre du métal dans un électrolyte","La vitesse de corrosion en mm/an","L'épaisseur de la couche d'oxyde","La température de début de corrosion"],c:0,e:"<b>Ecor</b> = potentiel auquel un métal atteint un équilibre entre oxydation et réduction dans un électrolyte. Plus Ecor est négatif = métal plus actif (se corrode plus)."},
{q:"Les droites de Tafel servent à déterminer :",o:["Le courant de corrosion (icor)","La dureté du métal","L'épaisseur de la couche passive","La température de fusion"],c:0,e:"Les <b>droites de Tafel</b> = parties linéaires de log(i) vs E autour de Ecor. Leur intersection donne <b>icor</b> = la vitesse de corrosion du métal."},
],
L2:[
{q:"La limite d'endurance (fatigue) est :",o:["La contrainte sous laquelle la pièce ne casse jamais","La contrainte maximale avant rupture","La déformation permanente à 0,2 %","L'énergie absorbée au choc"],c:0,e:"Certains matériaux (surtout les <b>aciers</b>) ont une <b>limite d'endurance</b> : en dessous de cette contrainte, la pièce peut supporter un nombre <b>infini</b> de cycles sans casser. Les alliages d'alu n'ont PAS de limite d'endurance → ils finissent toujours par casser en fatigue."},
{q:"HRC vs HV : la principale différence est :",o:["HRC = cône diamant, HV = pyramide diamant","HRC = pyramide, HV = bille","HRC pour les mous, HV pour les durs","Aucune différence, même mesure"],c:0,e:"<b>Rockwell C (HRC)</b> = indenteur <b>cône diamant</b>, mesure directe (cadran). Rapide. Utilisé en atelier.<br><b>Vickers (HV)</b> = indenteur <b>pyramide diamant</b>, mesure de l'empreinte au microscope. Plus précis. Utilisé en labo et pour les micro-duretés (couches minces, TdS)."},
{q:"Les 3 stades du fluage sont :",o:["Primaire → secondaire → tertiaire","Élastique → plastique → rupture","Chauffage → maintien → refroidissement","Traction → compression → cisaillement"],c:0,e:"Le <b>fluage</b> = 3 stades : <b>primaire</b> (déformation rapide qui ralentit, écrouissage), <b>secondaire</b> (déformation à vitesse constante, la plus longue phase), <b>tertiaire</b> (accélération, striction, fissuration → rupture). En aéro, on dimensionne pour rester dans le stade secondaire pendant toute la durée de vie."},
{q:"L'éprouvette Charpy a une entaille en :",o:["V (45°, 2 mm de profondeur)","U (5 mm de profondeur)","Cercle (trou traversant)","Pas d'entaille (lisse)"],c:0,e:"L'éprouvette <b>Charpy</b> standard a une entaille en <b>V</b> (angle 45°, profondeur 2 mm, rayon fond 0,25 mm). L'entaille concentre les contraintes pour provoquer une rupture fragile contrôlée. Il existe aussi l'entaille en U (moins courante). La norme est ISO 148."},
{q:"Le faciès de rupture d'un métal ductile montre :",o:["Des cupules","Une surface lisse et brillante","Des stries régulières","Aucun signe visible"],c:0,e:"En fractographie, une rupture <b>ductile</b> montre des <b>cupules</b> (dimples) = petites cavités formées par la coalescence de microvides. Surface mate et rugueuse. Une rupture <b>fragile</b> montre des facettes cristallographiques <b>lisses et brillantes</b> (clivage). En fatigue, on voit des <b>stries de fatigue</b> (beach marks)."},
{q:"La thermographie infrarouge en CND sert à :",o:["Détecter les défauts par différence de température","Mesurer la résistance mécanique","Chauffer la pièce pour la traiter","Colorer les fissures de surface"],c:0,e:"La <b>thermographie infrarouge</b> : on chauffe légèrement la pièce (flash, lampe) et on filme avec une caméra IR. Les défauts (délaminage, porosité, décollements) modifient la diffusion de la chaleur → ils apparaissent comme des zones plus chaudes ou plus froides. Très utile pour les composites et les assemblages collés."},
{q:"Le MEB (microscope électronique à balayage) sert à :",o:["Observer la surface à très fort grossissement","Mesurer la dureté de la surface","Détecter les fissures internes","Mesurer l'épaisseur des dépôts"],c:0,e:"Le <b>MEB</b> (SEM en anglais) utilise un faisceau d'électrons pour imager la surface à des grossissements de <b>x50 à x100 000+</b>. En métallurgie, il sert à observer les <b>faciès de rupture</b> (ductile, fragile, fatigue), la <b>microstructure</b>, les <b>précipités</b> et les défauts de TdS. Souvent couplé à l'<b>EDS</b> (analyse chimique locale)."},
],L3:[
{q:"Un acier Charpy 20 J à -40 °C vs 120 J à 20 °C. Que signifie cette chute ?",o:["Transition ductile-fragile","L'acier est défectueux","La machine de test est mal calibrée","Normal, tous les métaux sont identiques"],c:0,e:"Les aciers ont une <b>température de transition ductile-fragile</b> : au-dessus, ils absorbent beaucoup d'énergie (rupture ductile, 120 J). En dessous, ils deviennent <b>fragiles</b> (rupture nette, 20 J). C'est critique en aéro : les pièces de train d'atterrissage ou de structure basse doivent résister aux températures de vol (-50 °C). On choisit des aciers avec une transition basse."},
{q:"Essai de fatigue : 10⁷ cycles à 200 MPa sans rupture (acier). Conclusion ?",o:["200 MPa est sous la limite d'endurance","L'essai est trop court pour conclure","L'acier est fragile et va casser bientôt","La contrainte est trop élevée"],c:0,e:"Les <b>aciers</b> ont une <b>limite d'endurance</b> : si la pièce survit à ~10⁷ cycles sans rompre, elle ne rompra probablement <b>jamais</b> à cette contrainte. 200 MPa est donc <b>sous la limite d'endurance</b> de cet acier. Attention : les alliages d'alu <b>n'ont PAS</b> de limite d'endurance → ils finissent toujours par casser en fatigue, même à faible contrainte."},
]},

// ==================== COMPOSITES - BASES ====================
comp_bases:{title:'Introduction aux composites',mod:'composites',
lessons:[
{t:"Définition et constituants",en:"Definition and constituents",b:"<span class='key'>Composite</span> = <span class='key'>renfort</span> <span class='en'>(reinforcement)</span> + <span class='key'>matrice</span> <span class='en'>(matrix)</span>. Propriétés supérieures aux constituants seuls.<br><br>Renforts :<br><span class='key'>Carbone</span> <span class='en'>(Carbon fiber)</span> : standard aéro. Haute résistance + module. Issu du PAN pyrolysé.<br><span class='key'>Verre</span> <span class='en'>(Glass fiber)</span> : moins cher mais plus lourd. Carénages non structuraux.<br><span class='key'>Aramide</span> (Kevlar) : grande ténacité, résistance impact. Blindages.<br><span class='key'>Céramique</span> (SiC) : très haute température. CMC pour aubes turbine LEAP.<br><br>Matrices :<br><span class='key'>Thermodurcissable</span> <span class='en'>(Thermoset)</span> : époxy (standard), BMI, polyimide. Irréversible après cuisson.<br><span class='key'>Thermoplastique</span> <span class='en'>(Thermoplastic)</span> : PEEK, PPS, PEI. Recyclable, soudable. En croissance."},
{t:"Composites en avions modernes",en:"Composites in modern aircraft",b:"<span class='key'>A350</span> : 53 % composite (record Airbus). Fuselage + ailes + empennage.<br><span class='key'>B787</span> : 50 % composite. Premier fuselage full composite en service.<br><span class='key'>LEAP</span> : aubes fan en composite tissé 3D (RTM) + carter composite. -500 kg vs CFM56.<br><span class='key'>CMC</span> = <b>Composite à Matrice Céramique</b> (Ceramic Matrix Composite). Concrètement : des <b>fibres de carbure de silicium (SiC)</b> dans une <b>matrice de carbure de silicium</b> → d'où le nom SiC/SiC. Utilisé dans les <b>aubes de turbine basse pression</b> du LEAP. Pourquoi ? Les aubes de turbine étaient en superalliage de nickel (très lourd, 8,9 g/cm³). Le CMC fait le même travail à <b>1/3 du poids</b> (~2,5 g/cm³) tout en tenant <b>1300 °C+</b>. Ça veut dire moins de masse en rotation → moins de contraintes mécaniques → moteur plus léger et plus efficace. Fabriqué par Safran Ceramics à Bordeaux."},
{t:"Matrices polymères et vieillissement",en:"Polymer matrices and aging",b:"En composites aéro, la <span class='key'>matrice polymère</span> protège les fibres et transfère les charges :<br><br><b>La température de transition vitreuse (<span class='key'>Tg</span>) :</b><br>Température où le polymère passe de <b>rigide</b> (vitreux) à <b>souple</b> (caoutchoutique). En aéro, la pièce doit toujours travailler <b>en dessous de Tg</b>. Époxy aéro : Tg ~180 °C. PEEK : Tg ~143 °C mais utilisable au-delà grâce à sa cristallinité.<br><br><b>La réticulation :</b><br>La matrice époxy est un <span class='key'>thermodurcissable</span> : les chaînes polymères se lient entre elles de façon <b>irréversible</b> pendant la cuisson (autoclave). Le <span class='key'>taux de réticulation</span> se mesure par <b>DSC</b> (chaleur résiduelle de réaction). Taux insuffisant = Tg trop basse = pièce non conforme.<br><br><b>Vieillissement des composites :</b><br>- <span class='key'>Hydrothermique</span> : la matrice absorbe l'eau → <b>plastification</b> → Tg baisse. Critique en zone tropicale.<br>- <span class='key'>UV</span> : cassent les chaînes polymères en surface. Protection : peinture ou gel-coat.<br>- <span class='key'>Thermique</span> : exposition prolongée à haute température → dégradation oxydative.<br><br><div class='remember'><b>Lien avec tes cours :</b> la DSC mesure Tg et taux de réticulation. La FTIR suit la dégradation chimique. La SEC mesure la masse molaire des thermoplastiques.</div>"},
{t:"Défauts et contrôle des composites",en:"Composite defects and inspection",b:"Les composites ont des <span class='key'>défauts spécifiques</span> à surveiller :<br><br><b>Défauts de fabrication :</b><br>- <span class='key'>Porosité</span> : bulles d'air piégées dans la matrice. Trop de porosité = pièce rejetée. Contrôle : <b>ultrasons C-scan</b>.<br>- <span class='key'>Délaminage</span> <span class='en'>(Delamination)</span> : séparation entre deux plis. Le défaut le plus critique. Contrôle : <b>ultrasons</b>.<br>- <span class='key'>Plissement</span> (wrinkle) : pli ondulé → chute de résistance en compression. Souvent dû à un drapage incorrect.<br>- <span class='key'>Mauvaise réticulation</span> : matrice mal cuite → Tg trop basse. Contrôle : <b>DSC</b>.<br><br><b>Défauts en service :</b><br>- <span class='key'>Impact</span> : un choc (outil tombé, grêle, oiseau) peut créer un <b>délaminage interne invisible</b> à l'œil (BVID = Barely Visible Impact Damage). Très dangereux.<br>- <span class='key'>Dommage de foudre</span> : le composite ne conduit pas bien l'électricité → risque d'échauffement. Protection : grillage métallique intégré.<br><br><b>Contrôle :</b><br>Les <span class='key'>ultrasons C-scan</span> sont LE CND principal des composites (cartographie 2D des défauts). La <b>thermographie infrarouge</b> détecte les décollements.<br><br><div class='remember'>Contrairement aux métaux, les composites <b>ne préviennent pas avant de casser</b> (pas de déformation plastique visible). D'où l'importance de l'inspection régulière.</div>"},
],
L1:[
{q:"Un composite est :",o:["Renfort + matrice combinés","Un métal pur monocristallin","Un alliage de deux métaux","Un polymère seul renforcé"],c:0,e:"Un <b>composite</b> = association d'un <b>renfort</b> (fibre de carbone, verre, aramide) et d'une <b>matrice</b> (époxy, PEEK). Les propriétés du composite sont <b>supérieures</b> à celles de chaque constituant seul.<br><svg viewBox='0 0 260 90' style='width:100%;max-width:260px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:6px'><rect x='20' y='15' width='220' height='60' rx='4' fill='#334155' stroke='#94a3b8' stroke-width='1'/><line x1='30' y1='28' x2='230' y2='28' stroke='#3b82f6' stroke-width='3'/><line x1='30' y1='40' x2='230' y2='40' stroke='#3b82f6' stroke-width='3'/><line x1='30' y1='52' x2='230' y2='52' stroke='#3b82f6' stroke-width='3'/><line x1='30' y1='64' x2='230' y2='64' stroke='#3b82f6' stroke-width='3'/><text x='130' y='82' text-anchor='middle' fill='#94a3b8' font-size='8'>Fibres (renfort) dans la matrice (résine)</text><text x='240' y='35' fill='#3b82f6' font-size='7'>Fibres</text><text x='240' y='55' fill='#64748b' font-size='7'>Matrice</text></svg>"},
{q:"La fibre la plus utilisée en aéro structural :",o:["Fibre de carbone","Fibre de verre","Fibre d'aramide (Kevlar)","Fibre de céramique (SiC)"],c:0,e:"La <b>fibre de carbone</b> est le standard en aéro structurale : haute résistance + haut module d'élasticité + faible densité. Issue du <b>PAN</b> (polyacrylonitrile) pyrolysé à haute température."},
{q:"Une matrice thermodurcissable est :",o:["Irréversible après cuisson","Recyclable par refusion","Toujours d'origine métallique","Soluble dans l'eau"],c:0,e:"Les matrices <b>thermodurcissables</b> (époxy, BMI, polyimide) : une fois cuites, la réticulation est <b>irréversible</b> → on ne peut pas les refondre. Les <b>thermoplastiques</b> (PEEK, PPS, PEI) sont recyclables et soudables → en croissance."},
{q:"L'A350 contient combien de composite :",o:["53 %","25 %","70 %","40 %"],c:0,e:"L'A350 = <b>53 % composite</b> en masse (record Airbus). Le B787 = 50 %. L'A320neo est encore majoritairement en aluminium."},
{q:"Les CMC dans le LEAP sont en :",o:["SiC/SiC","Carbone/époxy","Verre/polyester","Aramide/BMI"],c:0,e:"<b>CMC</b> = Composite à Matrice Céramique (Ceramic Matrix Composite). C'est un type de composite où <b>les fibres ET la matrice sont en céramique</b>, pas en polymère.<br><br><b>Le LEAP</b> = le moteur d'avion phare de CFM (Safran + GE). Dans sa turbine basse pression, des pièces sont en CMC <b>SiC/SiC</b> : fibres de <b>carbure de silicium</b> dans une matrice de <b>carbure de silicium</b>.<br><br><b>Pourquoi ?</b> Le nickel (matériau classique des aubes turbine) est lourd. Le SiC/SiC = <b>1/3 du poids du nickel</b> et tient à <b>1300 °C+</b>. Moins de poids → moins de conso.<br><svg viewBox='0 0 280 70' style='width:100%;max-width:280px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:6px'><rect x='10' y='10' width='80' height='40' rx='4' fill='#475569' stroke='#94a3b8' stroke-width='1.5'/><text x='50' y='28' text-anchor='middle' fill='#e2e8f0' font-size='8' font-weight='bold'>Nickel</text><text x='50' y='42' text-anchor='middle' fill='#94a3b8' font-size='7'>Lourd, cher</text><text x='130' y='33' text-anchor='middle' fill='#f97316' font-size='12'>→</text><rect x='170' y='10' width='100' height='40' rx='4' fill='#1e3a5f' stroke='#059669' stroke-width='2'/><text x='220' y='28' text-anchor='middle' fill='#6ee7b7' font-size='8' font-weight='bold'>CMC SiC/SiC</text><text x='220' y='42' text-anchor='middle' fill='#6ee7b7' font-size='7'>1/3 poids, 1300 °C</text><text x='140' y='62' text-anchor='middle' fill='#94a3b8' font-size='8'>Fabriqué par Safran Ceramics (Le Haillan)</text></svg>"},
{q:"Le PEEK est :",o:["Une matrice thermoplastique (recyclable)","Une matrice thermodurcissable (irréversible)","Une fibre de renfort carbone","Un traitement de surface"],c:0,e:"Le <b>PEEK</b> (polyétheréthercétone) est une matrice <b>thermoplastique</b> haute performance. Avantages vs époxy : <b>recyclable</b>, soudable, meilleure résistance aux impacts. En forte croissance en aéro."},
{q:"La fibre aramide (Kevlar) est surtout utilisée pour :",o:["La résistance aux impacts","La résistance en compression","La tenue à haute température","La conductivité électrique"],c:0,e:"L'<b>aramide</b> (Kevlar) a une grande <b>ténacité</b> (résistance à l'impact). Utilisée pour les <b>blindages</b>, gilets pare-balles, et protections anti-balistiques. Moins utilisée en structure aéro car sa résistance en compression est faible."},
{q:"La fibre de carbone est issue de :",o:["PAN pyrolysé","Pétrole brut directement","Bois de bambou carbonisé","Silicium fondu et étiré"],c:0,e:"La fibre de carbone aéro est fabriquée à partir de <b>PAN</b> (polyacrylonitrile), un précurseur polymère. Le procédé en 3 étapes :<br>1. <b>Oxydation</b> (200-300 °C, air) : stabilise les chaînes polymère<br>2. <b>Carbonisation</b> (1000-1500 °C, azote) : élimine H, N, O → ne reste que C<br>3. <b>Graphitisation</b> (2000-3000 °C, argon) : aligne les plans de graphite → haute rigidité<br>Résultat : fibre à <b>95 % de carbone</b>, 10× plus résistante que l'acier pour 4× moins lourd.<br><svg viewBox='0 0 480 120' style='width:100%;max-width:480px;margin:10px auto;display:block;background:#1a1a2e;border-radius:8px;padding:8px'><defs><marker id='apan' markerWidth='8' markerHeight='6' refX='8' refY='3' orient='auto'><path d='M0,0 L8,3 L0,6' fill='#60a5fa'/></marker></defs><rect x='10' y='30' width='80' height='50' rx='8' fill='#334155' stroke='#94a3b8' stroke-width='1.5'/><text x='50' y='50' text-anchor='middle' fill='#e2e8f0' font-size='11' font-weight='bold'>PAN</text><text x='50' y='65' text-anchor='middle' fill='#94a3b8' font-size='9'>polymère</text><line x1='95' y1='55' x2='130' y2='55' stroke='#60a5fa' stroke-width='2' marker-end='url(#apan)'/><rect x='135' y='30' width='90' height='50' rx='8' fill='#7c2d12' stroke='#f97316' stroke-width='1.5'/><text x='180' y='48' text-anchor='middle' fill='#fdba74' font-size='10' font-weight='bold'>Oxydation</text><text x='180' y='62' text-anchor='middle' fill='#fed7aa' font-size='9'>200-300 °C</text><text x='180' y='74' text-anchor='middle' fill='#94a3b8' font-size='8'>air</text><line x1='230' y1='55' x2='265' y2='55' stroke='#60a5fa' stroke-width='2' marker-end='url(#apan)'/><rect x='270' y='30' width='90' height='50' rx='8' fill='#991b1b' stroke='#ef4444' stroke-width='1.5'/><text x='315' y='48' text-anchor='middle' fill='#fca5a5' font-size='10' font-weight='bold'>Carbonisation</text><text x='315' y='62' text-anchor='middle' fill='#fecaca' font-size='9'>1000-1500 °C</text><text x='315' y='74' text-anchor='middle' fill='#94a3b8' font-size='8'>N₂</text><line x1='365' y1='55' x2='395' y2='55' stroke='#60a5fa' stroke-width='2' marker-end='url(#apan)'/><rect x='400' y='30' width='70' height='50' rx='8' fill='#1e3a5f' stroke='#3b82f6' stroke-width='1.5'/><text x='435' y='48' text-anchor='middle' fill='#93c5fd' font-size='10' font-weight='bold'>Fibre C</text><text x='435' y='62' text-anchor='middle' fill='#bfdbfe' font-size='9'>95% C</text><text x='240' y='105' text-anchor='middle' fill='#94a3b8' font-size='9'>Fabrication fibre de carbone à partir du PAN</text></svg>"},
{q:"La différence entre fibre de carbone et fibre de verre :",o:["Le carbone est plus résistant et plus léger","Le verre est plus résistant et plus léger","Ils sont identiques en performance","Le carbone est transparent"],c:0,e:"La fibre de <b>carbone</b> est plus <b>résistante</b>, plus <b>rigide</b> et plus <b>légère</b> que la fibre de verre. Mais le carbone coûte bien plus cher. En aéro structurale = carbone. La fibre de verre est réservée aux pièces non structurales (carénages, intérieurs)."},
{q:"L'époxy en composite est :",o:["La matrice (la colle qui lie les fibres)","Le renfort (les fibres)","Un traitement de surface","Un type de métal"],c:0,e:"L'<b>époxy</b> est la <b>matrice</b> la plus courante en aéro composite. Son rôle : <b>lier les fibres entre elles</b>, transférer les charges, protéger les fibres. C'est un <b>thermodurcissable</b> (irréversible après cuisson)."},
{q:"Les fibres dans un composite supportent surtout :",o:["Les efforts mécaniques","La protection contre la corrosion","La conduction de chaleur","L'isolation acoustique"],c:0,e:"Dans un composite, les <b>fibres</b> = le renfort qui supporte les <b>efforts mécaniques</b>. La <b>matrice</b> (époxy, PEEK) lie les fibres et transfère les charges. Comme le béton armé : les barres d'acier (fibres) résistent, le béton (matrice) entoure."},
{q:"Un composite est anisotrope, c'est-à-dire :",o:["Ses propriétés varient selon la direction","Ses propriétés sont identiques dans toutes les directions","Il ne se déforme jamais","Il conduit bien l'électricité"],c:0,e:"Un composite est <b>anisotrope</b> : il est très résistant <b>dans le sens des fibres</b> mais beaucoup moins <b>perpendiculairement</b>. C'est pourquoi on <b>oriente les plis</b> dans différentes directions (0°, 45°, 90°) pour résister aux efforts dans tous les sens.<br><svg viewBox='0 0 280 100' style='width:100%;max-width:280px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:6px'><text x='10' y='15' fill='#e2e8f0' font-size='9' font-weight='bold'>Orientation des plis :</text><rect x='10' y='22' width='80' height='30' rx='3' fill='#334155' stroke='#3b82f6' stroke-width='1.5'/><line x1='15' y1='37' x2='85' y2='37' stroke='#3b82f6' stroke-width='1.5'/><line x1='15' y1='32' x2='85' y2='32' stroke='#3b82f6' stroke-width='1.5'/><line x1='15' y1='42' x2='85' y2='42' stroke='#3b82f6' stroke-width='1.5'/><text x='50' y='65' text-anchor='middle' fill='#93c5fd' font-size='8'>0° (horizontal)</text><rect x='100' y='22' width='80' height='30' rx='3' fill='#334155' stroke='#f97316' stroke-width='1.5'/><line x1='110' y1='48' x2='170' y2='26' stroke='#f97316' stroke-width='1.5'/><line x1='105' y1='43' x2='165' y2='26' stroke='#f97316' stroke-width='1.5'/><line x1='115' y1='48' x2='175' y2='30' stroke='#f97316' stroke-width='1.5'/><text x='140' y='65' text-anchor='middle' fill='#fdba74' font-size='8'>45° (oblique)</text><rect x='190' y='22' width='80' height='30' rx='3' fill='#334155' stroke='#a855f7' stroke-width='1.5'/><line x1='210' y1='24' x2='210' y2='50' stroke='#a855f7' stroke-width='1.5'/><line x1='220' y1='24' x2='220' y2='50' stroke='#a855f7' stroke-width='1.5'/><line x1='230' y1='24' x2='230' y2='50' stroke='#a855f7' stroke-width='1.5'/><line x1='240' y1='24' x2='240' y2='50' stroke='#a855f7' stroke-width='1.5'/><line x1='250' y1='24' x2='250' y2='50' stroke='#a855f7' stroke-width='1.5'/><text x='230' y='65' text-anchor='middle' fill='#c4b5fd' font-size='8'>90° (vertical)</text><text x='140' y='85' text-anchor='middle' fill='#94a3b8' font-size='8'>On combine les 3 → résistance dans toutes les directions</text></svg>Un métal est <b>isotrope</b> (mêmes propriétés partout)."},
{q:"La Tg (transition vitreuse) d'un polymère est :",o:["La température où il passe de rigide à souple","Sa température de fusion","Sa température de cuisson","Sa température de dégradation"],c:0,e:"La <b>Tg</b> = température où un polymère amorphe passe de l'état <b>vitreux (rigide)</b> à l'état <b>caoutchoutique (souple)</b>. En aéro composite, on travaille toujours <b>en dessous de Tg</b>. Mesurée par DSC."},
{q:"Le taux de réticulation d'une résine se mesure par :",o:["DSC","Essai de traction","Ultrasons","Ressuage"],c:0,e:"La <b>DSC</b> mesure le <b>taux de réticulation</b> via la chaleur résiduelle de réaction. Résine bien cuite → presque pas de chaleur résiduelle (>95 %). Mal cuite → pic exothermique visible."},
{q:"Le BVID en composite c'est :",o:["Un dommage interne quasi invisible après impact","Un type de fibre de verre","Un procédé de fabrication","Un test de contrôle qualité"],c:0,e:"<b>BVID</b> (Barely Visible Impact Damage) = dommage d'impact <b>quasi invisible</b> en surface mais qui a créé un <b>délaminage interne</b>. Très dangereux car la surface semble intacte mais la structure interne est affaiblie.<br><svg viewBox='0 0 260 110' style='width:100%;max-width:260px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:6px'><text x='130' y='14' text-anchor='middle' fill='#e2e8f0' font-size='9' font-weight='bold'>Coupe d'un BVID</text><rect x='20' y='25' width='220' height='12' rx='2' fill='#475569' stroke='#94a3b8' stroke-width='1'/><text x='250' y='34' fill='#94a3b8' font-size='7'>Peau sup.</text><rect x='20' y='39' width='220' height='30' rx='0' fill='#334155'/><line x1='25' y1='45' x2='235' y2='45' stroke='#3b82f6' stroke-width='1.5'/><line x1='25' y1='52' x2='235' y2='52' stroke='#3b82f6' stroke-width='1.5'/><line x1='25' y1='59' x2='235' y2='59' stroke='#3b82f6' stroke-width='1.5'/><rect x='20' y='71' width='220' height='12' rx='2' fill='#475569' stroke='#94a3b8' stroke-width='1'/><text x='250' y='80' fill='#94a3b8' font-size='7'>Peau inf.</text><polygon points='130,0 125,22 135,22' fill='#ef4444'/><text x='130' y='100' text-anchor='middle' fill='#fca5a5' font-size='8'>Impact</text><ellipse cx='130' cy='52' rx='35' ry='14' fill='none' stroke='#ef4444' stroke-width='1.5' stroke-dasharray='3'/><text x='180' y='55' fill='#fca5a5' font-size='7'>Délaminage</text><circle cx='130' cy='31' r='3' fill='#f97316'/><text x='80' y='34' fill='#fdba74' font-size='7'>Quasi invisible</text></svg>Contrôle : <b>ultrasons C-scan</b> (seul moyen de voir le délaminage interne)."},
{q:"Le vieillissement hydrothermique d'un composite :",o:["Baisse la Tg car la matrice absorbe l'eau","Augmente la résistance mécanique","N'a aucun effet","Améliore la tenue en fatigue"],c:0,e:"<b>Vieillissement hydrothermique</b> : la matrice absorbe l'eau → <b>plastification</b> → la <b>Tg baisse</b>. On dimensionne en 'hot/wet' (pire cas)."},
{q:"Le délaminage dans un composite est :",o:["La séparation entre deux plis adjacents","Une fissure dans une fibre","Un trou de perçage","Un défaut de peinture"],c:0,e:"Le <b>délaminage</b> = séparation entre deux <b>plis</b>. Défaut le plus critique des composites. Réduit fortement la résistance en compression. Détecté par <b>ultrasons C-scan</b>."},
],
L2:[
{q:"L'avantage d'un thermoplastique (PEEK) sur un thermodurcissable (époxy) :",o:["Recyclable, soudable, meilleure tenue impact","Plus rigide, meilleure tenue thermique","Moins cher et plus facile à mouler","Plus léger et plus résistant en traction"],c:0,e:"<b>Thermoplastique</b> (PEEK, PPS) : recyclable, soudable (assemblage rapide), meilleure résistance aux impacts. <b>Thermodurcissable</b> (époxy, BMI) : mieux maîtrisé en aéro, meilleure tenue thermique, plus rigide. Le thermoplastique est l'avenir mais plus cher."},
{q:"Les aubes fan du LEAP sont en :",o:["Composite tissé 3D","Alliage de titane","Superalliage de nickel","Aluminium"],c:0,e:"Les aubes fan du LEAP sont en <b>composite carbone tissé 3D</b> fabriquées par RTM (Resin Transfer Molding). C'est une innovation majeure : <b>-500 kg</b> par moteur vs les aubes titane du CFM56."},
{q:"Le taux volumique de fibres typique en aéro est :",o:["55 à 65 %","10 à 20 %","80 à 90 %","30 à 40 %"],c:0,e:"En aéro structurale, le <b>taux volumique de fibres</b> (Vf) est de <b>55-65 %</b>. Trop peu de fibres → résistance insuffisante. Trop de fibres → pas assez de matrice pour transférer les charges et protéger les fibres. Le 60 % est le compromis optimal."},
{q:"Un stratifié UD (unidirectionnel) est :",o:["Des fibres toutes dans le même sens","Des fibres tissées en croix","Des fibres courtes aléatoires","Des fibres enroulées en spirale"],c:0,e:"<b>UD</b> (unidirectionnel) = toutes les fibres sont parallèles dans le <b>même sens</b>. Très résistant dans la direction des fibres, mais faible perpendiculairement. C'est pour ça qu'on empile les plis UD dans <b>différentes orientations</b> (0°, ±45°, 90°) pour obtenir un composite quasi-isotrope."},
{q:"La différence entre un tissu et un UD :",o:["Le tissu a des fibres croisées, le UD n'en a que dans un sens","Le UD est plus cher que le tissu","Le tissu est uniquement en verre","Le UD ne peut pas être drapé"],c:0,e:"Un <b>tissu</b> (woven) = des fibres croisées (chaîne + trame), comme un textile. Avantage : résiste dans 2 directions, plus facile à draper. Inconvénient : les fibres ondulent aux croisements → légère perte de résistance. Un <b>UD</b> = fibres toutes droites dans un sens → résistance maximale dans cette direction."},
{q:"BMI et polyimide sont des matrices pour :",o:["Les hautes températures","Les pièces non structurales","Les températures cryogéniques","Les pièces transparentes"],c:0,e:"<b>BMI</b> (bismaléimide) et <b>polyimide</b> = matrices thermodurcissables haute température. L'époxy est limitée à ~120-180 °C en service. Le BMI tient ~230 °C, le polyimide ~300 °C+. Utilisés pour les pièces proches du moteur (capots, nacelles)."},
],L3:[
{q:"Un composite quasi-isotrope [0/±45/90]s a des propriétés mécaniques :",o:["Similaires dans toutes les directions du plan","Identiques à un UD 0°","Meilleures en compression qu'en traction","Nulles à 45°"],c:0,e:"Le séquençage <b>[0/±45/90]s</b> (symétrique) donne un composite dont les propriétés en plan sont <b>quasi-identiques dans toutes les directions</b>. On perd la résistance max du UD à 0° mais on élimine la faiblesse à 90°. C'est le séquençage standard en aéro structurale."},
{q:"La Tg d'un composite époxy aéro est typiquement :",o:["~180-200 °C (au-dessus de la température de service)","~50 °C","~400 °C","~-20 °C"],c:0,e:"La <b>Tg</b> (température de transition vitreuse) d'un époxy aéro bien réticulé ≈ <b>180-200 °C</b>. Au-dessus de la Tg, la matrice ramollit et le composite perd ses propriétés mécaniques. La Tg doit toujours être <b>supérieure à la température max de service</b>. On la mesure par <b>DSC</b> ou <b>DMA</b>."},
{q:"Le module de Young des fibres de carbone HR est de l'ordre de :",o:["230 GPa","70 GPa (comme l'alu)","400 GPa","10 GPa"],c:0,e:"Fibres carbone <b>HR</b> (haute résistance, type T300/T700) : E ≈ <b>230 GPa</b>. Les fibres <b>HM</b> (haut module, type M40/M55) : E ≈ 400-500 GPa mais plus fragiles. L'alu = 70 GPa, l'acier = 210 GPa. Le module du composite final dépend du taux de fibres et de l'orientation."},
]},

// ==================== COMPOSITES - PROCÉDÉS ====================
comp_procedes:{title:'Procédés de fabrication',mod:'composites',
lessons:[
{t:"Procédés composites",en:"Composite manufacturing processes",b:"<span class='key'>Prepreg + autoclave</span> <span class='en'>(Prepreg layup)</span> : nappes pré-imprégnées, drapage, cuisson sous pression (6-7 bar, 180 °C). Référence aéro. Cher mais maîtrisé.<br><span class='key'>RTM</span> <span class='en'>(Resin Transfer Molding)</span> : fibres sèches dans moule, injection résine. Plus rapide, moins cher.<br><span class='key'>AFP/ATL</span> <span class='en'>(Automated Fiber/Tape Placement)</span> : dépose automatisée. Grandes pièces.<br><span class='key'>Enroulement filamentaire</span> <span class='en'>(Filament winding)</span> : pièces de révolution (réservoirs, tuyères)."},
{t:"L'autoclave pas à pas",en:"Autoclave cure step by step",b:"L'<span class='key'>autoclave</span> est un grand four pressurisé. Voici le cycle de cuisson type pour un composite époxy :<br><br><b>1. Préparation :</b><br>- La pièce drapée (prepreg) est mise sous <span class='key'>sac à vide</span> (bâche étanche + prise de vide)<br>- Le vide compacte les plis et aspire l'air piégé<br><br><b>2. Mise en autoclave :</b><br>- Fermeture, mise sous <span class='key'>pression</span> (6-7 bar d'azote)<br>- La pression force les plis les uns contre les autres → élimine les <span class='key'>porosités</span><br><br><b>3. Montée en température :</b><br>- Rampe contrôlée (1-3 °C/min) jusqu'au <span class='key'>palier de cuisson</span> (~180 °C pour l'époxy aéro)<br>- La résine se fluidifie puis <span class='key'>réticule</span> (durcit de façon irréversible)<br><br><b>4. Palier de cuisson :</b><br>- Maintien 2-4 h à 180 °C. La réticulation se complète. Le <span class='key'>taux de réticulation</span> final doit dépasser 95 % (vérifié par DSC).<br><br><b>5. Refroidissement :</b><br>- Descente contrôlée (2-5 °C/min). Trop rapide = contraintes thermiques résiduelles.<br><br><b>6. Démoulage + contrôle :</b><br>- CND ultrasons (C-scan) pour détecter porosités et délaminages<br>- DSC pour vérifier la Tg<br><br><div class='remember'>Le cycle autoclave est <b>long</b> (8-12 h) et <b>cher</b> (énergie + investissement). C'est pourquoi les procédés hors autoclave (RTM, infusion) se développent pour réduire les coûts.</div>"},
{t:"Réparation des composites",en:"Composite repair",b:"Un avion composite peut être <span class='key'>réparé</span> après un impact, une fissure ou un défaut de fabrication :<br><br><b>Types de réparation :</b><br><br><span class='key'>Patch boulonné</span> <span class='en'>(Bolted patch)</span> :<br>- Un renfort métallique ou composite fixé par des boulons/rivets<br>- Rapide, provisoire ou permanent. Simple mais ajoute du poids.<br><br><span class='key'>Patch collé</span> <span class='en'>(Bonded patch)</span> :<br>- Un renfort composite collé sur la zone endommagée<br>- Plus léger, meilleure répartition des efforts. Mais exige une excellente préparation de surface.<br><br><span class='key'>Scarfing</span> (réparation par incrustation) :<br>- On usine un <b>biseau</b> dans le composite endommagé (pente 1:20 à 1:60)<br>- On redrape des plis neufs dans le biseau + polymérisation<br>- La réparation la plus solide : retrouve ~90 % de la résistance originale<br>- Mais complexe, longue, et exige un opérateur très qualifié.<br><br><b>Contrôle après réparation :</b><br>- <span class='key'>CND ultrasons</span> : vérifier qu'il n'y a pas de délaminage entre le patch et la pièce<br>- <span class='key'>DSC</span> : vérifier que la résine de réparation est bien réticulée<br><br><div class='remember'>La réparation composite est un <b>procédé spécial</b> certifié. Les compagnies aériennes et MRO (maintenance) ont besoin d'ingénieurs matériaux pour qualifier et superviser ces réparations.</div>"},
],
L1:[
{q:"Le RTM consiste à :",o:["Injecter de la résine dans un moule","Draper des nappes pré-imprégnées","Enrouler des fils sur un mandrin","Fondre un thermoplastique en moule"],c:0,e:"<b>RTM</b> (Resin Transfer Molding) : on place des <b>fibres sèches</b> dans un moule fermé, puis on <b>injecte la résine</b> sous pression. Plus rapide et moins cher que le prepreg/autoclave. Utilisé pour les aubes fan du LEAP."},
{q:"Le procédé prepreg + autoclave est :",o:["La référence en aéro structurale","Le moins cher du marché","Réservé aux petites pièces simples","Obsolète et abandonné"],c:0,e:"<b>Prepreg + autoclave</b> = la référence en aéro. Les nappes <b>pré-imprégnées</b> (prepreg) sont drapées manuellement ou par robot, puis cuites en <b>autoclave</b> (6-7 bar, 180 °C). Maîtrisé et fiable, mais cher et lent. A350, B787 fabriqués ainsi."},
{q:"L'AFP/ATL est :",o:["Une dépose automatisée de fibres/bandes","Un test de contrôle non destructif","Un type de résine haute température","Un procédé de soudage composite"],c:0,e:"<b>AFP</b> (Automated Fiber Placement) et <b>ATL</b> (Automated Tape Laying) : robots qui déposent automatiquement les bandes de composite. Indispensable pour les <b>grandes pièces</b> (fuselage, ailes). Plus rapide et reproductible que le drapage manuel."},
{q:"L'enroulement filamentaire est adapté pour :",o:["Les pièces de révolution","Les panneaux plats de fuselage","Les ailes d'avion","Les fixations et boulons"],c:0,e:"L'<b>enroulement filamentaire</b> (filament winding) : on enroule des fibres continues autour d'un <b>mandrin</b>. Idéal pour les pièces <b>axisymétriques</b> : réservoirs, tuyères, tubes. Pas adapté aux formes complexes."},
{q:"C'est quoi un prepreg ?",o:["Une nappe de fibres déjà imprégnée de résine","Un moule pour cuire les composites","Un outil de contrôle qualité","Un type de fibre de verre"],c:0,e:"Un <b>prepreg</b> (pre-impregnated) = des fibres (carbone, verre) déjà <b>imprégnées de résine</b> (époxy). On les stocke au congélateur (-18 °C) pour empêcher la résine de durcir. Pour fabriquer une pièce, on <b>drape</b> les nappes dans un moule puis on cuit en autoclave."},
{q:"C'est quoi un autoclave (en composites) ?",o:["Un grand four sous pression pour cuire les composites","Un bain chimique pour traiter les métaux","Un robot de dépose automatique","Un outil de découpe des fibres"],c:0,e:"Un <b>autoclave</b> = un grand <b>four pressurisé</b>. On y place la pièce composite sous vide, puis on chauffe (~180 °C) sous pression (6-7 bar). La pression compacte les plis et élimine les bulles d'air (porosités). C'est le procédé de référence en aéro mais il est <b>cher</b> (autoclave = investissement lourd)."},
{q:"Le drapage c'est :",o:["Poser les couches de fibres dans le moule","Cuire la pièce en autoclave","Injecter la résine sous pression","Démouler la pièce finie"],c:0,e:"Le <b>drapage</b> (layup) = poser les nappes de fibres (prepreg ou fibres sèches) <b>couche par couche</b> dans le moule, en variant les orientations (0°, 45°, 90°). C'est comme construire un mille-feuille. Chaque couche s'appelle un <b>pli</b>. Le drapage peut être manuel ou automatisé (AFP/ATL)."},
{q:"C'est quoi un pli (en composite) ?",o:["Une couche de fibres dans le composite","Un défaut de fabrication","Un outil de découpe","Un type de résine"],c:0,e:"Un <b>pli</b> (ply) = une seule couche de fibres. Un composite est fait de <b>plusieurs plis empilés</b> dans différentes directions (0°, ±45°, 90°) pour résister aux efforts dans tous les sens. Plus de plis = plus épais et plus résistant. Un panneau typique a 10 à 40+ plis."},
{q:"Pourquoi orienter les plis dans différentes directions ?",o:["Pour résister aux efforts dans tous les sens","Pour décorer la pièce","Pour réduire le poids au maximum","Pour faciliter le démoulage"],c:0,e:"Les fibres ne résistent que <b>dans leur direction</b> (anisotropie). Si tous les plis sont à 0°, la pièce est forte dans un sens mais faible à 90°. En empilant à <b>0°, ±45° et 90°</b>, on crée un composite qui résiste dans <b>toutes les directions</b>. C'est le <b>séquençage</b> (stacking sequence)."},
{q:"Le sac à vide en autoclave sert à :",o:["Compacter les plis et aspirer l'air piégé","Protéger la pièce de la corrosion","Chauffer la résine uniformément","Mesurer l'épaisseur finale"],c:0,e:"Le <b>sac à vide</b> = bâche étanche + prise de vide. Le vide <b>compacte</b> les plis et <b>aspire l'air</b>. Sans vide, trop de <b>porosités</b>."},
{q:"La température typique de cuisson d'un composite époxy aéro est :",o:["~180 °C","~50 °C","~400 °C","~1000 °C"],c:0,e:"L'époxy aéro standard cure à ~<b>180 °C</b> pendant 2-4 h. Le BMI cure à ~220-230 °C, le polyimide à ~300 °C+."},
{q:"Le scarfing en réparation composite c'est :",o:["Usiner un biseau pour incruster des plis neufs","Coller un patch en surface","Boulonner un renfort métallique","Peindre la zone endommagée"],c:0,e:"Le <b>scarfing</b> = usiner un <b>biseau</b> (1:20 à 1:60) puis re-draper des plis neufs. ~90 % de la résistance originale mais complexe."},
{q:"Le C-scan ultrasons sur composite donne :",o:["Une cartographie 2D des défauts internes","L'épaisseur de chaque pli","La composition chimique","La résistance en traction"],c:0,e:"Le <b>C-scan</b> = balayage ultrasons → <b>image 2D</b> des défauts. Zones saines en vert, défauts en rouge. LE contrôle qualité principal des composites aéro."},
],
L2:[
{q:"La pression typique d'un cycle autoclave est :",o:["6-7 bar à 180 °C","1 bar à 120 °C","20 bar à 300 °C","0,5 bar à 80 °C"],c:0,e:"Cycle autoclave standard époxy : <b>6-7 bar</b> de pression, <b>180 °C</b> de température, pendant 2-4 h. La pression élimine les porosités et compacte les plis. C'est un procédé <b>coûteux</b> (investissement autoclave + énergie + temps)."},
{q:"Le RTM est utilisé pour les aubes fan du LEAP car :",o:["Forme complexe 3D + cadence élevée","C'est le procédé le moins cher","Il donne les fibres les plus résistantes","Il ne nécessite pas de moule"],c:0,e:"Le LEAP utilise du RTM avec un <b>tissage 3D</b> des fibres de carbone. Avantages : forme complexe de l'aube reproductible, <b>cadence de production</b> compatible avec les 3000+ moteurs/an, et résistance au <b>bird strike</b> (impact oiseau)."},
{q:"La différence entre AFP et ATL :",o:["AFP pose des mèches étroites, ATL pose des bandes larges","AFP est manuel, ATL est automatisé","AFP est pour les petites pièces uniquement","Ils sont identiques"],c:0,e:"<b>AFP</b> (Automated Fiber Placement) = dépose de <b>mèches étroites</b> (3-12 mm), peut suivre des formes complexes (doubles courbures). <b>ATL</b> (Automated Tape Laying) = bandes <b>larges</b> (75-300 mm), plus rapide mais limité aux surfaces peu courbées (panneaux de fuselage)."},
{q:"La température de cuisson d'un PEEK est :",o:["~380-400 °C (bien plus chaud que l'époxy)","~180 °C (comme l'époxy)","~80 °C (basse température)","~600 °C (proche de la fusion du métal)"],c:0,e:"Le <b>PEEK</b> se met en forme à ~<b>380-400 °C</b> (sa température de fusion). C'est bien plus chaud que l'époxy (~180 °C). Cela nécessite des outillages et des fours spéciaux, ce qui augmente le coût. Mais le PEEK est <b>recyclable</b> et <b>soudable</b> (thermoplastique)."},
{q:"Le hors-autoclave (OOA) signifie :",o:["Cuire le composite sans autoclave","Fabriquer sans fibres de carbone","Ne pas utiliser de résine","Draper sans moule"],c:0,e:"Le <b>hors-autoclave</b> (Out-of-Autoclave, OOA) = cuire le composite dans un <b>four classique sous vide</b>, sans la pression de l'autoclave (6-7 bar). Avantage : <b>moins cher</b> (pas d'investissement autoclave). Des résines OOA spéciales permettent d'obtenir une qualité proche de l'autoclave."},
],L3:[
{q:"Le taux de réticulation d'un composite époxy est mesuré par :",o:["DSC (enthalpie résiduelle de réticulation)","Essai de traction","Mesure de dureté Vickers","Microscope optique"],c:0,e:"Par <b>DSC</b>, on mesure l'<b>enthalpie résiduelle</b> de réticulation (pic exothermique). Si le composite est bien cuit, il n'y a presque plus de pic. On compare avec l'enthalpie totale d'une résine non cuite pour calculer le <b>taux de réticulation</b> (objectif > 95 %)."},
{q:"Le cycle de cuisson en autoclave comprend typiquement :",o:["Rampe montée + palier isotherme + refroidissement contrôlé","Un seul flash thermique instantané","Un refroidissement lent puis un réchauffement","Deux paliers à des températures différentes"],c:0,e:"Cycle standard : <b>rampe</b> (1-3 °C/min) → <b>palier</b> (180 °C pendant 2-4 h pour l'époxy) → <b>refroidissement contrôlé</b> (2-5 °C/min). Certains cycles ont un palier intermédiaire (~120 °C) pour la mise en forme de la résine avant réticulation complète."},
{q:"L'infusion sous vide (VARI) vs le RTM :",o:["L'infusion n'utilise qu'un demi-moule, le RTM un moule fermé","Les deux sont identiques","Le RTM est uniquement pour les petites pièces","L'infusion nécessite un autoclave"],c:0,e:"<b>VARI</b> (Vacuum Assisted Resin Infusion) : fibres sèches sur un <b>demi-moule</b> + bâche à vide. Le vide aspire la résine à travers les fibres. Moins cher (pas de moule fermé) mais moins maîtrisé. <b>RTM</b> : moule <b>fermé</b> + injection sous pression → meilleure qualité, meilleure reproductibilité, plus adapté à la cadence."},
]},

// ==================== COMPOSITES - DÉFAUTS ====================
comp_defauts:{title:'Défauts & Protection',mod:'composites',
lessons:[
{t:"Défauts et protection",en:"Defects and protection",b:"<span class='key'>Délaminage</span> <span class='en'>(Delamination)</span> : séparation entre plis. Cause #1 de ruine. Invisible en surface. Détecté aux ultrasons.<br><span class='key'>Porosité</span> : bulles d'air piégé. Réduit les propriétés.<br><span class='key'>BVID</span> <span class='en'>(Barely Visible Impact Damage)</span> : choc outil/grêle → délaminage interne invisible. Critique.<br><br>Protection :<br><span class='key'>Foudre</span> : grillage cuivre/bronze en surface (ECF). Le composite n'est pas conducteur.<br><span class='key'>UV</span> : peinture obligatoire (la résine se dégrade).<br><span class='key'>Érosion</span> : revêtement polyuréthane ou titane collé sur bord d'attaque."},
{t:"CND des composites",en:"NDT of composites",b:"Le <span class='key'>contrôle non destructif (CND)</span> <span class='en'>(Non-Destructive Testing, NDT)</span> est essentiel pour les composites car les défauts sont souvent <b>internes et invisibles</b>.<br><br><span class='key'>Ultrasons C-scan</span> <span class='en'>(Ultrasonic C-scan)</span> : LE contrôle principal. Un transducteur envoie des ondes ultrasonores à travers la pièce. Les défauts (délaminage, porosité) réfléchissent l'onde → image 2D couleur. Vert = sain, rouge = défaut.<br><br><span class='key'>Thermographie infrarouge</span> <span class='en'>(Infrared thermography)</span> : on chauffe brièvement la surface et on filme le refroidissement avec une caméra IR. Les défauts perturbent la diffusion thermique → zones chaudes ou froides anormales. Rapide, sans contact, mais moins précis que les ultrasons.<br><br><span class='key'>Tap test</span> <span class='en'>(Coin tap test)</span> : on tapote la surface avec un petit marteau ou une pièce. Un son <b>clair</b> = sain. Un son <b>sourd/mat</b> = possible délaminage en dessous. Simple mais subjectif, utilisé en inspection de routine.<br><br><span class='key'>Radiographie X</span> <span class='en'>(X-ray radiography)</span> : détecte les corps étrangers (inclusions, rivets mal posés), les porosités et les défauts de densité. Moins adapté au délaminage (perpendiculaire au faisceau).<br><br><div class='remember'>En production : C-scan systématique. En maintenance : tap test + C-scan ciblé. Après réparation : C-scan obligatoire pour valider le collage du patch.</div>"},
{t:"Tolérance aux dommages",en:"Damage tolerance",b:"En aéro, on ne dimensionne PAS les structures composites pour qu'elles soient <b>parfaites</b>. On les dimensionne pour qu'elles <b>tiennent même avec des défauts</b>.<br><br><span class='key'>Tolérance aux dommages</span> <span class='en'>(Damage tolerance)</span> = philosophie de certification : la structure doit supporter un niveau de dommage défini sans rupture catastrophique entre deux inspections programmées.<br><br><b>Niveaux de dommage :</b><br><span class='key'>CAI</span> <span class='en'>(Compression After Impact)</span> : on impacte une éprouvette composite à une énergie donnée, puis on la comprime jusqu'à rupture. La contrainte à rupture chute fortement (parfois -50 %) → c'est la propriété dimensionnante pour les composites.<br><br><span class='key'>BVID</span> : dommage à peine visible (< 0,5 mm de profondeur d'indentation). La structure doit tenir ses charges <b>limite</b> (charges max en service) avec un BVID.<br><span class='key'>VID</span> <span class='en'>(Visible Impact Damage)</span> : dommage visible. La structure doit tenir les charges <b>ultimes</b> (1,5 × limite) jusqu'à la prochaine inspection.<br><br><b>Conséquence en conception :</b> on ajoute des plis supplémentaires pour compenser la perte de résistance après impact → les composites sont souvent <b>surdimensionnés par rapport au pur calcul statique</b>.<br><br><div class='remember'>La tolérance aux dommages est LA raison pour laquelle un ingénieur matériaux doit connaître les <b>mécanismes d'endommagement</b> (délaminage, BVID) ET les <b>méthodes de CND</b> : on dimensionne pour le défaut qu'on sait détecter.</div>"},
],
L1:[
{q:"La fibre aramide (Kevlar) est utilisée pour :",o:["La résistance aux impacts et au balistique","La résistance aux hautes températures","La conductivité électrique","La transparence optique"],c:0,e:"La fibre <b>aramide</b> (Kevlar) est très résistante aux <b>impacts</b> et à l'<b>abrasion</b>. Utilisée en gilets pare-balles, mais aussi en aéro pour les pièces exposées aux impacts (capots de soufflante, protections). Inconvénient : elle absorbe l'humidité et résiste mal en compression."},
{q:"Protection foudre des composites :",o:["Grillage cuivre/bronze en surface","Peinture isolante spéciale","Aucune protection nécessaire","Résine chargée en graphite"],c:0,e:"Le composite carbone/époxy est un mauvais conducteur → la foudre peut le endommager. On ajoute un <b>ECF</b> (Expanded Copper Foil) = grillage de cuivre en surface pour <b>conduire le courant de foudre</b> sans abîmer la structure."},
{q:"Le délaminage est détecté par :",o:["Ultrasons","Inspection visuelle simple","Essai de traction","Mesure de dureté"],c:0,e:"Le délaminage est <b>interne</b> (entre les plis), donc invisible en surface. La méthode de détection : les <b>ultrasons</b> (contrôle non destructif). L'onde ultrasonore est réfléchie par le délaminage → on voit le défaut sur l'écran."},
{q:"La peinture UV sur un composite sert à :",o:["Protéger la résine de la dégradation","Rendre la pièce conductrice","Améliorer l'aérodynamisme","Détecter les fissures"],c:0,e:"La <b>résine époxy</b> se dégrade sous les <b>rayons UV</b> du soleil (jaunissement, fragilisation). La peinture protège la matrice. C'est pour ça que les pièces composites extérieures sont toujours peintes."},
{q:"Un composite ne rouille pas, mais il craint :",o:["Les impacts, les UV et la foudre","La rouille et la corrosion","Le froid extrême uniquement","Rien, il est indestructible"],c:0,e:"Le composite carbone/époxy <b>ne rouille pas</b> (pas de métal). Mais il est vulnérable aux <b>impacts</b> (délaminage invisible), aux <b>UV</b> (la résine se dégrade) et à la <b>foudre</b> (pas conducteur → grillage cuivre obligatoire)."},
{q:"Un nid d'abeille (honeycomb) en aéro est :",o:["Une structure sandwich légère et rigide","Un type de corrosion de l'alu","Un défaut de soudage","Un pattern de grenaillage"],c:0,e:"Le <b>nid d'abeille</b> (honeycomb) = structure alvéolaire en alu ou Nomex (aramide) prise en sandwich entre deux peaux composites ou métalliques.<br><svg viewBox='0 0 280 100' style='width:100%;max-width:280px;display:block;margin:.5rem auto;background:#1a1a2e;border-radius:8px;padding:6px'><text x='140' y='14' text-anchor='middle' fill='#e2e8f0' font-size='9' font-weight='bold'>Structure sandwich</text><rect x='30' y='22' width='200' height='10' rx='2' fill='#3b82f6'/><text x='240' y='31' fill='#93c5fd' font-size='7'>Peau sup.</text><polygon points='50,38 60,50 50,62 60,50' fill='none' stroke='#f97316' stroke-width='1.5'/><polygon points='60,38 70,50 60,62 70,50' fill='none' stroke='#f97316' stroke-width='1.5'/><polygon points='80,38 90,50 80,62 90,50' fill='none' stroke='#f97316' stroke-width='1.5'/><polygon points='100,38 110,50 100,62 110,50' fill='none' stroke='#f97316' stroke-width='1.5'/><polygon points='120,38 130,50 120,62 130,50' fill='none' stroke='#f97316' stroke-width='1.5'/><polygon points='140,38 150,50 140,62 150,50' fill='none' stroke='#f97316' stroke-width='1.5'/><polygon points='160,38 170,50 160,62 170,50' fill='none' stroke='#f97316' stroke-width='1.5'/><polygon points='180,38 190,50 180,62 190,50' fill='none' stroke='#f97316' stroke-width='1.5'/><polygon points='200,38 210,50 200,62 210,50' fill='none' stroke='#f97316' stroke-width='1.5'/><text x='240' y='53' fill='#fdba74' font-size='7'>Nid d'abeille</text><rect x='30' y='68' width='200' height='10' rx='2' fill='#3b82f6'/><text x='240' y='77' fill='#93c5fd' font-size='7'>Peau inf.</text><text x='140' y='93' text-anchor='middle' fill='#94a3b8' font-size='8'>Ultra-léger + très rigide en flexion</text></svg>Utilisé pour les panneaux de plancher, les volets, les portes de soute."},
{q:"C'est quoi une porosité dans un composite ?",o:["Une bulle d'air piégée dans la résine","Un renfort fibre mal orienté","Une fissure à la surface","Un excès de résine"],c:0,e:"Une <b>porosité</b> = une <b>bulle d'air</b> piégée dans la matrice (résine) du composite pendant la fabrication. Causes : mauvais vide, mauvaise cuisson, drapage mal compacté. Les porosités réduisent les propriétés mécaniques. Seuil acceptable en aéro : souvent < 2 %."},
{q:"C'est quoi un sandwich (en composite) ?",o:["Deux peaux rigides autour d'un cœur léger","Un empilement de fibres sans matrice","Un défaut de fabrication","Un type de fibre aramide"],c:0,e:"Un <b>sandwich</b> composite = deux <b>peaux</b> fines et résistantes (carbone/époxy ou alu) collées de chaque côté d'un <b>cœur</b> léger (nid d'abeille ou mousse). Comme un sandwich : le pain (peaux) résiste, le fromage (cœur) maintient l'écartement. Résultat : <b>très rigide et très léger</b>."},
{q:"Pourquoi le composite conduit mal l'électricité ?",o:["La résine est un isolant","Les fibres de carbone sont isolantes","Le composite est trop fin","Il conduit très bien l'électricité"],c:0,e:"La <b>résine époxy</b> (matrice) est un <b>isolant électrique</b>. Les fibres de carbone conduisent un peu, mais pas assez. Problème en aéro : un avion se fait frapper par la foudre en moyenne 1 fois par an. Solution : <b>grillage cuivre</b> (ECF) en surface pour conduire le courant de foudre."},
{q:"Un impact sur un composite est dangereux car :",o:["Il peut créer un délaminage invisible","Il laisse toujours une trace visible","Le composite se répare tout seul","Les impacts n'endommagent pas les composites"],c:0,e:"Un choc (outil tombé, grêle) sur un composite peut créer un <b>délaminage interne</b> (séparation entre les plis) <b>invisible en surface</b>. C'est le fameux <b>BVID</b> (Barely Visible Impact Damage). Sur un métal, un choc laisse une bosse visible. Sur un composite, la surface peut sembler intacte alors que la structure est endommagée à l'intérieur."},
],
L2:[
{q:"BVID signifie :",o:["Barely Visible Impact Damage","Basic Visual Inspection Data","Broken Valve Internal Defect","Bonded Void Inspection Depth"],c:0,e:"<b>BVID</b> = Barely Visible Impact Damage = dommage d'impact <b>à peine visible</b>. Un choc outil ou grêle peut provoquer un <b>délaminage interne invisible</b> en surface. C'est un scénario de dimensionnement critique en aéro composite."},
{q:"La porosité dans un composite est causée par :",o:["Des bulles d'air piégées à la cuisson","Une température trop basse du moule","Un excès de fibres de renfort","Un manque de peinture de protection"],c:0,e:"La <b>porosité</b> = bulles d'air piégées dans la matrice lors de la cuisson. Causes : mauvais dégazage, drapage mal compacté, cycle autoclave mal réglé. Conséquence : propriétés mécaniques <b>réduites</b>. Seuil acceptable : souvent < 2 % en aéro."},
{q:"L'érosion du bord d'attaque composite est traitée par :",o:["Revêtement polyuréthane ou titane collé","Peinture standard de protection","Grillage cuivre anti-foudre","Vernis haute température"],c:0,e:"Le bord d'attaque subit l'<b>érosion</b> (pluie, sable, grêle à grande vitesse). On colle un <b>revêtement en polyuréthane</b> ou une bande de <b>titane</b> sur le bord d'attaque pour protéger le composite."},
{q:"La tolérance aux dommages en aéro signifie :",o:["La structure doit tenir même avec un défaut","La pièce doit être parfaite sans aucun défaut","On remplace chaque pièce endommagée immédiatement","Les composites n'ont jamais de défauts"],c:0,e:"La <b>tolérance aux dommages</b> (damage tolerance) = la structure est dimensionnée pour <b>supporter un certain niveau de dommage</b> (fissure, délaminage) sans perdre sa capacité portante entre deux inspections. C'est la philosophie de certification en aéro : pas de rupture catastrophique, même avec des défauts."},
{q:"Réparer un composite vs un métal :",o:["Le composite se répare par patches collés, le métal par soudure ou rivetage","Le composite ne peut jamais être réparé","Le métal ne peut jamais être réparé","Les deux se réparent de la même façon"],c:0,e:"Réparation <b>composite</b> : on meule la zone endommagée et on colle un <b>patch</b> de fibres imprégnées de résine, puis on cuit (sac à vide + couverture chauffante). Réparation <b>métal</b> : on rive une tôle de renfort ou on soude. Les réparations composite sont plus délicates et nécessitent une qualification spécifique."},
{q:"L'ingestion d'eau dans un nid d'abeille est dangereuse car :",o:["L'eau alourdit la pièce et gèle en altitude","L'eau renforce le nid d'abeille","L'eau n'entre jamais dans un nid d'abeille","L'eau protège contre la corrosion"],c:0,e:"Si les peaux du sandwich sont endommagées, l'eau peut <b>entrer dans les alvéoles</b> du nid d'abeille. Problèmes : <b>alourdissement</b> (des dizaines de kg en plus), <b>gel en altitude</b> (-50 °C → l'eau gèle et dilate, endommageant les peaux), <b>corrosion</b> de l'âme alu. Détection : ultrasons ou thermographie."},
],L3:[
{q:"La CAI (Compression After Impact) est critique pour les composites car :",o:["Le délaminage réduit fortement la résistance en compression","Les composites sont faibles en traction après impact","La compression n'affecte que les métaux","Le délaminage augmente la résistance"],c:0,e:"Un impact crée du <b>délaminage</b>. Les plis délaminés <b>flambent</b> sous compression → la résistance en compression chute de 30 à 50 %. La <b>CAI</b> est donc la propriété <b>dimensionnante</b> des composites structuraux aéro. On la mesure sur éprouvettes impactées selon ASTM D7137."},
{q:"Le C-scan en immersion vs le C-scan par couplant :",o:["L'immersion plonge la pièce dans l'eau, le couplant utilise un gel","Les deux sont identiques","L'immersion est moins précise","Le couplant nécessite un bain d'huile"],c:0,e:"<b>C-scan immersion</b> : la pièce et le transducteur sont dans un <b>bac d'eau</b>. Meilleur couplage acoustique, plus précis. Standard en production. <b>C-scan par contact/couplant</b> : gel ou eau locale entre le capteur et la pièce. Plus pratique en maintenance (pas besoin de bac). Moins reproductible."},
{q:"La thermographie active détecte un délaminage car :",o:["Le défaut perturbe la diffusion thermique dans l'épaisseur","La caméra IR mesure la dureté","Le délaminage émet de la chaleur","Le composite devient transparent aux IR"],c:0,e:"On envoie un <b>flash thermique</b> sur la surface. La chaleur diffuse dans l'épaisseur. Un <b>délaminage</b> (air entre les plis) fait <b>barrage</b> à la diffusion → la zone au-dessus du défaut reste <b>plus chaude</b> plus longtemps. La caméra IR voit cette anomalie thermique. Rapide, sans contact, idéal pour les grandes surfaces."},
]},
