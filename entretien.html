function saveState(){
  try{localStorage.setItem(STORE_KEY, JSON.stringify({checks:state.checks}))}catch(e){}
}

  try{

function render(){
  renderNav();
  renderPage();
}

function renderNav(){
  const nav = document.getElementById('navTabs');
  nav.innerHTML = TABS.map(t =>
    `<button class="nav-btn${t.id===state.tab?' active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function switchTab(id){
  state.tab = id;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderPage(){
  const main = document.getElementById('mainContent');
  switch(state.tab){
    case 'general': main.innerHTML = renderGeneral(); break;
    case 'aero': main.innerHTML = renderAero(); break;
    case 'safran': main.innerHTML = renderSafran(); break;
    case 'thales': main.innerHTML = renderThales(); break;
    case 'hutchinson': main.innerHTML = renderHutchinson(); break;
  }
  restoreChecks();
}

// =====================================================================
// HELPERS
// =====================================================================
function renderAccordion(id, title, body, lang){
  const langClass = lang && lang.includes('FR') ? 'fr' : '';
  return `<div class="card" id="card_${id}">
    <div class="card-head" onclick="toggleCard('${id}')">
      <input type="checkbox" class="card-check" data-id="${id}" onclick="event.stopPropagation();toggleCheck('${id}',this.checked)">
      <div class="card-title">${title}</div>
      ${lang ? `<span class="card-lang ${langClass}">${lang}</span>` : ''}
      <span class="card-arrow">&#9660;</span>
    </div>
    <div class="card-body">${body}</div>
  </div>`;
}

function toggleCard(id){
  const card = document.getElementById('card_'+id);
  card.classList.toggle('open');
}

function toggleCheck(id, checked){
  state.checks[id] = checked;
  saveState();
  updateProgress();
}

function restoreChecks(){
  document.querySelectorAll('.card-check').forEach(cb => {
    const id = cb.dataset.id;
    if(state.checks[id]) cb.checked = true;
  });
  updateProgress();
}

function updateProgress(){
  const bar = document.getElementById('genProgress');
  if(!bar) return;
  const allChecks = document.querySelectorAll('.card-check');
  if(allChecks.length === 0) return;
  const checked = [...allChecks].filter(c => c.checked).length;
  bar.style.width = Math.round(checked/allChecks.length*100)+'%';
}

// =====================================================================
// TIMER
// =====================================================================
function toggleTimer(){
  const btn = document.getElementById('timerBtn');
  const disp = document.getElementById('timerDisp');
  if(!btn || !disp) return;

  if(state.timerRunning){
    clearInterval(state.timerInterval);
    state.timerRunning = false;
    btn.textContent = 'Reset';
    btn.onclick = resetTimer;
  } else {
    state.timerSeconds = 0;
    state.timerRunning = true;
    btn.textContent = 'Stop';
    disp.className = 'timer-display';
    state.timerInterval = setInterval(() => {
      state.timerSeconds++;
      const m = Math.floor(state.timerSeconds/60);
      const s = state.timerSeconds%60;
      disp.textContent = m+':'+(s<10?'0':'')+s;
      if(state.timerSeconds >= 30 && state.timerSeconds < 35){
        disp.className = 'timer-display warn';
      } else if(state.timerSeconds >= 35){
        disp.className = 'timer-display over';
      }
    }, 1000);
  }
}

function resetTimer(){
  const btn = document.getElementById('timerBtn');
  const disp = document.getElementById('timerDisp');
  if(!btn || !disp) return;
  clearInterval(state.timerInterval);
  state.timerRunning = false;
  state.timerSeconds = 0;
  disp.textContent = '0:00';
  disp.className = 'timer-display';
  btn.textContent = 'Start';
  btn.onclick = toggleTimer;
}

// Thales timer (2min30 target)
let thalesTimerState = {running:false, seconds:0, interval:null};
function toggleThalesTimer(){
  const btn = document.getElementById('thalesTimerBtn');
  const disp = document.getElementById('thalesTimerDisp');
  if(!btn || !disp) return;
  if(thalesTimerState.running){
    clearInterval(thalesTimerState.interval);
    thalesTimerState.running = false;
    btn.textContent = 'Reset';
    btn.onclick = resetThalesTimer;
  } else {
    thalesTimerState.seconds = 0;
    thalesTimerState.running = true;
    btn.textContent = 'Stop';
    disp.className = 'timer-display';
    thalesTimerState.interval = setInterval(() => {
      thalesTimerState.seconds++;
      const m = Math.floor(thalesTimerState.seconds/60);
      const s = thalesTimerState.seconds%60;
      disp.textContent = m+':'+(s<10?'0':'')+s;
      if(thalesTimerState.seconds >= 150 && thalesTimerState.seconds < 165){
        disp.className = 'timer-display warn';
      } else if(thalesTimerState.seconds >= 165){
        disp.className = 'timer-display over';
      }
    }, 1000);
  }
}
function resetThalesTimer(){
  const btn = document.getElementById('thalesTimerBtn');
  const disp = document.getElementById('thalesTimerDisp');
  if(!btn || !disp) return;
  clearInterval(thalesTimerState.interval);
  thalesTimerState = {running:false, seconds:0, interval:null};
  disp.textContent = '0:00';
  disp.className = 'timer-display';
  btn.textContent = 'Start';
  btn.onclick = toggleThalesTimer;
}
