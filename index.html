body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:400px;width:100%}
h1{grid-column:1/-1;text-align:center;font-size:22px;color:#1a1a2e;margin-bottom:8px}
a{text-decoration:none;background:white;border-radius:16px;padding:28px 20px;text-align:center;border:1px solid #e5e7eb;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:all .2s}
a:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.emoji{font-size:48px;display:block;margin-bottom:12px}
.label{font-size:15px;font-weight:700;color:#1a1a2e}
.sub{font-size:12px;color:#6b7280;margin-top:4px}
</style>
</head>
